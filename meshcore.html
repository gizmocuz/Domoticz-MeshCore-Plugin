                ? `<span class="row-map" data-node="${escHtml(name)}" data-lat="${slots.lat}" data-lon="${slots.lon}" title="Show on map"><i class="fa-solid fa-location-dot"></i></span>`
                : "";
            const isDirect = hops === "0";
            const directHtml = isDirect
                ? `<span class="row-direct" title="Direct neighbour (0 hops)"><i class="fa-solid fa-tower-broadcast"></i></span>`
                : "";
            return `
        <div class="contact-row${selectedCls}" data-node="${escHtml(name)}">
          <span class="row-check"><span class="${checkCls}" data-node="${escHtml(name)}" data-checked="${isChecked ? 1 : 0}" role="checkbox" aria-checked="${isChecked}"><i class="fa-regular ${checkIcon}"></i></span></span>
          <span class="row-status ${online ? "online" : "offline"}" title="${online ? "Online" : "Offline"}"></span>
          <div class="row-name">${favHtml}${mapInline}${escHtml(name)}${directHtml}</div>
          <div class="row-type">${escHtml(typeLabel)}</div>
          <div class="row-meta">${escHtml(lastSeen || "—")}</div>
          <div class="row-snr">${snr ? escHtml(snr) + " dB" : "—"}</div>
          <div class="row-hops">${hops !== "" ? hops + " hops" : "—"}</div>
          <button class="row-remove" title="Remove contact" data-node="${escHtml(name)}"><i class="fa-solid fa-trash"></i></button>
        </div>`;
        }

        function _renderListHeader(visibleNames) {
            const allChecked = visibleNames.length > 0 && visibleNames.every(n => _selectedContacts.has(n));
            const someChecked = visibleNames.some(n => _selectedContacts.has(n));
            const indeterminate = someChecked && !allChecked;
            const count = visibleNames.filter(n => _selectedContacts.has(n)).length;
            const headIcon = allChecked ? "fa-square-check" : (indeterminate ? "fa-square-minus" : "fa-square");
            const headCls  = allChecked ? "row-check-box checked" : (indeterminate ? "row-check-box indeterminate" : "row-check-box");
            return `
        <div class="contact-row-header">
          <span class="row-check"><span id="bulk-toggle" class="${headCls}" data-checked="${allChecked ? 1 : 0}" role="checkbox" aria-checked="${allChecked}"><i class="fa-regular ${headIcon}"></i></span></span>
          <span></span>
          <div class="row-bulk-actions">
            <span class="selected-count">${count > 0 ? count + " selected" : ""}</span>
            <button id="bulk-delete" class="danger" ${count === 0 ? "disabled" : ""}>
              <i class="fa-solid fa-trash"></i> Delete selected
            </button>
          </div>
        </div>`;
        }

        function _renderContacts(remoteNodes, liveSlotsOf) {
            const items = _buildContactGroups(remoteNodes, liveSlotsOf);
            const grid = document.getElementById("contacts-grid");
            const list = document.getElementById("contacts-list");
            if (!grid || !list) return;

            // Update the count badge next to the "Contacts" header
            const countEl = document.getElementById("contacts-count");
            if (countEl) {
                const total = remoteNodes.length;
                const shown = items.length;
                countEl.textContent = shown === total ? `(${total})` : `(${shown} / ${total})`;
            }

            const empty = !items.length;
            const emptyHtml = `<div class="contacts-empty">No contacts match the filter.</div>`;

            if (_viewMode === "list") {
                grid.style.display = "none";
                list.style.display = "";
                if (empty) {
                    list.innerHTML = emptyHtml;
                } else {
                    const visibleNames = items.map(it => it.name);
                    list.innerHTML = _renderListHeader(visibleNames) + items.map(_renderListRow).join("");
                }
            } else {
                list.style.display = "none";
                grid.style.display = "";
                grid.innerHTML = empty ? emptyHtml : items.map(it => renderNode(it.name, it.slots, false)).join("");
            }
            _reapplyComposeSelection();
        }

        function _reapplyComposeSelection() {
            const sel = document.getElementById("compose-target");
            if (!sel) return;
            const v = sel.value;
            document.querySelectorAll(".compose-selected").forEach(el => el.classList.remove("compose-selected"));
            if (!v || v.startsWith("#")) return;
            document.querySelectorAll(`.node-card[data-node="${CSS.escape(v)}"], .contact-row[data-node="${CSS.escape(v)}"]`)
                .forEach(el => el.classList.add("compose-selected"));
        }

        // ── Derive node list from device map (or fallback suffix-sniff) ───────────────

        function _nodeList(all) {
            if (_deviceMap && _deviceMap.nodes) {
                const selfName = _deviceMap.self || null;
                const remoteNodes = Object.keys(_deviceMap.nodes).filter(n => n !== selfName);
                return { selfName, remoteNodes };
            }
            // Fallback for fresh install before first heartbeat writes the JSON
            let selfName = null;
            for (const d of all) {
                if (d.Name.endsWith(" Uptime") && !selfName)
                    selfName = d.Name.slice(0, -" Uptime".length);
            }
            const seenRemote = new Set();
            const remoteNodes = [];
            for (const d of all) {
                if (d.Name.endsWith(" Hops")) {
                    const name = d.Name.slice(0, -" Hops".length);
                    if (!seenRemote.has(name)) { seenRemote.add(name); remoteNodes.push(name); }
                }
            }
            return { selfName, remoteNodes };
        }

        // ── Main data loader ─────────────────────────────────────────────────────────
        // Phase 1 (instant): render from the JSON snapshot — no API call needed.
        // Phase 2 (live):    fetch the Domoticz API and patch values in-place.

        let _initialRenderDone = false;
        let _deviceMapFreshFromInit = false;

        async function initialRender() {
            if (!_deviceMap) return;   // nothing to show yet

            const { selfName, remoteNodes } = _nodeList([]);
            if (!selfName && !remoteNodes.length) return;

            if (selfName) {
                const slots = (_deviceMap.nodes && _deviceMap.nodes[selfName]) || {};
                document.getElementById("self-grid").innerHTML = renderNode(selfName, slots, true);
                document.getElementById("self-section").style.display = "";
            }
            if (remoteNodes.length) {
                _renderContacts(remoteNodes, (n) => (_deviceMap.nodes && _deviceMap.nodes[n]) || {});
                document.getElementById("contacts-section").style.display = "";
            }
            document.getElementById("layout-divider").style.display =
                (selfName && remoteNodes.length) ? "block" : "none";
            document.getElementById("status-msg").style.display = "none";

            // Show snapshot inbox entry immediately as a placeholder (no timestamp yet).
            // Use a flag so loadInboxHistory knows to drop this entry once real history arrives.
            if (_deviceMap.inbox_value && !_inboxHistory.length) {
                const { channel, sender, text } = _parseInboxData(_deviceMap.inbox_value);
                const container = document.getElementById("inbox-history");
                _inboxHistory.push({ time: "", channel, sender, text, _snapshot: true });
                _renderInbox(container);
            }

            // Timestamp from written_at so the user knows how fresh the snapshot is
            if (_deviceMap.written_at) {
                const d = new Date(_deviceMap.written_at * 1000);
                document.getElementById("last-updated").textContent =
                    `Snapshot ${d.getHours().toString().padStart(2, "0")}:${d.getMinutes().toString().padStart(2, "0")}:${d.getSeconds().toString().padStart(2, "0")}`;
            }

            _initialRenderDone = true;
        }

        async function loadData() {
            if (!_initialRenderDone)
                document.getElementById("status-msg").textContent = "Refreshing…";
            try {
                // Reload the device map so new nodes / renamed slots are picked up.
                // Skip on the very first call — it was already loaded fresh during init.
                if (_deviceMapFreshFromInit) {
                    _deviceMapFreshFromInit = false;
                } else {
                    await _loadDeviceMap();
                }

                // Phase 1: if we haven't shown anything yet, render from snapshot immediately
                if (!_initialRenderDone) await initialRender();

                // Phase 2: fetch live data and patch
                const { all, byIdx } = await fetchDevices();

                const { selfName, remoteNodes } = _nodeList(all);

                if (!selfName && !remoteNodes.length) {
                    document.getElementById("status-msg").textContent = "No contacts found.";
                    return;
                }

                function _liveSlots(name) {
                    const slots = (_deviceMap && _deviceMap.nodes && _deviceMap.nodes[name]) || {};
                    const live = {};
                    for (const key of Object.keys(slots)) {
                        const snap = slots[key];
                        live[key] = snap && snap.idx && byIdx[snap.idx] ? byIdx[snap.idx] : snap;
                    }
                    return live;
                }

                // ── Connected node ──
                const selfGrid = document.getElementById("self-grid");
                const selfSection = document.getElementById("self-section");
                if (selfName) {
                    if (!selfGrid.querySelector(`.node-card[data-node="${CSS.escape(selfName)}"]`)) {
                        selfGrid.innerHTML = renderNode(selfName, _liveSlots(selfName), true);
                    } else {
                        patchNode(selfName, true, byIdx);
                    }
                    selfSection.style.display = "";
                } else {
                    selfSection.style.display = "none";
                }

                // ── Contacts ──
                // Always rebuild via the filter/sort/group pipeline. Patching
                // is replaced by full rebuild — contact counts are tiny and
                // filters/groups change which items are shown anyway.
                const contactsSection = document.getElementById("contacts-section");
                if (remoteNodes.length) {
                    _lastLiveSlotsOf = _liveSlots;
                    _lastRemoteNodes = remoteNodes;
                    _renderContacts(remoteNodes, _liveSlots);
                    contactsSection.style.display = "";
                } else {
                    contactsSection.style.display = "none";
                }

                document.getElementById("layout-divider").style.display =
                    (selfName && remoteNodes.length) ? "block" : "none";
                document.getElementById("status-msg").style.display = "none";

                // Refresh compose targets in case new nodes / channels appeared
                _populateComposeTargets();
                _refreshNodeSettingsActive();

                // Inbox — load in background so the node grid update is not blocked
                const inboxIdx = _deviceMap && _deviceMap.inbox;
                const inboxDev = inboxIdx ? byIdx[inboxIdx] : (all.find(d => d.Name === "Mesh Inbox") || null);
                loadInboxHistory(inboxDev);

                const now = new Date();
                document.getElementById("last-updated").textContent =
                    `Updated ${now.getHours().toString().padStart(2, "0")}:${now.getMinutes().toString().padStart(2, "0")}:${now.getSeconds().toString().padStart(2, "0")}`;

            } catch (err) {
                document.getElementById("status-msg").textContent = `Error loading data: ${err.message}`;
                document.getElementById("status-msg").style.display = "block";
            }
        }

        // Click a contact card / list row → select that node as the compose target.
        // Uses event delegation so it survives re-renders.
        function _initContactClickToCompose() {
            const handler = (ev) => {
                // Bulk-delete button
                if (ev.target.closest("#bulk-delete")) {
                    ev.stopPropagation();
                    _bulkDeleteSelectedContacts();
                    return;
                }
                // Bulk toggle-all checkbox (custom icon)
                const bulk = ev.target.closest("#bulk-toggle");
                if (bulk) {
                    ev.stopPropagation();
                    const newChecked = bulk.dataset.checked !== "1";
                    _onBulkToggle(newChecked);
                    return;
                }
                // Per-row checkbox in list view — toggle membership, don't change compose target
                const cb = ev.target.closest(".row-check-box");
                if (cb && cb.id !== "bulk-toggle") {
                    ev.stopPropagation();
                    const n = cb.dataset.node;
                    if (n) {
                        if (cb.dataset.checked === "1") _selectedContacts.delete(n);
                        else                            _selectedContacts.add(n);
                        _rerenderContacts();
                    }
                    return;
                }
                // Favorite toggle (card overlay)
                const favBtn = ev.target.closest(".fav-toggle");
                if (favBtn) {
                    ev.stopPropagation();
                    ev.preventDefault();
                    _toggleFavorite(favBtn.dataset.node);
                    return;
                }
                // Map button (card overlay or list-row icon)
                const mapBtn = ev.target.closest(".map-toggle, .row-map");
                if (mapBtn) {
                    ev.stopPropagation();
                    ev.preventDefault();
                    _openMapPanel(mapBtn.dataset.node, Number(mapBtn.dataset.lat), Number(mapBtn.dataset.lon));
                    return;
                }
                // Remove button (single)
                const removeBtn = ev.target.closest(".row-remove");
                if (removeBtn) {
                    ev.stopPropagation();
                    _removeContact(removeBtn.dataset.node);
                    return;
                }
                // Don't hijack clicks on metric links
                if (ev.target.closest("a")) return;
                const el = ev.target.closest(".node-card, .contact-row");
                if (!el) return;
                const name = el.dataset.node;
                if (!name) return;
                const sel = document.getElementById("compose-target");
                if (!sel) return;
                const match = [...sel.options].find(o => o.value === name);
                if (match) {
                    sel.value = name;
                    _persistComposeTarget(name);
                    _reapplyComposeSelection();
                    const input = document.getElementById("compose-input");
                    if (input) input.focus();
                }
            };
            const grid = document.getElementById("contacts-grid");
            const list = document.getElementById("contacts-list");
            if (grid && !grid._composeBound) { grid._composeBound = true; grid.addEventListener("click", handler); }
            if (list && !list._composeBound) { list._composeBound = true; list.addEventListener("click", handler); }

            // Persist user-driven changes to the compose-target dropdown
            const composeSel = document.getElementById("compose-target");
            if (composeSel && !composeSel._persistBound) {
                composeSel._persistBound = true;
                composeSel.addEventListener("change", () => {
                    _persistComposeTarget(composeSel.value);
                    _reapplyComposeSelection();
                });
            }

            // Toolbar wiring (search / type filter / view toggle)
            const nameInput = document.getElementById("filter-name");
            const btnCards  = document.getElementById("view-cards");
            const btnList   = document.getElementById("view-list");
            _initNodeSettings();
            if (nameInput && !nameInput._bound) {
                nameInput._bound = true;
                nameInput.addEventListener("input", (e) => {
                    _filterName = e.target.value;
                    _selectedContacts.clear();   // changing the filter resets the bulk selection
                    _rerenderContacts();
                });
            }
            if (btnCards && !btnCards._bound) {
                btnCards._bound = true;
                btnCards.addEventListener("click", () => { _viewMode = "cards"; btnCards.classList.add("active"); btnList.classList.remove("active"); _rerenderContacts(); });
            }
            if (btnList && !btnList._bound) {
                btnList._bound = true;
                btnList.addEventListener("click", () => { _viewMode = "list"; btnList.classList.add("active"); btnCards.classList.remove("active"); _rerenderContacts(); });
            }
        }

        // Rerender contacts using the last live-resolver from loadData() if we have one,
        // otherwise fall back to the JSON snapshot.
        function _rerenderContacts() {
            if (_lastLiveSlotsOf && _lastRemoteNodes.length) {
                _renderContacts(_lastRemoteNodes, _lastLiveSlotsOf);
                return;
            }
            if (!_deviceMap || !_deviceMap.nodes) return;
            const { selfName } = _nodeList([]);
            const remoteNodes = Object.keys(_deviceMap.nodes).filter(n => n !== selfName);
            _renderContacts(remoteNodes, (n) => (_deviceMap.nodes && _deviceMap.nodes[n]) || {});
        }

        // Re-apply active highlights on all settings buttons based on the current device map.
        // Called whenever the device map JSON is reloaded.
        function _refreshNodeSettingsActive() {
            for (const def of _SETTINGS_DEFS) {
                const cur = _currentSettingValue(def.key);
                document.querySelectorAll(`.settings-btn[data-key="${def.key}"]`).forEach(b => {
                    b.classList.toggle("active", Number(b.dataset.val) === Number(cur));
                });
            }
            // Sync the flood-scope input — but don't overwrite if user is editing it
            const scopeInput = document.getElementById("settings-flood-scope");
            if (scopeInput && document.activeElement !== scopeInput && _deviceMap) {
                scopeInput.value = _deviceMap.default_flood_scope || "";
            }
        }

        // Toggle every currently-visible row's checkbox state. "visible" = passes the active filter.
        function _onBulkToggle(checked) {
            const visibleNames = _currentVisibleContactNames();
            if (checked) visibleNames.forEach(n => _selectedContacts.add(n));
            else         visibleNames.forEach(n => _selectedContacts.delete(n));
            _rerenderContacts();
        }

        function _currentVisibleContactNames() {
            // Mirrors what _buildContactGroups would render now
            if (!_lastLiveSlotsOf || !_lastRemoteNodes.length) return [];
            return _buildContactGroups(_lastRemoteNodes, _lastLiveSlotsOf).map(it => it.name);
        }

        async function _bulkDeleteSelectedContacts() {
            const names = [..._selectedContacts];
            if (!names.length) return;
            if (!confirm(`Remove ${names.length} contact${names.length === 1 ? "" : "s"} from the device?\n\n${names.join(", ")}\n\nThis cannot be undone.`)) return;
            const sendIdx = _deviceMap && _deviceMap.send_idx;
            if (!sendIdx) { alert("Cannot remove: Mesh Send device not found."); return; }
            // Sequential, with a brief delay so the plugin can finish each !remove
            // cycle before the next overwrites the Mesh Send device value.
            let failures = [];
            for (const name of names) {
                try {
                    const url = `/json.htm?type=command&param=udevice&idx=${sendIdx}&nvalue=0&svalue=${encodeURIComponent("!remove " + name)}`;
                    const r = await fetch(url, { method: "GET" });
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    if (_deviceMap && _deviceMap.nodes) delete _deviceMap.nodes[name];
                    _selectedContacts.delete(name);
                    await new Promise(res => setTimeout(res, 250));
                } catch (err) {
                    failures.push(`${name}: ${err.message}`);
                }
            }
            _rerenderContacts();
            if (failures.length) alert("Some removals failed:\n\n" + failures.join("\n"));
        }

        // ── Map side panel (Leaflet) ─────────────────────────────────────────────
        let _leafletMap = null;
        let _leafletMarker = null;

        function _openMapPanel(name, lat, lon) {
            const panel = document.getElementById("map-panel");
            const backdrop = document.getElementById("map-backdrop");
            const title = document.getElementById("map-panel-title");
            const coords = document.getElementById("map-panel-coords");
            const ext = document.getElementById("map-panel-external");
            if (!panel || !backdrop) return;

            title.textContent = name;
            coords.textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
            // meshcore.co.uk/map.html may or may not honour lat/lon params — link out anyway
            ext.href = `https://meshcore.co.uk/map.html?lat=${lat}&lon=${lon}`;

            panel.classList.add("open");
            backdrop.classList.add("open");
            panel.setAttribute("aria-hidden", "false");

            // Defer until Leaflet is loaded; give up after ~5s with a fallback message
            const canvas = document.getElementById("map-canvas");
            let tries = 0;
            const init = () => {
                if (typeof L === "undefined") {
                    if (++tries > 50) {
                        canvas.innerHTML = `<div style="padding:24px;color:var(--muted);font-size:0.85rem;text-align:center;">
                            Leaflet failed to load from CDN.<br>Your browser may be blocking external scripts.<br>
                            Coordinates: <code>${lat.toFixed(6)}, ${lon.toFixed(6)}</code>
                        </div>`;
                        return;
                    }
                    setTimeout(init, 100); return;
                }
                if (!_leafletMap) {
                    _leafletMap = L.map(canvas, { zoomControl: true }).setView([lat, lon], 13);
                    // OpenStreetMap default tiles — broadly compatible and not on tracker
                    // block lists. CartoDB's dark tiles were getting blocked by Edge/Firefox
                    // tracking prevention.
                    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                        maxZoom: 19,
                    }).addTo(_leafletMap);
                } else {
                    _leafletMap.setView([lat, lon], 13);
                }
                if (_leafletMarker) _leafletMarker.remove();
                // CSS-only marker — avoids bundling Leaflet's PNG icons
                const pinIcon = L.divIcon({
                    className: "mc-pin",
                    html: '<div class="mc-pin-inner"></div>',
                    iconSize: [20, 20],
                    iconAnchor: [10, 20],
                    popupAnchor: [0, -16],
                });
                _leafletMarker = L.marker([lat, lon], { icon: pinIcon }).addTo(_leafletMap).bindPopup(name).openPopup();
                // Force a redraw — the panel just animated in, container size may be stale
                setTimeout(() => _leafletMap.invalidateSize(), 280);
            };
            init();
        }

        function _closeMapPanel() {
            const panel = document.getElementById("map-panel");
            const backdrop = document.getElementById("map-backdrop");
            if (!panel || !backdrop) return;
            panel.classList.remove("open");
            backdrop.classList.remove("open");
            panel.setAttribute("aria-hidden", "true");
        }

        // Hook up close interactions once on script load
        (function _bindMapPanel() {
            const close = document.getElementById("map-panel-close");
            const backdrop = document.getElementById("map-backdrop");
            if (close)    close.addEventListener("click", _closeMapPanel);
            if (backdrop) backdrop.addEventListener("click", _closeMapPanel);
            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") _closeMapPanel();
            });
        })();

        async function _toggleFavorite(name) {
            if (!name) return;
            const sendIdx = _deviceMap && _deviceMap.send_idx;
            if (!sendIdx) { alert("Cannot toggle favorite: Mesh Send device not found."); return; }
            const wasFav = _isFavorite(name);
            const action = wasFav ? "remove" : "add";
            const cmd = `!favorite ${action} ${name}`;
            try {
                const url = `/json.htm?type=command&param=udevice&idx=${sendIdx}&nvalue=0&svalue=${encodeURIComponent(cmd)}`;
                const r = await fetch(url, { method: "GET" });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                // Optimistic update of local cache so the UI reflects it immediately
                if (_deviceMap) {
                    const arr = Array.isArray(_deviceMap.favorites) ? _deviceMap.favorites.slice() : [];
                    const i = arr.indexOf(name);
                    if (wasFav && i >= 0) arr.splice(i, 1);
                    else if (!wasFav && i < 0) arr.push(name);
                    _deviceMap.favorites = arr;
                }
                _rerenderContacts();
            } catch (err) {
                alert(`Failed to toggle favorite: ${err.message}`);
            }
        }

        // Remove a contact: send "!remove <name>" via the Mesh Send device.
        async function _removeContact(name) {
            if (!name) return;
            if (!confirm(`Remove contact "${name}" from the device?\n\nThis cannot be undone.`)) return;
            const sendIdx = _deviceMap && _deviceMap.send_idx;
            if (!sendIdx) { alert("Cannot remove: Mesh Send device not found."); return; }
            try {
                const url = `/json.htm?type=command&param=udevice&idx=${sendIdx}&nvalue=0&svalue=${encodeURIComponent("!remove " + name)}`;
                const r = await fetch(url, { method: "GET" });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                // Optimistic: drop from local map so it disappears immediately
                if (_deviceMap && _deviceMap.nodes) delete _deviceMap.nodes[name];
                _rerenderContacts();
            } catch (err) {
                alert(`Failed to remove contact: ${err.message}`);
            }
        }

        // Init: load JSON files, render snapshot instantly, then start live refresh loop.
        Promise.all([_loadChannelNames(), _loadDeviceMap()]).then(async () => {
            _deviceMapFreshFromInit = true;
            _populateComposeTargets();
            await initialRender();   // instant — no API call
            _initContactClickToCompose();
            loadData();              // kick off first live refresh immediately
            setInterval(loadData, 10000);
        });

        // ── Compose bar ───────────────────────────────────────────────────────────

        const LS_COMPOSE_TARGET = "meshcore.composeTarget";

        function _persistComposeTarget(val) {
            try { if (val) localStorage.setItem(LS_COMPOSE_TARGET, val); } catch (_) {}
        }
        function _loadComposeTarget() {
            try { return localStorage.getItem(LS_COMPOSE_TARGET) || ""; } catch (_) { return ""; }
        }

        function _populateComposeTargets() {
            const sel = document.getElementById("compose-target");
            if (!sel) return;
            // Use current selection if any, else fall back to last-used target from localStorage
            const prev = sel.value || _loadComposeTarget();
            const prevText = sel.options[sel.selectedIndex] ? sel.options[sel.selectedIndex].textContent : "";
            const wasReply = sel.options[sel.selectedIndex] ? !!sel.options[sel.selectedIndex].dataset.reply : false;
            sel.innerHTML = "";

            // Channel options from meshcore_channels.json
            const chanEntries = Object.entries(_channelNames);
            if (chanEntries.length) {
                const grp = document.createElement("optgroup");
                grp.label = "Channels";
                for (const [idx, name] of chanEntries) {
                    const o = document.createElement("option");
                    o.value = `#${name}`;
                    o.textContent = name;
                    grp.appendChild(o);
                }
                sel.appendChild(grp);
            } else {
                // fallback: always offer ch0
                const o = document.createElement("option");
                o.value = "#0";
                o.textContent = "Ch 0 (flood)";
                sel.appendChild(o);
            }

            // Node options from device map
            if (_deviceMap && _deviceMap.nodes) {
                const grp = document.createElement("optgroup");
                grp.label = "Direct";
                const selfName = _deviceMap.self || null;
                for (const name of Object.keys(_deviceMap.nodes)) {
                    if (name === selfName) continue;   // can't DM yourself
                    const o = document.createElement("option");
                    o.value = name;
                    o.textContent = `➤ ${name}`;
                    grp.appendChild(o);
                }
                if (grp.childElementCount) sel.appendChild(grp);
            }

            // Restore previous selection if still present
            if (prev && [...sel.options].some(o => o.value === prev)) {
                sel.value = prev;
            } else if (prev && wasReply) {
                // Re-inject the temporary reply option that was wiped by the rebuild
                let tmp = document.createElement("option");
                tmp.dataset.reply = "1";
                tmp.value = prev;
                tmp.textContent = prevText;
                sel.appendChild(tmp);
                sel.value = prev;
            }
        }

        async function _sendMessage() {
            const sel = document.getElementById("compose-target");
            const input = document.getElementById("compose-input");
            const btn = document.getElementById("compose-send");
            const status = document.getElementById("compose-status");
            if (!sel || !input || !btn) return;

            const target = sel.value.trim();
            const body = input.value.trim();
            if (!body) return;

            // Build the value string the plugin expects: "target: body", "#name: body", or "#idx: body"
            const sendValue = `${target}: ${body}`;

            // Look up the Mesh Send device idx from the device map
            const sendIdx = _deviceMap && _deviceMap.send_idx;
            if (!sendIdx) {
                _setComposeStatus(status, "err", "Send device not found");
                return;
            }

            btn.disabled = true;
            _setComposeStatus(status, "", "⏳");

            try {
                const resp = await fetch(
                    `/json.htm?type=command&param=udevice&idx=${sendIdx}&nvalue=0&svalue=${encodeURIComponent(sendValue)}`
                );
                const data = await resp.json();
                if (data.status === "OK") {
                    input.value = "";
                    _clearReply();
                    _setComposeStatus(status, "ok", "✓ Sent");
                    // Optimistic inbox echo so the user doesn't wait for the next
                    // plugin heartbeat (~30s) to see their own message appear.
                    _addPendingInboxEcho(target, body);
                } else {
                    _setComposeStatus(status, "err", data.message || "Error");
                }
            } catch (e) {
                _setComposeStatus(status, "err", e.message);
            } finally {
                btn.disabled = false;
            }
            setTimeout(() => _setComposeStatus(status, "", ""), 4000);
        }

        function _setComposeStatus(el, cls, text) {
            el.className = `compose-status ${cls}`.trim();
            el.textContent = text;
        }

        // Add a pending placeholder to the inbox so the user sees their own
        // outgoing message immediately. Real send_result will replace this on
        // the next refresh; if no real entry arrives within 90s, drop it.
        function _addPendingInboxEcho(target, body) {
            let channel, sender;
            if (target.startsWith("#")) {
                channel = target.slice(1) || "Public";
                sender = "> Me";
            } else {
                channel = "Private";
                sender = "> " + target;
            }
            const now = new Date();
            const pad = n => String(n).padStart(2, "0");
            const time = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} `
                       + `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
            const id = `pending-${now.getTime()}-${Math.random().toString(36).slice(2,7)}`;
            _inboxHistory.unshift({ time, channel, sender, text: body, _pending: id });
            if (_inboxHistory.length > 200) _inboxHistory.pop();
            _lastRenderedInboxHtml = "";
            const container = document.getElementById("inbox-history");
            if (container) _renderInbox(container);
            setTimeout(() => {
                const idx = _inboxHistory.findIndex(m => m._pending === id);
                if (idx >= 0) {
                    _inboxHistory.splice(idx, 1);
                    _lastRenderedInboxHtml = "";
                    if (container) _renderInbox(container);
                }
            }, 90000);
        }

                    ["❤️", "red heart love"], ["🧡", "orange heart"], ["💛", "yellow heart"], ["💚", "green heart"], ["💙", "blue heart"], ["💜", "purple heart"], ["🖤", "black heart"], ["🤍", "white heart"], ["🤎", "brown heart"], ["💔", "broken heart"], ["❤️‍🔥", "heart on fire"], ["❤️‍🩹", "mending heart"], ["💕", "two hearts"], ["💞", "revolving hearts"], ["💓", "beating heart"], ["💗", "growing heart"], ["💖", "sparkling heart"], ["💘", "heart arrow"], ["💝", "heart ribbon"], ["💟", "heart decoration"], ["☮️", "peace symbol"], ["✝️", "cross"], ["☯️", "yin yang"], ["✅", "check mark green"], ["☑️", "check box"], ["🔘", "radio button"], ["🔴", "red circle"], ["🟠", "orange circle"], ["🟡", "yellow circle"], ["🟢", "green circle"], ["🔵", "blue circle"], ["🟣", "purple circle"], ["⚫", "black circle"], ["⚪", "white circle"], ["🔺", "red triangle up"], ["🔻", "red triangle down"], ["💠", "diamond blue"], ["🔷", "blue diamond large"], ["🔹", "blue diamond small"], ["🔶", "orange diamond large"], ["🔸", "orange diamond small"], ["▶️", "play button"], ["⏸️", "pause button"], ["⏹️", "stop button"], ["⏺️", "record button"], ["⏭️", "next track"], ["⏮️", "previous track"], ["🔀", "shuffle"], ["🔁", "repeat"], ["🔂", "repeat one"], ["🔼", "up button"], ["🔽", "down button"], ["⏫", "fast up"], ["⏬", "fast down"], ["⏩", "fast forward"], ["⏪", "rewind"], ["❌", "cross mark x"], ["⭕", "hollow circle"], ["🚫", "prohibited no"], ["⛔", "no entry"], ["📛", "name badge"], ["🔞", "no under eighteen"], ["❓", "question mark"], ["❗", "exclamation mark"], ["‼️", "double exclamation"], ["⚠️", "warning caution"], ["🔔", "bell notification"], ["🔕", "bell slash muted"], ["🔇", "muted speaker"], ["🔈", "low volume"], ["🔉", "medium volume"], ["🔊", "loud volume"], ["📣", "megaphone"], ["📢", "loudspeaker"], ["💬", "speech bubble"], ["💭", "thought bubble"], ["💤", "zzz sleep"], ["♻️", "recycling"], ["✅", "check"], ["💯", "hundred percent"], ["🆗", "ok"], ["🆕", "new"], ["🆙", "up"], ["🆒", "cool"], ["🆓", "free"], ["🆖", "ng"], ["🅰️", "blood type a"], ["🅱️", "blood type b"], ["🆎", "ab button"], ["🆑", "cl button"], ["🅾️", "blood type o"], ["🆘", "sos"], ["⛽", "fuel pump"], ["🚦", "vertical traffic light"], ["🚥", "horizontal traffic light"], ["🛑", "stop sign"], ["🚧", "construction barrier"], ["📶", "signal bars"], ["🔋", "battery"], ["🌐", "globe internet"], ["#️⃣", "hash"], ["*️⃣", "asterisk"], ["0️⃣", "zero"], ["1️⃣", "one"], ["2️⃣", "two"], ["3️⃣", "three"], ["4️⃣", "four"], ["5️⃣", "five"]
                ]
            },
            {
                label: "Flags", emoji: [
                    ["🏁", "chequered flag"], ["🚩", "triangular flag"], ["🎌", "crossed flags"], ["🏴", "black flag"], ["🏳️", "white flag"], ["🏳️‍🌈", "rainbow flag pride"], ["🏳️‍⚧️", "transgender flag"], ["🏴‍☠️", "pirate flag"], ["🌍", "earth africa europe"], ["🌎", "earth americas"], ["🌏", "earth asia"]
                ]
            },
        ];

        // Flat list for searching across all categories
        const EMOJI_FLAT = EMOJI_CATEGORIES.flatMap(c => c.emoji);

        let _emojiOpen = false;

        function _buildEmojiGrid(list, categorised) {
            const grid = document.getElementById("emoji-grid");
            if (!grid) return;
            const cell = (e, kw) => `<div class="emoji-cell" data-emoji="${e.replace(/"/g, '&quot;')}" title="${kw}">${e}</div>`;
            if (categorised) {
                grid.innerHTML = EMOJI_CATEGORIES.map(cat =>
                    `<div class="emoji-category-label">${cat.label}</div>` +
                    cat.emoji.map(([e, kw]) => cell(e, kw)).join("")
                ).join("");
            } else {
                grid.innerHTML = list.map(([e, kw]) => cell(e, kw)).join("");
            }
        }

        function _filterEmoji(q) {
            const needle = q.trim().toLowerCase();
            if (!needle) {
                _buildEmojiGrid(null, true);
            } else {
                const filtered = EMOJI_FLAT.filter(([, kw]) => kw.includes(needle));
                _buildEmojiGrid(filtered, false);
            }
        }

        function _toggleEmojiPicker(evt) {
            evt.stopPropagation();
            const picker = document.getElementById("emoji-picker");
            if (!picker) return;
            _emojiOpen = !_emojiOpen;
            if (_emojiOpen) {
                _buildEmojiGrid(null, true);
                const search = document.getElementById("emoji-picker-search");
                if (search) search.value = "";
                picker.classList.add("open");
            } else {
                picker.classList.remove("open");
            }
        }

        function _insertEmoji(emoji) {
            const input = document.getElementById("compose-input");
            if (!input) return;
            const start = input.selectionStart ?? input.value.length;
            const end = input.selectionEnd ?? input.value.length;
            input.value = input.value.slice(0, start) + emoji + input.value.slice(end);
            const pos = start + emoji.length;
            input.setSelectionRange(pos, pos);
            input.focus();
            // close picker
            const picker = document.getElementById("emoji-picker");
            if (picker) picker.classList.remove("open");
            _emojiOpen = false;
        }

        // Single delegated listener: handles emoji cell clicks AND outside-click close
        if (!window._mcEmojiListenerAdded) {
            window._mcEmojiListenerAdded = true;
            document.addEventListener("click", (e) => {
            const cell = e.target.closest(".emoji-cell");
            if (cell && cell.dataset.emoji) {
                e.stopPropagation();
                _insertEmoji(cell.dataset.emoji);
                return;
            }
            if (!_emojiOpen) return;
            const picker = document.getElementById("emoji-picker");
            const btn = document.getElementById("emoji-btn");
            if (picker && !picker.contains(e.target) && e.target !== btn) {
                picker.classList.remove("open");
                _emojiOpen = false;
            }
        });
        }

        function _clearReply() {
            // Remove any @[Username] prefix from the input
            const input = document.getElementById("compose-input");
            if (input) input.value = input.value.replace(/^@\[[^\]]*\]\s*/, "");
        }

        function _replyTo(evt, sender, channel) {
            evt.stopPropagation();
            const sel = document.getElementById("compose-target");
            const input = document.getElementById("compose-input");
            if (!sel || !input) return;

            // For channel messages, reply to the same channel (not the sender directly).
            // For private messages (no channel), reply directly to the sender node.
            if (channel) {
                // Find the matching channel option by value label — channel is the display name (e.g. "Public")
                const chanOpt = [...sel.options].find(o => o.textContent === channel || o.textContent.replace(/^#\s*/, "") === channel);
                if (chanOpt) {
                    sel.value = chanOpt.value;
                } else {
                    // Channel not in list yet — add a temporary option
                    let tmp = sel.querySelector(`option[data-reply="1"]`);
                    if (!tmp) {
                        tmp = document.createElement("option");
                        tmp.dataset.reply = "1";
                        sel.appendChild(tmp);
                    }
                    // Use channel name directly — the plugin resolves name → index
                    tmp.value = `#${channel}`;
                    tmp.textContent = `# ${channel} (reply)`;
                    sel.value = tmp.value;
                }
                // Pre-fill the input with @[Username] so the reply is addressed
                const mention = `@[${sender}] `;
                if (!input.value.startsWith(mention)) {
                    input.value = mention + input.value;
                }
            } else {
                // Private message — reply directly to the sender node
                const opt = [...sel.options].find(o => o.value === sender);
                if (opt) {
                    sel.value = sender;
                } else {
                    let tmp = sel.querySelector(`option[data-reply="1"]`);
                    if (!tmp) {
                        tmp = document.createElement("option");
                        tmp.dataset.reply = "1";
                        sel.appendChild(tmp);
                    }
                    tmp.value = sender;
                    tmp.textContent = `➤ ${sender} (reply)`;
                    sel.value = sender;
                }
            }

            input.focus();
            // Place cursor at the end of the input
            input.setSelectionRange(input.value.length, input.value.length);
            // Scroll the compose bar into view in case the inbox list is long.
            document.getElementById("compose-bar").scrollIntoView({ behavior: "smooth", block: "nearest" });
        }

        // Expose functions referenced by inline HTML event handlers to global scope
        window.loadData            = loadData;
        window._onInboxSearch      = _onInboxSearch;
        window._sendMessage        = _sendMessage;
        window._toggleEmojiPicker  = _toggleEmojiPicker;
        window._filterEmoji        = _filterEmoji;
        window._replyTo            = _replyTo;
    })();
    </script>
