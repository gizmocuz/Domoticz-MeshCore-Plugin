<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeshCore Dashboard</title>
    <link rel="stylesheet" href="/font-awesome/css/all.min.css">
    <!-- Leaflet is injected dynamically from an inline <script> (see below)
         because Domoticz custom-template loading does not execute <script src>
         tags reliably. The bundle lives at /templates/leaflet/ and is
         installed alongside this file by the plugin on startup. -->
    <style>
        :root {
            /* Map to Nightglass/Domoticz theme variables; fall back to dark defaults
               so the page also works without any theme loaded. */
            --bg:      var(--dz-bg,          #1e1f26);
            --surface: var(--dz-surface-2,   #2a2b35);
            --border:  var(--dz-border-b,    #3a3b47);
            --accent:  var(--dz-accent,      #4e9af1);
            --green:   var(--dz-success,     #4caf7d);
            --red:     var(--dz-danger,      #e05555);
            --yellow:  var(--dz-warning,     #f0a832);
            --heard:   #b07cff;
            --text:    var(--dz-text,        #e2e4ed);
            --muted:   var(--dz-text-muted,  #7c7f93);
            --radius:  10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        .clock-warn { color: var(--yellow); cursor: help; margin-left: 4px; font-size: 0.8em; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            /* Fill at least the viewport and lay children out as a column so
               the inbox can be pushed to the bottom (margin-top:auto) instead
               of leaving dead space below it. No height/overflow lock — the
               page still scrolls if content is taller than the viewport. */
            min-height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            color-scheme: light dark;
        }
        /* Bound the contacts area so the inbox below stays within reach
           without a long page scroll. The cards/list scroll internally. */
        #contacts-grid,
        #contacts-list {
            max-height: 50vh;
            min-height: 160px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        /* Make the scrollbar clearly visible against the dark surface */
        #contacts-grid::-webkit-scrollbar,
        #contacts-list::-webkit-scrollbar { width: 10px; }
        #contacts-grid::-webkit-scrollbar-track,
        #contacts-list::-webkit-scrollbar-track { background: transparent; }
        #contacts-grid::-webkit-scrollbar-thumb,
        #contacts-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
        }
        #contacts-grid::-webkit-scrollbar-thumb:hover,
        #contacts-list::-webkit-scrollbar-thumb:hover { background: var(--muted); }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 10px;
        }
        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        header h1 span.logo {
            background: var(--accent);
            color: #fff;
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        #last-updated { font-size: 0.8rem; color: var(--muted); }

        #header-stats {
            flex: 1 1 auto;
            min-width: 0;
            font-size: 0.82rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 4px 14px;
            flex-wrap: wrap;
            padding-left: 6px;
        }
        #header-stats .hs-label { color: var(--muted); }
        #header-stats b { color: var(--text); font-weight: 600; }
        #header-stats .hs-client   { color: var(--green); }
        #header-stats .hs-repeater { color: var(--yellow); }
        #header-stats .hs-server   { color: var(--accent); }
        #header-stats .hs-client b,
        #header-stats .hs-repeater b,
        #header-stats .hs-server b { color: inherit; }
        #header-stats .hs-sep { opacity: 0.4; }

        /* ── Statistics side panel ── */
        .stats-cards { display: flex; gap: 10px; margin: 10px 0 4px; }
        .stats-card {
            flex: 1; text-align: center; padding: 12px 6px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        .stats-card .sc-label { font-size: 0.72rem; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.04em; }
        .stats-card .sc-value { font-size: 1.5rem; font-weight: 700;
            color: var(--accent); margin-top: 3px; }
        .stats-tot { font-size: 0.92rem; margin: 4px 0 2px; }
        .stats-tot b { color: var(--text); }
        .stats-tot .st-adv { color: var(--yellow); }
        .stats-tot .st-msg { color: var(--accent); }
        .stats-head {
            display: flex; align-items: center; justify-content: space-between;
            gap: 8px;
        }
        #stats-reset {
            font-size: 0.76rem; color: var(--red);
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 6px; padding: 3px 9px; cursor: pointer;
        }
        #stats-reset:hover { background: rgba(224,85,85,0.15); border-color: var(--red); }
        #stats-reset:disabled { opacity: 0.5; cursor: default; }
        .lb-list { display: flex; flex-direction: column; gap: 6px; }
        .lb-row { margin: 0; }
        .lb-top {
            display: flex; justify-content: space-between;
            font-size: 0.8rem; color: var(--text); margin-bottom: 2px;
            line-height: 1.3;
        }
        .lb-top .lb-count { color: var(--accent); font-weight: 600; }
        .lb-bar { height: 5px; border-radius: 3px; background: var(--bg); overflow: hidden; }
        .lb-fill { height: 100%; border-radius: 4px; background: var(--green); }
        .lb-fill.adv { background: var(--yellow); }
        .hops-rec {
            margin: 12px 0; padding: 12px 14px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        .hops-rec .hr-title { color: var(--yellow); font-weight: 600; margin-bottom: 6px; }
        .hops-rec .hr-line { font-size: 0.85rem; color: var(--text); line-height: 1.6; }
        .hops-rec .hr-line b { color: var(--accent); }

        #refresh-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.15s;
        }
        #refresh-btn:hover { background: var(--border); }

        /* ── Main layout: self node left, contacts right ───────── */
        #main-layout {
            display: flex;
            align-items: flex-start;
            gap: 0;
        }
        #self-section {
            flex: 0 0 300px;
        }
        #layout-divider {
            flex: 0 0 1px;
            background: var(--border);
            align-self: stretch;
            margin: 0 36px;
            min-height: 80px;
            display: none;
            margin-top: 36px;
            opacity: 29%;
        }
        #contacts-section {
            flex: 1;
            min-width: 0;
        }

        /* ── Section headers ───────────────────────────────────── */
        .section-title {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: var(--muted);
            margin: 0 0 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        /* ── Node grids ─────────────────────────────────────────── */
        #self-grid .node-card { width: 100%; }
        #contacts-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            /* The grid gets an explicit (tall) height from the auto-fill
               layout. Keep cards at their natural size and top-aligned
               instead of stretching the few visible ones to fill it. */
            align-items: flex-start;
            align-content: flex-start;
        }
        #contacts-grid .node-card {
            width: 230px;
            flex-shrink: 0;
        }

        @media (max-width: 900px) {
            #main-layout { flex-direction: column; }
            #layout-divider { flex: none; width: 100%; height: 1px; margin: 24px 0; min-height: 0; }
            #self-section, #contacts-section { flex: none; width: 100%; }
            #contacts-grid .node-card { width: auto; flex: 1 1 220px; }
        }
        .node-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: visible;
            position: relative;
        }
        .node-header {
            padding: 10px 14px 8px;
            padding-right: 56px;  /* leave room for the floating badge */
            border-bottom: 1px solid var(--border);
        }
        .node-name { font-weight: 600; font-size: 0.95rem; }

        /* Floating badge — top-right overlay, doesn't affect card layout */
        .node-badge {
            position: absolute;
            top: 10px;
            right: 12px;
            z-index: 2;
            pointer-events: auto;
        }

        /* Floating map-pin button — bottom-LEFT overlay, mirrors fav-toggle */
        .map-toggle {
            position: absolute;
            bottom: 8px;
            left: 10px;
            z-index: 2;
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 1rem;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 4px;
            transition: color 0.12s, background 0.12s;
        }
        .map-toggle:hover { color: var(--green); background: rgba(76, 175, 125, 0.08); }
        /* Card action button: opens the self/contact info side panel.
           Sits in the top-right area of the card alongside the status badge. */
        .card-action-btn {
            position: absolute;
            top: 10px;
            right: 36px;
            z-index: 2;
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--text);
            opacity: 0.85;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 0;
            border-radius: 50%;
            transition: color 0.12s, background 0.12s, opacity 0.12s;
        }
        .card-action-btn:hover { color: var(--accent); opacity: 1; background: var(--bg); }
        .card-action-btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
        /* List-view map indicator before the favorite slot */
        .row-map {
            display: inline-flex;
            align-items: center;
            color: var(--green);
            font-size: 0.9rem;
            margin-right: 6px;
            cursor: pointer;
        }
        .row-map.empty { visibility: hidden; }

        /* Map side panel (slides in from the right) */
        #map-panel {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 480px;
            min-width: 360px;
            max-width: 90vw;
            background: var(--surface);
            border-left: 1px solid var(--border);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.25s ease-out;
            box-shadow: -4px 0 16px rgba(0, 0, 0, 0.4);
            /* Side-bar content (hashes, node names, stats) must be
               selectable/copyable. The .resizing rule below still
               suppresses selection while dragging the resize handle. */
            user-select: text;
            -webkit-user-select: text;
        }
        #map-panel.open { transform: translateX(0); }
        #map-panel.resizing { transition: none; user-select: none; }
        /* Drag handle on the left edge — user can drag to resize the panel */
        #map-panel-resizer {
            position: absolute;
            top: 0; bottom: 0; left: -3px;
            width: 6px;
            cursor: ew-resize;
            z-index: 1001;
            background: transparent;
        }
        #map-panel-resizer:hover,
        #map-panel.resizing #map-panel-resizer { background: var(--accent); opacity: 0.5; }
        #map-panel-header {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        #map-panel-header h3 {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
        }
        #map-panel-header .coords {
            font-size: 0.72rem;
            color: var(--muted);
            font-family: monospace;
            margin-top: 2px;
        }
        #map-panel-close {
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
        }
        #map-panel-close:hover { color: var(--text); background: var(--border); }
        #map-panel-body {
            flex: 1;
            position: relative;
            min-height: 0;
            /* Match min-height:0 with min-width:0 so flex children that
               contain wide content (analytics charts, long lists) can't
               push the parent wider than its column and force the side
               panel to overflow. */
            min-width: 0;
            overflow-x: hidden;
        }
        #map-canvas {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
        }

        /* ── Topology body layout (map on top + radar below) ─────────────── */
        #map-panel-body.topo-layout {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .topo-map-wrap {
            flex: 1 1 auto;
            min-height: 200px;
            position: relative;
        }
        .topo-map-wrap #map-canvas {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
        }
        .topo-radar-wrap {
            flex: 0 0 auto;
            height: 320px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .topo-radar-hdr {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .topo-radar-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-right: auto;
        }
        .topo-radar-seg {
            display: flex;
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        .topo-radar-seg button {
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 0.7rem;
            padding: 2px 8px;
            cursor: pointer;
            transition: background 0.1s, color 0.1s;
        }
        .topo-radar-seg button:not(:last-child) { border-right: 1px solid var(--border); }
        .topo-radar-seg button:hover { background: var(--border); color: var(--text); }
        .topo-radar-seg button.active { background: var(--accent); color: #fff; }
        .topo-radar-body {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }
        #topo-radar-chart {
            flex: 0 0 58%;
            min-height: 0;
            position: relative;
        }
        #topo-radar-list {
            flex: 1 1 0;
            overflow-y: auto;
            padding: 4px 6px;
            font-size: 0.72rem;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .topo-radar-row {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 3px 4px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.1s;
        }
        .topo-radar-row:hover { background: var(--border); }
        .topo-radar-row.offline { opacity: 0.65; }
        .topo-radar-row.offline .topo-rank { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.15); }
        .topo-rank {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 0.62rem;
            font-weight: 700;
            flex-shrink: 0;
            color: #fff;
        }
        .topo-rname {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }
        .topo-rname.offline { color: var(--muted); }
        .topo-rval {
            color: var(--muted);
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }
        .topo-rbearing {
            display: inline-block;
            width: 12px;
            text-align: center;
            flex-shrink: 0;
        }
        .topo-rrssi {
            color: var(--muted);
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }
        .topo-radar-empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 0.8rem;
            text-align: center;
            padding: 16px;
            line-height: 1.5;
        }
        @media (max-width: 520px) {
            .topo-radar-hdr { row-gap: 4px; }
            .topo-radar-title { flex: 0 0 100%; margin-right: 0; order: -1; }
        }

        #map-panel-footer {
            padding: 10px 14px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            font-size: 0.78rem;
        }
        #map-panel-footer a {
            color: var(--accent);
            text-decoration: none;
        }
        #map-panel-footer a:hover { text-decoration: underline; }
        #map-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 999;
            display: none;
        }
        #map-backdrop.open { display: block; }

        /* CSS-only Leaflet marker (no PNG dependency) */
        .mc-pin {
            background: transparent;
            border: none;
        }
        .mc-pin-inner {
            width: 20px;
            height: 20px;
            border-radius: 50% 50% 50% 0;
            background: var(--accent);
            border: 2px solid #fff;
            transform: rotate(-45deg);
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }
        /* Self marker: slightly larger + accent glow ring */
        .mc-pin-inner.self {
            width: 26px;
            height: 26px;
            box-shadow: 0 0 0 2px var(--accent), 0 2px 6px rgba(0,0,0,0.5);
        }

        /* ── Topology map toolbar ─────────────────────────────────────────── */
        /* Sits as its own row above the Leaflet canvas (no longer floats on
           top of the map), so it never overlaps the zoom controls or the
           map tiles. */
        .topo-map-tool-bar {
            flex: 0 0 auto;
            padding: 6px 10px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }
        .topo-map-tool-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 7px;
            height: 22px;
            font-size: 0.62rem;
            font-weight: 600;
            color: var(--text);
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid var(--border);
            border-radius: 11px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.12s, border-color 0.12s, color 0.12s;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .topo-map-tool-btn i { font-size: 0.72rem; }
        /* Icon-only button (no label, regardless of width) — used for Audio.
           Square-ish so the icon doesn't get clipped on the right edge. */
        .topo-map-tool-btn.icon-only {
            padding: 2px 0;
            gap: 0;
            min-width: 28px;
            justify-content: center;
        }
        .topo-map-tool-btn.icon-only .topo-tool-label { display: none; }
        .topo-map-tool-btn:hover {
            background: rgba(0, 0, 0, 0.75);
            border-color: var(--muted);
        }
        .topo-map-tool-btn.active {
            background: rgba(78, 154, 241, 0.22);
            border-color: var(--accent);
            color: var(--accent);
        }
        .topo-map-tool-btn[disabled] {
            opacity: 0.35;
            cursor: not-allowed;
            pointer-events: none;
        }
        /* Hide label text on narrow map panels */
        @media (max-width: 640px) {
            .topo-map-tool-btn .topo-tool-label { display: none; }
        }

        /* Heatmap window selector — inline <select> next to the Heat button */
        .topo-heat-window {
            height: 22px;
            padding: 0 4px;
            font-size: 0.62rem;
            font-weight: 600;
            color: var(--text);
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid var(--border);
            border-radius: 11px;
            cursor: pointer;
            display: none;
        }
        .topo-heat-window.visible { display: inline-block; }
        /* Empty-state note inside the toolbar */
        #topo-heatmap-empty {
            font-size: 0.60rem;
            color: var(--muted);
            white-space: nowrap;
            display: none;
        }
        #topo-heatmap-empty.visible { display: inline; }

        /* Delete button inside Leaflet topology popups */
        .topo-popup-del {
            margin-top: 6px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 8px;
            font-size: 0.72rem;
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            border-radius: 6px;
            cursor: pointer;
        }
        .topo-popup-del:hover { background: #ef4444; color: #fff; }
        .topo-popup-del[disabled] { opacity: 0.55; cursor: not-allowed; }

        /* LoS / Coverage popup buttons (shared styling) */
        .topo-popup-los, .topo-popup-cov {
            margin-top: 4px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 8px;
            font-size: 0.72rem;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 6px;
            cursor: pointer;
        }
        .topo-popup-los:hover, .topo-popup-cov:hover { background: var(--accent); color: #fff; }

        /* ── LoS pane (replaces .topo-radar-wrap when LoS is active) ──────── */
        .topo-los-pane {
            flex: 0 0 auto;
            height: 320px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .topo-los-hdr {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .topo-los-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-right: auto;
        }
        .topo-los-body {
            flex: 1;
            overflow-y: auto;
            padding: 6px 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 0;
        }
        .topo-los-banner {
            font-size: 0.72rem;
            color: var(--muted);
            background: rgba(78,154,241,0.08);
            border: 1px solid rgba(78,154,241,0.25);
            border-radius: 6px;
            padding: 5px 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .topo-los-banner.error { background: rgba(224,85,85,0.08); border-color: rgba(224,85,85,0.25); color: var(--red); }
        .topo-los-pin-list { display: flex; flex-direction: column; gap: 4px; }
        .topo-los-pin-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
        }
        .topo-los-pin-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            flex-shrink: 0;
        }
        .topo-los-pin-coords {
            flex: 1;
            color: var(--muted);
            font-family: monospace;
            font-size: 0.68rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .topo-los-pin-h {
            width: 52px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 4px;
            padding: 1px 4px;
            font-size: 0.7rem;
            text-align: right;
        }
        .topo-los-pin-h:focus { border-color: var(--accent); outline: none; }
        .topo-los-pin-hlabel { font-size: 0.68rem; color: var(--muted); white-space: nowrap; }
        .topo-los-pin-del {
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 3px;
            font-size: 0.75rem;
        }
        .topo-los-pin-del:hover { color: var(--red); background: rgba(224,85,85,0.1); }
        @media (max-width: 480px) {
            .topo-los-pin-row { flex-wrap: wrap; }
            .topo-los-pin-coords { flex-basis: 100%; order: 2; margin-left: 24px; }
            .topo-los-pin-num { order: 1; }
            .topo-los-pin-h, .topo-los-pin-hlabel, .topo-los-pin-del { order: 3; }
        }
        .topo-los-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 0.7rem;
        }
        .topo-los-hint {
            color: var(--muted);
            font-style: italic;
            flex: 1;
        }
        .topo-los-clear {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .topo-los-clear:hover { border-color: var(--red); color: var(--red); }
        #topo-los-chart { flex: 1; min-height: 80px; position: relative; }
        .topo-los-verdicts {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            padding: 2px 0;
        }
        .topo-los-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .topo-los-chip.clear   { background: rgba(76,175,125,0.18); color: var(--green); cursor: pointer; }
        .topo-los-chip.grazing { background: rgba(240,168,50,0.18);  color: var(--yellow); cursor: pointer; }
        .topo-los-chip.blocked { background: rgba(224,85,85,0.18);   color: var(--red); cursor: pointer; }
        .topo-los-chip.selected { outline: 2px solid currentColor; outline-offset: 1px; }
        .topo-los-seg-status {
            font-size: 0.72rem;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: rgba(78,154,241,0.06);
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: none;
        }
        .topo-los-seg-status.visible { display: block; }
        .topo-los-seg-status .seg-verdict { font-weight: 700; padding: 1px 6px; border-radius: 8px; margin-left: 4px; }
        .topo-los-seg-status .seg-verdict.clear   { background: rgba(76,175,125,0.22); color: var(--green); }
        .topo-los-seg-status .seg-verdict.grazing { background: rgba(240,168,50,0.22); color: var(--yellow); }
        .topo-los-seg-status .seg-verdict.blocked { background: rgba(224,85,85,0.22);  color: var(--red); }
        .topo-los-seg-heights {
            display: none;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            font-size: 0.72rem;
        }
        .topo-los-seg-heights.visible { display: flex; }
        .topo-los-seg-heights label { color: var(--muted); white-space: nowrap; }
        .topo-los-seg-h {
            width: 56px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 4px;
            padding: 2px 4px;
            font-size: 0.72rem;
            text-align: right;
        }
        .topo-los-seg-h:focus { border-color: var(--accent); outline: none; }
        .topo-los-pin-row.seg-selected { background: rgba(78,154,241,0.08); border-radius: 4px; }

        /* When LoS tool is active, existing topology markers fade */
        #map-canvas.los-active .mc-pin-inner { opacity: 0.6; }

        /* Numbered LoS pin divIcon */
        .los-pin-icon {
            width: 22px; height: 22px;
            border-radius: 50%;
            background: var(--yellow);
            border: 2px solid #fff;
            color: #000;
            font-size: 0.65rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.55);
        }

        /* ── Live-flash pulse keyframe ────────────────────────────────────── */
        @keyframes topoLivePulse {
            0%   { transform: rotate(-45deg) scale(1); }
            40%  { transform: rotate(-45deg) scale(1.35); }
            100% { transform: rotate(-45deg) scale(1); }
        }
        .mc-pin-inner.live-flash {
            animation: topoLivePulse 2s ease-in-out 1;
        }

        /* ── Coverage / propagation heatmap ──────────────────────────────── */
        .topo-coverage-drawer {
            flex: 0 0 auto;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 6px 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px 12px;
            align-items: center;
            font-size: 0.68rem;
        }
        .topo-cov-row {
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }
        .topo-cov-row label {
            color: var(--muted);
            font-size: 0.65rem;
        }
        .topo-cov-ctrl {
            height: 20px;
            padding: 0 4px;
            font-size: 0.65rem;
            background: rgba(0,0,0,0.45);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            min-width: 56px;
        }
        .topo-cov-ctrl:focus { border-color: var(--accent); outline: none; }
        .topo-cov-progress {
            font-size: 0.63rem;
            color: var(--muted);
            white-space: nowrap;
        }
        .topo-cov-progress i { margin-right: 3px; }

        /* Origin-node pulsing halo */
        @keyframes covOriginPulse {
            0%   { transform: translate(-50%, -50%) scale(0.6); opacity: 0.9; }
            100% { transform: translate(-50%, -50%) scale(2.0); opacity: 0; }
        }
        .cov-origin-halo {
            position: absolute;
            width: 24px; height: 24px;
            border-radius: 50%;
            border: 3px solid #22c55e;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: covOriginPulse 1.6s ease-out infinite;
            pointer-events: none;
        }
        .cov-origin-wrap {
            position: relative;
            width: 24px; height: 24px;
        }
        .cov-origin-inner {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #22c55e;
            border: 2px solid #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.6);
        }

        /* Coverage legend */
        #topo-cov-legend {
            position: absolute;
            bottom: 28px; right: 8px;
            z-index: 900;
            background: rgba(20,22,30,0.82);
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 6px 8px;
            font-size: 0.6rem;
            color: var(--text);
            backdrop-filter: blur(4px);
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        #topo-cov-legend .cov-leg-bar {
            width: 14px;
            height: 80px;
            border-radius: 3px;
            /* gradient set inline by JS */
        }
        #topo-cov-legend .cov-leg-labels {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 80px;
            font-size: 0.58rem;
            color: var(--muted);
        }
        #topo-cov-legend .cov-leg-inner {
            display: flex;
            gap: 4px;
            align-items: stretch;
        }
        #topo-cov-legend .cov-leg-title {
            font-size: 0.58rem;
            color: var(--muted);
            text-align: center;
        }

        /* Floating favorite toggle — bottom-right overlay on contact cards */
        .fav-toggle {
            position: absolute;
            bottom: 8px;
            right: 10px;
            z-index: 2;
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 1rem;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 4px;
            transition: color 0.12s, background 0.12s;
        }
        .fav-toggle:hover  { color: var(--yellow); background: rgba(240, 168, 50, 0.08); }
        .fav-toggle.active { color: var(--yellow); }
        /* List-view favorite indicator in front of the name */
        .row-fav {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            color: var(--yellow);
            font-size: 0.9rem;
            margin-right: 6px;
        }
        /* visibility:hidden (not display:none) so non-favorite rows keep
           the same name-column starting position as favorite rows */
        .row-fav.empty { visibility: hidden; }
        .row-fav.row-fav-toggle { cursor: pointer; visibility: visible; color: var(--muted); }
        .row-fav.row-fav-toggle.active { color: var(--yellow); }
        .row-fav.row-fav-toggle:hover { color: var(--yellow); }

        .badge {
            font-size: 0.85rem;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.35);
            flex-shrink: 0;
        }
        .badge i { font-size: 0.85rem; }
        .badge.online  { background: rgba(var(--dz-success-rgb, 76,175,125),  0.15); color: var(--green); }
        .badge.offline { background: rgba(var(--dz-danger-rgb,  224,85,85),   0.15); color: var(--red); }
        .badge.unknown { background: rgba(var(--dz-border-rgb,  51,53,74),    0.40); color: var(--text); }
        .badge.self    { background: rgba(var(--dz-accent-rgb,  78,154,241),  0.15); color: var(--accent); }

        .node-metrics {
            /* extra bottom padding reserves room for the floating fav-star and
               map-pin overlays so they don't sit on top of the Last Heard row */
            padding: 8px 12px 28px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px 8px;
        }
        /* Single-line metric rows: "LABEL  value" inline. Compact. */
        .metric {
            display: flex;
            flex-direction: row;
            align-items: baseline;
            gap: 6px;
            min-width: 0;
        }
        .metric a { text-decoration: none; color: inherit; display: contents; }
        .metric a:hover .metric-value { color: var(--accent); }
        .metric-label::after { content: ""; }

        /* Hide metric rows that have no data (instead of showing a "—" placeholder). */
        .metric.empty { display: none; }

        /* Last Heard spans the full row at the bottom of the metric grid. */
        .metric[data-key="last_seen"] {
            grid-column: 1 / -1;
            margin-top: 2px;
        }
        .metric[data-key="last_seen"] .metric-label::after { content: ":"; }
        .metric[data-key="last_seen"] .metric-value { font-size: 0.82rem; }

        /* Clickable contact cards — visual cue */
        #contacts-grid .node-card { cursor: pointer; transition: border-color 0.15s, transform 0.1s; }
        #contacts-grid .node-card:hover { border-color: var(--accent); }
        #contacts-grid .node-card.compose-selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent);
        }

        /* Firmware info line shown under the self-node name */
        .fw-info {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 4px;
            font-family: -apple-system, "Segoe UI", monospace;
        }

        /* Direct-neighbour badge ("hops == 0") */
        .direct-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.62rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(var(--dz-success-rgb, 76,175,125), 0.15);
            color: var(--green);
            border-radius: 4px;
            padding: 2px 6px;
            margin-top: 4px;
        }
        .direct-chip i { font-size: 0.7rem; }
        .row-direct {
            display: inline-flex;
            align-items: center;
            color: var(--green);
            font-size: 0.85rem;
            margin-left: 8px;
        }

        /* Contact type chip (shown under node name in card header) */
        .type-chip {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 4px;
            padding: 2px 7px;
            margin-top: 4px;
        }
        .type-chip.type-1 { background: rgba(var(--dz-accent-rgb,   78,154,241), 0.15); color: var(--accent); }
        .type-chip.type-2 { background: rgba(var(--dz-warning-rgb, 240,168,50),  0.15); color: var(--yellow); }
        .type-chip.type-3 { background: rgba(var(--dz-success-rgb,  76,175,125), 0.15); color: var(--green); }
        .type-chip.type-4 { background: rgba(176, 124, 255, 0.15); color: #d090e0; }
        .type-chip.type-0 { background: rgba(var(--dz-border-rgb,   51,53,74),   0.40); color: var(--muted); }

        /* Group headings between online/offline + per-type sections */
        .contact-group-title {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin: 14px 0 8px;
            width: 100%;
        }
        .contact-group-title:first-child { margin-top: 0; }

        /* Contacts toolbar: view-toggle + type-filter + name-search on right */
        .contacts-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 14px;
            margin: 0 0 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .contacts-header .section-title {
            margin: 0;
            padding: 0;
            border: none;
        }
        #contacts-count {
            color: var(--text);
            font-weight: 500;
            margin-left: 6px;
            opacity: 0.7;
        }
        #contacts-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #contacts-toolbar select,
        #contacts-toolbar input {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 0.82rem;
            outline: none;
            min-width: 0;
        }
        #contacts-toolbar input[type="search"] { width: 180px; }
        #contacts-toolbar input:focus,
        #contacts-toolbar select:focus { border-color: var(--accent); }
        #contacts-toolbar .search-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        #contacts-toolbar .search-wrap i {
            position: absolute;
            left: 9px;
            color: var(--muted);
            font-size: 0.8rem;
            pointer-events: none;
        }
        #contacts-toolbar .search-wrap input { padding-left: 28px; }

        .view-toggle {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }
        .view-btn {
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 0.95rem;
            padding: 5px 11px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .view-btn:hover { color: var(--text); }
        .view-btn.active { background: var(--border); color: var(--accent); }

        /* Generic icon button in the contacts toolbar (e.g. manual_add_contacts toggle) */
        .toolbar-icon-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 6px;
            padding: 5px 11px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.15s, color 0.15s;
        }
        .toolbar-icon-btn:hover { color: var(--text); }
        .toolbar-icon-btn.active { color: var(--yellow); }       /* manual-add = ON (block auto-add) */
        .toolbar-icon-btn.inactive { color: var(--green); }      /* manual-add = OFF (auto-add) */

        /* List view */
        #contacts-list {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            /* No `overflow: hidden` here — it would defeat the
               internal scroll set higher up. */
        }
        /* Shared grid template for header + body rows so columns line up.
           cols: [checkbox] [status-dot] [name] [type] [last-seen wider] [snr] [hops] [trash] */
        .contact-row,
        .contact-row-header {
            display: grid;
            grid-template-columns: 24px 18px 1fr 110px 170px 70px 60px 40px;
            align-items: center;
            gap: 12px;
            padding: 4px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 0.82rem;
            line-height: 1.2;
        }
        .contact-row-header {
            background: var(--bg);
            color: var(--muted);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
            cursor: default;
        }
        .contact-row-header .row-bulk-actions {
            grid-column: 3 / -1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            text-transform: none;
            font-weight: 500;
            font-size: 0.78rem;
            color: var(--text);
        }
        .contact-row-header .row-bulk-actions .selected-count { color: var(--muted); font-size: 0.74rem; }
        .contact-row-header .row-bulk-actions button {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 5px;
            padding: 4px 10px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: color 0.1s, border-color 0.1s, background 0.1s;
        }
        .contact-row-header .row-bulk-actions button.danger:hover {
            color: var(--red); border-color: var(--red); background: rgba(224, 85, 85, 0.08);
        }
        .contact-row-header .row-bulk-actions button:disabled {
            opacity: 0.4; cursor: not-allowed;
        }
        .contact-row { cursor: pointer; transition: background 0.1s; }
        .contact-row:last-child { border-bottom: none; }
        .contact-row:hover { background: rgba(var(--dz-overlay-rgb, 255,255,255), 0.04); }
        .contact-row.compose-selected { background: rgba(var(--dz-accent-rgb,  78,154,241), 0.08); }
        .contact-row.row-selected     { background: rgba(var(--dz-danger-rgb, 224,85,85),   0.08); }
        /* Custom icon-based checkbox (Domoticz host CSS sometimes hides native ones). */
        .row-check { display: flex; align-items: center; justify-content: center; }
        .row-check-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            cursor: pointer;
            color: var(--muted);
            font-size: 1.05rem;
            transition: color 0.12s;
        }
        .row-check-box:hover            { color: var(--text); }
        .row-check-box.checked          { color: var(--accent); }
        .row-check-box.indeterminate    { color: var(--accent); }
        .contact-row .row-status {
            width: 10px; height: 10px; border-radius: 50%;
        }
        .contact-row .row-status.online  { background: var(--green); }
        .contact-row .row-status.offline { background: var(--red); }
        .contact-row .row-name { font-weight: 500; color: var(--text); }
        .contact-row .row-name .row-pk {
            font-size: 0.7rem; color: var(--muted); margin-left: 8px; font-family: monospace;
        }
        .contact-row .row-type { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .contact-row .row-meta { color: var(--muted); font-size: 0.78rem; }
        .contact-row .row-snr  { color: var(--text); font-variant-numeric: tabular-nums; text-align: right; }
        .contact-row .row-hops { color: var(--muted); text-align: right; }
        .contact-row .row-remove {
            background: transparent;
            border: none;
            color: var(--red);
            font-size: 0.9rem;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 4px;
            transition: background 0.1s;
        }
        .contact-row .row-remove:hover { background: rgba(224, 85, 85, 0.15); }

        .contacts-empty {
            padding: 18px;
            text-align: center;
            color: var(--muted);
            font-size: 0.88rem;
        }

        /* Settings panel inside the connected-node card */
        .node-settings {
            border-top: 1px solid var(--border);
            padding: 8px 18px 0;
        }
        .node-settings-header {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin: 0;
            padding: 6px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }
        .node-settings-header:hover { color: var(--text); }
        .node-settings-header .ns-chevron {
            font-size: 0.7rem;
            transition: transform 0.2s ease;
        }
        .node-settings.open .node-settings-header .ns-chevron {
            transform: rotate(180deg);
        }
        .node-settings-body {
            display: none;
            padding-bottom: 10px;
            padding-top: 8px;
        }
        .node-settings.open .node-settings-body { display: block; }
        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 7px;
        }
        .settings-row:last-child { margin-bottom: 0; }
        .settings-label {
            font-size: 0.78rem;
            color: var(--text);
        }
        .settings-options {
            display: flex;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            overflow: hidden;
        }
        .settings-btn {
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 0.72rem;
            padding: 3px 9px;
            cursor: pointer;
            transition: background 0.1s, color 0.1s;
        }
        .settings-btn:hover { color: var(--text); }
        .settings-btn.active {
            background: var(--accent);
            color: #fff;
        }

        /* Flood-scope text-input row */
        .settings-text-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .settings-text {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text);
            font-size: 0.78rem;
            padding: 3px 8px;
            width: 130px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.4s;
        }
        .settings-text:focus { border-color: var(--accent); }
        .settings-text.saved { box-shadow: 0 0 0 2px rgba(76, 175, 125, 0.5); }
        .settings-btn-save {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--muted);
            font-size: 0.78rem;
            padding: 3px 8px;
            cursor: pointer;
            transition: color 0.1s, border-color 0.1s;
        }
        .settings-btn-save:hover { color: var(--green); border-color: var(--green); }

        .metric-label {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            white-space: nowrap;
        }
        .metric-value {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text);
            transition: color 0.15s;
            white-space: nowrap;
        }
        .metric-value.na { color: var(--muted); font-style: italic; }

        /* Battery bar */
        .batt-wrap { display: flex; align-items: center; gap: 6px; }
        .batt-bar-bg {
            flex: 1;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }
        .batt-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
        .batt-bar-fill.high   { background: var(--green); }
        .batt-bar-fill.medium { background: var(--yellow); }
        .batt-bar-fill.low    { background: var(--red); }

        /* ── Error / loading ───────────────────────────────────── */
        #status-msg { text-align: center; color: var(--muted); margin-top: 40px; font-size: 0.9rem; }

        /* ── Inbox history ─────────────────────────────────────── */
        /* Normal page flow: the message inbox sits below the contacts. The
           page scrolls naturally so the Domoticz host footer stays at the
           very bottom. The list itself is internally scrollable and the
           drag bar resizes its height. */
        #inbox-history-section {
            /* margin-top is set by _dockInbox() (JS): CSS 100vh/auto have no
               effect in the Domoticz-embedded document, so the section is
               pushed down to the bottom of the viewport by measurement. */
            margin-top: 16px;
            border-top: 1px solid var(--border);
            padding-top: 10px;
        }

        .inbox-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .inbox-section-header h2 {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--muted);
        }

        #inbox-log-link {
            font-size: 0.8rem;
            color: var(--accent);
            text-decoration: none;
            padding: 4px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            transition: background 0.15s;
        }
        #inbox-log-link:hover { background: var(--border); }

        #conv-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin: 6px 0;
            padding: 6px 10px;
            font-size: 0.82rem;
            color: var(--text);
            background: rgba(176, 124, 255, 0.12);
            border: 1px solid var(--heard);
            border-radius: 6px;
        }
        #conv-banner-label { font-weight: 600; margin-right: auto; }
        #conv-banner-exit {
            font-size: 0.78rem;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 3px 9px;
            cursor: pointer;
        }
        #conv-banner-exit:hover { background: var(--border); }

        #inbox-history {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0;
            /* Short by default so the page has no browser scrollbar out of the
               box; drag the bar above to enlarge (the saved height overrides
               this via an inline style + max-height:none). */
            max-height: 140px;
            overflow-y: auto;
        }
        /* When the user has manually resized the inbox, an explicit height +
           max-height:none (set inline by the resizer JS) overrides the
           responsive clamp above so the chosen size is honoured exactly. */
        #inbox-resizer {
            height: 7px;
            margin-bottom: 2px;
            border-radius: 3px;
            background: var(--border);
            cursor: ns-resize;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }
        /* Visible grip so it's obvious the bar is draggable. */
        #inbox-resizer::before {
            content: "";
            width: 40px;
            height: 3px;
            border-radius: 2px;
            background: var(--muted);
        }
        #inbox-resizer:hover,
        body.inbox-resizing #inbox-resizer { background: var(--accent); }
        #inbox-resizer:hover::before,
        body.inbox-resizing #inbox-resizer::before { background: #fff; }
        body.inbox-resizing { user-select: none; cursor: ns-resize; }
        .inbox-msg {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            line-height: 1.25;
        }
        .inbox-msg:last-child { border-bottom: none; }
        .inbox-msg .msg-time {
            color: var(--dz-text-soft, #a6a9bd);
            font-size: 0.75rem;
            white-space: nowrap;
            flex-shrink: 0;
            /* Fixed width + tabular digits so the timestamp column is
               identical on every row — otherwise the info icon / channel
               chip drift horizontally (flex keys off content width). */
            width: 116px;
            font-variant-numeric: tabular-nums;
        }
        .inbox-msg .msg-sender {
            color: var(--accent);
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .inbox-msg .msg-text {
            color: var(--text);
            word-break: break-word;
            user-select: text;
            -webkit-user-select: text;
            cursor: text;
        }
        .inbox-msg .msg-text .path-annot {
            color: var(--muted);
            font-style: italic;
            font-size: 0.92em;
        }
        /* Allow selecting time + sender too (e.g. copy a timestamp) */
        .inbox-msg .msg-time,
        .inbox-msg .msg-sender { user-select: text; -webkit-user-select: text; }
        .inbox-msg .msg-text .mention {
            color: var(--green);
            background: rgba(var(--dz-success-rgb, 76,175,125), 0.13);
            border-radius: 4px;
            padding: 0 4px;
            font-weight: 600;
        }

        @media (max-width: 540px) {
            .inbox-msg { flex-wrap: wrap; align-items: center; }
            .inbox-msg .msg-text { flex-basis: 100%; padding-top: 4px; padding-left: 2px; }
        }

        .msg-chan {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 4px;
            white-space: nowrap;
            flex-shrink: 0;
            background: var(--border);
            color: var(--text);
            /* Outline so the pill stays defined on tinted (sent-message)
               rows where the chip bg blends into the row bg. */
            border: 1px solid rgba(var(--dz-overlay-rgb, 255,255,255), 0.10);
            /* Fixed column so the sender lines up across rows regardless
               of channel-name length (#amersfoort vs Public vs #test). */
            min-width: 84px;
            box-sizing: border-box;
            text-align: center;
        }
        .msg-chan.private { background: rgba(var(--dz-accent-rgb, 78,154,241), 0.12); color: var(--dz-accent-light, #7ab); }
        .inbox-msg.sent { background: rgba(var(--dz-accent-rgb, 78,154,241), 0.13); border-left: 3px solid var(--accent); }
        .inbox-msg.sent .msg-sender { color: var(--muted); font-weight: 500; }
        /* Optimistic placeholder until the plugin confirms the send (~30s) */
        .inbox-msg.pending { opacity: 0.6; font-style: italic; }
        .inbox-msg.pending .msg-time { color: var(--yellow); font-style: normal; }
        /* Delivery ack marker on outgoing DMs */
        .msg-ack { font-size: 0.72rem; color: var(--muted); margin-left: 4px; white-space: nowrap; }
        .msg-ack.acked  { color: var(--green); }
        .msg-ack.no-ack { color: var(--muted); font-style: italic; }

        /* ── Inbox filter bar ───────────────────────────────────── */
        #inbox-filters {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        #filter-rows { display: flex; flex-direction: column; gap: 6px; flex: 1; }
        .filter-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .filter-label {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            flex-shrink: 0;
            min-width: 56px;
        }

        .filter-btn {
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--muted);
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .filter-btn:hover { background: var(--border); }
        .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        #inbox-search {
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            outline: none;
            width: 160px;
            margin-left: auto;
            align-self: flex-start;
        }
        #inbox-search:focus { border-color: var(--accent); }

        #inbox-page-size {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            outline: none;
            cursor: pointer;
            align-self: flex-start;
        }
        #inbox-page-size:focus { border-color: var(--accent); }

        #inbox-empty {
            padding: 20px 16px;
            color: var(--muted);
            font-size: 0.85rem;
            font-style: italic;
            text-align: center;
        }

        .msg-reply-btn {
            margin-left: auto;
            flex-shrink: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 4px;
            padding: 1px 7px;
            font-size: 0.72rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s, color 0.15s, background 0.15s;
        }
        .inbox-msg:hover .msg-reply-btn { color: var(--text); opacity: 1; }
        .msg-reply-btn:hover {
            color: #fff;
            background: var(--accent);
            border-color: var(--accent);
        }
        .msg-dm-btn { border-color: var(--heard); }
        .msg-dm-btn:hover {
            background: var(--heard);
            border-color: var(--heard);
        }
        /* Retry button on unacknowledged outgoing DMs. Hidden until the row
           is hovered (same pattern as the reply button) so it doesn't crowd
           the row when at rest. Red border to signal a failure-recovery
           action. */
        .msg-retry-btn {
            flex-shrink: 0;
            background: var(--surface);
            border: 1px solid var(--red, #e05555);
            color: var(--red, #e05555);
            border-radius: 4px;
            padding: 1px 7px;
            font-size: 0.72rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s, color 0.15s, background 0.15s;
        }
        .inbox-msg:hover .msg-retry-btn { opacity: 1; }
        .msg-retry-btn:hover {
            color: #fff;
            background: var(--red, #e05555);
        }
        .msg-retry-btn[disabled] { opacity: 0.55; cursor: not-allowed; }
        .msg-info-btn {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            align-self: center;
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            opacity: 0.5;
            padding: 0;
            margin: 0 -4px;
            line-height: 1;
            font-size: 0.8rem;
            transition: opacity 0.15s, color 0.15s;
        }
        .msg-info-btn:hover { color: var(--accent); opacity: 1; }

        /* Message details panel — shares side-panel skin with the map panel */
        #msg-details-list {
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }
        .msg-detail-row {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .msg-detail-row:last-child { border-bottom: none; }
        .msg-detail-section {
            font-size: 0.66rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent);
            border-top: 1px solid var(--border);
            margin-top: 8px;
            padding-top: 8px;
        }

        /* RX-log toolbar in the header */
        .rx-toolbar { display: inline-flex; gap: 4px; }
        .rx-tool-btn {
            background: var(--card-bg, transparent);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            width: 32px; height: 32px;
            cursor: pointer;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: color .15s, border-color .15s, background .15s;
        }
        .rx-tool-btn:hover { color: var(--accent); border-color: var(--accent); background: var(--bg); }
        .rx-tool-btn.active { color: var(--accent); border-color: var(--accent); }

        /* ── Generic side-panel view styles (reused across firehose/traffic/heatmap/channels) ── */
        .panel-view {
            position: absolute;
            inset: 0;
            box-sizing: border-box;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            font-size: 0.85rem;
        }
        /* Firehose stream rows */
        .firehose-row {
            font-family: ui-monospace, "Cascadia Code", "Consolas", monospace;
            font-size: 0.72rem;
            line-height: 1.35;
            color: var(--text);
            border-bottom: 1px solid var(--border);
            padding: 4px 0;
            display: grid;
            grid-template-columns: 56px 70px 28px 1fr;
            gap: 6px;
            align-items: baseline;
        }
        .firehose-row.firehose-head {
            color: var(--accent);
            font-weight: 600;
            border-bottom: 1px solid var(--accent);
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 0.05em;
            padding-top: 0;
        }
        .firehose-row[data-tip] { cursor: help; }
        .firehose-row[data-tip]:hover { background: var(--bg); }
        .firehose-row.text     { color: var(--accent); }
        .firehose-row.advert   { color: #a0c4ff; }
        .firehose-row.response { color: #c7c7c7; opacity: 0.85; }
        .firehose-row.group    { color: #f9c74f; }
        .firehose-row .t  { color: var(--muted); }
        .firehose-row .pt { font-weight: 600; }
        .firehose-row .meta { color: var(--muted); }
        .firehose-row .msg  { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .firehose-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
        }
        .firehose-controls button {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 4px;
            padding: 3px 10px;
            cursor: pointer;
            font-size: 0.78rem;
        }
        .firehose-controls button:hover { color: var(--accent); border-color: var(--accent); background: var(--bg); }
        #firehose-list {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
        }

        /* Bar chart for traffic stats */
        .bar-row {
            display: grid;
            grid-template-columns: 120px 1fr 50px;
            gap: 8px;
            align-items: center;
            font-size: 0.78rem;
        }
        .bar-bar {
            height: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }
        .bar-bar > span {
            display: block;
            height: 100%;
            background: var(--accent);
        }
        .bar-row .bar-count { text-align: right; color: var(--text); font-variant-numeric: tabular-nums; }

        /* Packet-types donut card (traffic side-panel) */
        .payload-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            margin-bottom: 10px;
        }
        .payload-card-title {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin: 0 0 8px;
        }
        .payload-pie-wrap { position: relative; min-height: 260px; }
        #payload-pie { width: 100%; height: 280px; }

        /* 24h heatmap grid */
        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 2px;
            margin-top: 6px;
        }
        .heatmap-grid > div {
            min-height: 26px;
            border-radius: 2px;
            background: rgba(var(--dz-overlay-rgb, 255,255,255), 0.04);
            border: 1px solid var(--border);
            position: relative;
            font-size: 0.62rem;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-variant-numeric: tabular-nums;
        }
        .heatmap-grid > div.hot1 { background: rgba(38,196,124,0.22); color: var(--text); border-color: rgba(38,196,124,0.30); }
        .heatmap-grid > div.hot2 { background: rgba(38,196,124,0.45); color: #ffffff; border-color: rgba(38,196,124,0.55); }
        .heatmap-grid > div.hot3 { background: rgba(38,196,124,0.70); color: #000;     border-color: rgba(38,196,124,0.85); }
        .heatmap-grid > div.hot4 { background: rgba(38,196,124,0.95); color: #000;     border-color: rgba(38,196,124,1.00); font-weight: 600; }
        .heatmap-grid > div.now  { outline: 2px solid var(--accent); outline-offset: -2px; }
        .heatmap-labels {
            display: grid;
            grid-template-columns: repeat(24, 1fr);
            gap: 2px;
            margin-top: 2px;
            font-size: 0.62rem;
            color: var(--text);
            opacity: 0.7;
        }
        .heatmap-labels > div { text-align: center; }

        /* Channel discovery list */
        .chan-row {
            display: grid;
            grid-template-columns: 60px 1fr 60px;
            gap: 6px;
            font-size: 0.8rem;
            padding: 4px 0;
            border-bottom: 1px solid var(--border);
        }
        #chan-slots-list {
            max-height: 340px;
            overflow-y: auto;
        }
        .chan-slot-row {
            display: grid;
            grid-template-columns: 36px 1fr auto;
            gap: 8px;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.82rem;
        }
        .chan-slot-row .slot-idx {
            color: var(--accent);
            font-family: ui-monospace, monospace;
            text-align: center;
        }
        .chan-slot-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 3px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .chan-slot-btn.add:hover    { color: var(--green); border-color: var(--green); }
        .chan-slot-btn.clear:hover  { color: var(--red); border-color: var(--red); }
        .chan-row .chash { font-family: ui-monospace, monospace; color: var(--accent); }
        .chan-row .name  { color: var(--text); opacity: 0.7; font-style: italic; }
        .chan-row .cnt   { text-align: right; font-variant-numeric: tabular-nums; }
        .chan-row.known  .name { color: var(--text); opacity: 1; font-style: normal; }

        /* Heard-nodes list */
        .heard-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        /* Heard side panel: intro fixed at top, list scrolls, map pinned to
           the bottom so it's always visible regardless of list length. */
        #heard-view {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }
        #heard-view > div:first-child { flex: 0 0 auto; }
        #heard-view #heard-list-wrap {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
        }
        #heard-view #heard-map {
            flex: 0 0 240px;
        }
        .heard-row-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }
        .heard-acts { display: flex; gap: 4px; flex-shrink: 0; }
        .heard-act {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 5px;
            cursor: pointer;
        }
        .heard-act.add:hover  { color: var(--green); border-color: var(--green); }
        .heard-act.del:hover  { color: var(--red); border-color: var(--red); }
        .heard-act.gps:hover  { color: var(--accent); border-color: var(--accent); }
        #heard-map, #contact-map {
            height: 240px;
            margin-top: 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }
        /* Heard nodes blended into the contacts grid/list — same card/row
           markup, distinguished only by a different name colour. */
        .heard-name-color { color: var(--heard) !important; }
        .row-fav.heard-add-star { cursor: pointer; color: var(--heard); visibility: visible; }
        .row-fav.heard-add-star:hover { color: var(--accent); }
        .heard-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2px;
            padding: 6px 8px;
            background: rgba(var(--dz-overlay-rgb, 255,255,255), 0.025);
            border: 1px solid var(--border);
            border-radius: 5px;
        }
        .heard-row .heard-name { color: var(--text); font-weight: 600; font-size: 0.86rem; }
        .heard-row .heard-meta { display: flex; gap: 5px; flex-wrap: wrap; }
        .heard-chip {
            font-size: 0.66rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            background: var(--bg);
            color: var(--text);
            opacity: 0.85;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1px 6px;
        }
        .heard-pk {
            font-family: ui-monospace, "Cascadia Code", "Consolas", monospace;
            font-size: 0.72rem;
            color: var(--accent);
            opacity: 0.85;
            cursor: help;
            display: block;
            max-width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .heard-extra {
            display: flex;
            justify-content: space-between;
            font-size: 0.72rem;
            color: var(--text);
            opacity: 0.7;
        }

        /* Mini SNR sparkline on cards */
        .sparkline {
            display: block;
            width: 100%;
            height: 16px;
            margin-top: 4px;
            opacity: 0.9;
            border-top: 1px dashed var(--border);
            padding-top: 2px;
        }
        .sparkline:hover { opacity: 1; }

        /* Self / contact info side panel form styling */
        .self-section {
            font-size: 0.7rem;
            color: var(--accent);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom: 1px solid var(--accent);
            padding-bottom: 4px;
            margin-top: 8px;
        }
        .self-row {
            display: grid;
            grid-template-columns: 130px 1fr;
            gap: 8px;
            align-items: center;
            font-size: 0.82rem;
        }
        .self-row label {
            color: var(--text);
            opacity: 0.85;
        }
        .self-row input[type="text"],
        .self-row input[type="number"],
        .self-row select,
        .self-input-wrap input[type="text"],
        .self-input-wrap select {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 4px;
            padding: 4px 8px;
            font-family: inherit;
            font-size: 0.82rem;
            min-width: 0;
            width: 100%;
        }
        .self-row input[readonly] { opacity: 0.7; cursor: not-allowed; }
        .self-value {
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }
        .self-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 12px;
        }
        .self-grid-2 .self-row {
            grid-template-columns: 1fr;
            gap: 2px;
        }
        .self-grid-2 .self-row label {
