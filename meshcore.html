                            reject(new Error("cmd timeout"));
                        }, 30000);
                        unsub = _pluginWS.onPluginMessage(msg => {
                            if (msg && msg.t === "cmd_result" && msg.id === id) {
                                clearTimeout(timer);
                                unsub();
                                if (msg.ok) resolve(msg);
                                else reject(new Error(msg.error || "elevation cmd failed"));
                            }
                        });
                        _pluginWS.sendPluginCommand({ t: "cmd", cmd: "elevation", points: chunk, id });
                    });
                    if (gen !== _losGeneration) return;
                    const elevs = result.elevations || [];
                    for (let j = 0; j < elevs.length; j++) elevations[off + j] = elevs[j];
                    // Progressive redraw: each chunk that returns updates the
                    // terrain area + verdicts incrementally. On a cache-warm
                    // path this is a single tight loop; on a cold path the
                    // user sees terrain fill in from left to right.
                    _drawLosChart({ segPoints, elevations });
                }
            } catch (err) {
                if (gen !== _losGeneration) return;
                const verdEl = document.getElementById("topo-los-verdicts");
                if (verdEl) verdEl.innerHTML = `<div class="topo-los-banner error"><i class="fa-solid fa-triangle-exclamation"></i> Elevation service unreachable; profile unavailable.</div>`;
                return;
            }

            if (gen !== _losGeneration) return;
            _losLastElevations = { segPoints, elevations };
        }

        // Build and render the Highcharts elevation profile.
        function _drawLosChart({ segPoints, elevations }) {
            if (typeof Highcharts === "undefined") return;
            const chartEl = document.getElementById("topo-los-chart");
            if (!chartEl) return;
            // Guard: cached segPoints must match current pin count.
            if (!segPoints || segPoints.length !== _losPins.length - 1) return;
            const verdEl = document.getElementById("topo-los-verdicts");
            if (verdEl) verdEl.innerHTML = "";   // wipe any prior error banner
            if (_losChart) { try { _losChart.destroy(); } catch (_) {} _losChart = null; }

            // Reconstruct per-segment data with cumulative distance axis.
            const terrainData  = [];   // [dist_km, elev_m]
            const losLineData  = [];   // [dist_km, los_m]
            const fresnelRange = [];   // [dist_km, lower_m, upper_m]  — arearange
            const pinData      = [];   // [dist_km, h_above_terrain_stub]
            const verdicts     = [];

            let elevIdx = 0;
            let cumDist = 0;

            for (let s = 0; s < segPoints.length; s++) {
                const seg = segPoints[s];
                const p1 = _losPins[s], p2 = _losPins[s + 1];
                const segElev = elevations.slice(elevIdx, elevIdx + seg.length);
                elevIdx += seg.length;

                const segKm = _haversineKm(p1.lat, p1.lon, p2.lat, p2.lon);
                const elev1 = segElev[0] != null ? segElev[0] : 0;
                const elev2 = segElev[seg.length - 1] != null ? segElev[seg.length - 1] : 0;
                const ant1 = elev1 + p1.h;
                const ant2 = elev2 + p2.h;

                if (s === 0) pinData.push([cumDist, p1.h]);

                let minClearance = Infinity;

                for (let i = 0; i < seg.length; i++) {
                    const frac = i / (seg.length - 1);
                    const d = cumDist + frac * segKm;
                    const terrain = segElev[i] != null ? segElev[i] : null;
                    terrainData.push([d, terrain]);

                    // LoS straight line (interpolated between antenna tops)
                    const losH = ant1 + frac * (ant2 - ant1);
                    losLineData.push([d, losH]);

                    // Per-segment elliptical Fresnel zone (60% of 1st-zone radius).
                    // d1/d2 are distances from each pin end within THIS segment — resets at each pin.
                    const d1 = frac * segKm;
                    const d2 = (1 - frac) * segKm;
                    let fresnelReq = 0;
                    if (d1 > 0 && d2 > 0) {
                        const r1 = 17.31 * Math.sqrt((d1 * d2) / ((d1 + d2) * _LOS_FREQ_GHZ));
                        fresnelReq = 0.6 * r1;
                    }
                    // arearange: [x, low, high]
                    fresnelRange.push([d, losH - fresnelReq, losH + fresnelReq]);

                    // Clearance margin: how far terrain is below the Fresnel lower bound
                    if (terrain != null) {
                        const margin = (losH - fresnelReq) - terrain;
                        if (margin < minClearance) minClearance = margin;
                    }
                }
                cumDist += segKm;
                pinData.push([cumDist, p2.h]);

                // Verdict
                const v = minClearance === Infinity ? "unknown"
                         : minClearance > 0          ? "clear"
                         : minClearance >= -3         ? "grazing"
                         :                             "blocked";
                verdicts.push({ seg: s + 1, segIdx: s, v, minClearance, km: segKm,
                                a: s + 1, b: s + 2 });
            }

            _losChart = Highcharts.chart(chartEl, {
                chart: {
                    animation: false,
                    backgroundColor: "transparent",
                    margin: [4, 8, 22, 38],
                    style: { fontFamily: "inherit" },
                },
                title: { text: null },
                credits: { enabled: false },
                legend: { enabled: false },
                // Hide the hamburger / context menu in the top-right corner.
                exporting: { enabled: false },
                xAxis: {
                    type: "linear",
                    title: { text: "km", style: { color: "var(--muted)", fontSize: "0.62rem" }, margin: 2 },
                    labels: { style: { color: "var(--muted)", fontSize: "0.62rem" } },
                    gridLineColor: "rgba(255,255,255,0.05)",
                    lineColor: "rgba(255,255,255,0.12)",
                    tickColor: "rgba(255,255,255,0.12)",
                    crosshair: { color: "rgba(255,255,255,0.15)" },
                },
                yAxis: {
                    title: { text: "m", style: { color: "var(--muted)", fontSize: "0.62rem" }, margin: 2 },
                    labels: { style: { color: "var(--muted)", fontSize: "0.62rem" } },
                    gridLineColor: "rgba(255,255,255,0.05)",
                },
                tooltip: {
                    shared: true,
                    backgroundColor: "rgba(30,31,38,0.92)",
                    borderColor: "#3a3b47",
                    style: { color: "#e2e4ed", fontSize: "0.7rem" },
                    formatter: function () {
                        let s = `<b>${this.x.toFixed(2)} km</b><br>`;
                        this.points.forEach(pt => {
                            if (pt.series.name === "Terrain" && pt.y != null)
                                s += `Terrain: <b>${pt.y.toFixed(0)} m</b><br>`;
                            if (pt.series.name === "LoS line")
                                s += `LoS: <b>${pt.y.toFixed(0)} m</b><br>`;
                        });
                        const terrainPt = this.points.find(p => p.series.name === "Terrain");
                        const losPt     = this.points.find(p => p.series.name === "LoS line");
                        const frPt      = this.points.find(p => p.series.name === "Fresnel 60%");
                        if (terrainPt && losPt && terrainPt.y != null) {
                            const frLow = frPt ? frPt.point.low : losPt.y;
                            s += `Clearance: <b>${(frLow - terrainPt.y).toFixed(0)} m</b>`;
                        }
                        return s;
                    },
                },
                series: [
                    {
                        // Fresnel arearange drawn first so terrain renders on top
                        name: "Fresnel 60%",
                        type: "arearange",
                        data: fresnelRange,
                        color: "rgba(255,255,255,0.55)",
                        fillColor: "rgba(255,255,255,0.07)",
                        lineWidth: 1,
                        dashStyle: "Dash",
                        marker: { enabled: false },
                        zIndex: 2,
                        enableMouseTracking: true,
                    },
                    {
                        name: "Terrain",
                        type: "area",
                        data: terrainData,
                        color: "rgba(200,200,200,0.75)",
                        fillColor: { linearGradient: { x1: 0, y1: 0, x2: 0, y2: 1 },
                            stops: [[0, "rgba(50,50,55,0.95)"], [1, "rgba(25,25,28,0.85)"]] },
                        lineWidth: 1.5,
                        marker: { enabled: false },
                        zIndex: 3,
                        connectNulls: false,
                        threshold: null,
                    },
                    {
                        name: "LoS line",
                        type: "line",
                        data: losLineData,
                        color: "#ef4444",
                        lineWidth: 2,
                        dashStyle: "Solid",
                        marker: { enabled: false },
                        zIndex: 4,
                    },
                    {
                        name: "Pins",
                        type: "column",
                        data: pinData,
                        color: "rgba(78,154,241,0.6)",
                        borderWidth: 0,
                        pointWidth: 2,
                        grouping: false,
                        zIndex: 5,
                        marker: { enabled: false },
                        enableMouseTracking: false,
                    },
                ],
            });

            // Update verdict chips below chart (clickable → select segment)
            if (verdEl) {
                const vLabel = { clear: "Clear", grazing: "Grazing", blocked: "Blocked", unknown: "No data" };
                const vIcon  = { clear: "fa-check", grazing: "fa-exclamation", blocked: "fa-xmark", unknown: "fa-question" };
                verdEl.innerHTML = verdicts.map((vd, idx) => {
                    const sel = idx === _losSelectedSeg ? " selected" : "";
                    return `<span class="topo-los-chip ${vd.v}${sel}" data-seg-idx="${idx}"><i class="fa-solid ${vIcon[vd.v] || 'fa-question'}"></i> Seg ${vd.seg}: ${vLabel[vd.v] || vd.v}</span>`;
                }).join("");
                verdEl.querySelectorAll(".topo-los-chip").forEach(chip => {
                    chip.addEventListener("click", () => {
                        const idx = parseInt(chip.dataset.segIdx, 10);
                        _losSelectedSeg = idx;
                        _renderLosPanel();
                        _drawLosChart({ segPoints, elevations });
                    });
                });
            }

            // Update segment status header
            _updateLosSegStatus(verdicts);
        }

        // Update the segment-status banner and the segment-height inputs for the selected segment.
        function _updateLosSegStatus(verdicts) {
            if (!verdicts || !verdicts.length) return;
            const vd = verdicts[Math.min(_losSelectedSeg, verdicts.length - 1)];
            if (!vd) return;

            const statusEl = document.getElementById("topo-los-seg-status");
            if (statusEl) {
                const vLabel = { clear: "Clear", grazing: "Grazing", blocked: "Blocked", unknown: "No data" };
                let margin = "";
                if (vd.minClearance !== Infinity) {
                    if (vd.v === "clear") {
                        margin = ` (+${vd.minClearance.toFixed(1)} m)`;
                    } else if (vd.v === "grazing") {
                        margin = ` (${vd.minClearance.toFixed(1)} m)`;
                    } else if (vd.v === "blocked") {
                        margin = ` (+${(-vd.minClearance).toFixed(1)} m)`;
                    }
                }
                statusEl.innerHTML =
                    `LoS: ${vd.a}→${vd.b} &middot; ${vd.km.toFixed(2)} km &middot; ` +
                    `<span class="seg-verdict ${vd.v}">${vLabel[vd.v] || vd.v}${margin}</span>`;
                statusEl.classList.add("visible");
            }

            // Sync segment height inputs to current selected-segment pins
            const hStart = document.getElementById("topo-los-seg-h-start");
            const hEnd   = document.getElementById("topo-los-seg-h-end");
            if (hStart && _losPins[_losSelectedSeg]) hStart.value = _losPins[_losSelectedSeg].h;
            if (hEnd   && _losPins[_losSelectedSeg + 1]) hEnd.value = _losPins[_losSelectedSeg + 1].h;
        }

        // ── Self-node side panel ─────────────────────────────────────────
        // Renders identity + radio + actions. Uses the same panel-view
        // styling as the other RX-log views.
        const LS_RADIO_PRESETS = "meshcore.radioPresets";
        const LS_HAS_GPS = "meshcore.selfHasGps";

        function _loadRadioPresets() {
            try { return JSON.parse(localStorage.getItem(LS_RADIO_PRESETS) || "[]"); }
            catch (_) { return []; }
        }
        function _saveRadioPresets(arr) {
            try { localStorage.setItem(LS_RADIO_PRESETS, JSON.stringify(arr)); } catch (_) {}
        }
        function _hasGpsHardware() {
            return localStorage.getItem(LS_HAS_GPS) === "1";
        }
        function _setHasGpsHardware(v) {
            try { localStorage.setItem(LS_HAS_GPS, v ? "1" : "0"); } catch (_) {}
        }

        // Accept both "12,34" (EU locale) and "12.34" decimal separators —
        // <input type=number> normalisation is inconsistent across browsers
        // and Domoticz users come from many locales.
        function _normDecimal(v) {
            if (v === null || v === undefined) return "";
            return String(v).trim().replace(",", ".");
        }

        async function _sendDeviceCmd(cmd) {
            try {
                await _pluginWS.sendCmdAndWait(cmd);
                return true;
            } catch (_) { return false; }
        }

        function _renderSelfPanel() {
            const view = document.getElementById("self-view");
            if (!view) return;
            const si = (_deviceMap && _deviceMap.self_info) || {};
            const st = (_deviceMap && _deviceMap.self_telemetry) || {};
            const hasGps = _hasGpsHardware();
            const presets = _loadRadioPresets();
            const SF_OPTS = [7,8,9,10,11,12].map(v =>
                `<option value="${v}"${v === si.radio_sf ? " selected" : ""}>${v}</option>`).join("");
            // Coding rate in MeshCore firmware: 5..8 = 4/5..4/8
            const CR_OPTS = [5,6,7,8].map(v =>
                `<option value="${v}"${v === si.radio_cr ? " selected" : ""}>4/${v}</option>`).join("");
            const presetOpts = presets.length
                ? `<option value="">— select preset —</option>` +
                  presets.map((p, i) => {
                      const parts = [`${p.freq}/${p.bw}/SF${p.sf}/CR4/${p.cr}`];
                      if (p.tx_power)       parts.push(`${p.tx_power}dBm`);
                      if (p.path_hash_mode) parts.push(`${p.path_hash_mode}-byte`);
                      if (p.flood_scope)    parts.push(p.flood_scope);
                      return `<option value="${i}">${escHtml(p.name)} (${escHtml(parts.join(" · "))})</option>`;
                  }).join("")
                : `<option value="">(no presets saved)</option>`;

            view.innerHTML = `
                <div class="self-section">Identity</div>
                <div class="self-row">
                    <label>Name</label>
                    <div class="self-input-wrap">
                        <input id="self-name" type="text" value="${escHtml(si.name || "")}" maxlength="32">
                        <button class="self-btn" data-action="set-name">Save</button>
                    </div>
                </div>
                <div class="self-row">
                    <label>Public key</label>
                    <div class="self-input-wrap">
                        <input id="self-pubkey" type="text" value="${escHtml(si.public_key || "")}" readonly>
                        <button class="self-btn" data-action="copy-pubkey">Copy</button>
                    </div>
                </div>
                <div class="self-row">
                    <label>Adv type</label>
                    <span class="self-value">${escHtml(({1:"Companion",2:"Repeater",3:"Room Server",4:"Sensor"})[si.adv_type] || si.adv_type || "?")}</span>
                </div>

                <div class="self-section">Coordinates
                    <label style="float:right;font-weight:normal;font-size:0.78rem">
                        <input type="checkbox" id="self-has-gps"${hasGps ? " checked" : ""}>
                        I have GPS hardware
                    </label>
                </div>
                <div style="font-size:0.74rem;color:var(--text);opacity:0.7;line-height:1.4">
                    ${hasGps
                        ? "GPS hardware is set, the device updates its own coordinates — manual edit disabled."
                        : "No GPS hardware — set the coordinates manually so the device advertises a location."}
                </div>
                <div class="self-row">
                    <label>Latitude</label>
                    <input id="self-lat" type="text" inputmode="decimal" value="${si.adv_lat ?? 0}"${hasGps ? " readonly" : ""}>
                </div>
                <div class="self-row">
                    <label>Longitude</label>
                    <input id="self-lon" type="text" inputmode="decimal" value="${si.adv_lon ?? 0}"${hasGps ? " readonly" : ""}>
                </div>
                ${hasGps ? "" : `<button class="self-btn primary" data-action="set-coords">Apply coordinates</button>`}

                <div class="self-section">Radio</div>
                <div class="self-grid-2">
                    <div class="self-row">
                        <label>Frequency (MHz)</label>
                        <input id="self-freq" type="text" inputmode="decimal" value="${si.radio_freq ?? ""}">
                    </div>
                    <div class="self-row">
                        <label>Bandwidth (kHz)</label>
                        <input id="self-bw" type="text" inputmode="decimal" value="${si.radio_bw ?? ""}">
                    </div>
                    <div class="self-row">
                        <label>Spreading factor</label>
                        <select id="self-sf">${SF_OPTS}</select>
                    </div>
                    <div class="self-row">
                        <label>Coding rate</label>
                        <select id="self-cr">${CR_OPTS}</select>
                    </div>
                    <div class="self-row">
                        <label>TX power (dBm)</label>
                        <input id="self-tx" type="number" min="0" max="${si.max_tx_power || 22}" value="${si.tx_power ?? ""}">
                    </div>
                    <div class="self-row">
                        <label>Max TX power</label>
                        <span class="self-value">${si.max_tx_power ?? "?"} dBm</span>
                    </div>
                </div>
                <div style="display:flex;gap:6px;flex-wrap:wrap">
                    <button class="self-btn primary" data-action="apply-radio">Apply radio</button>
                    <button class="self-btn" data-action="apply-tx">Apply TX power</button>
                </div>

                <div class="self-section">Routing</div>
                <div class="self-row">
                    <label title="MeshCore stores N bytes per hop in the packet path field.
1-byte ≈ 64 max hops but more hash collisions.
2-byte ≈ 32 max hops, less collision.
3-byte ≈ 21 max hops, near-zero collision (default on SF8).
Larger = more reliable routing but smaller mesh diameter.">Path hash size</label>
                    <div class="self-input-wrap">
                        <select id="self-phm">
                            <option value="1"${(_deviceMap?.device_info?.path_hash_mode === 1) ? " selected" : ""}>1 byte (max ~64 hops)</option>
                            <option value="2"${(_deviceMap?.device_info?.path_hash_mode === 2) ? " selected" : ""}>2 byte (max ~32 hops)</option>
                            <option value="3"${(_deviceMap?.device_info?.path_hash_mode === 3 || !_deviceMap?.device_info?.path_hash_mode) ? " selected" : ""}>3 byte (max ~21 hops, default on SF8)</option>
                        </select>
                        <button class="self-btn" data-action="apply-phm">Apply</button>
                    </div>
                </div>
                <div class="self-row">
                    <label title="Default flood scope tag — empty = global flood. e.g. #nl or #europe.">Default flood scope</label>
                    <div class="self-input-wrap">
                        <input id="self-flood-scope" type="text" maxlength="31" placeholder="(global)" value="${escHtml(_deviceMap?.default_flood_scope || "")}">
                        <button class="self-btn" data-action="apply-flood-scope">Apply</button>
                    </div>
                </div>

                <div class="self-section">Presets</div>
                <div class="self-input-wrap">
                    <select id="self-preset" style="flex:1">${presetOpts}</select>
                    <button class="self-btn" data-action="apply-preset" disabled>Apply</button>
                    <button class="self-btn" data-action="save-preset">Save current as…</button>
                    <button class="self-btn" data-action="delete-preset" title="Delete the selected preset" disabled><i class="fa-solid fa-trash"></i></button>
                </div>

                <div class="self-section">Node Settings</div>
                ${_renderNodeSettings()}

                <div class="self-section">Actions</div>
                <div class="self-input-wrap">
                    <label style="display:inline-flex;align-items:center;gap:4px;font-size:0.78rem">
                        <input type="radio" name="advert-mode" value="flood" checked> Flood
                    </label>
                    <label style="display:inline-flex;align-items:center;gap:4px;font-size:0.78rem">
                        <input type="radio" name="advert-mode" value="direct"> Direct
                    </label>
                    <button class="self-btn primary" data-action="send-advert">Send advert</button>
                </div>
                <div class="self-input-wrap">
                    <button class="self-btn" data-action="get-telemetry">Get telemetry</button>
                    <button class="self-btn danger" data-action="reboot">Reboot device</button>
                </div>
                <div id="self-telemetry-box" style="font-size:0.78rem;color:var(--text);${Object.keys(st).length ? "" : "display:none"}">
                    ${_renderTelemetryBox(st)}
                </div>
            `;
            // Wire buttons
            view.querySelectorAll(".self-btn").forEach(btn => {
                btn.onclick = () => _selfPanelAction(btn.dataset.action);
            });

            // Hovering "Apply" preset or "Save current as…" highlights every
            // form field that the preset captures, so the user knows at a
            // glance what is in / not in the preset.
            const PRESET_FIELD_IDS = ["self-freq", "self-bw", "self-sf", "self-cr",
                                      "self-tx", "self-phm", "self-flood-scope"];
            const onHi = () => {
                PRESET_FIELD_IDS.forEach(id => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    el.classList.add("preset-highlight");
                    // Also highlight the row's label so it's obvious in the grid
                    const row = el.closest(".self-row");
                    if (row) {
                        const lab = row.querySelector("label");
                        if (lab) lab.classList.add("preset-highlight-label");
                    }
                });
            };
            const offHi = () => {
                document.querySelectorAll(".preset-highlight").forEach(el => el.classList.remove("preset-highlight"));
                document.querySelectorAll(".preset-highlight-label").forEach(el => el.classList.remove("preset-highlight-label"));
            };
            view.querySelectorAll('.self-btn[data-action="apply-preset"], .self-btn[data-action="save-preset"]').forEach(btn => {
                btn.addEventListener("mouseenter", onHi);
                btn.addEventListener("mouseleave", offHi);
                btn.addEventListener("focus", onHi);
                btn.addEventListener("blur", offHi);
            });
            const gpsCb = document.getElementById("self-has-gps");
            if (gpsCb) gpsCb.onchange = () => {
                _setHasGpsHardware(gpsCb.checked);
                _renderSelfPanel();   // re-render to enable/disable inputs
            };
            // When the user picks a preset from the dropdown, mirror its
            // values into the form so they see what Apply will send. Doesn't
            // actually fire any commands yet — only the Apply button does.
            // Also gate the Apply/Delete buttons on a valid selection.
            const presetSel = document.getElementById("self-preset");
            const applyBtn  = view.querySelector('.self-btn[data-action="apply-preset"]');
            const deleteBtn = view.querySelector('.self-btn[data-action="delete-preset"]');
            const syncPresetButtons = () => {
                const hasSel = presetSel && presetSel.value !== "";
                if (applyBtn)  applyBtn.disabled  = !hasSel;
                if (deleteBtn) deleteBtn.disabled = !hasSel;
            };
            if (presetSel) presetSel.onchange = () => {
                syncPresetButtons();
                const idx = presetSel.value;
                if (idx === "") return;
                const ps = _loadRadioPresets();
                const p = ps[idx];
                if (!p) return;
                const setIf = (id, v) => {
                    const el = document.getElementById(id);
                    if (el && v !== undefined && v !== null) el.value = String(v);
                };
                setIf("self-freq",        p.freq);
                setIf("self-bw",          p.bw);
                setIf("self-sf",          p.sf);
                setIf("self-cr",          p.cr);
                setIf("self-tx",          p.tx_power);
                setIf("self-phm",         p.path_hash_mode);
                if (p.flood_scope !== undefined) setIf("self-flood-scope", p.flood_scope);
            };
            syncPresetButtons();
        }

        function _renderTelemetryBox(st, title = "Last telemetry reading") {
            if (!st || !Object.keys(st).length) return "";
            const rows = Object.entries(st).map(([k, v]) =>
                `<div class="self-row" style="grid-template-columns: 130px 1fr">
                    <span style="font-size:0.74rem;opacity:0.8;text-transform:uppercase;letter-spacing:0.04em">${escHtml(k)}</span>
                    <span>${escHtml(typeof v === "object" ? JSON.stringify(v) : String(v))}</span>
                </div>`).join("");
            return title ? `<div class="self-section">${escHtml(title)}</div>${rows}` : rows;
        }

        // Wrap a self-panel command so the user sees feedback and the panel
        // re-renders with fresh values after the plugin processes the change.
        async function _selfPanelApply(cmd, btnAction) {
            const btn = btnAction ? document.querySelector(`.self-btn[data-action="${btnAction}"]`) : null;
            const orig = btn ? btn.innerHTML : null;
            if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; }
            await _sendDeviceCmd(cmd);
            // Re-render the panel after a short delay so the spinner button
            // is replaced and a repeat click won't double-fire.  The panel
            // reflects the plugin's updated device map when the next `devices`
            // push arrives (~1-2 s).
            setTimeout(_renderSelfPanel, 800);
            // The re-render replaces the button DOM, but if it failed early
            // (no device map yet) we still restore the original state.
            if (btn) {
                setTimeout(() => { try { btn.disabled = false; btn.innerHTML = orig; } catch (_) {} }, 1200);
            }
        }

        async function _selfPanelAction(action) {
            const si = (_deviceMap && _deviceMap.self_info) || {};
            if (action === "copy-pubkey") {
                const el = document.getElementById("self-pubkey");
                if (el && el.value) {
                    navigator.clipboard.writeText(el.value).then(
                        () => { el.style.background = "rgba(38,196,124,0.20)"; setTimeout(() => el.style.background = "", 600); },
                        () => alert("Copy failed — select the text manually.")
                    );
                }
                return;
            }
            if (action === "set-name") {
                const v = document.getElementById("self-name").value.trim();
                if (!v) return;
                await _selfPanelApply(`!set_name ${v}`, action);
                return;
            }
            if (action === "set-coords") {
                const lat = _normDecimal(document.getElementById("self-lat").value);
                const lon = _normDecimal(document.getElementById("self-lon").value);
                if (lat === "" || lon === "") return;
                await _selfPanelApply(`!set_coords ${lat} ${lon}`, action);
                return;
            }
            if (action === "apply-radio") {
                const f  = _normDecimal(document.getElementById("self-freq").value);
                const bw = _normDecimal(document.getElementById("self-bw").value);
                const sf = document.getElementById("self-sf").value;
                const cr = document.getElementById("self-cr").value;
                if (!f || !bw || !sf || !cr) { alert("Fill in all radio fields."); return; }
                if (!confirm(`Apply radio settings?\nfreq=${f} MHz  bw=${bw} kHz  sf=${sf}  cr=4/${cr}\n\nMis-set values can drop your link to the local mesh.`)) return;
                await _selfPanelApply(`!set_radio ${f} ${bw} ${sf} ${cr}`, action);
                return;
            }
            if (action === "apply-tx") {
                const p = _normDecimal(document.getElementById("self-tx").value);
                if (!p) return;
                if (!confirm(`Apply TX power = ${p} dBm?`)) return;
                await _selfPanelApply(`!set_tx_power ${p}`, action);
                return;
            }
            if (action === "apply-phm") {
                const m = document.getElementById("self-phm").value;
                if (!m) return;
                if (!confirm(`Set path hash size to ${m} byte(s)?\n\nLarger size = less hash collision but smaller mesh diameter.`)) return;
                await _selfPanelApply(`!set_path_hash_mode ${m}`, action);
                return;
            }
            if (action === "apply-flood-scope") {
                const v = document.getElementById("self-flood-scope").value.trim();
                await _selfPanelApply(`!flood_scope ${v}`, action);
                return;
            }
            if (action === "save-preset") {
                const f  = _normDecimal(document.getElementById("self-freq").value);
                const bw = _normDecimal(document.getElementById("self-bw").value);
                const sf = document.getElementById("self-sf").value;
                const cr = document.getElementById("self-cr").value;
                const tx = _normDecimal(document.getElementById("self-tx").value);
                const phm = document.getElementById("self-phm").value;
                const scope = document.getElementById("self-flood-scope").value.trim();
                const name = prompt("Preset name (e.g. SF7 or SF8):", `SF${sf}`);
                if (!name) return;
                const presets = _loadRadioPresets();
                const existing = presets.findIndex(p => p.name === name);
                const entry = {
                    name,
                    freq: +f, bw: +bw, sf: +sf, cr: +cr,
                    tx_power: +tx,
                    path_hash_mode: +phm,
                    flood_scope: scope,
                };
                if (existing >= 0) presets[existing] = entry;
                else presets.push(entry);
                _saveRadioPresets(presets);
                _renderSelfPanel();
                return;
            }
            if (action === "apply-preset") {
                const idx = document.getElementById("self-preset").value;
                const presets = _loadRadioPresets();
                if (idx === "" || !presets[idx]) return;
                const p = presets[idx];
                // Build an explicit confirm dialog that names EVERY setting
                // the preset will or will not touch, so the user can see at
                // a glance what changes. Empty string = will reset to global
                // / off; undefined = preset doesn't carry this setting yet
                // (legacy presets saved before the field existed).
                const fmt = (v, emptyLabel) =>
                    v === undefined ? "(unchanged)" :
                    v === ""        ? emptyLabel :
                    String(v);
                const lines = [
                    `Frequency:        ${p.freq} MHz`,
                    `Bandwidth:        ${p.bw} kHz`,
                    `Spreading factor: SF${p.sf}`,
                    `Coding rate:      4/${p.cr}`,
                    `TX power:         ${fmt(p.tx_power, "(unchanged)")}${p.tx_power ? " dBm" : ""}`,
                    `Path hash size:   ${fmt(p.path_hash_mode, "(unchanged)")}${p.path_hash_mode ? "-byte" : ""}`,
                    `Default flood scope: ${fmt(p.flood_scope, "(global / off)")}`,
                ];
                if (!confirm(`Apply preset "${p.name}"?\n\n${lines.join("\n")}`)) return;
                // Apply non-radio commands FIRST — set_radio re-tunes the
                // transceiver and can briefly drop the local link. Doing TX
                // power / path hash / flood scope ahead means we're not
                // racing against a re-tune. Radio goes last.
                // Space the writes apart so the plugin can process each
                // command before the next one arrives. The WebSocket channel
                // delivers each command individually, but a short gap between
                // commands avoids overwhelming the plugin's command lock.
                // Each _step rejects on failure so the sequence aborts immediately.
                const _step = (cmd) => new Promise((resolve, reject) =>
                    setTimeout(async () => {
                        const ok = await _sendDeviceCmd(cmd);
                        if (ok) { resolve(); }
                        else { reject(new Error(cmd)); }
                    }, PRESET_STEP_MS));
                try {
                    if (p.flood_scope !== undefined) await _step(`!flood_scope ${p.flood_scope}`);
                    if (p.path_hash_mode)            await _step(`!set_path_hash_mode ${p.path_hash_mode}`);
                    if (p.tx_power)                  await _step(`!set_tx_power ${p.tx_power}`);
                    await _step(`!set_radio ${p.freq} ${p.bw} ${p.sf} ${p.cr}`);
                } catch (err) {
                    alert(`Preset aborted: ${err.message} failed — radio may be partially configured`);
                    return;
                }
                // Self panel refreshes automatically when the plugin pushes
                // the next `devices` message (handled by _onDeviceMapUpdated).
                return;
            }
            if (action === "delete-preset") {
                const idx = document.getElementById("self-preset").value;
                const presets = _loadRadioPresets();
                if (idx === "" || !presets[idx]) return;
                if (!confirm(`Delete preset "${presets[idx].name}"?`)) return;
                presets.splice(+idx, 1);
                _saveRadioPresets(presets);
                _renderSelfPanel();
                return;
            }
            if (action === "send-advert") {
                const mode = (document.querySelector("input[name='advert-mode']:checked") || {}).value || "flood";
                await _sendDeviceCmd(`!send_advert ${mode}`);
                return;
            }
            if (action === "get-telemetry") {
                await _sendDeviceCmd("!get_telemetry");
                return;
            }
            if (action === "reboot") {
                if (!confirm("Reboot the connected MeshCore device?\n\nYou'll lose the connection for ~30 seconds.")) return;
                await _sendDeviceCmd("!reboot");
                return;
            }
        }

        // ── Remote-contact side panel ────────────────────────────────────
        // Build a _deviceMap-node-shaped object from the heard store so the
        // contact panel can show pubkey/type/snr/hops/coords for a heard node
        // that isn't a real contact (and so has no _deviceMap.nodes entry).
        function _heardNodeShape(name) {
            const hl = (typeof _heardList === "function") ? _heardList() : [];
            const h = hl.find(x => (x.name || (x.pubkey || "").slice(0, 12)) === name);
            if (!h) return null;
            return {
                pubkey: h.pubkey || "",
                type:   h.type || 0,
                snr:    (h.snr != null) ? { value: `${h.snr} dB` } : null,
                rssi:   (h.rssi != null) ? { value: `${h.rssi} dBm` } : null,
                hops:   (h.path_len != null && h.path_len >= 0) ? { value: String(h.path_len) } : null,
                lat:    h.lat ?? null,
                lon:    h.lon ?? null,
                query:  {},
                _heard: true,
            };
        }

        function _renderContactPanel(name) {
            const view = document.getElementById("contact-view");
            if (!view) return;
            const node = (_deviceMap && _deviceMap.nodes && _deviceMap.nodes[name])
                       || _heardNodeShape(name) || {};
            const query = node.query || {};
            const hops  = node.hops && node.hops.value || "?";
            // Values already carry their unit ("4.5 dB" / "-88 dBm") — strip
            // it so we don't render a doubled unit in the panel.
            const snr   = (node.snr  && String(node.snr.value).replace(/\s*dB$/i, "").trim())  || "?";
            const rssiV = (node.rssi && String(node.rssi.value).replace(/\s*dBm$/i, "").trim()) || "";
            const cLat = node.lat, cLon = node.lon;
            const cHasLoc = (cLat != null && cLon != null) && (cLat || cLon);
            // Distance from us — only if both we and the node have GPS.
            // Our own coords live in self_info (adv_lat/adv_lon); the self
            // node usually has no lat/lon under nodes[]. Fall back to that.
            const _si = (_deviceMap && _deviceMap.self_info) || {};
            const _selfNode = (_deviceMap && _deviceMap.self
                && _deviceMap.nodes && _deviceMap.nodes[_deviceMap.self]) || null;
            // Coerce to numbers — JSON values may arrive as strings; a
            // non-finite or null-island (0,0) coord is treated as "no fix".
            const sLat = Number(_si.adv_lat != null ? _si.adv_lat
                          : (_selfNode ? _selfNode.lat : NaN));
            const sLon = Number(_si.adv_lon != null ? _si.adv_lon
                          : (_selfNode ? _selfNode.lon : NaN));
            const cLatN = Number(cLat), cLonN = Number(cLon);
            const sHasLoc = isFinite(sLat) && isFinite(sLon) && (sLat || sLon);
            const cFix    = isFinite(cLatN) && isFinite(cLonN) && (cLatN || cLonN);
            let distHtml = "";
            if (cFix && sHasLoc) {
                const R = 6371, toR = d => d * Math.PI / 180;
                const dLat = toR(cLatN - sLat), dLon = toR(cLonN - sLon);
                const a = Math.sin(dLat/2)**2
                        + Math.cos(toR(sLat)) * Math.cos(toR(cLatN)) * Math.sin(dLon/2)**2;
                const km = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                const txt = km < 1 ? `${Math.round(km * 1000)} m` : `${km.toFixed(km < 10 ? 2 : 1)} km`;
                distHtml = `<div class="self-row"><label>Distance</label><span class="self-value">${txt} from us</span></div>`;
            }

            const fmtAge = (t) => {
                if (!t) return "never";
                const d = Math.max(0, Math.floor(Date.now() / 1000 - t));
                if (d < 60) return `${d}s ago`;
                if (d < 3600) return `${Math.floor(d / 60)}m ago`;
                return `${Math.floor(d / 3600)}h ago`;
            };

            const statusHtml = query.status ? `
                <div class="self-section">Status @ ${fmtAge(query.status.t)}</div>
                ${_renderTelemetryBox(query.status.data, null)}
            ` : "";
            const telemHtml = query.telemetry ? `
                <div class="self-section">Telemetry @ ${fmtAge(query.telemetry.t)}</div>
                ${_renderTelemetryBox(query.telemetry.data, null)}
            ` : "";
            const neighHtml = query.neighbours ? `
                <div class="self-section">Neighbours @ ${fmtAge(query.neighbours.t)}</div>
                <pre style="font-size:0.72rem;white-space:pre-wrap;word-break:break-all;color:var(--text);background:var(--bg);padding:6px;border-radius:4px">${escHtml(JSON.stringify(query.neighbours.data, null, 2))}</pre>
            ` : "";

            // Last-heard: prefer heard-nodes entry (unix seconds), fall back to last_seen slot.
            const _nodePk = node.pubkey || "";
            const _heardEntry = _nodePk && (_heard && _heard.nodes) && (_heard.nodes[_nodePk] || null);
            let _lastHeardStr = "—";
            if (_heardEntry && _heardEntry.last_heard) {
                _lastHeardStr = new Date(_heardEntry.last_heard * 1000).toLocaleString();
            } else {
                const _lsRaw = node.last_seen ? _slotValue(node.last_seen) : "";
                if (_lsRaw) _lastHeardStr = _lsRaw;
            }

            view.innerHTML = `
                <div class="self-section">Contact info</div>
                <div class="self-row"><label>Name</label><span class="self-value">${escHtml(name)}</span></div>
                <div class="self-row"><label>Type</label><span class="self-value">${escHtml(({1:"Companion",2:"Repeater",3:"Room Server",4:"Sensor"})[node.type] || node.type || "?")}</span></div>
                <div class="self-row"><label><i class="fa-regular fa-clock"></i> Last heard</label><span class="self-value">${escHtml(_lastHeardStr)}</span></div>
                <div class="self-row"><label><i class="fa-solid fa-tower-broadcast"></i> Hops</label><span class="self-value">${escHtml(hops)}</span></div>
                <div class="self-row"><label><i class="fa-solid fa-signal"></i> SNR</label><span class="self-value">${escHtml(snr)} dB</span></div>
                ${rssiV ? `<div class="self-row"><label><i class="fa-solid fa-wifi"></i> RSSI</label><span class="self-value">${escHtml(rssiV)} dBm</span></div>` : ""}
                <div class="self-row"><label>Public key</label>
                    <div class="self-input-wrap">
                        <input type="text" readonly value="${escHtml(node.pubkey || "")}">
                        <button class="self-btn" data-action="copy-pubkey">Copy</button>
                    </div>
                </div>
                <div class="self-row"><label>Coordinates</label>
                    <span class="self-value">${cHasLoc ? `${cLat}, ${cLon}` : "—"}</span>
                </div>
                ${distHtml}
                ${cHasLoc ? `<div id="contact-map"></div>` : ""}
                ${!node._heard ? `
                <div class="self-input-wrap">
                    <button class="self-btn primary" data-action="show-conversation" style="flex:1">
                        💬 Show conversation in inbox
                    </button>
                </div>` : ""}

                ${node._heard ? `
                <div class="self-section">Heard node</div>
                <div style="font-size:0.78rem;color:var(--text);opacity:0.8;line-height:1.5">
                    This node was heard over the air but is not in your contacts,
                    so remote queries aren't available. Add it to contacts
                    (star it in the list or the Heard-nodes panel) to enable
                    status / telemetry / neighbour queries.
                </div>
                ` : `
                <div class="self-section">Remote queries</div>
                <div style="font-size:0.78rem;color:var(--text);opacity:0.8;line-height:1.5">
                    Each query sends a packet over the mesh and waits up to 60s
                    for the remote to respond. If the contact is offline or out
                    of range the query will time out.
                </div>
                <div class="self-input-wrap" style="flex-wrap:wrap">
                    <button class="self-btn" data-action="reset-path">Reset path</button>
                    <button class="self-btn primary" data-action="req-status">Get status</button>
                    <button class="self-btn primary" data-action="req-telemetry">Get telemetry</button>
                    <button class="self-btn primary" data-action="req-neighbours">Get neighbours</button>
                </div>
                ${statusHtml}${telemHtml}${neighHtml}
                `}
            `;

            // Location map. innerHTML above replaced the DOM, so any prior
            // Leaflet instance is now orphaned — drop it and rebuild. This
            // panel has no periodic refresh, so a plain rebuild is fine.
            if (_contactMap) { try { _contactMap.remove(); } catch (_) {} _liveMaps.delete(_contactMap); _contactMap = null; }
            if (cHasLoc) {
                const el = document.getElementById("contact-map");
                let tries = 0;
                const init = () => {
                    if (typeof L === "undefined") {
                        if (++tries > LEAFLET_MAX_TRIES) {
                            if (el) el.innerHTML = `<div style="padding:16px;color:var(--muted);font-size:0.8rem;text-align:center">Map library unavailable.</div>`;
                            return;
                        }
                        setTimeout(init, LEAFLET_POLL_MS);
                        return;
                    }
                    if (!el) return;
                    _contactMap = L.map(el, { zoomControl: true }).setView([cLat, cLon], 12);
                    _liveMaps.add(_contactMap);
                    _applyTileMode(_contactMap, _topoGetStr("tile", "light"));
                    const pinIcon = L.divIcon({
                        className: "mc-pin",
                        html: '<div class="mc-pin-inner"></div>',
                        iconSize: [20, 20],
                        iconAnchor: [10, 20],
                        popupAnchor: [0, -16],
                    });
                    L.marker([cLat, cLon], { icon: pinIcon })
                        .addTo(_contactMap).bindPopup(name).openPopup();
                    setTimeout(() => _contactMap.invalidateSize(), 200);
                };
                init();
            }

            view.querySelectorAll(".self-btn").forEach(btn => {
                btn.onclick = async () => {
                    const action = btn.dataset.action;
                    if (action === "show-conversation") {
                        _closeMapPanel();
                        _enterConversation(name);
                        return;
                    }
                    if (action === "copy-pubkey") {
                        const el = btn.previousElementSibling;
                        if (el && el.value) {
                            navigator.clipboard.writeText(el.value).then(
                                () => { el.style.background = "rgba(38,196,124,0.20)"; setTimeout(() => el.style.background = "", 600); },
                                () => alert("Copy failed — select the text manually.")
                            );
                        }
                        return;
                    }
                    btn.disabled = true;
                    const orig = btn.innerHTML;
                    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> …';
                    try {
                        if (action === "reset-path")      await _sendDeviceCmd(`!reset_path ${name}`);
                        else if (action === "req-status") await _sendDeviceCmd(`!req_status ${name}`);
                        else if (action === "req-telemetry") await _sendDeviceCmd(`!req_telemetry ${name}`);
                        else if (action === "req-neighbours") await _sendDeviceCmd(`!req_neighbours ${name}`);
                        // Re-render the panel once the plugin has processed the
                        // command and pushed an updated device map (~1-2 s).
                        setTimeout(() => _renderContactPanel(name), 1500);
                    } finally {
                        btn.disabled = false;
                        btn.innerHTML = orig;
                    }
                };
            });
        }

        // Sparkline refresh hook — invoked from the rx-log interval. Walks all
        // visible contact cards and re-paints their SVG.
        function _refreshCardSparklines() {
            const sigHist = (_rxLog.stats && _rxLog.stats.signal_history) || {};
            document.querySelectorAll(".sparkline").forEach(el => {
                const pk = el.dataset.pubkey;
                if (!pk || !sigHist[pk] || sigHist[pk].length < 2) {
                    // Not enough samples yet — render a flat placeholder.
                    el.innerHTML = "";
                    return;
                }
                _renderSparkline(el, sigHist[pk]);
            });
        }

        function _renderSparkline(svg, points) {
            if (!points || !points.length) return;
            const W = 100, H = 16;
            const snrs = points.map(p => p.snr).filter(v => v !== null && v !== undefined);
            if (!snrs.length) return;
            const lo = Math.min(...snrs), hi = Math.max(...snrs);
            const rng = (hi - lo) || 1;
            const pts = points.map((p, i) => {
                const x = (W * i) / Math.max(points.length - 1, 1);
                const y = H - ((p.snr - lo) / rng) * H;
                return `${x.toFixed(1)},${y.toFixed(1)}`;
            }).join(" ");
            svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
            const last = points[points.length - 1];
            const tip = `SNR history: ${snrs.length} samples\nRange: ${lo} … ${hi} dB\nLatest: ${last.snr ?? "?"} dB at ${last.t ? new Date(last.t * 1000).toLocaleTimeString() : "?"}`;
            svg.setAttribute("title", tip);
            // A faint filled area under the line makes the curve more readable
            // at 14px. Use the accent colour at low alpha.
            const areaPts = `0,${H} ${pts} ${W},${H}`;
            svg.innerHTML =
                `<polygon points="${areaPts}" fill="var(--accent)" fill-opacity="0.10"/>` +
                `<polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="1" stroke-linejoin="round"/>`;
        }

        // Restore the map canvas inside the panel before opening a map view —

            if (ext) ext.style.display = "";
        }

        // Rebuild the topology body as flex column: map on top, radar at bottom.
        // Idempotent: only rebuilds if the topo-layout class or the sub-divs are missing.
        function _ensureTopologyBody() {
            const body = document.getElementById("map-panel-body");
            if (!body) return;
            // If already in topo layout with both sub-divs present, keep it intact
            // (Leaflet already attached to map-canvas; destroying it would force a re-init).

            const hasRadarWrap = !!body.querySelector(".topo-radar-wrap");
            if (body.classList.contains("topo-layout") && hasMapWrap && hasRadarWrap) return;

            // Entering topo layout fresh: reset fit-done flag so the new open
            // auto-fits bounds, and clear live-baseline so we don't fire stale pulses.
            _topoFitDone = false;
            _lastSeenByNode = {};
            _topoLivePulsing.clear();

            // LoS and Coverage are intentionally session-only — clear any
            // stored "on" state from a previous session so the panel always
            // opens with both off. The settings drawer values for Coverage
            // (TX power, freq, etc.) persist; only the on/off toggle resets.
            try {

            // Entering topo layout from a non-topo view: rebuild content.

            body.innerHTML = `

                </div>
