            // Force a Leaflet re-init since we replaced the map-canvas DOM node.
            if (_leafletMap) _liveMaps.delete(_leafletMap);
            _leafletMap = null;
            _leafletMarker = null;

            // ── Apply persisted toggle states to toolbar buttons ─────────────
            function _applyTopoToolbarState() {
                const defs = { contacts: true, repeaters: true, rooms: true, heard: false, lines: true, live: false, audio: false };
                for (const [key, def] of Object.entries(defs)) {
                    const btn = document.getElementById(`topo-btn-${key}`);
                    if (!btn) continue;
                    btn.classList.toggle("active", _topoGet(key, def));
                }
                // Audio is visually disabled when Live is off
                const liveOn  = _topoGet("live", false);
                const audioBtn = document.getElementById("topo-btn-audio");
                if (audioBtn) audioBtn.toggleAttribute("disabled", !liveOn);
                // Tile button icon reflects current mode: moon = currently light (click → dark)
                const tileBtn = document.getElementById("topo-btn-tile");
                if (tileBtn) {
                    const tileMode = _topoGetStr("tile", "light");
                    _updateTileIcon(tileBtn, tileMode);
                    tileBtn.classList.toggle("active", tileMode === "dark");
                }
                // Heatmap button + window selector visibility
                const heatBtn = document.getElementById("topo-btn-heatmap");
                const heatWin = document.getElementById("topo-heat-window");
                const heatOn  = _topoGet("heatmap", false);
                if (heatBtn) heatBtn.classList.toggle("active", heatOn);
                if (heatWin) {
                    heatWin.classList.toggle("visible", heatOn);
                    const savedWin = _topoGetStr("heatmap-window", "10");
                    heatWin.value = savedWin;
                }
                // LoS button restores its persisted active state
                const losBtn = document.getElementById("topo-btn-los");
                const losOn  = _topoGet("los", false);
                if (losBtn) losBtn.classList.toggle("active", losOn);
                // Coverage button restores its persisted active state
                const covBtn = document.getElementById("topo-btn-coverage");
                const covOn  = _topoGet("coverage", false);
                if (covBtn) covBtn.classList.toggle("active", covOn);
            }
            _applyTopoToolbarState();

            // Apply persisted LoS state (swap pane + cursor + dimming).
            if (_topoGet("los", false)) _applyLosActiveState(true);

            // Apply persisted coverage state (render drawer + trigger recompute).
            if (_topoGet("coverage", false)) {
                _propRenderDrawer();
                _propScheduleRecompute();
            }

            // ── Wire toolbar button clicks ────────────────────────────────────
            const toolbar = body.querySelector("#topo-toolbar");
            toolbar.addEventListener("click", ev => {
                const btn = ev.target.closest(".topo-map-tool-btn");
                if (!btn || btn.hasAttribute("disabled")) return;
                const id = btn.id; // e.g. "topo-btn-contacts"
                const key = id.replace("topo-btn-", "");

                // Tile toggle — string value, not boolean
                if (key === "tile") {
                    const cur = _topoGetStr("tile", "light");
                    const next = cur === "light" ? "dark" : "light";
                    _topoSetStr("tile", next);
                    _updateTileIcon(btn, next);
                    // active = dark mode is currently on (icon shows the inverse: what clicking will do next)
                    btn.classList.toggle("active", next === "dark");
                    _applyTileModeAll(next);
                    return;
                }

                // Heatmap toggle — manage window selector visibility, rxlog sub, and auto-fade.
                if (key === "heatmap") {
                    const newVal = !_topoGet("heatmap", false);
                    _topoSet("heatmap", newVal);
                    btn.classList.toggle("active", newVal);
                    const heatWin = document.getElementById("topo-heat-window");
                    if (heatWin) heatWin.classList.toggle("visible", newVal);
                    const emptyNote = document.getElementById("topo-heatmap-empty");
                    if (!newVal && emptyNote) emptyNote.classList.remove("visible");
                    if (newVal) {
                        // Ensure rxlog is subscribed (topology panel doesn't subscribe on its own).
                        // _rxLogOpenPanels refcount covers other heavy panels — subscribing here
                        // is safe; toggling off only unsubscribes when no other panel holds a ref.
                        if (_rxLogOpenPanels.size === 0) _rxLogSubscribe();
                        _startHeatmapAutoFade();
                    } else {
                        _stopHeatmapAutoFade();
                        if (_rxLogOpenPanels.size === 0) _rxLogUnsubscribe();
                    }
                    _renderActivityHeatmap();
                    return;
                }

                // LoS toggle — swap radar pane with LoS pane, manage cursor + dimming.
                if (key === "los") {
                    const newVal = !_topoGet("los", false);
                    _topoSet("los", newVal);
                    btn.classList.toggle("active", newVal);
                    _applyLosActiveState(newVal);
                    // Preload Highcharts (core + more for arearange) the moment
                    // the user enables LoS, so the library is in cache by the
                    // time the first pin is dropped — eliminates the 1-2 s
                    // first-paint delay.
                    if (newVal) {
                        if (typeof _loadHighchartsMore === "function") {
                            try { _loadHighchartsMore(); } catch (_) {}
                        } else if (typeof _loadHighcharts === "function") {
                            try { _loadHighcharts(); } catch (_) {}
                        }
                    }
                    return;
                }

                // Coverage toggle — show/hide settings drawer, start/stop computation.
                if (key === "coverage") {
                    const newVal = !_topoGet("coverage", false);
                    _topoSet("coverage", newVal);
                    btn.classList.toggle("active", newVal);
                    _propRenderDrawer();
                    if (newVal) {
                        _propScheduleRecompute();
                    } else {
                        _propTeardown();
                    }
                    return;
                }

                const defs = { contacts: true, repeaters: true, rooms: true, heard: false, lines: true, live: false, audio: false };
                const newVal = !_topoGet(key, defs[key] !== undefined ? defs[key] : false);
                _topoSet(key, newVal);
                btn.classList.toggle("active", newVal);

                // If Live was toggled, update audio button disabled state
                // and reset the baseline (toggling ON → fresh baseline, no burst).
                if (key === "live") {
                    _topoLiveOn = newVal;
                    if (newVal) {
                        // Establish a fresh baseline from current data (no flashes)
                        _lastSeenByNode = {};
                        const nodes = (_deviceMap && _deviceMap.nodes) || {};
                        for (const [name, node] of Object.entries(nodes)) {
                            const nk = node.pubkey_prefix || name;
                            _lastSeenByNode[nk] = {
                                last_advert: (node.last_advert != null) ? node.last_advert : 0,
                                last_seen_str: node.last_seen ? String(node.last_seen.value || node.last_seen || "") : "",
                            };
                        }
                    }
                    const audioBtn = document.getElementById("topo-btn-audio");
                    if (audioBtn) audioBtn.toggleAttribute("disabled", !newVal);
                    // When Live is turned off, also turn Audio off
                    if (!newVal) {
                        _topoSet("audio", false);
                        if (audioBtn) audioBtn.classList.remove("active");
                    }
                }

                // If Audio was just toggled ON, create the AudioContext now (user gesture)
                // so it is authorised before the first beep fires asynchronously.
                if (key === "audio" && newVal && !_topoAudioCtx) {
                    try { _topoAudioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
                    catch (_) { _topoAudioCtx = null; }
                }

                // Filter / view toggles re-fit the visible bounds so the
                // result of the change always fits nicely on screen. Live
                // and Audio don't change which nodes are visible, so they
                // do NOT reset the fit flag (keeps the user's pan/zoom).
                if (key !== "live" && key !== "audio") {
                    _topoFitDone = false;
                }
                _renderTopology();
            });

            // Wire button event handlers for the radar toolbar (delegated to body
            // so they still work after _losSwapPane replaces the radar wrap).
            body.addEventListener("click", ev => {
                const vBtn = ev.target.closest("#topo-radar-view-seg button[data-view]");
                if (vBtn) {
                    body.querySelectorAll("#topo-radar-view-seg button").forEach(b => b.classList.remove("active"));
                    vBtn.classList.add("active");
                    _radarView = vBtn.dataset.view;
                    _renderRadar();
                }
                const zBtn = ev.target.closest("#topo-radar-zoom-seg button[data-zoom]");
                if (zBtn) {
                    body.querySelectorAll("#topo-radar-zoom-seg button").forEach(b => b.classList.remove("active"));
                    zBtn.classList.add("active");
                    _radarZoom = parseInt(zBtn.dataset.zoom, 10);
                    _renderRadar();
                }
            });
            // Heatmap window selector — persist value and re-render immediately.
            const heatWinSel = body.querySelector("#topo-heat-window");
            if (heatWinSel) {
                heatWinSel.addEventListener("change", () => {
                    _topoSetStr("heatmap-window", heatWinSel.value);
                    _renderActivityHeatmap();
                });
            }
            const ext = document.getElementById("map-panel-external");
            if (ext) ext.style.display = "";
        }

        // Delegated click handler for the "info" button on each message
        document.addEventListener("click", (ev) => {
            const btn = ev.target.closest(".msg-info-btn");
            if (!btn) return;
            ev.preventDefault();
            ev.stopPropagation();
            try {
                const json = decodeURIComponent(escape(atob(btn.dataset.msg)));
                _openMsgDetails(JSON.parse(json));
            } catch (_) { /* corrupt data attr — ignore */ }
        });

        // Topology popup delete buttons. Contact markers send !remove (which
        // demotes the contact into the heard list) followed by !forget_heard
        // (which purges it). Heard markers just !forget_heard. Net effect on
        // either path: the node is fully gone from our system and a future
        // advert from it will not resurrect the entry (the purged pubkey is
        // persisted in meshcore_heard.json).
        //
        // _deletionInProgress serialises deletions so two rapid clicks on
        // different popups can't interleave their save/restore snapshots.
        // Native <button> elements already fire `click` on Enter/Space, so
        // keyboard activation is covered by this handler too.
        let _deletionInProgress = false;
        document.addEventListener("click", async (ev) => {
            const btn = ev.target.closest(".topo-popup-del");
            if (!btn || btn.hasAttribute("disabled") || _deletionInProgress) return;
            ev.preventDefault();
            ev.stopPropagation();
            const kind = btn.dataset.kind;
            const name = btn.dataset.name || "";
            const pk   = btn.dataset.pk   || "";
            const tag  = name || pk.slice(0, 12) || "this node";
            if (!confirm(`Permanently remove ${tag} from your MeshCore data?\n\nThis cannot be undone — further adverts from this node will be ignored.`)) return;
            _deletionInProgress = true;
            btn.setAttribute("disabled", "disabled");
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Removing…';
            // Optimistically remove from local state and redraw immediately so
            // the marker vanishes the moment the user confirms. The popup is
            // closed before the WebSocket round-trip so the user never sees
            // the spinner state — the next devices_delta from the plugin will
            // confirm the removal, and on failure we redraw without restoring
            // (a fresh server push will reconcile any divergent state).
            if (kind === "contact" && name && _deviceMap && _deviceMap.nodes) {
                delete _deviceMap.nodes[name];
            }
            if (pk && _heard && _heard.nodes) {
                delete _heard.nodes[pk];
            }
            if (_leafletMap) _leafletMap.closePopup();
            _topoFitDone = false;
            _renderTopology();
            try {
                if (kind === "contact" && name) {
                    await _pluginWS.sendCmdAndWait(`!remove ${name}`);
                    if (pk) {
                        try { await _pluginWS.sendCmdAndWait(`!forget_heard ${pk}`); } catch (_) {}
                    }
                } else if (kind === "heard" && pk) {
                    await _pluginWS.sendCmdAndWait(`!forget_heard ${pk}`);
                }
            } catch (err) {
                // Don't restore from a stale snapshot — concurrent inbox /
                // devices_delta pushes may have changed the entry since the
                // click. Ask the user to refresh; the next server push will
                // re-seed any node we shouldn't have removed.
                const msg = (err && typeof err.message === "string" && err.message) || "Unknown error";
                alert(`Removal failed: ${msg}\n\nPlease refresh the dashboard to resync.`);
            } finally {
                _deletionInProgress = false;
                // The button's DOM node was destroyed by _renderTopology()'s
                // layer rebuild, but reset attributes defensively in case the
                // popup somehow survived (e.g. closePopup() no-op'd).
                if (btn.isConnected) {
                    btn.removeAttribute("disabled");
                    btn.innerHTML = '<i class="fa-solid fa-trash"></i> Delete';
                }
            }
        });

        // Card action buttons (self gear, contact info)
        document.addEventListener("click", (ev) => {
            const btn = ev.target.closest(".card-action-btn");
            if (!btn || btn.disabled) return;
            ev.preventDefault();
            ev.stopPropagation();
            const action = btn.dataset.action;
            if (action === "open-self") {
                _openSidePanel("self");
            } else if (action === "open-contact") {
                const name = btn.dataset.node;
                if (name) _openSidePanel("contact:" + name);
            }
        });

        // Delegated handler for "LoS to here" popup buttons.
        // Enables LoS mode, seeds observer (pin 1) + target (pin 2), then renders.
        document.addEventListener("click", (ev) => {
            const btn = ev.target.closest(".topo-popup-los");
            if (!btn) return;
            ev.preventDefault();
            ev.stopPropagation();
            const tgtLat = parseFloat(btn.dataset.losLat);
            const tgtLon = parseFloat(btn.dataset.losLon);
            const tgtLabel = btn.dataset.losLabel || "";
            if (isNaN(tgtLat) || isNaN(tgtLon)) return;

            // Resolve observer coords (same 3-tier chain as _renderTopology).
            let obsLat = null, obsLon = null;
            const si = _deviceMap && _deviceMap.self_info;
            if (si && si.adv_lat != null && si.adv_lon != null && (si.adv_lat || si.adv_lon)) {
                obsLat = si.adv_lat; obsLon = si.adv_lon;
            }
            if ((obsLat == null || (!obsLat && !obsLon)) && _deviceMap && _deviceMap.nodes && _deviceMap.self) {
                const sn = _deviceMap.nodes[_deviceMap.self];
                if (sn && sn.lat != null && sn.lon != null && (sn.lat || sn.lon)) { obsLat = sn.lat; obsLon = sn.lon; }
            }
            if ((obsLat == null || (!obsLat && !obsLon)) && _domoticzLocation && _domoticzLocation.lat != null) {
                obsLat = _domoticzLocation.lat; obsLon = _domoticzLocation.lon;
            }
            if (obsLat == null) {
                // Quick-action shortcut: alert is fine here; the LoS pane uses an inline banner for the sustained-use case.
                alert("Observer location unknown. Set GPS on the connected node or configure the Domoticz location in Settings.");
                return;
            }

            // Enable LoS if not already on.
            if (!_topoGet("los", false)) {
                _topoSet("los", true);
                const losBtn = document.getElementById("topo-btn-los");
                if (losBtn) losBtn.classList.add("active");
                _applyLosActiveState(true);
            }

            // Seed two pins: observer → target.
            _losPins = [
                { id: _losNextId++, lat: obsLat, lon: obsLon, h: 2, label: "Observer" },
                { id: _losNextId++, lat: tgtLat, lon: tgtLon, h: 8, label: tgtLabel },
            ];
            if (_leafletMap) _leafletMap.closePopup();
            _renderLosOverlay();
            _renderLosPanel();
            _scheduleLosProfile();
        });

        // Delegated handler for "Coverage from here" popup buttons.
        // Enables Coverage mode if off, sets the drawer's origin to the
        // clicked node, then re-renders the drawer + recomputes the grid.
        document.addEventListener("click", (ev) => {
            const btn = ev.target.closest(".topo-popup-cov");
            if (!btn) return;
            ev.preventDefault();
            ev.stopPropagation();
            const origin = btn.dataset.covOrigin || "";
            if (!origin) return;

            // Validate the node actually has resolvable coords before we kick
            // off the recompute — avoids the user staring at a stalled grid
            // when the popup belongs to a node without GPS.
            if (!_propOriginCoords(origin)) {
                alert("That node has no known location. Coverage needs a fix to centre the grid.");
                return;
            }

            // Persist the new origin to the coverage drawer's storage. Other
            // coverage settings (TX power, freq, etc.) are intentionally left
            // alone.
            _topoSetStr("coverage:origin", origin);

            // Enable Coverage if not already on. Mirror the toolbar click
            // path so toolbar state stays in sync.
            if (!_topoGet("coverage", false)) {
                _topoSet("coverage", true);
                const covBtn = document.getElementById("topo-btn-coverage");
                if (covBtn) covBtn.classList.add("active");
            }
            if (_leafletMap) _leafletMap.closePopup();
            _propRenderDrawer();
            _propScheduleRecompute();
        });

        // ── Map side panel (Leaflet) ─────────────────────────────────────────────
        let _leafletMap = null;
        let _leafletMarker = null;

        function _openMapPanel(name, lat, lon) {
            // Clear any topology overlay before showing a single-node view
            if (_topologyLayer) { _topologyLayer.remove(); _topologyLayer = null; }
            const panel = document.getElementById("map-panel");
            const backdrop = document.getElementById("map-backdrop");
            const title = document.getElementById("map-panel-title");
            const coords = document.getElementById("map-panel-coords");
            const ext = document.getElementById("map-panel-external");
            if (!panel || !backdrop) return;

            // Restore map canvas if a different content (e.g. message details) replaced it
            _ensureMapCanvas();

            title.textContent = name;
            coords.textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
            // meshcore.co.uk/map.html may or may not honour lat/lon params — link out anyway
            ext.href = `https://meshcore.co.uk/map.html?lat=${lat}&lon=${lon}`;

            panel.classList.add("open");
            backdrop.classList.add("open");
            panel.setAttribute("aria-hidden", "false");

            // Defer until Leaflet is loaded; give up after ~5s with a fallback message
            const canvas = document.getElementById("map-canvas");
            let tries = 0;
            const init = () => {
                if (typeof L === "undefined") {
                    if (++tries > LEAFLET_MAX_TRIES) {
                        canvas.innerHTML = `<div style="padding:24px;color:var(--muted);font-size:0.85rem;text-align:center;">
                            Leaflet failed to load.<br>Your browser may be blocking external scripts.<br>
                            Coordinates: <code>${lat.toFixed(6)}, ${lon.toFixed(6)}</code>
                        </div>`;
                        return;
                    }
                    setTimeout(init, LEAFLET_POLL_MS); return;
                }
                if (!_leafletMap) {
                    _leafletMap = L.map(canvas, { zoomControl: true }).setView([lat, lon], 13);
                    _liveMaps.add(_leafletMap);
                    _applyTileMode(_leafletMap, _topoGetStr("tile", "light"));
                } else {
                    _leafletMap.setView([lat, lon], 13);
                }
                if (_leafletMarker) _leafletMarker.remove();
                // CSS-only marker — avoids bundling Leaflet's PNG icons
                const pinIcon = L.divIcon({
                    className: "mc-pin",
                    html: '<div class="mc-pin-inner"></div>',
                    iconSize: [20, 20],
                    iconAnchor: [10, 20],
                    popupAnchor: [0, -16],
                });
                _leafletMarker = L.marker([lat, lon], { icon: pinIcon }).addTo(_leafletMap).bindPopup(name).openPopup();
                // Force a redraw — the panel just animated in, container size may be stale
                setTimeout(() => _leafletMap.invalidateSize(), 280);
            };
            init();
        }

        function _closeMapPanel() {
            const panel = document.getElementById("map-panel");
            const backdrop = document.getElementById("map-backdrop");
            if (!panel || !backdrop) return;
            panel.classList.remove("open");
            backdrop.classList.remove("open");
            panel.setAttribute("aria-hidden", "true");
            // Release rxlog subscription if a heavy panel was open.
            _rxLogPanelClose(_sidePanelView);
            // Destroy the radar chart if the topology panel was open.
            if (_sidePanelView === "topology") {
                if (_radarChart) { try { _radarChart.destroy(); } catch (_) {} _radarChart = null; }
                if (_radarThrottleTimer) { clearTimeout(_radarThrottleTimer); _radarThrottleTimer = null; }
                const body = document.getElementById("map-panel-body");
                if (body) body.classList.remove("topo-layout");
            }
            // Mirror the analytics teardown from _openSidePanel's
            // "leaving analytics" branch. Without this, clicking X (or
            // Esc / backdrop) leaves the 7 Highcharts instances alive
            // while body.innerHTML throws away their SVG containers on
            // the next reopen — the renderers then take the in-place
            // setData() path against orphan charts and nothing draws.
            if (_sidePanelView === "analytics") {
                _analyticsStopTimer();
                if (_analyticsUnsubWS) { try { _analyticsUnsubWS(); } catch (_) {} _analyticsUnsubWS = null; }
                if (_analyticsResizeObs) { try { _analyticsResizeObs.disconnect(); } catch (_) {} _analyticsResizeObs = null; }
                try { if (_analyticsRssiChart)    { _analyticsRssiChart.destroy();    _analyticsRssiChart    = null; } } catch (_) {}
                try { if (_analyticsSnrChart)     { _analyticsSnrChart.destroy();     _analyticsSnrChart     = null; } } catch (_) {}
                try { if (_analyticsPacketsChart) { _analyticsPacketsChart.destroy(); _analyticsPacketsChart = null; } } catch (_) {}
                try { if (_analyticsNoiseChart)   { _analyticsNoiseChart.destroy();   _analyticsNoiseChart   = null; } } catch (_) {}
                try { if (_analyticsHourlyChart)  { _analyticsHourlyChart.destroy();  _analyticsHourlyChart  = null; } } catch (_) {}
                try { if (_analyticsHopsChart)    { _analyticsHopsChart.destroy();    _analyticsHopsChart    = null; } } catch (_) {}
                try { if (_analyticsChanChart)    { _analyticsChanChart.destroy();    _analyticsChanChart    = null; } } catch (_) {}
                panel.classList.remove("panel-analytics-wide");
            }
            _sidePanelView = null;
        }

        // Hook up close interactions once on script load
        (function _bindMapPanel() {
            const close = document.getElementById("map-panel-close");
            const backdrop = document.getElementById("map-backdrop");
            if (close)    close.addEventListener("click", _closeMapPanel);
            if (backdrop) backdrop.addEventListener("click", _closeMapPanel);
            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") _closeMapPanel();
            });

            // ── Resizable side panel ──
            // Drag the left edge to make the panel wider/narrower. We persist
            // the chosen width in localStorage so it survives page reloads.
            const panel   = document.getElementById("map-panel");
            const resizer = document.getElementById("map-panel-resizer");
            if (!panel || !resizer) return;
            const LS_KEY = "meshcore.sidePanelWidth";
            const saved  = parseInt(localStorage.getItem(LS_KEY) || "0", 10);
            if (saved >= 360) panel.style.width = saved + "px";
            let dragging = false;
            // Throttle Leaflet redraws — invalidateSize() per pixel move is
            // wasteful, especially on the topology map. Coalesce into a
            // single rAF callback per frame.
            let mapInvalidatePending = false;
            const _scheduleMapInvalidate = () => {
                if (mapInvalidatePending || !_leafletMap) return;
                mapInvalidatePending = true;
                requestAnimationFrame(() => {
                    mapInvalidatePending = false;
                    if (_leafletMap) _leafletMap.invalidateSize();
                });
            };
            resizer.addEventListener("mousedown", (e) => {
                dragging = true;
                panel.classList.add("resizing");
                e.preventDefault();
            });
            document.addEventListener("mousemove", (e) => {
                if (!dragging) return;
                // Panel is anchored to the right edge: width = (viewportW - clientX)
                const w = Math.max(360, Math.min(window.innerWidth - 80, window.innerWidth - e.clientX));
                panel.style.width = w + "px";
                _scheduleMapInvalidate();
                _scheduleAnalyticsReflow();
            });
            document.addEventListener("mouseup", () => {
                if (!dragging) return;
                dragging = false;
                panel.classList.remove("resizing");
                if (_leafletMap) _leafletMap.invalidateSize();
                _scheduleAnalyticsReflow();
                try { localStorage.setItem(LS_KEY, parseInt(panel.style.width, 10) || 480); } catch (_) {}
            });
        })();

        async function _toggleFavorite(name) {
            if (!name) return;
            const wasFav = _isFavorite(name);
            const action = wasFav ? "remove" : "add";
            const cmd = `!favorite ${action} ${name}`;
            try {
                await _pluginWS.sendCmdAndWait(cmd);
                // Optimistic update of local cache so the UI reflects it immediately
                if (_deviceMap) {
                    const arr = Array.isArray(_deviceMap.favorites) ? _deviceMap.favorites.slice() : [];
                    const i = arr.indexOf(name);
                    if (wasFav && i >= 0) arr.splice(i, 1);
                    else if (!wasFav && i < 0) arr.push(name);
                    _deviceMap.favorites = arr;
                }
                _rerenderContacts();
            } catch (err) {
                alert(`Failed to toggle favorite: ${err.message}`);
            }
        }

        // Remove a contact: send "!remove <name>" via the WebSocket channel.
        async function _removeContact(name) {
            if (!name) return;
            if (!confirm(`Remove contact "${name}" from the device?\n\nThis cannot be undone.`)) return;
            try {
                await _pluginWS.sendCmdAndWait(`!remove ${name}`);
                // Optimistic: drop from local map so it disappears immediately
                if (_deviceMap && _deviceMap.nodes) delete _deviceMap.nodes[name];
                _rerenderContacts();
            } catch (err) {
                alert(`Failed to remove contact: ${err.message}`);
            }
        }

        // ── Init ─────────────────────────────────────────────────────────────────────
        // State is delivered by the plugin via WebSocket push (snapshot message).
        // _onSnapshotReady() is called by the reducer on the first snapshot AND on
        // every reconnect snapshot.  The full state reset below is intentional on
        // reconnect: the plugin re-sends a fresh snapshot so any stale UI is replaced.
        let _initDone = false;

        async function _onSnapshotReady() {
            if (!_initDone) {
                // One-time setup: wire up UI callbacks and start the RX log interval.
                // _initDone is intentionally never reset on reconnect so this block
                // runs exactly once — prevents duplicate/leaked rx-log intervals.
                _initDone = true;

                _initContactClickToCompose();
                const _ce = document.getElementById("conv-banner-exit");
                if (_ce) _ce.onclick = _exitConversation;

                // Reflect the persisted page-size choice in the selector.
                const _ps = document.getElementById("inbox-page-size");
                if (_ps) _ps.value = _inboxPageSizeRaw;

                // ── Resizable inbox + auto-fill contacts ──
                // The inbox section is pinned to the bottom of the viewport
                // (clear of the Domoticz host footer). The contacts area then
                // auto-fills ALL the space between its top and the inbox so
                // there is never a dead gap. The drag bar changes only the
                // inbox height; the contacts area is recomputed to fit, so
                // dragging up grows the inbox as far as the contacts minimum
                // allows. Only the inbox height is persisted.
                (() => {
                    const box  = document.getElementById("inbox-history");
                    const grip = document.getElementById("inbox-resizer");
                    const sec  = document.getElementById("inbox-history-section");
                    const cg   = document.getElementById("contacts-grid");
                    const cl   = document.getElementById("contacts-list");
                    if (!box || !grip || !sec) return;
                    const LS_H = "meshcore.inboxHeight";
                    const _minInbox    = 120;
                    const _minContacts = 140;   // contacts can shrink to a
                                                // small internally-scrolling
                                                // strip so the inbox can grow
                                                // tall (up to ~Observer card).
                    const FOOTER_GAP   = 58;    // keep clear of host footer
                    const INNER_GAP    = 16;    // breathing room above inbox

                    // The contacts container currently on screen (grid or list).
                    const _activeC = () => {
                        if (cg && cg.offsetParent !== null) return cg;
                        if (cl && cl.offsetParent !== null) return cl;
                        return cg || cl;
                    };
                    const _setInbox = (h) => {
                        box.style.height = Math.max(_minInbox, Math.round(h)) + "px";
                        box.style.maxHeight = "none";
                    };
                    const _setContacts = (h) => {
                        const v = Math.max(_minContacts, Math.round(h)) + "px";
                        [cg, cl].forEach(el => {
                            if (!el) return;
                            el.style.height = v;
                            el.style.maxHeight = "none";
                        });
                    };

                    const savedH = parseInt(localStorage.getItem(LS_H) || "0", 10);
                    if (savedH >= _minInbox) _setInbox(savedH);

                    // Single layout pass: size contacts to fill the space, then
                    // pin the inbox section bottom just above the host footer.
                    const _layout = () => {
                        const cEl = _activeC();
                        if (!cEl) return;
                        // Inbox section height is independent of contacts (it
                        // is its own column-sibling: header + compose + box).
                        sec.style.marginTop = "0px";
                        const secH = sec.offsetHeight;
                        // Target where the section's TOP should land so its
                        // bottom clears the footer.
                        const targetTop = window.innerHeight - FOOTER_GAP - secH;
                        // Contacts container top is fixed (content above it
                        // does not depend on its own height), so fill from
                        // there down to the inbox.
                        const cTop = cEl.getBoundingClientRect().top;
                        _setContacts(Math.max(_minContacts, targetTop - cTop - INNER_GAP));
                        // Re-measure with contacts now sized, then push the
                        // section down so its bottom sits above the footer.
                        sec.style.marginTop = "0px";
                        const natTop = sec.getBoundingClientRect().top;
                        const push = Math.max(8, Math.round(
                            window.innerHeight - FOOTER_GAP - sec.offsetHeight - natTop));
                        sec.style.marginTop = push + "px";
                    };

                    // Largest inbox height that still leaves the layout valid.
                    // The inbox section sits BELOW #main-layout, whose height
                    // is max(self-section, contacts-section). Shrinking the
                    // contacts grid below the self-section height no longer
                    // moves the section up — it just adds blank space (and a
                    // page scrollbar). So the real floor for the section top
                    // is the LOWER of the self-section bottom and the minimum
                    // contacts extent, not the contacts minimum alone.
                    const _selfSec = document.getElementById("self-section");
                    const _maxInbox = () => {
                        const cEl = _activeC();
                        if (!cEl) return _minInbox;
                        const chrome = sec.offsetHeight - box.getBoundingClientRect().height;
                        const cTop   = cEl.getBoundingClientRect().top;
                        const ssBot  = _selfSec
                            ? _selfSec.getBoundingClientRect().bottom : 0;
                        const floorTop = Math.max(ssBot, cTop + _minContacts) + INNER_GAP;
                        return Math.max(_minInbox,
                            window.innerHeight - FOOTER_GAP - floorTop - chrome);
                    };

                    let dragging = false, startY = 0, startInbox = 0;
                    grip.addEventListener("mousedown", (e) => {
                        dragging = true;
                        startY = e.clientY;
                        startInbox = box.getBoundingClientRect().height;
                        document.body.classList.add("inbox-resizing");
                        e.preventDefault();
                    });
                    document.addEventListener("mousemove", (e) => {
                        if (!dragging) return;
                        const d = startY - e.clientY;             // up => grow
                        const newInbox = Math.max(_minInbox,
                            Math.min(_maxInbox(), startInbox + d));
                        _setInbox(newInbox);
                        _layout();
                    });
                    document.addEventListener("mouseup", () => {
                        if (!dragging) return;
                        dragging = false;
                        document.body.classList.remove("inbox-resizing");
                        try {
                            localStorage.setItem(LS_H,
                                parseInt(box.style.height, 10) || _minInbox);
                        } catch (_) {}
                        _layout();
                    });

                    window._scheduleDock = (() => {
                        let raf = 0;
                        return () => {
                            if (raf) return;
                            raf = requestAnimationFrame(() => { raf = 0; _layout(); });
                        };
                    })();
                    window.addEventListener("resize", window._scheduleDock);
                    if (window.ResizeObserver) {
                        const _ro = new ResizeObserver(window._scheduleDock);
                        const _ml = document.getElementById("main-layout");
                        _ro.observe(sec);
                        if (_ml) _ro.observe(_ml);
                    }
                    window._scheduleDock();
                })();

                // Infinite-scroll: load older pages when the user scrolls to
                // the bottom of the inbox history container.
                const _inboxHistEl = document.getElementById("inbox-history");
                if (_inboxHistEl) {
                    _inboxHistEl.addEventListener("scroll", () => {
                        if (_inboxLoadingMore || !_inboxHasMore || !_inboxOldestId) return;
                        const el = _inboxHistEl;
                        // "bottom" = older entries (inbox is newest-first).
                        if (el.scrollTop + el.clientHeight >= el.scrollHeight - 60) {
                            if (_convNode) _convLoadOlderPage();
                            else           _mainLoadOlderPage();
                        }
                    });
                }

                // F3: no unconditional subscription here — rxlog is subscribed
                // on demand when a heavy panel opens (firehose/traffic/channels/stats).
            } else {
                // Reconnect path: show a lightweight placeholder in the inbox/
                // conversation area so the user sees "Reconnecting…" rather than
                // stale messages during the brief window before initialRender()
                // replaces the content with fresh snapshot data.
                const _inboxContainer = document.getElementById("inbox-history");
                if (_inboxContainer) {
                    _inboxHistory.length = 0;
                    _lastRenderedInboxHtml = "";
                    _inboxLastWsValue = "";
                    _inboxLoaded = false;   // allow fresh query after reconnect
                    _inboxHasMore   = false;
                    _inboxOldestId  = null;
                    _inboxLoadingMore = false;
                    _inboxContainer.innerHTML = `<div id="inbox-empty">Reconnecting…</div>`;
                }
                // If a conversation was open, exit it cleanly so the banner
                // doesn't reference a node whose data may have changed.
                if (_convNode) {
                    _convNode = null;
                    _inboxHasMore   = false;
                    _inboxOldestId  = null;
                    _inboxLoadingMore = false;
                    if (_inboxSearchDebTimer) { clearTimeout(_inboxSearchDebTimer); _inboxSearchDebTimer = null; }
                    const banner = document.getElementById("conv-banner");
                    if (banner) banner.style.display = "none";
                    const logLink = document.getElementById("inbox-log-link");
                    if (logLink) logLink.style.display = "none";
                }
                // F3 reconnect: reset seq and clear the entry buffer so a stale
                // delta cannot corrupt the new window.  Then re-subscribe only if
                // a heavy panel is currently open — otherwise leave unsubscribed.
                _rxLogSeq = -1;
                _rxLog.entries = [];
                if (_rxLogOpenPanels.size > 0) _rxLogSubscribe();
                // F7 reconnect: reset device-map delta seq so a stale
                // devices_delta cannot corrupt the new snapshot baseline.
                _deviceSeq = -1;
            }

            // Render from the newly-arrived snapshot (runs on every reconnect too,
            // clearing any stale UI from the previous session).
            _initialRenderDone = false;   // force re-render from fresh snapshot
            _lastLiveSlotsOf   = null;    // discard stale live-slot resolver
            _lastRemoteNodes   = [];
            _populateComposeTargets();
            try { _renderChannelChips(_allChannelChips()); } catch (_) {}
            await initialRender();        // instant — no API call
            // Seed _inboxLastWsValue from the snapshot so a reconnect where the
            // last message hasn't changed does not re-prepend it as a delta.
            // The snapshot/initialRender path already rendered that entry via
            // _inboxHistory; seeding here only suppresses a redundant delta
            // prepend — a genuinely new message will have a different value.
            if (_deviceMap && _deviceMap.inbox_value) {
                _inboxLastWsValue = _deviceMap.inbox_value;
            }
            _renderHeaderStats();
            try { if (_isOpen('stats')) _renderStatsPanel(); } catch (_) {}
            try { _renderHeardIfOpen(); } catch (_) {}
            try { if (_includeHeard) _rerenderContacts(); } catch (_) {}
            try { _renderChannelsIfOpen(); } catch (_) {}
            // Kick fetchDevices() so live Domoticz device values are patched in.
            loadData();
            // Kick the main-inbox server query on connect/reconnect (unless a
            // conversation is already open — that path uses _convQueryNewest).
            // Guard with _inboxLoaded so a rapid double-snapshot doesn't issue
            // two concurrent queries.
            if (!_convNode && !_inboxLoaded) {
                _inboxLoaded = true;
                _mainQueryNewest();
            }
        }

        // ── Compose bar ───────────────────────────────────────────────────────────

        const LS_COMPOSE_TARGET = "meshcore.composeTarget";

        function _persistComposeTarget(val) {
            try { if (val) localStorage.setItem(LS_COMPOSE_TARGET, val); } catch (_) {}
        }
        function _loadComposeTarget() {
            try { return localStorage.getItem(LS_COMPOSE_TARGET) || ""; } catch (_) { return ""; }
        }

        function _populateComposeTargets() {
            const sel = document.getElementById("compose-target");
            if (!sel) return;
            // Use current selection if any, else fall back to last-used target from localStorage
            const prev = sel.value || _loadComposeTarget();
            const prevText = sel.options[sel.selectedIndex] ? sel.options[sel.selectedIndex].textContent : "";
            const wasReply = sel.options[sel.selectedIndex] ? !!sel.options[sel.selectedIndex].dataset.reply : false;
            sel.innerHTML = "";

            // Channel options from meshcore_channels.json
            const chanEntries = Object.entries(_channelNames);
            if (chanEntries.length) {
                const grp = document.createElement("optgroup");
                grp.label = "Channels";
                for (const [idx, name] of chanEntries) {
                    const o = document.createElement("option");
                    // Channel names already include the leading "#"
                    // (e.g. "#test") — don't double-prefix into "##test".
                    o.value = String(name).startsWith("#") ? name : `#${name}`;
                    o.textContent = name;
                    grp.appendChild(o);
                }
                sel.appendChild(grp);
            } else {
                // fallback: always offer ch0
                const o = document.createElement("option");
                o.value = "#0";
                o.textContent = "Ch 0 (flood)";
                sel.appendChild(o);
            }

            // Node options from device map
            if (_deviceMap && _deviceMap.nodes) {
                const grp = document.createElement("optgroup");
                grp.label = "Direct";
                const selfName = _deviceMap.self || null;
                for (const name of Object.keys(_deviceMap.nodes)) {
                    if (name === selfName) continue;   // can't DM yourself
                    const o = document.createElement("option");
                    o.value = name;
                    o.textContent = `➤ ${name}`;
                    grp.appendChild(o);
                }
                if (grp.childElementCount) sel.appendChild(grp);
            }

            // Restore previous selection if still present
            if (prev && [...sel.options].some(o => o.value === prev)) {
                sel.value = prev;
            } else if (prev && wasReply) {
                // Re-inject the temporary reply option that was wiped by the rebuild
                let tmp = document.createElement("option");
                tmp.dataset.reply = "1";
                tmp.value = prev;
                tmp.textContent = prevText;
                sel.appendChild(tmp);
                sel.value = prev;
            }
        }

        async function _sendMessage() {
            const sel = document.getElementById("compose-target");
            const input = document.getElementById("compose-input");
            const btn = document.getElementById("compose-send");
            const status = document.getElementById("compose-status");
            if (!sel || !input || !btn) return;

            const target = sel.value.trim();
            const body = input.value.trim();
            if (!body) return;

            // Build the value string the plugin expects: "target: body", "#name: body", or "#idx: body"
            const sendValue = `${target}: ${body}`;

            btn.disabled = true;
            _setComposeStatus(status, "", "⏳");

            // Optimistic inbox echo immediately — the user sees their message
            // as "sending…" the instant they press Send, before the WS
            // round-trip completes (previously this only appeared after the
            // cmd ack, ~1 s of an hourglass with nothing in the list).
            const echoId = _addPendingInboxEcho(target, body);

            try {
                await _pluginWS.sendCmdAndWait(sendValue);
                input.value = "";
                _updateCharCounter(0);
                _clearReply();
                _setComposeStatus(status, "ok", "✓ Sent");
                // The plugin has now stored the outgoing row in the SQLite
                // message store (cmd_result is pushed right after the insert).
                // Re-query the current scope so the placeholder reconciles
                // into the real stored row — which renders as a proper sent
                // line and later picks up the delivery ✓ once the ACK lands.
                // The single-valued inbox_value devices_delta is unreliable
                // here: a fast reply can overwrite our own outgoing echo
                // before the frontend ever sees it, leaving the placeholder
                // stuck on "sending…".
                if (_convNode) _convQueryNewest(); else _mainQueryNewest();
            } catch (e) {
                // Send failed — drop the optimistic placeholder.
                _removePendingInboxEcho(echoId);
                _setComposeStatus(status, "err", e.message);
            } finally {
                btn.disabled = false;
            }
            setTimeout(() => _setComposeStatus(status, "", ""), 4000);
        }

        // MeshCore on-the-wire message size cap (bytes, NOT characters —
        // emoji/multi-byte UTF-8 count for more than one byte).
        const COMPOSE_MAX = 150;
        const _byteEncoder = new TextEncoder();

        function _byteLen(s) {
            return _byteEncoder.encode(s || "").length;
        }

        function _updateCharCounter(value) {
            const el = document.getElementById("compose-counter");
            const input = document.getElementById("compose-input");
            if (!el || !input) return;
            // If we received a length (legacy) just treat it as bytes; otherwise compute.
            let bytes = typeof value === "number" ? value : _byteLen(value);
            // Hard-truncate when over the byte cap (browsers can't do this natively).
            if (typeof value === "string" && bytes > COMPOSE_MAX) {
                let v = value;
                while (_byteLen(v) > COMPOSE_MAX) v = v.slice(0, -1);
                input.value = v;
                bytes = _byteLen(v);
            }
            const remaining = COMPOSE_MAX - bytes;
            el.textContent = remaining;
            el.classList.toggle("warn", remaining <= 30 && remaining > 10);
            el.classList.toggle("low",  remaining <= 10);
        }

        function _setComposeStatus(el, cls, text) {
            el.className = `compose-status ${cls}`.trim();
            el.textContent = text;
        }

        // Add a pending placeholder to the inbox so the user sees their own
        // outgoing message immediately. Real send_result will replace this on
        // the next refresh; if no real entry arrives within 90s, drop it.
        function _addPendingInboxEcho(target, body) {
            const selfName = (_deviceMap && _deviceMap.self) || "Me";
            let channel, sender;
            if (target.startsWith("#")) {
                // The plugin echoes the channel tag as the stored channel
                // name (which itself includes the leading "#", e.g.
                // "#amersfoort", or "Public" for ch0). The compose target
                // may be "#name", "#idx" or legacy "##name" — resolve it to
                // that exact stored name so the placeholder's channel matches
                // the real echo and the dedup can reconcile them (otherwise
                // "amersfoort" vs "#amersfoort" → duplicate row + extra chip).
                const raw = target.replace(/^#+/, "");
                let nm = /^\d+$/.test(raw) ? _channelNames[raw] : null;
                if (!nm) {
                    nm = Object.values(_channelNames).find(v =>
                        String(v).replace(/^#+/, "").toLowerCase() === raw.toLowerCase());
                }
                channel = nm || (raw ? `#${raw}` : "Public");
                // For channel sends the plugin uses the connected-node's own name
                // when echoing back, so mirror that to keep placeholder/real visually identical.
                sender = "> " + selfName;
            } else {
                channel = "Private";
                sender = "> " + target;
            }
            const now = new Date();
            const pad = n => String(n).padStart(2, "0");
            const time = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} `
                       + `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
            const id = `pending-${now.getTime()}-${Math.random().toString(36).slice(2,7)}`;
            _inboxHistory.unshift({ time, channel, sender, text: body, _pending: id });
            if (_inboxHistory.length > 200) _inboxHistory.pop();
            _lastRenderedInboxHtml = "";
            const container = document.getElementById("inbox-history");
            if (container) _renderInbox(container);
            setTimeout(() => {
                const idx = _inboxHistory.findIndex(m => m._pending === id);
                if (idx >= 0) {
                    // The Mesh Inbox is a single-value Domoticz device, so a
                    // burst of messages can overwrite our own send-echo before
                    // the dashboard polls it — the confirmation is then never
                    // seen. The send DID succeed (the plugin logged it), so
                    // don't delete the message: settle it into a permanent
                    // "sent" row. Keep a marker so a late real echo still
                    // dedups against it instead of duplicating.
                    const m = _inboxHistory[idx];
                    m._pending = null;
                    m._settled = id;
                    _lastRenderedInboxHtml = "";
                    if (container) _renderInbox(container);
                }
            }, 90000);
            return id;
        }

        // Drop an optimistic placeholder by id (used when the send fails so
        // the user isn't left staring at a phantom "sending…" line).
        function _removePendingInboxEcho(id) {
            if (!id) return;
            const idx = _inboxHistory.findIndex(m => m._pending === id || m._settled === id);
            if (idx < 0) return;
            _inboxHistory.splice(idx, 1);
            _lastRenderedInboxHtml = "";
            const container = document.getElementById("inbox-history");
            if (container) _renderInbox(container);
        }

                if (!btn || btn.hasAttribute("disabled")) return;
                ev.stopPropagation();
                const rcpt = btn.dataset.retryRcpt || "";
                let body = "";
                try { body = decodeURIComponent(escape(atob(btn.dataset.retryBody || ""))); }
                catch (_) { body = ""; }
                if (!rcpt || !body) return;
                const originalHtml = btn.innerHTML;
                btn.setAttribute("disabled", "disabled");
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Retrying…';

                    // pending ack) is rendered. Same trick _sendMessage uses.
                    if (_convNode) _convQueryNewest(); else _mainQueryNewest();

        function _clearReply() {

        function _replyTo(evt, sender, channel) {
            evt.stopPropagation();
            const sel = document.getElementById("compose-target");
            const input = document.getElementById("compose-input");
            if (!sel || !input) return;

            // For channel messages, reply to the same channel (not the sender directly).
            // For private messages (no channel), reply directly to the sender node.
            if (channel) {
                // Find the matching channel option by value label — channel is the display name (e.g. "Public")
                const chanOpt = [...sel.options].find(o => o.textContent === channel || o.textContent.replace(/^#\s*/, "") === channel);
                if (chanOpt) {
                    sel.value = chanOpt.value;
                } else {
                    // Channel not in list yet — add a temporary option
                    let tmp = sel.querySelector(`option[data-reply="1"]`);
                    if (!tmp) {
                        tmp = document.createElement("option");
                        tmp.dataset.reply = "1";
                        sel.appendChild(tmp);
                    }
                    // Use channel name directly — the plugin resolves name → index
                    tmp.value = `#${channel}`;
                    tmp.textContent = `# ${channel} (reply)`;
                    sel.value = tmp.value;
                }
                // Pre-fill the input with @[Username] so the reply is addressed
                const mention = `@[${sender}] `;
                if (!input.value.startsWith(mention)) {
                    input.value = mention + input.value;
                }
            } else {
                // Private message — reply directly to the sender node
                const opt = [...sel.options].find(o => o.value === sender);
                if (opt) {
                    sel.value = sender;
                } else {
                    let tmp = sel.querySelector(`option[data-reply="1"]`);
                    if (!tmp) {
                        tmp = document.createElement("option");
                        tmp.dataset.reply = "1";
                        sel.appendChild(tmp);
                    }
                    tmp.value = sender;
                    tmp.textContent = `➤ ${sender} (reply)`;
                    sel.value = sender;
                }
            }

            input.focus();
            // Place cursor at the end of the input
            input.setSelectionRange(input.value.length, input.value.length);
            // Scroll the compose bar into view in case the inbox list is long.
            document.getElementById("compose-bar").scrollIntoView({ behavior: "smooth", block: "nearest" });
        }

        // Reply privately to a channel sender. Safe variant: only ever
        // called when _resolveDmTarget() succeeded. Heard senders are added
        // as a persistent contact (the plugin's !heard_add also refreshes
        // contacts, so the name resolves for the send) — no add/remove churn.
        async function _replyPrivate(evt, sender) {
            evt.stopPropagation();
            const t = _resolveDmTarget(sender);
            if (!t) { alert("No public key known for this sender — can't send a private message."); return; }
            const sel = document.getElementById("compose-target");
            const input = document.getElementById("compose-input");
            if (!sel || !input) return;

            if (t.kind === "heard") {
                const btn = evt.currentTarget;
                const orig = btn ? btn.innerHTML : "";
                if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; }
                try {
                    await _sendDeviceCmd(`!heard_add ${t.pubkey}`);
                } catch (_) {
                    if (btn) { btn.disabled = false; btn.innerHTML = orig; }
                    alert("Could not add " + sender + " to contacts — try again.");
                    return;
                }
                if (btn) { btn.disabled = false; btn.innerHTML = orig; }
            }

            // Point the composer at the contact (DM, not the channel).
            let opt = [...sel.options].find(o => o.value === t.name);
            if (!opt) {
                let tmp = sel.querySelector('option[data-reply="1"]');
                if (!tmp) { tmp = document.createElement("option"); tmp.dataset.reply = "1"; sel.appendChild(tmp); }
                tmp.value = t.name;
                tmp.textContent = `➤ ${t.name} (DM)`;
            }
            sel.value = t.name;
            _persistComposeTarget(t.name);
            input.focus();
            input.setSelectionRange(input.value.length, input.value.length);
            document.getElementById("compose-bar").scrollIntoView({ behavior: "smooth", block: "nearest" });
        }

        // ── Analytics card ────────────────────────────────────────────────────
        //
        // Registration API for other panels:
        //   _analyticsPanels.push({ id: <string>, panel: <string>, render: function(data){} })
        //   where:
        //     id     — unique identifier for this entry (e.g. "rssi", "snr")
        //     panel  — the analytics panel name sent to the backend (e.g. "rssi")
        //     render — called with the cmd_result data when the response arrives
        //
        // The registration must happen before or immediately after _analyticsInit()
        // is called (on DOMContentLoaded). Entries added while the card is open
        // will be included in the next refresh cycle.
        //
        const _analyticsPanels = [];

        // Current time range in seconds. Persisted in localStorage.
        let _analyticsRange = 21600;  // default 6 h

        // Auto-refresh timer handle (setInterval while card is open).
        let _analyticsRefreshTimer = null;

        // Generation counter — bumped on every refresh so stale responses are dropped.
        let _analyticsGeneration = 0;

        // Monotonic command-id counter shared across all analytics commands.
        let _analyticsCmdId = 1;

        // Unsubscribe handle for the analytics onPluginMessage listener.
        let _analyticsUnsubWS = null;

        // Escape node names before passing to Highcharts, which may render
        // legend labels as HTML in some configurations.
        const _escAnalyticsName = (name) => {
            const div = document.createElement("div");
            div.textContent = name == null ? "unknown" : String(name);
            return div.innerHTML;
        };

        // Highcharts instances for RSSI and SNR charts (kept for cross-chart legend sync).
        let _analyticsRssiChart = null;
        let _analyticsSnrChart  = null;
        // ResizeObserver attached to the side panel while the analytics view
        // is active; disconnected on view leave.
        let _analyticsResizeObs = null;

        // Reflow all analytics charts in a single rAF tick (called from the
        // side-panel resize handler so charts track the container width).
        let _analyticsReflowPending = false;
        function _scheduleAnalyticsReflow() {
            if (_analyticsReflowPending) return;
            _analyticsReflowPending = true;
            requestAnimationFrame(() => {
                _analyticsReflowPending = false;
                [_analyticsRssiChart, _analyticsSnrChart, _analyticsPacketsChart,
                 _analyticsNoiseChart, _analyticsHourlyChart, _analyticsHopsChart,
                 _analyticsChanChart].forEach(c => {
                    if (c) { try { c.reflow(); } catch (_) {} }
                });
            });
        }

        // Map node → colour (cache so palette is stable within a session).
        const _analyticsColorCache = {};

        // Returns a hash-stable HSL colour string for a node key.
        // Lightness varies with the high byte of the hash so adjacent
        // hue-space neighbours don't collide visually — matches the
        // pattern used by _chanColour for channel bars.
        function _nodePalette(pk) {
            if (_analyticsColorCache[pk]) return _analyticsColorCache[pk];
            let h = 0;
            for (let i = 0; i < pk.length; i++) {
                h = (h * 31 + pk.charCodeAt(i)) >>> 0;
            }
            const col = `hsl(${h % 360}, 65%, ${45 + ((h >> 8) % 20)}%)`;
            _analyticsColorCache[pk] = col;
            return col;
        }

        // Bucket size table from 00-timeseries-store.md.
        function _analyticsBucket(rangeSecs) {
            if (rangeSecs <= 10800)  return 60;
            if (rangeSecs <= 21600)  return 120;
            if (rangeSecs <= 43200)  return 300;
            if (rangeSecs <= 86400)  return 600;
            if (rangeSecs <= 172800) return 1200;
            return 3600;
        }

        // Fire one analytics WS command per registered panel, drop stale results
        // via the generation guard.
        function _analyticsRefresh() {
            if (!_analyticsIsOpen()) return;
            const gen = ++_analyticsGeneration;
            const now = Math.floor(Date.now() / 1000);
            const from = now - _analyticsRange;
            const bucket = _analyticsBucket(_analyticsRange);

            // Register a one-shot listener for this generation's results.
            // We keep a running unsubscribe and replace it so we never pile up
            // duplicate listeners.
            if (_analyticsUnsubWS) { try { _analyticsUnsubWS(); } catch (_) {} }
            _analyticsUnsubWS = _pluginWS.onPluginMessage(msg => {
                if (msg.t !== 'cmd_result') return;
                // The backend echoes analytics_id when present; fall back to
                // matching by panel name (the backend always echoes `panel`).
                const matchId = msg.analytics_id || msg.panel;
                if (!matchId) return;
                // Drop stale-generation results when analytics_gen is present.
                if (msg.analytics_gen !== undefined && msg.analytics_gen !== gen) return;
                // Match by id first; if not found, match by panel name.
                let entry = _analyticsPanels.find(p => p.id === matchId);
                if (!entry) entry = _analyticsPanels.find(p => p.panel === matchId);
                if (entry) {
                    try { entry.render(msg); } catch (e) { console.warn('analytics render error', e); }
                }
            });

            for (const p of _analyticsPanels) {
                const id = _analyticsCmdId++;
                _pluginWS.sendPluginCommand({
                    t: 'cmd',
                    cmd: 'analytics',
                    id,
                    panel: p.panel,
                    analytics_id: p.id,
                    analytics_gen: gen,
                    from,
                    to: now,
                    bucket
                });
            }
        }

        // Whether the analytics side-panel is currently open.
        function _analyticsIsOpen() {
            return _isOpen('analytics');
        }

        // Start / stop the 60-second auto-refresh timer.
        function _analyticsStartTimer() {
            _analyticsStopTimer();
            _analyticsRefreshTimer = setInterval(_analyticsRefresh, 60000);
        }
        function _analyticsStopTimer() {
            if (_analyticsRefreshTimer) { clearInterval(_analyticsRefreshTimer); _analyticsRefreshTimer = null; }
        }

        // Human-readable range label for empty states.
        function _analyticsRangeLabel(secs) {
            if (secs < 3600)   return `${Math.round(secs / 60)} minutes`;
            if (secs < 86400)  return `${(secs / 3600).toFixed(secs % 3600 === 0 ? 0 : 1)} hours`;
            return `${(secs / 86400).toFixed(secs % 86400 === 0 ? 0 : 1)} days`;
        }

        // ── RSSI chart renderer ───────────────────────────────────────────────
        function _renderRssiChart(data) {
            const slot = document.getElementById('analytics-slot-rssi');
            if (!slot) return;
            const rangeLabel = _analyticsRangeLabel(_analyticsRange);
            if (!data || !data.ok || !data.series || !data.series.length) {
                slot.innerHTML = `<div class="analytics-empty-state">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>No RSSI samples in the last ${rangeLabel}</span>
                    <span class="analytics-empty-hint">Widen the range or wait for more data</span>
                </div>`;
                if (_analyticsRssiChart) { try { _analyticsRssiChart.destroy(); } catch (_) {} _analyticsRssiChart = null; }
                return;
            }
            const series = _analyticsCapSeries(data.series);
            if (_analyticsRssiChart && _analyticsRssiChart.series &&
                _analyticsRssiChart.series.length === series.length &&
                _analyticsRssiChart.series.every((s, i) => s.name === series[i].name)) {
                series.forEach((s, i) => _analyticsRssiChart.series[i].setData(s.data, true, false, false));
                return;
            }
            if (_analyticsRssiChart) { try { _analyticsRssiChart.destroy(); } catch (_) {} _analyticsRssiChart = null; }
            slot.innerHTML = '<div id="analytics-rssi-chart" style="width:100%;height:250px"></div>';
            _analyticsRssiChart = Highcharts.chart('analytics-rssi-chart', _analyticsChartOptions({
                title: 'RSSI over time',
                yAxisTitle: 'RSSI (dBm)',
                series,
                sibling: () => _analyticsSnrChart
            }));
        }

        // ── SNR chart renderer ────────────────────────────────────────────────
        function _renderSnrChart(data) {
            const slot = document.getElementById('analytics-slot-snr');
            if (!slot) return;
            const rangeLabel = _analyticsRangeLabel(_analyticsRange);
            if (!data || !data.ok || !data.series || !data.series.length) {
                slot.innerHTML = `<div class="analytics-empty-state">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>No SNR samples in the last ${rangeLabel}</span>
                    <span class="analytics-empty-hint">Widen the range or wait for more data</span>
                </div>`;
                if (_analyticsSnrChart) { try { _analyticsSnrChart.destroy(); } catch (_) {} _analyticsSnrChart = null; }
                return;
            }
            const series = _analyticsCapSeries(data.series);
            if (_analyticsSnrChart && _analyticsSnrChart.series &&
                _analyticsSnrChart.series.length === series.length &&
                _analyticsSnrChart.series.every((s, i) => s.name === series[i].name)) {
                series.forEach((s, i) => _analyticsSnrChart.series[i].setData(s.data, true, false, false));
                return;
            }
            if (_analyticsSnrChart) { try { _analyticsSnrChart.destroy(); } catch (_) {} _analyticsSnrChart = null; }
            slot.innerHTML = '<div id="analytics-snr-chart" style="width:100%;height:250px"></div>';
            _analyticsSnrChart = Highcharts.chart('analytics-snr-chart', _analyticsChartOptions({
                title: 'SNR over time',
                yAxisTitle: 'SNR (dB)',
                series,
                sibling: () => _analyticsRssiChart
            }));
        }

        // Cap series to top-8 by sample count; collapse the rest into "Other" (averaged).
        function _analyticsCapSeries(rawSeries) {
            const MAX = 8;
            if (rawSeries.length <= MAX) {
                return rawSeries.map(s => ({
                    name: _escAnalyticsName(s.node || s.name),
                    data: (s.data || []).map(([ts, v]) => [ts * 1000, v]),
                    color: _nodePalette(s.node || s.name || ''),
                    type: 'spline',
                    lineWidth: 1.5,
                    marker: { enabled: false }
                }));
            }
            // Sort by sample count descending.
            const sorted = [...rawSeries].sort((a, b) => (b.data || []).length - (a.data || []).length);
            const top = sorted.slice(0, MAX);
            const rest = sorted.slice(MAX);
            // Build Other: merge all timestamps and average same-bucket values.
            const otherMap = {};
            const otherCount = {};
            for (const s of rest) {
                for (const [ts, v] of (s.data || [])) {
                    if (v === null || v === undefined) continue;
                    otherMap[ts]   = (otherMap[ts]   || 0) + v;
                    otherCount[ts] = (otherCount[ts] || 0) + 1;
                }
            }
            const otherData = Object.keys(otherMap)
                .sort((a, b) => a - b)
                .map(ts => [parseInt(ts, 10) * 1000, otherMap[ts] / otherCount[ts]]);

            const result = top.map(s => ({
                name: _escAnalyticsName(s.node || s.name),
                data: (s.data || []).map(([ts, v]) => [ts * 1000, v]),
                color: _nodePalette(s.node || s.name || ''),
                type: 'spline',
                lineWidth: 1.5,
                marker: { enabled: false }
            }));
            if (otherData.length) {
                result.push({
                    name: 'Other',
                    data: otherData,
                    color: '#888888',
                    type: 'spline',
                    lineWidth: 1,
                    dashStyle: 'ShortDash',
                    marker: { enabled: false }
                });
            }
            return result;
        }

        // Shared Highcharts options factory. sibling() returns the other chart instance.
        function _analyticsChartOptions({ title, yAxisTitle, series, sibling }) {
            return {
                chart: {
                    backgroundColor: 'transparent',
                    style: { fontFamily: 'inherit', color: 'var(--text)' },
                    animation: false,
                    marginRight: 10
                },
                // Per-chart belt-and-braces: even though _loadHighcharts() calls
                // Highcharts.setOptions({time:{useUTC:false}}) globally, some
                // setups still rendered UTC labels (likely because the chart
                // captured the option before our setOptions ran). Setting it
                // per-chart is unambiguous.
                time: { useUTC: false },
                // Hide the Highcharts hamburger / context menu on the RSSI,
                // SNR, and Noise charts (the three that build their options
                // via this helper). The other analytics charts already set
                // this inline.
                exporting: { enabled: false },
                title: {
                    text: title,
                    style: { color: 'var(--text)', fontSize: '0.78rem', fontWeight: '600' },
                    align: 'left',
                    margin: 8
                },
                xAxis: {
                    type: 'datetime',
                    lineColor: 'var(--border)',
                    tickColor: 'var(--border)',
                    labels: { style: { color: 'var(--muted)', fontSize: '0.68rem' } },
                    crosshair: { color: 'rgba(255,255,255,0.15)', dashStyle: 'Solid' }
                },
                yAxis: {
                    title: { text: yAxisTitle, style: { color: 'var(--muted)', fontSize: '0.7rem' } },
                    gridLineColor: 'rgba(255,255,255,0.06)',
                    labels: { style: { color: 'var(--muted)', fontSize: '0.68rem' } }
                },

                    itemHoverStyle: { color: 'var(--accent)' }
                },
                plotOptions: {
                    series: {
                        events: {
                            legendItemClick: function(e) {
                                // Cross-chart legend: toggle the same series in the sibling chart.
                                const siblingChart = sibling();
                                if (!siblingChart) return;
                                const seriesName = this.name;
                                const isVisible  = this.visible;
                                const siblingSeries = siblingChart.series.find(s => s.name === seriesName);
                                if (siblingSeries) {
                                    if (isVisible) siblingSeries.hide(); else siblingSeries.show();

                        }
                    }
