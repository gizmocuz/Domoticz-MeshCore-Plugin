        // ── Analytics side-panel helpers ──────────────────────────────────────

        // Poll until the plugin WebSocket is open (or time out).
        // Used by _openSidePanel when entering the analytics view.
        function _waitForWSOpen(timeoutMs) {
            return new Promise((resolve, reject) => {
                if (_pluginWS.isOpen && _pluginWS.isOpen()) return resolve();
                const t0 = Date.now();
                (function poll() {
                    if (_pluginWS.isOpen && _pluginWS.isOpen()) return resolve();
                    if (Date.now() - t0 > timeoutMs) return reject(new Error("WS open timeout"));
                    setTimeout(poll, 150);
                })();
            });
        }

        // Wire the range-segment control that lives inside the analytics panel body.
        // Called every time the analytics panel is opened (body.innerHTML is replaced
        // each open, so event listeners must be re-attached).
        function _analyticsAttachUI() {
            const seg = document.getElementById('analytics-range-seg');
            if (!seg) return;
            seg.querySelectorAll('button').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.range, 10) === _analyticsRange);
            });
            seg.addEventListener('click', ev => {
                const btn = ev.target.closest('button[data-range]');
                if (!btn) return;
                const r = parseInt(btn.dataset.range, 10);
                _analyticsRange = r;
                seg.querySelectorAll('button').forEach(b => b.classList.toggle('active', parseInt(b.dataset.range, 10) === r));
                try { localStorage.setItem('meshcore.analytics.range', String(r)); } catch (_) {}
                _analyticsRefresh();
            });
        }

        // ── Analytics panel init (registration only) ──────────────────────────
        function _analyticsInit() {
            // Load persisted range.
            try {
                const saved = localStorage.getItem('meshcore.analytics.range');
                if (saved) {
                    const n = parseInt(saved, 10);
                    if ([10800, 21600, 43200, 86400, 172800, 604800].includes(n)) _analyticsRange = n;
                }
            } catch (_) {}

            // Register built-in RSSI and SNR panels.
            _analyticsPanels.push({ id: 'rssi', panel: 'rssi', render: _renderRssiChart });
            _analyticsPanels.push({ id: 'snr',  panel: 'snr',  render: _renderSnrChart  });
        }

        // Initialise after DOM is ready (the IIFE runs at DOMContentLoaded time or
        // inline — schedule via microtask to be safe).
        Promise.resolve().then(_analyticsInit);

        // ── Packet volume chart (#4) ──────────────────────────────────────────
        let _analyticsPacketsChart = null;

        function _renderPacketsChart(data) {
            const slot = document.getElementById('analytics-slot-packets');
            if (!slot) return;
            const rangeLabel = _analyticsRangeLabel(_analyticsRange);

            // Backend shape: { series: [ {name:'rx', data:[[ts,val],...]}, {name:'tx', ...} ] }
            // — Highcharts-series wrappers, NOT flat rows. Convert ts (epoch
            // seconds) to ms for Highcharts.
            const series = data && data.ok && Array.isArray(data.series) ? data.series : [];
            const rxSeries = series.find(s => s.name === 'rx');
            const txSeries = series.find(s => s.name === 'tx');
            const rxData = (rxSeries && Array.isArray(rxSeries.data) ? rxSeries.data : [])
                .map(([ts, v]) => [ts * 1000, v || 0]);
            const txData = (txSeries && Array.isArray(txSeries.data) ? txSeries.data : [])
                .map(([ts, v]) => [ts * 1000, v || 0]);

            // Empty state when both series carry no data points.
            if (rxData.length === 0 && txData.length === 0) {
                if (_analyticsPacketsChart) { try { _analyticsPacketsChart.destroy(); } catch (_) {} _analyticsPacketsChart = null; }
                slot.innerHTML = `<div class="analytics-empty-state">
                    <i class="fa-solid fa-chart-area"></i>
                    <span>No packet data in the last ${rangeLabel}</span>
                    <span class="analytics-empty-hint">Packet counters are sampled every 5 min from the self node</span>
                </div>`;
                return;
            }

            // Static 2-series structure (RX / TX) → in-place update when chart exists.
            if (_analyticsPacketsChart && _analyticsPacketsChart.series &&
                _analyticsPacketsChart.series.length === 2) {
                _analyticsPacketsChart.series[0].setData(rxData, false, false, false);
                _analyticsPacketsChart.series[1].setData(txData, true,  false, false);
                return;
            }
            if (_analyticsPacketsChart) { try { _analyticsPacketsChart.destroy(); } catch (_) {} _analyticsPacketsChart = null; }
            slot.innerHTML = '<div id="analytics-chart-packets" style="width:100%;height:250px"></div>';

            // NOTE: if the selected range straddles a plugin restart, the backend's
            // _ts_packets_add drops the very first delta on session start to avoid a
            // counter-vs-zero spike.  A restart mid-range may still produce a one-bucket
            // dip where the new session's first sample is zero; this is cosmetic and expected.
            _analyticsPacketsChart = Highcharts.chart('analytics-chart-packets', {
                chart: {
                    type: 'spline',
                    backgroundColor: 'transparent',
                    style: { fontFamily: 'inherit', color: 'var(--text)' },
                    animation: false,
                    marginRight: 10,
                },
                time: { useUTC: false },
                title: {
                    text: 'RX / TX packet volume',
                    style: { color: 'var(--text)', fontSize: '0.78rem', fontWeight: '600' },
                    align: 'left',
                    margin: 8,
                },
                credits: { enabled: false },
                exporting: { enabled: false },
                xAxis: {
                    type: 'datetime',
                    lineColor: 'var(--border)',
                    tickColor: 'var(--border)',
                    labels: { style: { color: 'var(--muted)', fontSize: '0.68rem' } },
                    crosshair: { color: 'rgba(255,255,255,0.15)', dashStyle: 'Solid' },
                },
                yAxis: {
                    title: { text: 'packets', style: { color: 'var(--muted)', fontSize: '0.7rem' } },
                    gridLineColor: 'rgba(255,255,255,0.06)',
                    labels: {
                        style: { color: 'var(--muted)', fontSize: '0.68rem' },
                        // Packet counts are whole numbers.
                        formatter: function () { return Math.round(this.value); },
                    },
                    allowDecimals: false,
                    min: 0,
                },
                tooltip: {
                    shared: true,
                    backgroundColor: 'var(--surface)',
                    borderColor: 'var(--border)',
                    style: { color: 'var(--text)', fontSize: '0.75rem' },
                    formatter: function () {
                        const ts = Highcharts.dateFormat('%H:%M, %e %b', this.x);
                        let s = `<span style="font-size:0.65rem;color:var(--muted)">${ts}</span><br>`;
                        this.points.forEach(pt => {
                            const dir = pt.series.name === 'RX' ? 'rx' : 'tx';
                            s += `<span style="color:${pt.color}">●</span> ${pt.y.toLocaleString()} packets (${dir})<br>`;
                        });

                legend: {

                    itemHoverStyle: { color: 'var(--accent)' },

                series: [

                    { name: 'TX', color: '#e63946', lineWidth: 2, marker: { enabled: false }, data: txData },

        // ── Noise floor chart (#3) ────────────────────────────────────────────
        let _analyticsNoiseChart = null;

        function _renderNoiseChart(data) {
            const slot = document.getElementById('analytics-slot-noise');
            if (!slot) return;
            const rangeLabel = _analyticsRangeLabel(_analyticsRange);

            // Shape: [{node: <str>, data: [[bucket_ts_s, avg_noise_dbm], ...]}, ...]
            const rawSeries = data && data.ok && Array.isArray(data.series)
                ? data.series.filter(s => Array.isArray(s.data) && s.data.length > 0)

            if (rawSeries.length === 0) {

                    <span class="analytics-empty-hint">Only self noise floor is recorded today. Remote-node noise reporting needs periodic STATUS_SYNC polling — planned.</span>
                </div>`;

            // Dashed series style distinguishes "ambient" noise from
            // "link" data (RSSI/SNR) in the sibling charts.
            const hcSeries = rawSeries.map(s => ({

                color: _nodePalette(s.node || ''),
                dashStyle: 'ShortDash',

                hcSeries.forEach((s, i) => _analyticsNoiseChart.series[i].setData(s.data, true, false, false));
                return;

            if (_analyticsNoiseChart) { try { _analyticsNoiseChart.destroy(); } catch (_) {} _analyticsNoiseChart = null; }
            slot.innerHTML = '<div id="analytics-chart-noise" style="width:100%;height:250px"></div>';

            _analyticsNoiseChart = Highcharts.chart('analytics-chart-noise', _analyticsChartOptions({
                title: 'Noise floor',
                yAxisTitle: 'Noise (dBm)',
                series: hcSeries,
                // No cross-chart sibling for noise; each series is dashed so the
                // "ambient vs link" distinction is already visually clear.
                sibling: () => null,

        // Register packets + noise panels (slots are created in _openSidePanel).
        (function _registerExtraPanels() {
            if (!_analyticsPanels.some(p => p.panel === 'packets')) {
                _analyticsPanels.push(

        // ── Traffic volume per hour chart (#6) ───────────────────────────────
        let _analyticsHourlyChart = null;

        function _renderHourlyChart(data) {
            const slot = document.getElementById('analytics-slot-hourly');
            if (!slot) return;

            if (!data || !data.ok) {
                const errMsg = _escAnalyticsName((data && data.error) || 'unknown error');
                slot.innerHTML = `<div class="analytics-empty-state" style="color:var(--red,#e05555);">Could not load: ${errMsg}</div>`;
                return;
            }

            const rows = Array.isArray(data.rows) ? data.rows : [];

            if (rows.length === 0) {
                if (_analyticsHourlyChart) { try { _analyticsHourlyChart.destroy(); } catch (_) {} _analyticsHourlyChart = null; }
                slot.innerHTML = `<div class="analytics-empty-state">
                    <i class="fa-solid fa-chart-column"></i>
                    <span>No packet activity in this range</span>
                </div>`;
                return;
            }

            // Determine x-axis tick interval based on selected range.
            // 6 h / 12 h → every hour; 48 h → every 6 h; 7 d → every 24 h.
            let tickInterval;
            if (_analyticsRange <= 43200) {
                tickInterval = 3600 * 1000;       // 1 h
            } else if (_analyticsRange <= 172800) {
                tickInterval = 6 * 3600 * 1000;   // 6 h
            } else {
                tickInterval = 24 * 3600 * 1000;  // 24 h
            }

            // Build column data: [epoch_ms, total_packets].
            const colData = rows.map(r => {
                const ts = (r.hour_ts || r.ts || 0) * 1000;
                const rx = r.rx_count != null ? r.rx_count : (r.rx || 0);
                const tx = r.tx_count != null ? r.tx_count : (r.tx || 0);
                return { x: ts, y: rx + tx, rx, tx };
            });

            // Static single-series column chart → in-place update when chart exists.
            if (_analyticsHourlyChart && _analyticsHourlyChart.series &&
                _analyticsHourlyChart.series.length === 1) {
                _analyticsHourlyChart.series[0].setData(colData, true, false, false);
                return;
            }
            if (_analyticsHourlyChart) { try { _analyticsHourlyChart.destroy(); } catch (_) {} _analyticsHourlyChart = null; }
            slot.innerHTML = '<div id="analytics-chart-hourly" style="width:100%;height:250px"></div>';

            _analyticsHourlyChart = Highcharts.chart('analytics-chart-hourly', {
                chart: {
                    type: 'column',
                    backgroundColor: 'transparent',
                    style: { fontFamily: 'inherit', color: 'var(--text)' },
                    animation: false,
                    marginRight: 10,
                },
                time: { useUTC: false },
                title: {
                    text: 'TRAFFIC VOLUME (packets per hour)',
                    style: { color: 'var(--text)', fontSize: '0.78rem', fontWeight: '600' },
                    align: 'left',
                    margin: 8,
                },
                credits: { enabled: false },
                exporting: { enabled: false },
                legend: { enabled: false },
                xAxis: {
                    type: 'datetime',
                    lineColor: 'var(--border)',
                    tickColor: 'var(--border)',
                    tickInterval: tickInterval,
                    labels: {
                        style: { color: 'var(--muted)', fontSize: '0.68rem' },
                        formatter: function () {
                            const fmt = (typeof _analyticsRange === 'number' && _analyticsRange > 86400) ? '%e %b %H:00' : '%H:00';
                            return Highcharts.dateFormat(fmt, this.value);
                        },
                    },
                },
                yAxis: {
                    title: { text: 'packets', style: { color: 'var(--muted)', fontSize: '0.7rem' } },
                    gridLineColor: 'rgba(255,255,255,0.06)',
                    labels: {
                        style: { color: 'var(--muted)', fontSize: '0.68rem' },
                        formatter: function () { return Math.round(this.value); },
                    },
                    allowDecimals: false,
                    min: 0,
                },
                tooltip: {
                    backgroundColor: 'var(--surface)',
                    borderColor: 'var(--border)',
                    style: { color: 'var(--text)', fontSize: '0.75rem' },
                    formatter: function () {
                        const hourLabel = Highcharts.dateFormat('%H:00, %e %b', this.x);
                        const total = this.y.toLocaleString();
                        const rx = (this.point.rx || 0).toLocaleString();
                        const tx = (this.point.tx || 0).toLocaleString();
                        return `<span style="font-size:0.65rem;color:var(--muted)">${hourLabel}</span><br>` +
                               `${total} packets (${rx} RX / ${tx} TX)`;
                    },
                },
                plotOptions: {
                    column: {
                        color: '#8b5cf6',
                        borderWidth: 0,
                        pointPadding: 0.05,
                        groupPadding: 0.02,
                    },
                },
                series: [{ name: 'Packets', data: colData }],
            });

        // ── Top relay keys table (#7) ─────────────────────────────────────────

        function _renderRelaysTable(data) {
            const slot = document.getElementById('analytics-slot-relays');
            if (!slot) return;

            if (!data || !data.ok) {
                const errMsg = _escAnalyticsName((data && data.error) || 'unknown error');
                slot.innerHTML = `<div class="analytics-empty-state" style="color:var(--red,#e05555);">Could not load: ${errMsg}</div>`;
                return;
            }

            const rows = Array.isArray(data.rows) ? data.rows.slice() : [];
            rows.sort((a, b) => (b.count || 0) - (a.count || 0));

            if (rows.length === 0) {
                slot.innerHTML = `<div class="analytics-empty-state">
                    <i class="fa-solid fa-route"></i>
                    <span>No relay activity recorded yet</span>
                </div>`;
                return;
            }

            // Build table rows safely using DOM manipulation (XSS-safe).
            const frag = document.createDocumentFragment();

            const wrapper = document.createElement('div');
            wrapper.className = 'analytics-relays-wrapper';

            const table = document.createElement('table');
            table.className = 'analytics-relays-table';

            // Header.
            const thead = document.createElement('thead');
            const hr = document.createElement('tr');
            ['Hex', 'Name', 'Count'].forEach((label, i) => {
                const th = document.createElement('th');
                th.textContent = label;
                if (i === 2) th.style.textAlign = 'right';
                hr.appendChild(th);
            });
            thead.appendChild(hr);
            table.appendChild(thead);

            // Body.
            const tbody = document.createElement('tbody');
            for (const row of rows) {
                const hex = String(row.hex || row.hex_key || '??');
                const name = row.name || null;
                const count = (row.count || 0).toLocaleString();

                const tr = document.createElement('tr');
                if (name) tr.dataset.relayName = name;

                const tdHex = document.createElement('td');
                const chip = document.createElement('span');
                chip.className = 'relay-hex-chip';
                chip.textContent = hex;
                tdHex.appendChild(chip);

                const tdName = document.createElement('td');
                if (name) {
                    tdName.textContent = name;
                } else {
                    const em = document.createElement('span');
                    em.className = 'relay-name-empty';
                    em.textContent = '—';
                    tdName.appendChild(em);
                }

                const tdCount = document.createElement('td');
                tdCount.textContent = count;
                tdCount.style.textAlign = 'right';

                tr.appendChild(tdHex);
                tr.appendChild(tdName);
                tr.appendChild(tdCount);
                tbody.appendChild(tr);
            }
            table.appendChild(tbody);
            wrapper.appendChild(table);

            // Title bar above the table wrapper.
            const titleBar = document.createElement('div');
            titleBar.className = 'analytics-panel-title';
            titleBar.textContent = 'TOP RELAY KEYS (path 2-char hex) ';
            const noteText = document.createElement('span');
            noteText.className = 'relays-note';
            noteText.textContent = 'lifetime totals · not filtered by time range';
            titleBar.appendChild(noteText);

            frag.appendChild(titleBar);
            frag.appendChild(wrapper);

            slot.innerHTML = '';
            slot.appendChild(frag);
        }

        // Register hourly + relays panels (slots are created in _openSidePanel).
        (function _registerHourlyRelaysPanels() {
            if (!_analyticsPanels.some(p => p.panel === 'hourly')) {
                _analyticsPanels.push(
                    { id: 'analytics-chart-hourly', panel: 'hourly', render: _renderHourlyChart },
                    { id: 'analytics-chart-relays', panel: 'relays', render: _renderRelaysTable }
                );
            }
        }());

        // ── Path length distribution chart (#8) ─────────────────────────────
        let _analyticsHopsChart = null;

        // Compute weighted percentile from histogram buckets [{hops, count}].
        function _hopPercentile(rows, pct) {
            const total = rows.reduce((s, r) => s + r.count, 0);
            if (total === 0) return 0;
            const target = total * pct;
            let cum = 0;
            for (const r of rows) {
                cum += r.count;
                if (cum >= target) return r.hops;
            }
            return rows[rows.length - 1].hops;
        }

        function _renderHopHistogram(data) {
            const slot = document.getElementById('analytics-slot-hops');
            if (!slot) return;
            const rangeLabel = _analyticsRangeLabel(_analyticsRange);

            if (!data || !data.ok) {
                if (_analyticsHopsChart) { try { _analyticsHopsChart.destroy(); } catch (_) {} _analyticsHopsChart = null; }
                slot.innerHTML = `<div class="analytics-empty-state" style="color:var(--red,#e05555);">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <span>${_escAnalyticsName((data && data.error) || 'Query failed')}</span>
                </div>`;
                return;
            }

            const rows = Array.isArray(data.rows) ? data.rows : [];
            const total = rows.reduce((s, r) => s + r.count, 0);

            if (rows.length === 0 || total === 0) {
                if (_analyticsHopsChart) { try { _analyticsHopsChart.destroy(); } catch (_) {} _analyticsHopsChart = null; }
                slot.innerHTML = `<div class="analytics-empty-state">
                    <i class="fa-solid fa-diagram-project"></i>
                    <span>No routed frames recorded in the last ${rangeLabel}</span>
                </div>`;
                return;
            }

            const median = _hopPercentile(rows, 0.5);
            const p90    = _hopPercentile(rows, 0.9);

            // In-place update when the hop-count categories haven't changed.
            const hopCategories = rows.map(r => String(r.hops));
            if (_analyticsHopsChart && _analyticsHopsChart.series &&
                _analyticsHopsChart.series.length === 1 &&
                _analyticsHopsChart.xAxis[0].categories.length === hopCategories.length &&
                _analyticsHopsChart.xAxis[0].categories.every((c, i) => c === hopCategories[i])) {
                _analyticsHopsChart.series[0].setData(rows.map(r => r.count), false, false, false);
                _analyticsHopsChart.setTitle(null,
                    { text: `median = ${median} hops · p90 = ${p90} hops` }, false);
                _analyticsHopsChart.redraw(false);
                return;
            }
            if (_analyticsHopsChart) { try { _analyticsHopsChart.destroy(); } catch (_) {} _analyticsHopsChart = null; }
            slot.innerHTML = '<div id="analytics-chart-hops" style="width:100%;height:250px"></div>';

            _analyticsHopsChart = Highcharts.chart('analytics-chart-hops', {
                chart: {
                    type: 'column',
                    backgroundColor: 'transparent',
                    style: { fontFamily: 'inherit', color: 'var(--text)' },
                    animation: false,
                    marginRight: 10,
                },
                title: {
                    text: 'PATH LENGTH DISTRIBUTION (mesh depth)',
                    style: { color: 'var(--text)', fontSize: '0.78rem', fontWeight: '600' },
                    align: 'left',
                    margin: 4,
                },
                subtitle: {
                    text: `median = ${median} hops · p90 = ${p90} hops`,
                    style: { color: 'var(--muted)', fontSize: '0.7rem' },
                    align: 'left',
                },
                credits: { enabled: false },
                exporting: { enabled: false },
                xAxis: {
                    categories: rows.map(r => String(r.hops)),
                    tickInterval: 3,
                    lineColor: 'var(--border)',
                    tickColor: 'var(--border)',
                    labels: { style: { color: 'var(--text-soft)', fontSize: '0.72rem' } },
                    title: { text: 'Hops', style: { color: 'var(--muted)', fontSize: '0.72rem' } },
                },
                yAxis: {
                    title: { text: 'Frames', style: { color: 'var(--muted)', fontSize: '0.72rem' } },
                    gridLineColor: 'rgba(255,255,255,0.06)',
                    labels: { style: { color: 'var(--text-soft)', fontSize: '0.72rem' } },
                    allowDecimals: false,
                },
                tooltip: {
                    backgroundColor: 'var(--surface)',
                    borderColor: 'var(--border)',
                    style: { color: 'var(--text)', fontSize: '0.78rem' },
                    formatter: function () {
                        const pct = (this.y / total * 100).toFixed(1);
                        return `<b>${this.x} hops</b><br>${pct}% of ${total} frames`;
                    },
                },
                legend: { enabled: false },
                plotOptions: {
                    column: {
                        color: '#3eb6e6',
                        borderWidth: 0,
                        groupPadding: 0.05,
                        pointPadding: 0.05,
                    },
                },
                series: [{ name: 'Frames', data: rows.map(r => r.count) }],
            });
        }

        // ── Messages per channel chart (#5) ──────────────────────────────────
        let _analyticsChanChart = null;

        // Hash-stable HSL colour for a channel name.
        function _chanColour(name) {
            let h = 0;
            const s = String(name || '');
            for (let i = 0; i < s.length; i++) {
                h = (h * 31 + s.charCodeAt(i)) & 0xffff;
            }
            return `hsl(${h % 360}, 65%, ${45 + ((h >> 8) % 20)}%)`;
        }

        function _renderChannelBars(data) {
            const slot = document.getElementById('analytics-slot-channels');
            if (!slot) return;
            const rangeLabel = _analyticsRangeLabel(_analyticsRange);

            if (!data || !data.ok) {
                if (_analyticsChanChart) { try { _analyticsChanChart.destroy(); } catch (_) {} _analyticsChanChart = null; }
                slot.innerHTML = `<div class="analytics-empty-state" style="color:var(--red,#e05555);">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <span>${_escAnalyticsName((data && data.error) || 'Query failed')}</span>
                </div>`;
                return;
            }

            const rows = Array.isArray(data.rows) ? [...data.rows].sort((a, b) => b.count - a.count) : [];
            const total = rows.reduce((s, r) => s + r.count, 0);

            if (rows.length === 0 || total === 0) {
                if (_analyticsChanChart) { try { _analyticsChanChart.destroy(); } catch (_) {} _analyticsChanChart = null; }
                slot.innerHTML = `<div class="analytics-empty-state">
                    <i class="fa-solid fa-hashtag"></i>
                    <span>No channel messages in the last ${rangeLabel}</span>
                </div>`;
                return;
            }

            // In-place update when the channel list hasn't changed.
            const chanCategories = rows.map(r => _escAnalyticsName(r.chan));
            if (_analyticsChanChart && _analyticsChanChart.series &&
                _analyticsChanChart.series.length === 1 &&
                _analyticsChanChart.xAxis[0].categories.length === chanCategories.length &&
                _analyticsChanChart.xAxis[0].categories.every((c, i) => c === chanCategories[i])) {
                _analyticsChanChart.series[0].setData(rows.map(r => r.count), false, false, false);
                _analyticsChanChart.setTitle({ text: `MESSAGES PER CHANNEL (${total} total)` }, null, false);
                _analyticsChanChart.redraw(false);
                return;
            }
            if (_analyticsChanChart) { try { _analyticsChanChart.destroy(); } catch (_) {} _analyticsChanChart = null; }
            slot.innerHTML = '<div id="analytics-chart-channels" style="width:100%;height:250px"></div>';

            _analyticsChanChart = Highcharts.chart('analytics-chart-channels', {
                chart: {
                    type: 'bar',
                    backgroundColor: 'transparent',
                    style: { fontFamily: 'inherit', color: 'var(--text)' },
                    animation: false,
                    marginRight: 10,
                },
                title: {
                    text: `MESSAGES PER CHANNEL (${total} total)`,
                    style: { color: 'var(--text)', fontSize: '0.78rem', fontWeight: '600' },
                    align: 'left',
                    margin: 8,
                },
                credits: { enabled: false },
                exporting: { enabled: false },
                // Horizontal bars (type: 'bar') in Highcharts: categories go
                // on xAxis (which renders at the LEFT), values on yAxis
                // (which renders at the BOTTOM). Reversing this swaps the
                // labels — left axis shows tick numbers, bottom shows
                // channel names — which is exactly what we want to avoid.
                xAxis: {
                    categories: rows.map(r => _escAnalyticsName(r.chan)),
                    lineColor: 'var(--border)',
                    tickColor: 'var(--border)',
                    labels: { style: { color: 'var(--text-soft)', fontSize: '0.72rem' } },
                },
                yAxis: {
                    title: { text: 'Messages', style: { color: 'var(--muted)', fontSize: '0.72rem' } },
                    gridLineColor: 'rgba(255,255,255,0.06)',
                    labels: { style: { color: 'var(--text-soft)', fontSize: '0.72rem' } },
                    allowDecimals: false,
                },
                tooltip: {
                    backgroundColor: 'var(--surface)',
                    borderColor: 'var(--border)',
                    style: { color: 'var(--text)', fontSize: '0.78rem' },
                    formatter: function () {
                        const chan = this.point && this.point.category ? this.point.category : '';
                        return `<b>${this.y} messages</b><br>${chan}`;
                    },
                },
                legend: { enabled: false },
                plotOptions: {
                    bar: {
                        borderWidth: 0,
                        colorByPoint: true,
                        colors: rows.map(r => _chanColour(r.chan)),
                        cursor: 'pointer',
                        point: {
                            events: {
                                click: function () {
                                    // _setChanFilter is the inbox channel-chip API.
                                    if (typeof _setChanFilter === 'function' && rows[this.index]) {
                                        _setChanFilter(rows[this.index].chan);
                                    }
                                },
                            },
                        },
                    },
                },
                series: [{ name: 'Messages', data: rows.map(r => r.count) }],
            });
        }

        // Register hops and channels panels (slots are created in _openSidePanel).
        (function _registerHopsChannelsPanels() {
            if (!_analyticsPanels.some(p => p.panel === 'hops')) {
                _analyticsPanels.push(
                    { id: 'analytics-chart-hops',     panel: 'hops',     render: _renderHopHistogram },
                    { id: 'analytics-chart-channels', panel: 'channels', render: _renderChannelBars  }
                );
            }
        }());

        // ── End analytics card ────────────────────────────────────────────────

        // Expose functions referenced by inline HTML event handlers to global scope
        window.loadData            = loadData;
        window._replyPrivate       = _replyPrivate;
        window._onInboxSearch      = _onInboxSearch;
        window._sendMessage        = _sendMessage;
        window._toggleEmojiPicker  = _toggleEmojiPicker;
        window._filterEmoji        = _filterEmoji;
        window._replyTo            = _replyTo;
        window._updateCharCounter  = _updateCharCounter;
        window._openSidePanel      = _openSidePanel;
    })();
    </script>

    <!-- ── Map side panel ─────────────────────────────────────── -->
    <div id="map-backdrop"></div>
    <div id="map-panel" aria-hidden="true">
        <div id="map-panel-resizer" title="Drag to resize"></div>
        <div id="map-panel-header">
            <div>
                <h3 id="map-panel-title">Map</h3>
                <div class="coords" id="map-panel-coords"></div>
            </div>
            <button id="map-panel-close" title="Close (Esc)"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="map-panel-body">
            <div id="map-canvas"></div>
        </div>
        <div id="map-panel-footer">
            <span style="color: var(--muted);">Powered by Leaflet · OpenStreetMap</span>
            <a id="map-panel-external" href="https://meshcore.co.uk/map.html" target="_blank" rel="noopener">
                View on meshcore.co.uk <i class="fa-solid fa-arrow-up-right-from-square"></i>
            </a>
        </div>
    </div>
</body>
</html>
