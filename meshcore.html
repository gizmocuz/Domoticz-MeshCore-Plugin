            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            opacity: 0.7;
        }
        .self-input-wrap {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .self-input-wrap input { flex: 1; }
        .self-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.78rem;
            font-family: inherit;
            white-space: nowrap;
        }
        .self-btn:hover { color: var(--accent); border-color: var(--accent); }
        .self-btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        .self-btn.primary:hover { opacity: 0.85; color: var(--bg); }
        .self-btn.danger:hover { color: var(--red); border-color: var(--red); }
        .self-btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
        /* Highlight inputs that a Save / Apply button will read or overwrite. */
        .preset-highlight {
            outline: 2px solid var(--accent);
            outline-offset: 1px;
            border-radius: 4px;
            transition: outline-color 0.12s;
        }
        .preset-highlight-label { color: var(--accent) !important; opacity: 1 !important; }

        /* Direct (1-hop) neighbour badge */
        .direct-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            background: rgba(var(--dz-success-rgb, 76,175,125), 0.14);
            color: var(--dz-success-light, #6cf2a8);
            border: 1px solid rgba(var(--dz-success-rgb, 76,175,125), 0.35);
            border-radius: 8px;
            padding: 0 5px;
            font-size: 0.6rem;
            line-height: 1.4;
            margin-left: 4px;
        }
        .msg-detail-row .lbl {
            font-size: 0.66rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
        }
        .msg-detail-row .val {
            font-size: 0.86rem;
            color: var(--text);
            word-break: break-word;
            font-family: ui-monospace, "Cascadia Code", "Consolas", monospace;
            white-space: pre-wrap;
        }
        .msg-detail-row .val.text { font-family: inherit; }

        /* ── Compose bar ───────────────────────────────────────────── */
        #compose-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px;
        }
        #compose-target {
            font-size: 0.82rem;
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            outline: none;
            flex-shrink: 0;
        }
        #compose-target:focus { border-color: var(--accent); }

        #compose-input {
            flex: 1;
            font-size: 0.88rem;
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            outline: none;
            min-width: 0;
        }
        #compose-input:focus { border-color: var(--accent); }

        #compose-send {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 5px 14px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            flex-shrink: 0;
            transition: opacity 0.15s;
        }
        #compose-send:disabled { opacity: 0.45; cursor: default; }
        #compose-send:not(:disabled):hover { opacity: 0.85; }

        #compose-status { font-size: 0.75rem; flex-shrink: 0; text-align: right; }
        #compose-status.ok  { color: var(--green); }
        #compose-status.err { color: var(--red); }

        /* Character counter — turns yellow ≤30, red ≤10 */
        #compose-counter {
            font-size: 0.75rem;
            color: var(--muted);
            font-variant-numeric: tabular-nums;
            min-width: 28px;
            text-align: right;
            user-select: none;
        }
        #compose-counter.warn { color: var(--yellow); }
        #compose-counter.low  { color: var(--red); font-weight: 600; }

        #compose-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            flex-shrink: 0;
        }

        #emoji-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 7px;
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        #emoji-btn:hover { background: var(--border); }

        #emoji-picker {
            display: none;
            position: absolute;
            bottom: calc(100% + 6px);
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 8px;
            z-index: 200;
            width: 340px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        #emoji-picker.open { display: block; }

        #emoji-picker-search {
            width: 100%;
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            outline: none;
            margin-bottom: 6px;
            box-sizing: border-box;
        }
        #emoji-picker-search:focus { border-color: var(--accent); }

        #emoji-scroll { max-height: 260px; overflow-y: auto; overflow-x: hidden; }
        #emoji-scroll::-webkit-scrollbar { width: 5px; }
        #emoji-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .emoji-category-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--muted);
            padding: 6px 2px 2px;
            grid-column: 1 / -1;
        }
        #emoji-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 1px; }
        .emoji-cell {
            font-size: 1.25rem;
            text-align: center;
            padding: 3px 1px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.1s;
            user-select: none;
            line-height: 1.5;
        }
        .emoji-cell:hover { background: var(--border); }

        /* Signal quality bar — compact for inline metric rows */
        .signal-wrap {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            min-width: 0;
        }
        .signal-wrap span { font-variant-numeric: tabular-nums; }
        .signal-bars { display: flex; align-items: flex-end; gap: 1px; height: 11px; flex-shrink: 0; }
        .signal-bars .bar { width: 3px; }
        .signal-wrap { gap: 5px; }
        .signal-bars .bar {
            width: 3px;
            border-radius: 1px;
            background: var(--border);
            transition: background 0.3s;
        }
        .signal-bars .bar.active.excellent { background: var(--green); }
        .signal-bars .bar.active.good      { background: var(--yellow); }
        .signal-bars .bar.active.poor      { background: var(--red); }

        /* ── Analytics side-panel wide state ─────────────────────────────────── */
        #map-panel.panel-analytics-wide {
            width: 900px;
            /* Enable container queries so the chart grid can react to the
               panel's actual width, not the viewport. This lets a user
               drag the panel narrow and have the 2-column chart layout
               collapse to a single column without affecting the rest of
               the dashboard. */
            container-type: inline-size;
            container-name: analytics-panel;
        }
        @media (max-width: 1100px) { #map-panel.panel-analytics-wide { width: 90vw; } }
        /* Time-range segmented control */
        .analytics-range-bar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            margin-bottom: 12px;
        }
        .analytics-range-label {
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: var(--muted);
            text-transform: uppercase;
        }
        .analytics-range-seg {
            display: flex;
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        .analytics-range-seg button {
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 0.7rem;
            padding: 2px 8px;
            cursor: pointer;
            transition: background 0.1s, color 0.1s;
        }
        .analytics-range-seg button:not(:last-child) { border-right: 1px solid var(--border); }
        .analytics-range-seg button:hover { background: var(--border); color: var(--text); }
        .analytics-range-seg button.active { background: var(--accent); color: #fff; }
        /* Chart grid: stacked by default. Inside the analytics side panel,
           switch to 2 columns once the panel itself is at least 720 px wide
           (container query, not viewport). Below that, charts stack so they
           always have enough horizontal room to render usefully. */
        .analytics-chart-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            /* Same min-width:0 trick — keeps the grid from being expanded
               by content (Highcharts SVGs have an intrinsic minimum that
               otherwise pushes the grid wider than the panel). */
            min-width: 0;
        }
        /* 2 columns down to ~500 px panel width — each chart then gets
           ~240 px which is still legible for sparkline-style time-series.
           Anything narrower stacks. */
        @container analytics-panel (min-width: 500px) {
            .analytics-chart-grid { grid-template-columns: 1fr 1fr; }
        }
        .analytics-chart-slot {
            position: relative;
            min-height: 250px;
            /* CSS grid items default to `min-width: auto` — i.e. the
               intrinsic minimum size of the content. Highcharts charts
               have an effective minimum that's wider than half the panel
               at most viewport widths, which forces the grid column to
               expand and pushes the whole panel wider (creating the
               horizontal scrollbar). Setting min-width:0 lets the grid
               cell shrink past the chart's preferred width; combined
               with overflow:hidden the chart is clipped to the slot,
               and our ResizeObserver kicks reflow() to refit it. */
            min-width: 0;
            overflow: hidden;
        }
        .analytics-chart-slot > div[id$="-chart"] {
            width: 100%;
            height: 250px;
        }
        /* Empty-state per chart slot */
        .analytics-empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 250px;
            gap: 6px;
            color: var(--muted);
            font-size: 0.82rem;
            opacity: 0.7;
        }
        .analytics-empty-state i { font-size: 1.6rem; margin-bottom: 4px; }
        .analytics-empty-hint { font-size: 0.72rem; }
        /* ── Relay keys table (panel #7) ──────────────────────────────────────── */
        .analytics-relays-wrapper {
            max-height: 280px;
            overflow-y: auto;
        }
        .analytics-relays-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.78rem;
        }
        .analytics-relays-table thead th {
            position: sticky;
            top: 0;
            background: var(--surface);
            color: var(--muted);
            text-align: left;
            padding: 6px 8px;
            border-bottom: 1px solid var(--border);
        }
        .analytics-relays-table tbody td {
            padding: 5px 8px;
            border-bottom: 1px solid var(--border-subtle, rgba(255,255,255,0.05));
        }
        .analytics-relays-table tbody tr:hover {
            background: var(--bg-hover, rgba(255,255,255,0.04));
            cursor: pointer;
        }
        .relay-hex-chip {
            font-family: monospace;
            padding: 1px 6px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--surface);
        }
        .relay-name-empty { color: var(--muted); }
        .relays-note { font-size: 0.65rem; color: var(--muted); margin-left: 6px; }
        .analytics-panel-title { font-size: 0.75rem; color: var(--muted); margin: 4px 0 6px; }
        /* ── End analytics card ──────────────────────────────────────────────── */

        /* Light-mode overrides — applied when _bridgeDzTheme() sets body.dz-light
           or when the parent theme already injects that class.  These mirror the
           Nightglass body.dz-light palette and serve as a self-contained fallback
           if the JS bridge cannot read the parent's computed --dz-* variables. */
        body.dz-light {
            --bg:      #f0f2f5;
            --surface: #f5f6fa;
            --border:  #c4c7d0;
            --accent:  #2a7de1;
            --green:   #2e8c58;
            --red:     #d63b3b;
            --yellow:  #c07818;
            --text:    #1a1c24;
            --muted:   #6b6e7f;
            color-scheme: light;
        }
    </style>
</head>
<body>

    <header>
        <h1><span class="logo">MC</span> MeshCore Dashboard</h1>
        <div id="header-stats" title="Messages received today (since local midnight)"></div>
        <div style="display:flex;align-items:center;gap:10px">
            <div class="rx-toolbar">
                <button class="rx-tool-btn" onclick="_openSidePanel('stats')" title="Statistics — lifetime totals & leaderboards"><i class="fa-solid fa-ranking-star"></i></button>
                <button class="rx-tool-btn" onclick="_openSidePanel('firehose')" title="Live RF firehose (RX_LOG_DATA)"><i class="fa-solid fa-tower-broadcast"></i></button>
                <button class="rx-tool-btn" onclick="_openSidePanel('traffic')" title="Traffic stats by payload type"><i class="fa-solid fa-chart-column"></i></button>
                <button class="rx-tool-btn" onclick="_openSidePanel('channels')" title="Channel auto-discovery"><i class="fa-solid fa-hashtag"></i></button>
                <button class="rx-tool-btn" onclick="_openSidePanel('topology')" title="Mesh topology: all contacts + paths"><i class="fa-solid fa-sitemap"></i></button>
                <button class="rx-tool-btn" onclick="_openSidePanel('heard')" title="Heard nodes — adverts from nodes not in your contacts"><i class="fa-solid fa-satellite-dish"></i></button>
                <button class="rx-tool-btn" onclick="_openSidePanel('analytics')" title="Historical analytics charts"><i class="fa-solid fa-chart-line"></i></button>
            </div>
            <span id="last-updated"></span>
            <button id="refresh-btn" onclick="loadData()">↻ Refresh</button>
        </div>
    </header>

    <div id="status-msg">Loading…</div>

    <div id="main-layout">
        <section id="self-section" style="display:none">
            <h2 class="section-title">Observer</h2>
            <div id="self-grid"></div>
        </section>

        <div id="layout-divider"></div>

        <section id="contacts-section" style="display:none">
            <div class="contacts-header">
                <h2 class="section-title">Contacts <span id="contacts-count"></span></h2>
                <div id="contacts-toolbar">
                    <div class="view-toggle" role="tablist" title="View mode">
                        <button id="view-cards" class="view-btn active" title="Card view"><i class="fa-solid fa-grip"></i></button>
                        <button id="view-list"  class="view-btn"        title="List view"><i class="fa-solid fa-list"></i></button>
                    </div>
                    <button id="view-type-1" class="view-btn" title="Show/hide Companions (clients)"><i class="fa-solid fa-user"></i></button>
                    <button id="view-type-2" class="view-btn" title="Show/hide Repeaters"><i class="fa-solid fa-tower-broadcast"></i></button>
                    <button id="view-type-3" class="view-btn" title="Show/hide Room Servers"><i class="fa-solid fa-house-signal"></i></button>
                    <button id="view-heard" class="view-btn" title="Also show heard (non-contact) nodes"><i class="fa-solid fa-satellite-dish"></i></button>
                    <div class="search-wrap">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input id="filter-name" type="search" placeholder="Filter by name, type...">
                    </div>
                </div>
            </div>
            <div id="contacts-grid"></div>
            <div id="contacts-list" style="display:none"></div>
        </section>
    </div>

    <!-- ── Inbox history ─────────────────────────────────────── -->
    <div id="inbox-history-section">
        <div class="inbox-section-header">
            <h2>📨 Message Inbox</h2>
            <a id="inbox-log-link" href="#" target="_top" style="display:none">📋 View full log</a>
        </div>
        <div id="conv-banner" style="display:none">
            <span id="conv-banner-label"></span>
            <button id="conv-banner-exit" title="Back to all messages">✕ All messages</button>
        </div>
        <!-- filter / search -->
        <div id="inbox-filters">
            <div id="filter-rows">
                <div class="filter-row">
                    <span class="filter-label">Channel</span>
                    <div id="channel-chips"></div>
                </div>
            </div>
            <input id="inbox-search" type="search" placeholder="Search sender / text…" oninput="_onInboxSearch(this.value)">
            <select id="inbox-page-size" title="Messages per page" onchange="_onInboxPageSize(this.value)">
                <option value="25">25</option>
                <option value="50">50</option>
                <option value="100">100</option>
                <option value="250">250</option>
                <option value="all">All</option>
            </select>
        </div>
        <!-- compose bar -->
        <div id="compose-bar" style="position:relative">
            <select id="compose-target" title="Send to"></select>
            <input id="compose-input" type="text" placeholder="Type a message…"
                   oninput="_updateCharCounter(this.value)"
                   onkeydown="if(event.key==='Enter')_sendMessage()">
            <button id="emoji-btn" onclick="_toggleEmojiPicker(event)" title="Insert emoji">😊</button>
            <div id="emoji-picker">
                <input id="emoji-picker-search" type="search" placeholder="Search…" oninput="_filterEmoji(this.value)" autocomplete="off">
                <div id="emoji-scroll"><div id="emoji-grid"></div></div>
            </div>
            <div id="compose-actions">
                <span id="compose-counter" title="Characters remaining (MeshCore limit: 150)">150</span>
                <button id="compose-send" onclick="_sendMessage()">Send ✈</button>
                <span id="compose-status"></span>
            </div>
        </div>
        <div id="inbox-resizer" title="Drag to resize the inbox height"></div>
        <div id="inbox-history">
            <div id="inbox-empty">No messages yet.</div>
        </div>
    </div>

    <script>
    // ── Theme bridge ────────────────────────────────────────────────────────
    // This page runs in a Domoticz iframe.  The host theme CSS (Nightglass or
    // any other --dz-* theme) is only loaded in the parent document, not here.
    // We copy every --dz-* variable we use from the parent's computed style so
    // our local CSS variables (which reference --dz-* with dark fallbacks) pick
    // up the correct theme colours in both dark and light mode.
    (function _bridgeDzTheme() {
        const DZ_VARS = [
            '--dz-bg', '--dz-surface-2', '--dz-border-b',
            '--dz-accent', '--dz-accent-light',
            '--dz-success', '--dz-success-light', '--dz-danger', '--dz-warning',
            '--dz-text', '--dz-text-soft', '--dz-text-muted',
            '--dz-accent-rgb', '--dz-success-rgb', '--dz-danger-rgb',
            '--dz-warning-rgb', '--dz-border-rgb', '--dz-overlay-rgb',
        ];
        function _apply() {
            try {
                if (window.parent === window) return; // not in an iframe
                const parentBody = window.parent.document.body;
                const cs = window.parent.getComputedStyle(parentBody);
                const root = document.documentElement;
                DZ_VARS.forEach(v => {
                    const val = cs.getPropertyValue(v).trim();
                    if (val) root.style.setProperty(v, val);
                });
                // Mirror dz-light body class so body.dz-light {} overrides work

    function _haversineKm(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) ** 2 +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon / 2) ** 2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function _bearingDeg(lat1, lon1, lat2, lon2) {
        const toRad = d => d * Math.PI / 180;
        const dLon = toRad(lon2 - lon1);
        const y = Math.sin(dLon) * Math.cos(toRad(lat2));
        const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
                  Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);
        return ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
    }

                    _sock.send(JSON.stringify({ event: 'subscribe', requestid: 1, topic: 'plugin:' + PLUGIN }));

                            }

                        }

                            delete _pending[data.id];

                            else { p.reject(new Error(data.result || 'cmd failed')); }

            if (!_initialRenderDone) return;

            // _lastLiveSlotsOf is set after the first fetchDevices() completes;

            // ~1-2 s when the plugin pushes the next `devices` message.

            _renderRadarIfOpen();

        // }
        let _deviceMap = null;

        // -1 = no baseline yet (ignore devices_delta until first snapshot/devices arrives).
        let _deviceSeq = -1;
        let _deviceMapResubAt = 0;  // epoch-ms: suppress gap resync within ~1 s

        // ── RX_LOG_DATA buffer (analyzer-style packet detail) ────────────────
        // Fed by WebSocket push: rxlog (full window) and rxlog_delta (incremental).
        // Shape: { entries: [...], stats: {payload_type_counts, chan_hash_counts,
        //   signal_history, dup_floods, heatmap_24h}, known_channels: {...} }

        // Must stay in sync with RX_LOG_BUFFER in plugin.py (server-side ring size).

        let _rxLogLastSeen = 0;        // last entry _t seen by the firehose
        let _rxLogFirehosePaused = false;
        // F3: sequence tracking for gap detection.
        // -1 = no window received yet (ignore rxlog_delta until first rxlog arrives).
        let _rxLogSeq = -1;

        // ── F3 on-demand subscription ref-count ──────────────────────────────
        // Heavy panels that live-render from rxlog push: firehose, traffic,
        // channels, stats (which embeds the 24-h heatmap).  We subscribe when
        // the first heavy panel opens and unsubscribe when the last one closes.
        // Since only one panel can be open at a time the set size is always 0
        // or 1; the Set abstraction makes the intent explicit and is trivially
        // correct if future work opens multiple panels simultaneously.
        //
        // Sparkline tradeoff: sparklines on contact cards update opportunistically
        // whenever an rxlog subscription is already active for a heavy panel.
        // When no heavy panel is open there is no subscription and sparklines
        // simply retain their last-known values — they do not subscribe on their
        // own and do not error when the data is stale.
        const RXLOG_HEAVY_PANELS = new Set(['firehose', 'traffic', 'channels', 'stats']);
        const _rxLogOpenPanels   = new Set();  // subset of RXLOG_HEAVY_PANELS currently open
        let _rxLogResubAt = 0;                 // epoch-ms: suppress gap re-sub within ~1 s

        function _rxLogSubscribe() {
            if (_pluginWS) _pluginWS.sendPluginCommand({ t: 'sub', feed: 'rxlog' });
        }
        function _rxLogUnsubscribe() {
            if (_pluginWS) _pluginWS.sendPluginCommand({ t: 'sub', feed: 'none' });
        }

        // Call when opening a panel that needs rxlog.
        function _rxLogPanelOpen(view) {
            if (!RXLOG_HEAVY_PANELS.has(view)) return;
            const wasZero = _rxLogOpenPanels.size === 0;
            _rxLogOpenPanels.add(view);
            if (wasZero) _rxLogSubscribe();
        }

        // Call when closing a panel that may have needed rxlog.
        // Safe to call for non-heavy panels — the has() check is a no-op.
        function _rxLogPanelClose(view) {
            if (!view || !RXLOG_HEAVY_PANELS.has(view)) return;
            _rxLogOpenPanels.delete(view);
            if (_rxLogOpenPanels.size === 0) _rxLogUnsubscribe();
        }

        // ── Persistent heard-nodes store ─────────────────────────────────────
        // Shape: { nodes: { <pubkey>: {pubkey, name,
        // type, lat, lon, snr, rssi, path_len, first_heard, last_heard} } }
        // Populated exclusively by the WS reducer (t:'snapshot' / t:'heard').
        let _heard = { nodes: {} };

        // Lifetime statistics — populated exclusively by the WS reducer.
        let _stats = null;

        function _renderHeaderStats() {
            const el = document.getElementById("header-stats");
            if (!el) return;
            const t = (_stats && _stats.today) || {};
            const m = t.messages || 0, c = t.client || 0,
                  rp = t.repeater || 0, sv = t.server || 0;
            el.innerHTML =
                `<span class="hs-label">Today</span> `
              + `<span><i class="fa-solid fa-envelope"></i> <b>${m}</b> msgs</span>`
              + `<span class="hs-sep">·</span>`
              + `<span class="hs-client">Client <b>${c}</b></span>`
              + `<span class="hs-repeater">Repeater <b>${rp}</b></span>`
              + `<span class="hs-server">Server <b>${sv}</b></span>`;
        }

        function _statsLeaderboard(map, limit, cls) {
            const rows = Object.entries(map || {})
                .filter(([, c]) => c > 0)
                .sort((a, b) => b[1] - a[1])
                .slice(0, limit);
            if (!rows.length) return `<div class="dd-chart-unconfigured">No data yet.</div>`;
            const max = rows[0][1] || 1;
            return `<div class="lb-list">` + rows.map(([name, n]) => `
                <div class="lb-row">
                    <div class="lb-top"><span>${escHtml(name)}</span><span class="lb-count">${n}</span></div>
                    <div class="lb-bar"><div class="lb-fill ${cls}" style="width:${Math.max(2, Math.round(n / max * 100))}%"></div></div>
                </div>`).join("") + `</div>`;
        }

        function _renderStatsPanel() {
            const view = document.getElementById("stats-view");
            if (!view) return;
            if (!_stats) {
                view.innerHTML = `<div class="dd-chart-unconfigured">Statistics not available yet.</div>`;
                return;
            }
            const s = _stats;
            const recs = Array.isArray(s.hops_records) ? s.hops_records
                       : (s.hops_record ? [s.hops_record] : []);   // back-compat
            const hopsHtml = recs.length ? `
                <div class="hops-rec">
                    <div class="hr-title">🏆 Hops records (top 5)</div>
                    ${recs.slice(0, 5).map((r, i) => `
                    <div class="hr-line">
                        <b>#${i + 1}</b> &nbsp;<b>${r.hops}</b> hops &nbsp;·&nbsp;
                        ${escHtml(r.name || "?")}
                        <span style="color:var(--muted)">&nbsp;(${escHtml(r.channel || "?")}, ${escHtml(r.date || "?")})</span>
                    </div>`).join("")}
                </div>` : "";
            view.innerHTML = `
                <div class="stats-head">
                    <span class="self-section" style="margin:0">Statistics</span>
                    <button id="stats-reset" title="Reset all lifetime statistics">↺ Reset</button>
                </div>
                ${_heatmapHtml()}
                <div class="self-section">Totals</div>
                <div class="stats-tot">
                    Adverts: <b class="st-adv">${s.adverts_total || 0}</b>
                    &nbsp;|&nbsp;
                    Messages: <b class="st-msg">${s.messages_total || 0}</b>
                </div>
                <div class="stats-cards">
                    <div class="stats-card"><div class="sc-label">Client</div>
                        <div class="sc-value">${s.client_total || 0}</div></div>
                    <div class="stats-card"><div class="sc-label">Repeater</div>
                        <div class="sc-value">${s.repeater_total || 0}</div></div>
                    <div class="stats-card"><div class="sc-label">Server</div>
                        <div class="sc-value">${s.server_total || 0}</div></div>
                </div>

                <div class="self-section">Top message senders</div>
                ${_statsLeaderboard(s.msg_by_sender, 20, "")}

                ${hopsHtml}

                <div class="self-section">Top advert senders</div>
                ${_statsLeaderboard(s.adv_by_sender, 10, "adv")}
            `;
            const rb = document.getElementById("stats-reset");
            if (rb) rb.onclick = async () => {
                if (!confirm("Reset ALL lifetime statistics?\n\n"
                    + "This clears totals, leaderboards and hop records on the "
                    + "plugin and cannot be undone.")) return;
                rb.disabled = true;
                try { await _sendDeviceCmd("!reset_stats"); } catch (_) {}
                setTimeout(_renderStatsPanel, 800);
            };
        }

        // Heuristic: match an inbox message to an RX log entry.
        // We have message text, channel and approximate time; the RX log entry
        // has snr/rssi/recv_time + raw header fields. Match by:
        //   1) exact text inside entry.message  (best signal)
        //   2) same channel hash (chan_hash matches the channel index name hash)
        //   3) recv_time within ±10s of the inbox-reported time
        function _findRxEntryForMsg(msgObj) {
            if (!_rxLog || !Array.isArray(_rxLog.entries)) return null;
            const wantText = (msgObj.text || "").trim();
            const wantTs   = msgObj.ts ? msgObj.ts : 0;
            let best = null, bestScore = -1;
            for (const e of _rxLog.entries) {
                let score = 0;
                const msg = (e.message || "").trim();
                if (wantText && msg && msg.indexOf(wantText) !== -1) score += 10;
                if (wantText && msg === wantText) score += 5;
                if (wantTs && e.recv_time) {
                    const dt = Math.abs((e.recv_time - wantTs));
                    if (dt < 5)  score += 4;
                    else if (dt < 15) score += 2;
                }
                if (msgObj.isSent && (e.payload_typename === "TEXT_MSG" || e.payload_typename === "GRP_TXT")) score += 1;
                if (score > bestScore) { bestScore = score; best = e; }
            }
            return bestScore >= 5 ? best : null;
        }

        function deviceUrl(idx) {
            if (!idx) return "#";
            return `/index.html#/Devices/${idx}/Log`;
        }

        // Fetch all devices and return a byIdx lookup keyed on Domoticz idx.
        async function fetchDevices() {
            const resp = await fetch("/json.htm?type=command&param=getdevices&order=Name");
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            const all = data.result || [];
            const byIdx = {};
            for (const d of all) byIdx[d.idx] = d;
            return { all, byIdx };
        }

        function battClass(pct) {
            if (pct >= 60) return "high";
            if (pct >= 25) return "medium";
            return "low";
        }

        function renderBatteryHtml(pct, idx) {
            const cls = battClass(pct);
            return `
        <a href="${deviceUrl(idx)}" target="_top" title="View battery detail">
          <div class="metric-label">Battery</div>
          <div class="metric-value">
            <div class="batt-wrap">
              <span>${pct}%</span>
              <div class="batt-bar-bg">
                <div class="batt-bar-fill ${cls}" style="width:${pct}%"></div>
              </div>
            </div>
          </div>
        </a>`;
        }

        function _snrQuality(snr) {
            if (snr >= 7)  return { level: 4, cls: "excellent", label: "Excellent" };
            if (snr >= 3)  return { level: 3, cls: "excellent", label: "Good" };
            if (snr >= 0)  return { level: 2, cls: "good",      label: "Fair" };
            if (snr >= -5) return { level: 1, cls: "poor",      label: "Poor" };
            return                { level: 0, cls: "poor",      label: "Very Poor" };
        }

        function renderSnrHtml(snr, idx) {
            const q = _snrQuality(snr);
            const heights = [4, 7, 10, 14];
            const bars = heights.map((h, i) =>
                `<div class="bar${i < q.level ? ` active ${q.cls}` : ""}" style="height:${h}px"></div>`
            ).join("");
            const inner = `
              <div class="metric-label">SNR</div>
              <div class="metric-value">
                <div class="signal-wrap">
                  <div class="signal-bars">${bars}</div>
                  <span>${snr} dB</span>
                </div>
              </div>`;
            return idx
                ? `<a href="${deviceUrl(idx)}" target="_top" title="${q.label}">${inner}</a>`
                : inner;
        }

        function _formatUptime(rawMinutes) {
            const m = parseFloat(rawMinutes);
            if (isNaN(m) || m < 0) return null;
            const totalMin = Math.round(m);
            const days  = Math.floor(totalMin / 1440);
            const hours = Math.floor((totalMin % 1440) / 60);
            const mins  = totalMin % 60;
            const parts = [];
            if (days  > 0) parts.push(`${days}d`);
            if (hours > 0) parts.push(`${hours}h`);
            parts.push(`${mins}m`);
            return parts.join(" ");
        }

        function renderMetricHtml(label, value, unit, idx) {
            const display = value !== undefined && value !== null && value !== ""
                ? `${value}${unit ? " " + unit : ""}`
                : "—";
            const cls = display === "—" ? " na" : "";
            const inner = `<div class="metric-label">${label}</div><div class="metric-value${cls}">${display}</div>`;
            return idx
                ? `<a href="${deviceUrl(idx)}" target="_top" title="View ${label} detail">${inner}</a>`
                : inner;
        }

        // A node's advert carries a timestamp set by the advertising node's
        // own RTC. We display OUR local receive time as "Last Heard" (slots
        // .last_seen), but if the node-reported advert time (slots.last_advert)
        // drifts from our receive time by more than this, the node's clock is
        // wrong — flag it red with a tooltip showing both times.
        const CLOCK_WRONG_TOLERANCE_S = 3600;   // 1 hour

        function _clockSkew(slots) {
            // Use ONLY a trustworthy paired sample: the node's advertised RTC
            // measured against OUR receive time of that very advert (captured
            // together by the plugin). Comparing the stale contact-list
            // last_advert against last_seen (an unrelated, often much later
            // message-receive time) flagged almost every contact that simply
            // hadn't advertised in the last hour — a false positive, not a
            // real wrong clock. No advert sample yet → unknown, not wrong.
            const c = slots && slots.clock;
            const nodeTs = c && Number(c.node_ts) || 0;
            const ourTs  = c && Number(c.our_ts)  || 0;
            if (!nodeTs || !ourTs) return { wrong: false, tip: "" };
            if (Math.abs(nodeTs - ourTs) <= CLOCK_WRONG_TOLERANCE_S) {
                return { wrong: false, tip: "" };
            }
            const fmt = s => s ? new Date(s * 1000).toLocaleString() : "?";
            return {
                wrong: true,
                tip: `Node clock looks wrong (off by >1h).\n`
                   + `Received: ${fmt(ourTs)}\n`
                   + `Node reported: ${fmt(nodeTs)}`,
            };
        }

        // Build a raw value string from a slot object (from either JSON snapshot or live API).
        // slot = { idx, value, online } from JSON  OR  a Domoticz API device object.
        function _slotValue(slot) {
            if (!slot) return "";
            // Live API device object has a "Data" field; JSON snapshot has "value".
            return slot.Data !== undefined ? slot.Data : (slot.value || "");
        }

        function _slotIdx(slot) {
            if (!slot) return null;
            return slot.idx !== undefined ? slot.idx : (slot.ID || null);
        }

        function _slotOnline(slot) {
            if (!slot) return false;
            if (slot.online !== undefined) return slot.online;           // JSON snapshot
            return slot.Status === "On" || slot.Data === "On";           // live API
        }

        // Contact type names (from meshcore: CONTACT_TYPENAMES = NONE/CLI/REP/ROOM/SENS)
        const TYPE_LABELS = { 0: "", 1: "Companion", 2: "Repeater", 3: "Room Server", 4: "Sensor" };

        function _isFavorite(name) {
            return !!(_deviceMap && Array.isArray(_deviceMap.favorites) && _deviceMap.favorites.includes(name));
        }

        function _typeChipHtml(type) {
            const t = Number(type) || 0;
            const label = TYPE_LABELS[t];
            if (!label) return "";
            return `<span class="type-chip type-${t}">${label}</span>`;
        }

        // Render a complete node card from a slots map.
        // slots values can be either JSON snapshot objects or live API device objects.
        function renderNode(nodeName, slots, isSelf) {
            const statusSlot = slots.status || null;
            const statusIdx = _slotIdx(statusSlot);

            let badgeHtml;
            if (isSelf) {
                const selfIsOnline = statusSlot ? _slotOnline(statusSlot) : true;
                badgeHtml = selfIsOnline
                    ? `<span class="badge self" title="Connected"><i class="fa-solid fa-plug-circle-check"></i></span>`
                    : `<span class="badge offline" title="Offline"><i class="fa-solid fa-circle-xmark"></i></span>`;
            } else if (statusSlot) {
                const online = _slotOnline(statusSlot);
                badgeHtml = online
                    ? `<a href="${deviceUrl(statusIdx)}" target="_top" style="text-decoration:none"><span class="badge online" title="Online"><i class="fa-solid fa-circle-check"></i></span></a>`
                    : `<a href="${deviceUrl(statusIdx)}" target="_top" style="text-decoration:none"><span class="badge offline" title="Offline"><i class="fa-solid fa-circle-xmark"></i></span></a>`;
            } else {
                badgeHtml = `<span class="badge unknown" title="Unknown"><i class="fa-solid fa-circle-question"></i></span>`;
            }

            const typeChip = isSelf ? "" : _typeChipHtml(slots.type);

            // Direct-neighbour chip — shows when hops == 0 (no intermediate repeater).
            // hops slot value may be "0", "0 hops", or empty/null.
            let directChip = "";
            if (!isSelf && slots.hops) {
                const hopsRaw = _slotValue(slots.hops).replace(/\s*hops?$/i, "").trim();
                if (hopsRaw === "0") directChip = `<span class="direct-chip" title="Direct path learned (0 intermediate repeaters). Based on past discovery, not a live RX check."><i class="fa-solid fa-tower-broadcast"></i> Direct</span>`;
            }

            // Firmware info on the self-node card (from send_device_query)
            let fwLine = "";
            if (isSelf && _deviceMap && _deviceMap.device_info && Object.keys(_deviceMap.device_info).length) {
                const di = _deviceMap.device_info;
                const fwVer = di["fw ver"];
                const fwBuild = di.fw_build || "";
                const model = di.model || "";
                const bits = [];
                if (fwVer != null) bits.push(`FW v${fwVer}`);
                if (fwBuild) bits.push(fwBuild);
                if (model) bits.push(model);
                if (bits.length) fwLine = `<div class="fw-info">${escHtml(bits.join("  "))}</div>`;
            }

            const metrics = isSelf ? SELF_METRICS : NODE_METRICS;
            const _skew = isSelf ? { wrong: false, tip: "" } : _clockSkew(slots);
            let metricsHtml = "";
            for (const { key, label, unit, special } of metrics) {
                const slot = slots[key] || null;
                const devIdx = _slotIdx(slot);
                const raw = _slotValue(slot);
                const numVal = raw.replace(/\s*(dBm|dB|%|V|°C|hops|min|s|pkts)$/i, "").trim();
                // Remote contact cards: hide metric rows that have no usable value
                // (compact view). Self always shows everything so the user sees that
                // their connected node is reporting all stats.
                const hideEmpty = !isSelf && (!slot || numVal === "");
                const _ckw = (key === "last_seen" && _skew.wrong);
                const cls = hideEmpty ? "metric empty" : "metric";
                const div = `<div class="${cls}" data-node="${escHtml(nodeName)}" data-key="${key}">`;
                const end = `</div>`;
                const warnIcon = _ckw ? ` <i class="fa-solid fa-triangle-exclamation clock-warn" title="${escHtml(_skew.tip).replace(/\n/g, "&#10;")}"></i>` : "";
                if (!slot) {
                    metricsHtml += `${div}${renderMetricHtml(label, null, unit, null)}${end}`;
                    continue;
                }
                if (special === "battery") {
                    const pct = parseInt(numVal, 10);
                    metricsHtml += `${div}${isNaN(pct) ? renderMetricHtml(label, null, unit, devIdx) : renderBatteryHtml(pct, devIdx)}${warnIcon}${end}`;
                } else if (special === "snr") {
                    const snr = parseFloat(numVal);
                    metricsHtml += `${div}${isNaN(snr) ? renderMetricHtml(label, null, unit, devIdx) : renderSnrHtml(snr, devIdx)}${warnIcon}${end}`;
                } else if (special === "uptime") {
                    const formatted = _formatUptime(numVal);
                    metricsHtml += `${div}${renderMetricHtml(label, formatted, "", devIdx)}${warnIcon}${end}`;
                } else {
                    metricsHtml += `${div}${renderMetricHtml(label, numVal, unit, devIdx)}${warnIcon}${end}`;
                }
            }

            // Node Settings used to live inside the Observer card; they have
            // been moved into the self side panel (gear button) so the card
            // stays compact. Keep the placeholder empty so the surrounding
            // template doesn't need to change.
            const settingsHtml = "";
            const favHtml = isSelf ? "" : (() => {
                const fav = _isFavorite(nodeName);
                const icon = fav ? "fa-solid fa-star" : "fa-regular fa-star";
                return `<button class="fav-toggle ${fav ? "active" : ""}" data-node="${escHtml(nodeName)}" title="${fav ? "Remove from favorites" : "Mark as favorite"}"><i class="${icon}"></i></button>`;
            })();
            const mapHtml = (!isSelf && slots.lat != null && slots.lon != null && (slots.lat || slots.lon))
                ? `<button class="map-toggle" data-node="${escHtml(nodeName)}" data-lat="${slots.lat}" data-lon="${slots.lon}" title="Show on map"><i class="fa-solid fa-location-dot"></i></button>`
                : "";

            // SNR sparkline for remote contacts. We key it by the contact's
            // 12-char pubkey_prefix so it matches the plugin's signal_history
            // bucket (filled from ADVERT + CONTACT_MSG_RECV events).
            const pkPrefix = (!isSelf && slots.pubkey_prefix) ? slots.pubkey_prefix : "";
            const sparklineHtml = pkPrefix
                ? `<svg class="sparkline" data-pubkey="${escHtml(pkPrefix)}" preserveAspectRatio="none"></svg>`
                : "";

            // Self-node card gets a "gear" button that opens the self side
            // panel (radio params, identity, send-advert, reboot, telemetry).
            // Remote cards get an "info" button that opens the contact side
            // panel (reset path, status / telemetry / neighbours queries).
            // The gear is disabled (greyed, non-interactive) when the self node
            // is offline so the user can't open settings on a disconnected node.
            const selfOnline = !isSelf || (statusSlot ? _slotOnline(statusSlot) : true);
            const cardActionBtn = isSelf
                ? `<button class="card-action-btn" data-action="open-self" title="${selfOnline ? "Self-node info & radio settings" : "Node offline — settings unavailable"}"${selfOnline ? "" : " disabled"}><i class="fa-solid fa-sliders"></i></button>`
                : `<button class="card-action-btn" data-action="open-contact" data-node="${escHtml(nodeName)}" title="Contact info & remote queries"><i class="fa-solid fa-circle-info"></i></button>`;

            const _hpk = slots && slots._heardPk;
            const heardAttrs = _hpk ? ` data-heard="1" data-pk="${escHtml(_hpk)}"` : "";
            const heardCls = _hpk ? " heard-node" : "";
            const nameCls = _hpk ? "node-name heard-name-color" : "node-name";
            return `
        <div class="node-card${heardCls}" data-node="${escHtml(nodeName)}"${heardAttrs}>
          <div class="node-header">
            <div class="${nameCls}">${escHtml(nodeName)}</div>
            ${typeChip}
            ${directChip}
            ${fwLine}
            <span class="node-badge" data-node="${escHtml(nodeName)}">${badgeHtml}</span>
          </div>
          <div class="node-metrics">${metricsHtml}</div>
          ${sparklineHtml}
          ${settingsHtml}
          ${cardActionBtn}
          ${mapHtml}
          ${favHtml}
        </div>`;
        }

        // ── Self-node settings panel (rendered at the bottom of the connected card) ──

        const _SETTINGS_DEFS = [
            { key: "manual_add",     label: "Auto-add contacts",   options: [{v: 0, l: "On"},  {v: 1, l: "Off"}] },
            { key: "telemetry_base", label: "Telemetry: base",     options: [{v: 0, l: "Off"}, {v: 1, l: "Public"}, {v: 2, l: "Always"}] },
            { key: "telemetry_env",  label: "Telemetry: env",      options: [{v: 0, l: "Off"}, {v: 1, l: "Public"}, {v: 2, l: "Always"}] },
            { key: "telemetry_loc",  label: "Telemetry: location", options: [{v: 0, l: "Off"}, {v: 1, l: "Public"}, {v: 2, l: "Always"}] },
            { key: "adv_loc_policy", label: "Advert location",     options: [{v: 0, l: "Never"}, {v: 1, l: "Share"}] },
        ];

        function _currentSettingValue(key) {
            if (!_deviceMap) return null;
            if (key === "manual_add")     return _deviceMap.manual_add_contacts ? 1 : 0;
            if (key === "telemetry_base") return Number(_deviceMap.telemetry_mode_base) || 0;
            if (key === "telemetry_env")  return Number(_deviceMap.telemetry_mode_env) || 0;
            if (key === "telemetry_loc")  return Number(_deviceMap.telemetry_mode_loc) || 0;
            if (key === "adv_loc_policy") return Number(_deviceMap.adv_loc_policy) || 0;
            return null;
        }

        // Returns the bare settings rows. Lives inside the self side panel
        // (opened via the gear button on the Observer card) — no collapsible
        // wrapper any more, because the side panel is itself a settings view.
        function _renderNodeSettings() {
            const rows = _SETTINGS_DEFS.map(def => {
                const cur = _currentSettingValue(def.key);
                const opts = def.options.map(o =>
                    `<button class="settings-btn ${o.v === cur ? "active" : ""}" data-key="${def.key}" data-val="${o.v}">${escHtml(o.l)}</button>`
                ).join("");
                return `<div class="settings-row">
                    <span class="settings-label">${escHtml(def.label)}</span>
                    <div class="settings-options">${opts}</div>
                </div>`;
            }).join("");
            // Default flood scope is already rendered as its own row in the
            // Radio section of the self side panel (id "self-flood-scope" +
            // Apply button), so we don't repeat it here.
            return rows;
        }

        async function _applyNodeSetting(key, val) {
            // Map dashboard key → plugin command syntax
            let cmd;
            if (key === "manual_add") {
                cmd = `!manual_add ${val ? "on" : "off"}`;
            } else {
                cmd = `!set ${key} ${val}`;
            }
            try {
                await _pluginWS.sendCmdAndWait(cmd);
                // Optimistic update so the active highlight moves immediately
                if (_deviceMap) {
                    if (key === "manual_add")          _deviceMap.manual_add_contacts = !!val;
                    else if (key === "telemetry_base") _deviceMap.telemetry_mode_base = val;
                    else if (key === "telemetry_env")  _deviceMap.telemetry_mode_env  = val;
                    else if (key === "telemetry_loc")  _deviceMap.telemetry_mode_loc  = val;
                    else if (key === "adv_loc_policy") _deviceMap.adv_loc_policy      = val;
                }
                // Re-render the active highlights without losing the rest
                document.querySelectorAll(`.settings-btn[data-key="${key}"]`).forEach(b => {
                    b.classList.toggle("active", Number(b.dataset.val) === Number(val));
                });
            } catch (err) {
                alert(`Failed to save setting: ${err.message}`);
            }
        }

        function _initNodeSettings() {
            // The settings rows now live in the self side panel (#self-view),
            // which is built each time it opens. Bind once to document.body so
            // a single delegation handler catches clicks regardless of which
            // panel instance produced them — no need to re-bind per re-render.
            const root = document.body;
            if (!root || root._mcSettingsBound) return;
            root._mcSettingsBound = true;
            root.addEventListener("click", (ev) => {
                const btn = ev.target.closest(".settings-btn");
                if (btn) {
                    ev.preventDefault();
                    _applyNodeSetting(btn.dataset.key, Number(btn.dataset.val));
                    return;
                }
                const saveBtn = ev.target.closest(".settings-btn-save");
                if (saveBtn && saveBtn.dataset.key === "flood_scope") {
                    ev.preventDefault();
                    _saveFloodScope();
                }
            });
            // Enter inside the flood-scope input also saves
            root.addEventListener("keydown", (ev) => {
                if (ev.target.id === "settings-flood-scope" && ev.key === "Enter") {
                    ev.preventDefault();
                    _saveFloodScope();
                }
            });
        }

        async function _saveFloodScope() {
            const input = document.getElementById("settings-flood-scope");
            if (!input) return;
            const val = input.value.trim();
            const cmd = `!flood_scope ${val}`;
            try {
                await _pluginWS.sendCmdAndWait(cmd);
                // Optimistic: the plugin normalizes ("#nl" prefix) on apply.
                if (_deviceMap) {
                    _deviceMap.default_flood_scope = val
                        ? (val.startsWith("#") ? val : "#" + val)
                        : "";
                }
                input.value = _deviceMap.default_flood_scope || "";
                input.classList.add("saved");
                setTimeout(() => input.classList.remove("saved"), 1200);
            } catch (err) {
                alert(`Failed to save flood scope: ${err.message}`);
            }
        }

        // Patch an already-rendered card in-place with fresh data from byIdx.
        // Only rewrites the inner HTML of each metric cell — no full re-render.
        function patchNode(nodeName, isSelf, byIdx) {
            const mapSlots = (_deviceMap && _deviceMap.nodes && _deviceMap.nodes[nodeName]) || {};
            const metrics = isSelf ? SELF_METRICS : NODE_METRICS;

            // Patch badge
            const badgeEl = document.querySelector(`.node-badge[data-node="${CSS.escape(nodeName)}"]`);
            if (badgeEl && isSelf) {
                const statusSlot = mapSlots.status;
                const statusIdx = statusSlot ? statusSlot.idx : null;
                const liveDev = statusIdx ? byIdx[statusIdx] : null;
                if (liveDev) {
                    const online = liveDev.Status === "On" || liveDev.Data === "On";
                    badgeEl.innerHTML = online
                        ? `<span class="badge self" title="Connected"><i class="fa-solid fa-plug-circle-check"></i></span>`
                        : `<span class="badge offline" title="Offline"><i class="fa-solid fa-circle-xmark"></i></span>`;
                    // Sync the gear button disabled state with online state
                    const gearBtn = badgeEl.closest(".node-card")
                        && badgeEl.closest(".node-card").querySelector(".card-action-btn[data-action='open-self']");
                    if (gearBtn) {
                        gearBtn.disabled = !online;
                        gearBtn.title = online ? "Self-node info & radio settings" : "Node offline — settings unavailable";
                    }
                }
            } else if (badgeEl && !isSelf) {
                const statusSlot = mapSlots.status;
                const statusIdx = statusSlot ? statusSlot.idx : null;
                const liveDev = statusIdx ? byIdx[statusIdx] : null;
                if (liveDev) {
                    const online = liveDev.Status === "On" || liveDev.Data === "On";
                    badgeEl.innerHTML = online
                        ? `<a href="${deviceUrl(statusIdx)}" target="_top" style="text-decoration:none"><span class="badge online" title="Online"><i class="fa-solid fa-circle-check"></i></span></a>`
                        : `<a href="${deviceUrl(statusIdx)}" target="_top" style="text-decoration:none"><span class="badge offline" title="Offline"><i class="fa-solid fa-circle-xmark"></i></span></a>`;
                }
            }

            // Patch each metric cell
            for (const { key, label, unit, special } of metrics) {
                const cell = document.querySelector(`.metric[data-node="${CSS.escape(nodeName)}"][data-key="${key}"]`);
                if (!cell) continue;
                const slot = mapSlots[key] || null;
                const devIdx = slot ? slot.idx : null;
                const liveDev = devIdx ? byIdx[devIdx] : null;
                if (!liveDev) continue;
                const raw = liveDev.Data || "";
                const numVal = raw.replace(/\s*(dBm|dB|%|V|°C|hops|min|s|pkts)$/i, "").trim();
                cell.innerHTML = special === "battery"
                    ? (() => { const pct = parseInt(numVal, 10); return isNaN(pct) ? renderMetricHtml(label, null, unit, devIdx) : renderBatteryHtml(pct, devIdx); })()
                    : special === "snr"
                    ? (() => { const snr = parseFloat(numVal); return isNaN(snr) ? renderMetricHtml(label, null, unit, devIdx) : renderSnrHtml(snr, devIdx); })()
                    : special === "uptime"
                    ? (() => { const formatted = _formatUptime(numVal); return renderMetricHtml(label, formatted, "", devIdx); })()
                    : renderMetricHtml(label, numVal, unit, devIdx);
            }
        }

        // ── Inbox history ────────────────────────────────────────────────────────────
        // On first load: render instantly from JSON snapshot, then fetch full history.
        // On every 10-second refresh: detect new messages via LastUpdate and prepend.

        const _inboxHistory = [];    // [{time, channel, sender, text}, ...] newest first
        let _inboxLastUpdate = null;  // LastUpdate of the last recorded entry
        let _inboxLastWsValue = ""; // inbox_value seen in the last devices push ("" = none seen)
        let _inboxDevIdx2 = null;
        let _inboxLoaded = false; // true once initial history has been fetched
        // When set, the inbox shows a single favourite contact's stored DM
        // history (from its SQLite-backed thread via inbox_query WS protocol)
        // instead of the global Mesh Inbox. null = normal global inbox.
        let _convNode = null;
        // Conversation-mode pagination state (inbox_query / inbox_page protocol).
        let _inboxReqId = 0;          // monotonic id for inbox_query correlation
        let _inboxHasMore = false;    // server indicated more rows exist before current window
        let _inboxOldestId = null;    // row id of the oldest loaded entry (for before= pagination)
        let _inboxLoadingMore = false; // guard: prevent concurrent page-load requests
        let _inboxSearchDebTimer = null; // debounce handle for search-in-conversation
        const LS_INBOX_CHAN = "meshcore.inboxChanFilter";
        // Restore the last channel filter from localStorage; "" / null means "All"
        let _inboxChanFilter = (() => {
            try {
                const v = localStorage.getItem(LS_INBOX_CHAN);
                return v ? v : null;
            } catch (_) { return null; }
        })();
        let _inboxSearch = "";           // text search on sender + text (case-insensitive)

        // idx string → name, populated exclusively by the WS reducer
        // (t:'snapshot' channels field / t:'channels').
        let _channelNames = {};

        function _chanLabel(idxStr) {
            if (_channelNames[idxStr]) return _channelNames[idxStr];
            const n = parseInt(idxStr, 10);
            return isNaN(n) ? `Ch ${idxStr}` : `Ch ${n}`;
        }

        function _fmtEpoch(sec) {
            if (!sec) return "";
            const d = new Date(sec * 1000);
            const p = n => String(n).padStart(2, "0");
            return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} `
                 + `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
        }

        function _parseInboxData(raw) {
            // Format:  [chan|sender|<epoch>]      <epoch> = trusted send time
            //          [chan|sender|<epoch>|x]    <epoch> = our receive time
            //                                     (node RTC was wrong)
            // Legacy:  [chan|sender] text  /  [C0|sender] text  /  [sender] text

            const m = raw.match(/^\[([^\]]+)\]\s*(.*)/s);
            if (!m) return { channel: null, sender: "", text: raw, ts: null, tsWrong: false, snr: null, hops: null, rssi: null, path: null };
            const meta = m[1], text = m[2];
            const pipe = meta.indexOf("|");
            if (pipe < 0) {
                return { channel: null, sender: meta, text, ts: null, tsWrong: false, snr: null, hops: null, rssi: null, path: null };
            }
            const parts = meta.split("|");
            const chanPart = parts[0];
            let rest = parts.slice(1);
            // Pull out optional per-message signal tokens (~h hops, ~s snr,
            // ~r rssi). They are appended after the epoch/x; filtering them
            // out first leaves the epoch/x logic below untouched, and old
            // lines (no tokens) are unaffected.
            let snr = null, hops = null, rssi = null, path = null;
            rest = rest.filter(seg => {
                let mm;
                if ((mm = /^~h(-?\d+)$/.exec(seg)))        { hops = Number(mm[1]); return false; }
                if ((mm = /^~s(-?\d+(?:\.\d+)?)$/.exec(seg))) { snr  = Number(mm[1]); return false; }
                if ((mm = /^~r(-?\d+)$/.exec(seg)))        { rssi = Number(mm[1]); return false; }
                if ((mm = /^~p([0-9a-fA-F]+)$/.exec(seg))) { path = mm[1].toLowerCase(); return false; }
                return true;
            });
            let ts = null, tsWrong = false;
            // Trailing "x" flag → previous part is the (substituted) epoch.
            if (rest.length >= 2 && rest[rest.length - 1] === "x"
                && /^\d{6,}$/.test(rest[rest.length - 2])) {
                tsWrong = true;
                ts = Number(rest[rest.length - 2]);
                rest = rest.slice(0, -2);
            } else if (rest.length >= 1 && /^\d{6,}$/.test(rest[rest.length - 1])) {
                ts = Number(rest[rest.length - 1]);
                rest = rest.slice(0, -1);
            }
            const sender = rest.join("|");   // sender itself never contains "|"
            let channel;
            if (chanPart === "P") {
                channel = "Private";
            } else if (/^C\d+$/.test(chanPart)) {
                channel = _chanLabel(chanPart.slice(1));
            } else {
                channel = chanPart;
            }
            return { channel, sender, text, ts, tsWrong, snr, hops, rssi, path };
        }

        async function loadInboxHistory(inboxDev, byIdx) {
            // Conversation mode is self-managed via inbox_query/inbox_page;
            // loadData()/loadInboxHistory() must not interfere with it.
            if (_convNode) return;

            // Main inbox is now driven entirely by the server-side inbox_query
            // protocol (_mainQueryNewest / _onInboxPage).  The Domoticz text-log
            // device (inboxDev) is no longer the source of truth.
            //
            // The inbox-log-link points to a single Domoticz device row which
            // no longer reflects the full aggregated store — hide it for the
            // main inbox view so we don't leave a broken/misleading href.
            const logLink = document.getElementById("inbox-log-link");
            if (logLink) logLink.style.display = "none";

            // If the inbox has already been loaded (e.g. via _onSnapshotReady
            // kicking _mainQueryNewest on first connect), do nothing here — the
            // server page already rendered.  The _inboxLoaded flag is set by
            // _mainQueryNewest (via _sendInboxQuery / _onInboxPage).
            if (_inboxLoaded) return;

            // First call after a fresh connect: kick the initial server query.
            // Show a loading placeholder while the round-trip is in flight.
            const container = document.getElementById("inbox-history");
            if (container && !_inboxHistory.length) {
                container.innerHTML = `<div id="inbox-empty">Loading inbox…</div>`;
            }
            _inboxLoaded = true;     // guard against concurrent calls from loadData()
            _mainQueryNewest();
        }

        // ── inbox_query / inbox_page protocol ────────────────────────────────────────
        // The plugin stores all messages in SQLite and pages them on request.
        // scope = "@ContactName" for a DM thread, channel name or "" for global inbox.
        // Frames: send {t:'inbox_query', id, scope, before, limit, search}
        //         recv {t:'inbox_page',  id, scope, search, rows, has_more, oldest_id}
        // rows: [{id, chan, sender, epoch, bad, body, hops, snr, rssi, path, ack, dir}]

        // Page size is user-selectable (25/50/100/250/All) and persisted.
        // Stored raw value: "25".."250" or "all". Wire limit: the number, or
        // 0 for "all" (the plugin treats limit<=0 as "no row limit").
        const LS_INBOX_PAGE_SIZE = "meshcore.inboxPageSize";
        let _inboxPageSizeRaw = (() => {
            try {
                const v = localStorage.getItem(LS_INBOX_PAGE_SIZE);
                return ["25", "50", "100", "250", "all"].includes(v) ? v : "50";
            } catch (_) { return "50"; }
        })();
        function _inboxPageLimit() {
            return _inboxPageSizeRaw === "all" ? 0 : parseInt(_inboxPageSizeRaw, 10) || 50;
        }
        function _onInboxPageSize(val) {
            _inboxPageSizeRaw = ["25", "50", "100", "250", "all"].includes(val) ? val : "50";
            try { localStorage.setItem(LS_INBOX_PAGE_SIZE, _inboxPageSizeRaw); } catch (_) {}
            // Re-fetch the newest page at the new size (conversation or main).
            if (_convNode) _convQueryNewest();
            else           _mainQueryNewest();
        }

        function _sendInboxQuery(scope, before, search) {
            if (!_pluginWS) return 0;
            const id = ++_inboxReqId;
            const msg = { t: 'inbox_query', id, scope: scope || "", limit: _inboxPageLimit() };
            if (before != null) msg.before = before;
            if (search)         msg.search = search;
            _pluginWS.sendPluginCommand(msg);
            return id;
        }

        // Convert one inbox_page row to an _inboxHistory entry.
        function _mapInboxPageRow(row) {
            // chan: "P" → "Private"; "C1" etc → chanLabel; raw name otherwise.
            let channel;
            const c = row.chan || "";
            if (c === "P") {
                channel = "Private";
            } else if (/^C\d+$/.test(c)) {
                channel = _chanLabel(c.slice(1));
            } else {
                channel = c || null;
            }
            const epoch = row.epoch || 0;
            return {
                _rowId:   row.id,          // for pagination (oldest_id)
                time:     epoch ? _fmtEpoch(epoch) : "",
                channel,
                sender:   row.sender || "",
                text:     row.body   || "",
                tsWrong:  !!row.bad,
                snr:      row.snr  != null ? row.snr  : null,
                hops:     row.hops != null ? row.hops : null,
                rssi:     row.rssi != null ? row.rssi : null,
                path:     row.path || null,
                // Delivery ack for outgoing DMs: true = acked, false = no ack, null = N/A.
                ack:      row.ack === 1 ? true : row.ack === 0 ? false : null,
                // Outgoing flag: drive sent-row styling independently of sender prefix.
                _out:     row.dir === "out",
                // Stable peer identity for DM rows (12-hex pubkey prefix) —
                // used to label outgoing DMs with the recipient's name.
                peer_key: row.peer_key || null,
            };
        }

        // Resolve a 12-hex pubkey prefix to a friendly node name using the
        // device map (then heard nodes). Returns "" if unknown.
        function _nameForPubkey(pk) {
            const want = _normPk(pk);
            if (!want) return "";
            const nodes = (_deviceMap && _deviceMap.nodes) || {};
            for (const nm in nodes) {
                const np = nodes[nm] && nodes[nm].pubkey;
                if (np && _normPk(np) === want) return nm;
            }
            const si = _deviceMap && _deviceMap.self_info;
            if (si && si.public_key && _normPk(si.public_key) === want
                && _deviceMap.self) return _deviceMap.self;
            const hn = (_heard && _heard.nodes) || {};
            for (const k in hn) {
                if (hn[k] && hn[k].pubkey && _normPk(hn[k].pubkey) === want
                    && hn[k].name) return hn[k].name;
            }
            return "";
        }

        // Dispatch for incoming inbox_page frames.
        function _onInboxPage(msg) {
            // Ignore stale replies (e.g. from a query issued before navigation).
            if (msg.id !== _inboxReqId) return;

            const rows = Array.isArray(msg.rows) ? msg.rows : [];
            const isAppend = _inboxLoadingMore;   // true = "load older" append
            _inboxLoadingMore = false;

            if (!isAppend) {
                // Newest-page query: replace the full history.
                // Preserve any pending/settled optimistic echoes so a send in
                // conversation mode doesn't lose the placeholder while the
                // server round-trip is still in flight.
                const pending = _inboxHistory.filter(m => m._pending || m._settled);
                _inboxHistory.length = 0;
                for (const m of pending) _inboxHistory.push(m);
            }

            for (const row of rows) {
                const mapped = _mapInboxPageRow(row);
                // Dedup: a pending/settled placeholder is always an outgoing
                // echo. The stored row's sender is the self node (direction
                // carries in/out), while the placeholder's sender is "> target"
                // — so match on the outgoing flag + channel + text, NOT sender.
                const dupIdx = _inboxHistory.findIndex(m =>
                    (m._pending || m._settled) && mapped._out
                    && m.text === mapped.text && m.channel === mapped.channel);
                if (dupIdx >= 0) _inboxHistory.splice(dupIdx, 1);
                _inboxHistory.push(mapped);
            }

            _inboxHasMore  = !!msg.has_more;
            _inboxOldestId = msg.oldest_id != null ? msg.oldest_id : _inboxOldestId;
            _lastRenderedInboxHtml = "";

            const container = document.getElementById("inbox-history");
            if (container) {
                if (isAppend) {
                    // Preserve scroll position while appending older rows at the bottom.
                    const prev = container.scrollTop;
                    _renderInbox(container);
                    container.scrollTop = prev;
                } else {
                    _renderInbox(container);
                }
            }
        }

        // Resolve a DM conversation scope for a contact NAME. Prefer the
        // peer's public key (stable identity — names/callsigns can change or
        // collide): "@k:<12-hex pubkey prefix>". Fall back to the name-based
        // "@<name>" scope when no pubkey is known yet (the plugin still
        // matches that). The conversation is always *displayed* by name.
        function _normPk(pk) {
            const h = String(pk || "").toLowerCase().replace(/[^0-9a-f]/g, "").slice(0, 12);
            return h.length ? h : null;
        }
        function _dmScopeFor(name) {
            if (!name) return "@";
            const nodes = (_deviceMap && _deviceMap.nodes) || {};
            let pk = nodes[name] && nodes[name].pubkey;
            if (!pk && _deviceMap && _deviceMap.self === name) {
                const si = _deviceMap.self_info;
                pk = si && si.public_key;
            }
            if (!pk) {
                const hn = (_heard && _heard.nodes) || {};
                for (const k in hn) {
                    if (hn[k] && hn[k].name === name && hn[k].pubkey) { pk = hn[k].pubkey; break; }
                }
            }
            const norm = _normPk(pk);
            return norm ? ("@k:" + norm) : ("@" + name);
        }

        // Request the newest page for the current conversation (resets paging).
        function _convQueryNewest() {
            if (!_convNode) return;
            // Bump _inboxReqId now so any in-flight older-page reply is ignored.
            // _sendInboxQuery will use the bumped value and return it.
            _inboxHasMore   = false;
            _inboxOldestId  = null;
            _inboxLoadingMore = false;
            const search = (() => {
                try { return (document.getElementById("inbox-search") || {}).value || ""; } catch (_) { return ""; }
            })();
            _inboxReqId = _sendInboxQuery(_dmScopeFor(_convNode), null, search.trim() || null);
        }

        // Transient "loading older messages…" hint appended below the rows
        // while an older-page query is in flight. The next _renderInbox()
        // (called from _onInboxPage when the page arrives) rebuilds the
        // container's innerHTML, which removes it — no explicit cleanup needed.
        function _showInboxOlderLoading() {
            const c = document.getElementById("inbox-history");
            if (!c || document.getElementById("inbox-older-loading")) return;
            const d = document.createElement("div");
            d.id = "inbox-older-loading";
            d.style.cssText = "text-align:center;padding:8px;opacity:.6;font-size:.8rem;";
            d.textContent = "Loading older messages…";
            c.appendChild(d);
        }

        // Request the next older page (appended below current rows).
        function _convLoadOlderPage() {
            if (!_convNode || !_inboxHasMore || !_inboxOldestId || _inboxLoadingMore) return;
            _inboxLoadingMore = true;
            _showInboxOlderLoading();
            const search = (() => {
                try { return (document.getElementById("inbox-search") || {}).value || ""; } catch (_) { return ""; }
            })();
            _inboxReqId = _sendInboxQuery(_dmScopeFor(_convNode), _inboxOldestId, search.trim() || null);
        }

        // ── Main-inbox query drivers (mirror of _convQueryNewest / _convLoadOlderPage) ──

        // Map the currently active channel chip label to a server scope string:
        //   null / "All"     → "all"  (no filter — full store)
        //   "Private"        → "P"    (all DM threads)
        //   A channel label  → reverse-lookup against _channelNames to get "C<idx>",
        //                      or pass the name verbatim if it doesn't match any
        //                      known idx (non-C<n> channel tags pass through as-is).
        function _mainInboxScope() {
            const filter = _inboxChanFilter;
            if (!filter) return "all";
            if (filter === "Private") return "P";
            // Reverse-lookup: find an idx whose name matches the label.
            for (const idx in _channelNames) {
                if (_channelNames[idx] === filter) return "C" + idx;
            }
            // Fallback: treat the label as the raw stored channel tag.
            return filter;
        }

        // Request the newest page for the current main-inbox scope (resets paging).
        function _mainQueryNewest() {
            if (_convNode) return;   // main inbox only
            _inboxHasMore   = false;
            _inboxOldestId  = null;
            _inboxLoadingMore = false;
            const search = (() => {
                try { return (document.getElementById("inbox-search") || {}).value || ""; } catch (_) { return ""; }
            })();
            _inboxReqId = _sendInboxQuery(_mainInboxScope(), null, search.trim() || null);
        }

        // Debounced re-query of the newest page for whichever view is active
        // (pinned DM conversation or the main inbox). Driven by inbox_value
        // change notifications so the list always reflects the SQLite store.
        let _inboxRefreshTimer = 0;
        function _scheduleInboxRefresh() {
            if (_inboxRefreshTimer) return;
            _inboxRefreshTimer = setTimeout(() => {
                _inboxRefreshTimer = 0;
                if (_inboxLoadingMore) return;   // don't disturb an older-page fetch
                if (_convNode) _convQueryNewest(); else _mainQueryNewest();
            }, 120);
        }

        // Request the next older page for the main inbox (appended below current rows).
        function _mainLoadOlderPage() {
            if (_convNode || !_inboxHasMore || !_inboxOldestId || _inboxLoadingMore) return;
            _inboxLoadingMore = true;
            _showInboxOlderLoading();
            const search = (() => {
                try { return (document.getElementById("inbox-search") || {}).value || ""; } catch (_) { return ""; }
            })();
            _inboxReqId = _sendInboxQuery(_mainInboxScope(), _inboxOldestId, search.trim() || null);
        }

        // Pin the inbox to one contact's DM thread (served from SQLite).
        function _enterConversation(name) {
            _convNode = name;
            _inboxLoaded = false;
            // Conversation rows are all "Private"; a stale channel filter would
            // hide them. Clear it in-memory (don't touch the saved preference).
            _inboxChanFilter = null;
            _inboxHistory.length = 0;
            _inboxHasMore   = false;
            _inboxOldestId  = null;
            _inboxLoadingMore = false;
            _lastRenderedInboxHtml = "";

            const banner = document.getElementById("conv-banner");
            const label  = document.getElementById("conv-banner-label");
            if (label)  label.textContent = `💬 Conversation with ${name}`;
            if (banner) banner.style.display = "flex";

            // Hide the global-inbox log link — no single device idx applies here.
            const logLink = document.getElementById("inbox-log-link");
            if (logLink) logLink.style.display = "none";

            // Show a loading placeholder while the query is in flight.
            const container = document.getElementById("inbox-history");
            if (container) container.innerHTML = `<div id="inbox-empty">Loading…</div>`;

            const sec = document.getElementById("inbox-history-section");
            if (sec) sec.scrollIntoView({ behavior: "smooth", block: "start" });

            _convQueryNewest();
        }

        function _exitConversation() {
            _convNode = null;
            _inboxLoaded = false;          // allow _mainQueryNewest() to run fresh
            _inboxLastUpdate = null;
            _inboxHistory.length = 0;
