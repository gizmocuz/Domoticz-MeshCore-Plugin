<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeshCore Dashboard</title>
    <link rel="stylesheet" href="/font-awesome/css/all.min.css">
    <!-- Leaflet is injected dynamically from an inline <script> (see below)
         because Domoticz custom-template loading does not execute <script src>
         tags reliably. The bundle lives at /templates/leaflet/ and is
         installed alongside this file by the plugin on startup. -->
    <style>
        :root {
            --bg: #1e1f26;
            --surface: #2a2b35;
            --border: #3a3b47;
            --accent: #4e9af1;
            --green: #4caf7d;
            --red: #e05555;
            --yellow: #f0a832;
            --heard: #b07cff;
            --text: #e2e4ed;
            --muted: #7c7f93;
            --radius: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        .clock-wrong,
        .clock-wrong .metric-value,
        .clock-wrong .row-meta,
        .row-meta.clock-wrong,
        .heard-extra.clock-wrong span { color: var(--red) !important; cursor: help; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            min-height: 100vh;
            color-scheme: dark;
        }
        /* Bound the contacts area so the inbox below stays within reach
           without a long page scroll. The cards/list scroll internally. */
        #contacts-grid,
        #contacts-list {
            max-height: 50vh;
            min-height: 180px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        /* Make the scrollbar clearly visible against the dark surface */
        #contacts-grid::-webkit-scrollbar,
        #contacts-list::-webkit-scrollbar { width: 10px; }
        #contacts-grid::-webkit-scrollbar-track,
        #contacts-list::-webkit-scrollbar-track { background: transparent; }
        #contacts-grid::-webkit-scrollbar-thumb,
        #contacts-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
        }
        #contacts-grid::-webkit-scrollbar-thumb:hover,
        #contacts-list::-webkit-scrollbar-thumb:hover { background: var(--muted); }
        /* Keep the inbox compact so the whole page fits in a typical viewport. */
        #inbox-history { max-height: 180px; }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 10px;
        }
        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        header h1 span.logo {
            background: var(--accent);
            color: #fff;
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        #last-updated { font-size: 0.8rem; color: var(--muted); }

        #header-stats {
            flex: 1 1 auto;
            min-width: 0;
            font-size: 0.82rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 4px 14px;
            flex-wrap: wrap;
            padding-left: 6px;
        }
        #header-stats .hs-label { color: var(--muted); }
        #header-stats b { color: var(--text); font-weight: 600; }
        #header-stats .hs-client   { color: var(--green); }
        #header-stats .hs-repeater { color: var(--yellow); }
        #header-stats .hs-server   { color: var(--accent); }
        #header-stats .hs-client b,
        #header-stats .hs-repeater b,
        #header-stats .hs-server b { color: inherit; }
        #header-stats .hs-sep { opacity: 0.4; }

        /* ── Statistics side panel ── */
        .stats-cards { display: flex; gap: 10px; margin: 10px 0 4px; }
        .stats-card {
            flex: 1; text-align: center; padding: 12px 6px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        .stats-card .sc-label { font-size: 0.72rem; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.04em; }
        .stats-card .sc-value { font-size: 1.5rem; font-weight: 700;
            color: var(--accent); margin-top: 3px; }
        .stats-tot { font-size: 0.92rem; margin: 4px 0 2px; }
        .stats-tot b { color: var(--text); }
        .stats-tot .st-adv { color: var(--yellow); }
        .stats-tot .st-msg { color: var(--accent); }
        .lb-row { margin: 7px 0; }
        .lb-top {
            display: flex; justify-content: space-between;
            font-size: 0.82rem; color: var(--text); margin-bottom: 3px;
        }
        .lb-top .lb-count { color: var(--accent); font-weight: 600; }
        .lb-bar { height: 7px; border-radius: 4px; background: var(--bg); overflow: hidden; }
        .lb-fill { height: 100%; border-radius: 4px; background: var(--green); }
        .lb-fill.adv { background: var(--yellow); }
        .hops-rec {
            margin: 12px 0; padding: 12px 14px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        .hops-rec .hr-title { color: var(--yellow); font-weight: 600; margin-bottom: 6px; }
        .hops-rec .hr-line { font-size: 0.85rem; color: var(--text); line-height: 1.6; }
        .hops-rec .hr-line b { color: var(--accent); }

        #refresh-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.15s;
        }
        #refresh-btn:hover { background: var(--border); }

        /* ── Main layout: self node left, contacts right ───────── */
        #main-layout {
            display: flex;
            align-items: flex-start;
            gap: 0;
        }
        #self-section {
            flex: 0 0 300px;
        }
        #layout-divider {
            flex: 0 0 1px;
            background: var(--border);
            align-self: stretch;
            margin: 0 36px;
            min-height: 80px;
            display: none;
            margin-top: 36px;
            opacity: 29%;
        }
        #contacts-section {
            flex: 1;
            min-width: 0;
        }

        /* ── Section headers ───────────────────────────────────── */
        .section-title {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: var(--muted);
            margin: 0 0 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        /* ── Node grids ─────────────────────────────────────────── */
        #self-grid .node-card { width: 100%; }
        #contacts-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }
        #contacts-grid .node-card {
            width: 230px;
            flex-shrink: 0;
        }

        @media (max-width: 900px) {
            #main-layout { flex-direction: column; }
            #layout-divider { flex: none; width: 100%; height: 1px; margin: 24px 0; min-height: 0; }
            #self-section, #contacts-section { flex: none; width: 100%; }
            #contacts-grid .node-card { width: auto; flex: 1 1 220px; }
        }
        .node-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: visible;
            position: relative;
        }
        .node-header {
            padding: 10px 14px 8px;
            padding-right: 56px;  /* leave room for the floating badge */
            border-bottom: 1px solid var(--border);
        }
        .node-name { font-weight: 600; font-size: 0.95rem; }

        /* Floating badge — top-right overlay, doesn't affect card layout */
        .node-badge {
            position: absolute;
            top: 10px;
            right: 12px;
            z-index: 2;
            pointer-events: auto;
        }

        /* Floating map-pin button — bottom-LEFT overlay, mirrors fav-toggle */
        .map-toggle {
            position: absolute;
            bottom: 8px;
            left: 10px;
            z-index: 2;
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 1rem;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 4px;
            transition: color 0.12s, background 0.12s;
        }
        .map-toggle:hover { color: var(--green); background: rgba(76, 175, 125, 0.08); }
        /* Card action button: opens the self/contact info side panel.
           Sits in the top-right area of the card alongside the status badge. */
        .card-action-btn {
            position: absolute;
            top: 10px;
            right: 36px;
            z-index: 2;
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--text);
            opacity: 0.85;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 0;
            border-radius: 50%;
            transition: color 0.12s, background 0.12s, opacity 0.12s;
        }
        .card-action-btn:hover { color: var(--accent); opacity: 1; background: var(--bg); }
        /* List-view map indicator before the favorite slot */
        .row-map {
            display: inline-flex;
            align-items: center;
            color: var(--green);
            font-size: 0.9rem;
            margin-right: 6px;
            cursor: pointer;
        }
        .row-map.empty { visibility: hidden; }

        /* Map side panel (slides in from the right) */
        #map-panel {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 480px;
            min-width: 360px;
            max-width: 90vw;
            background: var(--surface);
            border-left: 1px solid var(--border);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.25s ease-out;
            box-shadow: -4px 0 16px rgba(0, 0, 0, 0.4);
        }
        #map-panel.open { transform: translateX(0); }
        #map-panel.resizing { transition: none; user-select: none; }
        /* Drag handle on the left edge — user can drag to resize the panel */
        #map-panel-resizer {
            position: absolute;
            top: 0; bottom: 0; left: -3px;
            width: 6px;
            cursor: ew-resize;
            z-index: 1001;
            background: transparent;
        }
        #map-panel-resizer:hover,
        #map-panel.resizing #map-panel-resizer { background: var(--accent); opacity: 0.5; }
        #map-panel-header {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        #map-panel-header h3 {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
        }
        #map-panel-header .coords {
            font-size: 0.72rem;
            color: var(--muted);
            font-family: monospace;
            margin-top: 2px;
        }
        #map-panel-close {
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
        }
        #map-panel-close:hover { color: var(--text); background: var(--border); }
        #map-panel-body {
            flex: 1;
            position: relative;
            min-height: 0;
        }
        #map-canvas {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
        }
        #map-panel-footer {
            padding: 10px 14px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            font-size: 0.78rem;
        }
        #map-panel-footer a {
            color: var(--accent);
            text-decoration: none;
        }
        #map-panel-footer a:hover { text-decoration: underline; }
        #map-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 999;
            display: none;
        }
        #map-backdrop.open { display: block; }

        /* CSS-only Leaflet marker (no PNG dependency) */
        .mc-pin {
            background: transparent;
            border: none;
        }
        .mc-pin-inner {
            width: 20px;
            height: 20px;
            border-radius: 50% 50% 50% 0;
            background: var(--accent);
            border: 2px solid #fff;
            transform: rotate(-45deg);
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        /* Floating favorite toggle — bottom-right overlay on contact cards */
        .fav-toggle {
            position: absolute;
            bottom: 8px;
            right: 10px;
            z-index: 2;
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 1rem;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 4px;
            transition: color 0.12s, background 0.12s;
        }
        .fav-toggle:hover  { color: var(--yellow); background: rgba(240, 168, 50, 0.08); }
        .fav-toggle.active { color: var(--yellow); }
        /* List-view favorite indicator in front of the name */
        .row-fav {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            color: var(--yellow);
            font-size: 0.9rem;
            margin-right: 6px;
        }
        /* visibility:hidden (not display:none) so non-favorite rows keep
           the same name-column starting position as favorite rows */
        .row-fav.empty { visibility: hidden; }

        .badge {
            font-size: 0.85rem;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.35);
            flex-shrink: 0;
        }
        .badge i { font-size: 0.85rem; }
        .badge.online  { background: #1a3d2b; color: var(--green); }
        .badge.offline { background: #3d1a1a; color: var(--red); }
        .badge.unknown { background: #2e2e2e; color: var(--text); }
        .badge.self    { background: #1a2e3d; color: var(--accent); }

        .node-metrics {
            /* extra bottom padding reserves room for the floating fav-star and
               map-pin overlays so they don't sit on top of the Last Seen row */
            padding: 8px 12px 28px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px 8px;
        }
        /* Single-line metric rows: "LABEL  value" inline. Compact. */
        .metric {
            display: flex;
            flex-direction: row;
            align-items: baseline;
            gap: 6px;
            min-width: 0;
        }
        .metric a { text-decoration: none; color: inherit; display: contents; }
        .metric a:hover .metric-value { color: var(--accent); }
        .metric-label::after { content: ""; }

        /* Hide metric rows that have no data (instead of showing a "—" placeholder). */
        .metric.empty { display: none; }

        /* Last Seen spans the full row at the bottom of the metric grid. */
        .metric[data-key="last_seen"] {
            grid-column: 1 / -1;
            margin-top: 2px;
        }
        .metric[data-key="last_seen"] .metric-label::after { content: ":"; }
        .metric[data-key="last_seen"] .metric-value { font-size: 0.82rem; }

        /* Clickable contact cards — visual cue */
        #contacts-grid .node-card { cursor: pointer; transition: border-color 0.15s, transform 0.1s; }
        #contacts-grid .node-card:hover { border-color: var(--accent); }
        #contacts-grid .node-card.compose-selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent);
        }

        /* Firmware info line shown under the self-node name */
        .fw-info {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 4px;
            font-family: -apple-system, "Segoe UI", monospace;
        }

        /* Direct-neighbour badge ("hops == 0") */
        .direct-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.62rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: #1a3d2b;
            color: var(--green);
            border-radius: 4px;
            padding: 2px 6px;
            margin-top: 4px;
        }
        .direct-chip i { font-size: 0.7rem; }
        .row-direct {
            display: inline-flex;
            align-items: center;
            color: var(--green);
            font-size: 0.85rem;
            margin-left: 8px;
        }

        /* Contact type chip (shown under node name in card header) */
        .type-chip {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 4px;
            padding: 2px 7px;
            margin-top: 4px;
        }
        .type-chip.type-1 { background: #1a2e3d; color: var(--accent); }
        .type-chip.type-2 { background: #3d2a1a; color: #f0a832; }
        .type-chip.type-3 { background: #1a3d2b; color: var(--green); }
        .type-chip.type-4 { background: #3d1a3d; color: #d090e0; }
        .type-chip.type-0 { background: #2e2e2e; color: var(--muted); }

        /* Group headings between online/offline + per-type sections */
        .contact-group-title {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin: 14px 0 8px;
            width: 100%;
        }
        .contact-group-title:first-child { margin-top: 0; }

        /* Contacts toolbar: view-toggle + type-filter + name-search on right */
        .contacts-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 14px;
            margin: 0 0 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .contacts-header .section-title {
            margin: 0;
            padding: 0;
            border: none;
        }
        #contacts-count {
            color: var(--text);
            font-weight: 500;
            margin-left: 6px;
            opacity: 0.7;
        }
        #contacts-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #contacts-toolbar select,
        #contacts-toolbar input {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 0.82rem;
            outline: none;
            min-width: 0;
        }
        #contacts-toolbar input[type="search"] { width: 180px; }
        #contacts-toolbar input:focus,
        #contacts-toolbar select:focus { border-color: var(--accent); }
        #contacts-toolbar .search-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        #contacts-toolbar .search-wrap i {
            position: absolute;
            left: 9px;
            color: var(--muted);
            font-size: 0.8rem;
            pointer-events: none;
        }
        #contacts-toolbar .search-wrap input { padding-left: 28px; }

        .view-toggle {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }
        .view-btn {
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 0.95rem;
            padding: 5px 11px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .view-btn:hover { color: var(--text); }
        .view-btn.active { background: var(--border); color: var(--accent); }

        /* Generic icon button in the contacts toolbar (e.g. manual_add_contacts toggle) */
        .toolbar-icon-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 6px;
            padding: 5px 11px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.15s, color 0.15s;
        }
        .toolbar-icon-btn:hover { color: var(--text); }
        .toolbar-icon-btn.active { color: var(--yellow); }       /* manual-add = ON (block auto-add) */
        .toolbar-icon-btn.inactive { color: var(--green); }      /* manual-add = OFF (auto-add) */

        /* List view */
        #contacts-list {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            /* No `overflow: hidden` here — it would defeat the
               internal scroll set higher up. */
        }
        /* Shared grid template for header + body rows so columns line up.
           cols: [checkbox] [status-dot] [name] [type] [last-seen wider] [snr] [hops] [trash] */
        .contact-row,
        .contact-row-header {
            display: grid;
            grid-template-columns: 24px 18px 1fr 110px 170px 70px 60px 40px;
            align-items: center;
            gap: 12px;
            padding: 4px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 0.82rem;
            line-height: 1.2;
        }
        .contact-row-header {
            background: var(--bg);
            color: var(--muted);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
            cursor: default;
        }
        .contact-row-header .row-bulk-actions {
            grid-column: 3 / -1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            text-transform: none;
            font-weight: 500;
            font-size: 0.78rem;
            color: var(--text);
        }
        .contact-row-header .row-bulk-actions .selected-count { color: var(--muted); font-size: 0.74rem; }
        .contact-row-header .row-bulk-actions button {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 5px;
            padding: 4px 10px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: color 0.1s, border-color 0.1s, background 0.1s;
        }
        .contact-row-header .row-bulk-actions button.danger:hover {
            color: var(--red); border-color: var(--red); background: rgba(224, 85, 85, 0.08);
        }
        .contact-row-header .row-bulk-actions button:disabled {
            opacity: 0.4; cursor: not-allowed;
        }
        .contact-row { cursor: pointer; transition: background 0.1s; }
        .contact-row:last-child { border-bottom: none; }
        .contact-row:hover { background: rgba(255, 255, 255, 0.03); }
        .contact-row.compose-selected { background: rgba(78, 154, 241, 0.08); }
        .contact-row.row-selected     { background: rgba(224, 85, 85, 0.08); }
        /* Custom icon-based checkbox (Domoticz host CSS sometimes hides native ones). */
        .row-check { display: flex; align-items: center; justify-content: center; }
        .row-check-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            cursor: pointer;
            color: var(--muted);
            font-size: 1.05rem;
            transition: color 0.12s;
        }
        .row-check-box:hover            { color: var(--text); }
        .row-check-box.checked          { color: var(--accent); }
        .row-check-box.indeterminate    { color: var(--accent); }
        .contact-row .row-status {
            width: 10px; height: 10px; border-radius: 50%;
        }
        .contact-row .row-status.online  { background: var(--green); }
        .contact-row .row-status.offline { background: var(--red); }
        .contact-row .row-name { font-weight: 500; color: var(--text); }
        .contact-row .row-name .row-pk {
            font-size: 0.7rem; color: var(--muted); margin-left: 8px; font-family: monospace;
        }
        .contact-row .row-type { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .contact-row .row-meta { color: var(--muted); font-size: 0.78rem; }
        .contact-row .row-snr  { color: var(--text); font-variant-numeric: tabular-nums; text-align: right; }
        .contact-row .row-hops { color: var(--muted); text-align: right; }
        .contact-row .row-remove {
            background: transparent;
            border: none;
            color: var(--red);
            font-size: 0.9rem;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 4px;
            transition: background 0.1s;
        }
        .contact-row .row-remove:hover { background: rgba(224, 85, 85, 0.15); }

        .contacts-empty {
            padding: 18px;
            text-align: center;
            color: var(--muted);
            font-size: 0.88rem;
        }

        /* Settings panel inside the connected-node card */
        .node-settings {
            border-top: 1px solid var(--border);
            padding: 12px 18px 14px;
        }
        .node-settings-header {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin: 0 0 10px;
        }
        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 7px;
        }
        .settings-row:last-child { margin-bottom: 0; }
        .settings-label {
            font-size: 0.78rem;
            color: var(--text);
        }
        .settings-options {
            display: flex;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            overflow: hidden;
        }
        .settings-btn {
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 0.72rem;
            padding: 3px 9px;
            cursor: pointer;
            transition: background 0.1s, color 0.1s;
        }
        .settings-btn:hover { color: var(--text); }
        .settings-btn.active {
            background: var(--accent);
            color: #fff;
        }

        /* Flood-scope text-input row */
        .settings-text-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .settings-text {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text);
            font-size: 0.78rem;
            padding: 3px 8px;
            width: 130px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.4s;
        }
        .settings-text:focus { border-color: var(--accent); }
        .settings-text.saved { box-shadow: 0 0 0 2px rgba(76, 175, 125, 0.5); }
        .settings-btn-save {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--muted);
            font-size: 0.78rem;
            padding: 3px 8px;
            cursor: pointer;
            transition: color 0.1s, border-color 0.1s;
        }
        .settings-btn-save:hover { color: var(--green); border-color: var(--green); }

        .metric-label {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            white-space: nowrap;
        }
        .metric-value {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text);
            transition: color 0.15s;
            white-space: nowrap;
        }
        .metric-value.na { color: var(--muted); font-style: italic; }

        /* Battery bar */
        .batt-wrap { display: flex; align-items: center; gap: 6px; }
        .batt-bar-bg {
            flex: 1;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }
        .batt-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
        .batt-bar-fill.high   { background: var(--green); }
        .batt-bar-fill.medium { background: var(--yellow); }
        .batt-bar-fill.low    { background: var(--red); }

        /* ── Error / loading ───────────────────────────────────── */
        #status-msg { text-align: center; color: var(--muted); margin-top: 40px; font-size: 0.9rem; }

        /* ── Inbox history ─────────────────────────────────────── */
        #inbox-history-section { margin-top: 16px; }

        .inbox-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .inbox-section-header h2 {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--muted);
        }

        #inbox-log-link {
            font-size: 0.8rem;
            color: var(--accent);
            text-decoration: none;
            padding: 4px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            transition: background 0.15s;
        }
        #inbox-log-link:hover { background: var(--border); }

        #conv-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin: 6px 0;
            padding: 6px 10px;
            font-size: 0.82rem;
            color: var(--text);
            background: rgba(176, 124, 255, 0.12);
            border: 1px solid var(--heard);
            border-radius: 6px;
        }
        #conv-banner-label { font-weight: 600; }
        #conv-banner-exit {
            font-size: 0.78rem;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 3px 9px;
            cursor: pointer;
        }
        #conv-banner-exit:hover { background: var(--border); }

        #inbox-history {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0;
            max-height: 400px;
            overflow-y: auto;
        }
        .inbox-msg {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 4px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            line-height: 1.25;
        }
        .inbox-msg:last-child { border-bottom: none; }
        .inbox-msg .msg-time {
            color: var(--muted);
            font-size: 0.75rem;
            white-space: nowrap;
            flex-shrink: 0;
            min-width: 130px;
        }
        .inbox-msg .msg-sender {
            color: var(--accent);
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .inbox-msg .msg-text {
            color: var(--text);
            word-break: break-word;
            user-select: text;
            -webkit-user-select: text;
            cursor: text;
        }
        /* Allow selecting time + sender too (e.g. copy a timestamp) */
        .inbox-msg .msg-time,
        .inbox-msg .msg-sender { user-select: text; -webkit-user-select: text; }
        .inbox-msg .msg-text .mention {
            color: #4caf7d;
            background: rgba(76,175,125,0.13);
            border-radius: 4px;
            padding: 0 4px;
            font-weight: 600;
        }

        @media (max-width: 540px) {
            .inbox-msg { flex-wrap: wrap; align-items: center; }
            .inbox-msg .msg-text { flex-basis: 100%; padding-top: 4px; padding-left: 2px; }
        }

        .msg-chan {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 4px;
            white-space: nowrap;
            flex-shrink: 0;
            background: var(--border);
            color: var(--muted);
        }
        .msg-chan.private { background: #2a3a4a; color: #7ab; }
        .inbox-msg.sent { background: rgba(78,154,241,0.06); border-left: 3px solid var(--accent); }
        .inbox-msg.sent .msg-sender { color: var(--muted); font-weight: 500; }
        /* Optimistic placeholder until the plugin confirms the send (~30s) */
        .inbox-msg.pending { opacity: 0.6; font-style: italic; }
        .inbox-msg.pending .msg-time { color: var(--yellow); font-style: normal; }

        /* ── Inbox filter bar ───────────────────────────────────── */
        #inbox-filters {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        #filter-rows { display: flex; flex-direction: column; gap: 6px; flex: 1; }
        .filter-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .filter-label {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            flex-shrink: 0;
            min-width: 56px;
        }

        .filter-btn {
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--muted);
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .filter-btn:hover { background: var(--border); }
        .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        #inbox-search {
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            outline: none;
            width: 160px;
            margin-left: auto;
            align-self: flex-start;
        }
        #inbox-search:focus { border-color: var(--accent); }

        #inbox-empty {
            padding: 20px 16px;
            color: var(--muted);
            font-size: 0.85rem;
            font-style: italic;
            text-align: center;
        }

        .msg-reply-btn {
            margin-left: auto;
            flex-shrink: 0;
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 4px;
            padding: 1px 7px;
            font-size: 0.72rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s, color 0.15s;
        }
        .inbox-msg:hover .msg-reply-btn,
        .inbox-msg:hover .msg-info-btn { opacity: 1; }
        .msg-reply-btn:hover { color: var(--accent); border-color: var(--accent); }
        .msg-info-btn {
            flex-shrink: 0;
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            opacity: 0;
            padding: 1px 4px;
            font-size: 0.85rem;
            transition: opacity 0.15s, color 0.15s;
        }
        .msg-info-btn:hover { color: var(--accent); }

        /* Message details panel — shares side-panel skin with the map panel */
        #msg-details-list {
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }
        .msg-detail-row {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .msg-detail-row:last-child { border-bottom: none; }
        .msg-detail-section {
            font-size: 0.66rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent);
            border-top: 1px solid var(--border);
            margin-top: 8px;
            padding-top: 8px;
        }

        /* RX-log toolbar in the header */
        .rx-toolbar { display: inline-flex; gap: 4px; }
        .rx-tool-btn {
            background: var(--card-bg, transparent);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            width: 32px; height: 32px;
            cursor: pointer;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: color .15s, border-color .15s, background .15s;
        }
        .rx-tool-btn:hover { color: var(--accent); border-color: var(--accent); background: var(--bg); }
        .rx-tool-btn.active { color: var(--accent); border-color: var(--accent); }

        /* ── Generic side-panel view styles (reused across firehose/traffic/heatmap/channels) ── */
        .panel-view {
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            font-size: 0.85rem;
        }
        /* Firehose stream rows */
        .firehose-row {
            font-family: ui-monospace, "Cascadia Code", "Consolas", monospace;
            font-size: 0.72rem;
            line-height: 1.35;
            color: var(--text);
            border-bottom: 1px solid var(--border);
            padding: 4px 0;
            display: grid;
            grid-template-columns: 56px 70px 28px 1fr;
            gap: 6px;
            align-items: baseline;
        }
        .firehose-row.firehose-head {
            color: var(--accent);
            font-weight: 600;
            border-bottom: 1px solid var(--accent);
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 0.05em;
            padding-top: 0;
        }
        .firehose-row[data-tip] { cursor: help; }
        .firehose-row[data-tip]:hover { background: var(--bg); }
        .firehose-row.text     { color: var(--accent); }
        .firehose-row.advert   { color: #a0c4ff; }
        .firehose-row.response { color: #c7c7c7; opacity: 0.85; }
        .firehose-row.group    { color: #f9c74f; }
        .firehose-row .t  { color: var(--muted); }
        .firehose-row .pt { font-weight: 600; }
        .firehose-row .meta { color: var(--muted); }
        .firehose-row .msg  { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .firehose-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
        }
        .firehose-controls button {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 4px;
            padding: 3px 10px;
            cursor: pointer;
            font-size: 0.78rem;
        }
        .firehose-controls button:hover { color: var(--accent); border-color: var(--accent); background: var(--bg); }
        #firehose-list {
            max-height: calc(100vh - 220px);
            overflow-y: auto;
        }

        /* Bar chart for traffic stats */
        .bar-row {
            display: grid;
            grid-template-columns: 120px 1fr 50px;
            gap: 8px;
            align-items: center;
            font-size: 0.78rem;
        }
        .bar-bar {
            height: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }
        .bar-bar > span {
            display: block;
            height: 100%;
            background: var(--accent);
        }
        .bar-row .bar-count { text-align: right; color: var(--text); font-variant-numeric: tabular-nums; }

        /* 24h heatmap grid */
        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 2px;
            margin-top: 6px;
        }
        .heatmap-grid > div {
            aspect-ratio: 1 / 1;
            border-radius: 2px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            position: relative;
            font-size: 0.62rem;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-variant-numeric: tabular-nums;
        }
        .heatmap-grid > div.hot1 { background: rgba(38,196,124,0.22); color: var(--text); border-color: rgba(38,196,124,0.30); }
        .heatmap-grid > div.hot2 { background: rgba(38,196,124,0.45); color: #ffffff; border-color: rgba(38,196,124,0.55); }
        .heatmap-grid > div.hot3 { background: rgba(38,196,124,0.70); color: #000;     border-color: rgba(38,196,124,0.85); }
        .heatmap-grid > div.hot4 { background: rgba(38,196,124,0.95); color: #000;     border-color: rgba(38,196,124,1.00); font-weight: 600; }
        .heatmap-grid > div.now  { outline: 2px solid var(--accent); outline-offset: -2px; }
        .heatmap-labels {
            display: grid;
            grid-template-columns: repeat(24, 1fr);
            gap: 2px;
            margin-top: 2px;
            font-size: 0.62rem;
            color: var(--text);
            opacity: 0.7;
        }
        .heatmap-labels > div { text-align: center; }

        /* Channel discovery list */
        .chan-row {
            display: grid;
            grid-template-columns: 60px 1fr 60px;
            gap: 6px;
            font-size: 0.8rem;
            padding: 4px 0;
            border-bottom: 1px solid var(--border);
        }
        #chan-slots-list {
            max-height: 340px;
            overflow-y: auto;
        }
        .chan-slot-row {
            display: grid;
            grid-template-columns: 36px 1fr auto;
            gap: 8px;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.82rem;
        }
        .chan-slot-row .slot-idx {
            color: var(--accent);
            font-family: ui-monospace, monospace;
            text-align: center;
        }
        .chan-slot-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 3px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .chan-slot-btn.add:hover    { color: #26c47c; border-color: #26c47c; }
        .chan-slot-btn.clear:hover  { color: #e63946; border-color: #e63946; }
        .chan-row .chash { font-family: ui-monospace, monospace; color: var(--accent); }
        .chan-row .name  { color: var(--text); opacity: 0.7; font-style: italic; }
        .chan-row .cnt   { text-align: right; font-variant-numeric: tabular-nums; }
        .chan-row.known  .name { color: var(--text); opacity: 1; font-style: normal; }

        /* Heard-nodes list */
        .heard-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        /* Heard side panel: intro fixed at top, list scrolls, map pinned to
           the bottom so it's always visible regardless of list length. */
        #heard-view {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }
        #heard-view > div:first-child { flex: 0 0 auto; }
        #heard-view #heard-list-wrap {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
        }
        #heard-view #heard-map {
            flex: 0 0 240px;
        }
        .heard-row-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }
        .heard-acts { display: flex; gap: 4px; flex-shrink: 0; }
        .heard-act {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 5px;
            cursor: pointer;
        }
        .heard-act.add:hover  { color: #26c47c; border-color: #26c47c; }
        .heard-act.del:hover  { color: #e63946; border-color: #e63946; }
        .heard-act.gps:hover  { color: var(--accent); border-color: var(--accent); }
        #heard-map, #contact-map {
            height: 240px;
            margin-top: 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }
        /* Heard nodes blended into the contacts grid/list — same card/row
           markup, distinguished only by a different name colour. */
        .heard-name-color { color: var(--heard) !important; }
        .row-fav.heard-add-star { cursor: pointer; color: var(--heard); visibility: visible; }
        .row-fav.heard-add-star:hover { color: var(--accent); }
        .heard-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2px;
            padding: 6px 8px;
            background: rgba(255,255,255,0.025);
            border: 1px solid var(--border);
            border-radius: 5px;
        }
        .heard-row .heard-name { color: var(--text); font-weight: 600; font-size: 0.86rem; }
        .heard-row .heard-meta { display: flex; gap: 5px; flex-wrap: wrap; }
        .heard-chip {
            font-size: 0.66rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            background: var(--bg);
            color: var(--text);
            opacity: 0.85;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1px 6px;
        }
        .heard-pk {
            font-family: ui-monospace, "Cascadia Code", "Consolas", monospace;
            font-size: 0.72rem;
            color: var(--accent);
            opacity: 0.85;
            cursor: help;
            display: block;
            max-width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .heard-extra {
            display: flex;
            justify-content: space-between;
            font-size: 0.72rem;
            color: var(--text);
            opacity: 0.7;
        }

        /* Mini SNR sparkline on cards */
        .sparkline {
            display: block;
            width: 100%;
            height: 16px;
            margin-top: 4px;
            opacity: 0.9;
            border-top: 1px dashed var(--border);
            padding-top: 2px;
        }
        .sparkline:hover { opacity: 1; }

        /* Self / contact info side panel form styling */
        .self-section {
            font-size: 0.7rem;
            color: var(--accent);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom: 1px solid var(--accent);
            padding-bottom: 4px;
            margin-top: 8px;
        }
        .self-row {
            display: grid;
            grid-template-columns: 130px 1fr;
            gap: 8px;
            align-items: center;
            font-size: 0.82rem;
        }
        .self-row label {
            color: var(--text);
            opacity: 0.85;
        }
        .self-row input[type="text"],
        .self-row input[type="number"],
        .self-row select,
        .self-input-wrap input[type="text"],
        .self-input-wrap select {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 4px;
            padding: 4px 8px;
            font-family: inherit;
            font-size: 0.82rem;
            min-width: 0;
            width: 100%;
        }
        .self-row input[readonly] { opacity: 0.7; cursor: not-allowed; }
        .self-value {
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }
        .self-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 12px;
        }
        .self-grid-2 .self-row {
            grid-template-columns: 1fr;
            gap: 2px;
        }
        .self-grid-2 .self-row label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            opacity: 0.7;
        }
        .self-input-wrap {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .self-input-wrap input { flex: 1; }
        .self-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.78rem;
            font-family: inherit;
            white-space: nowrap;
        }
        .self-btn:hover { color: var(--accent); border-color: var(--accent); }
        .self-btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        .self-btn.primary:hover { opacity: 0.85; color: var(--bg); }
        .self-btn.danger:hover { color: #e63946; border-color: #e63946; }
        .self-btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
        /* Highlight inputs that a Save / Apply button will read or overwrite. */
        .preset-highlight {
            outline: 2px solid var(--accent);
            outline-offset: 1px;
            border-radius: 4px;
            transition: outline-color 0.12s;
        }
        .preset-highlight-label { color: var(--accent) !important; opacity: 1 !important; }

        /* Direct (1-hop) neighbour badge */
        .direct-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            background: rgba(38,196,124,0.14);
            color: #6cf2a8;
            border: 1px solid rgba(38,196,124,0.35);
            border-radius: 8px;
            padding: 0 5px;
            font-size: 0.6rem;
            line-height: 1.4;
            margin-left: 4px;
        }
        .msg-detail-row .lbl {
            font-size: 0.66rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
        }
        .msg-detail-row .val {
            font-size: 0.86rem;
            color: var(--text);
            word-break: break-word;
            font-family: ui-monospace, "Cascadia Code", "Consolas", monospace;
            white-space: pre-wrap;
        }
        .msg-detail-row .val.text { font-family: inherit; }

        /* ── Compose bar ───────────────────────────────────────────── */
        #compose-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px;
        }
        #compose-target {
            font-size: 0.82rem;
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            outline: none;
            flex-shrink: 0;
        }
        #compose-target:focus { border-color: var(--accent); }

        #compose-input {
            flex: 1;
            font-size: 0.88rem;
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            outline: none;
            min-width: 0;
        }
        #compose-input:focus { border-color: var(--accent); }

        #compose-send {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 5px 14px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            flex-shrink: 0;
            transition: opacity 0.15s;
        }
        #compose-send:disabled { opacity: 0.45; cursor: default; }
        #compose-send:not(:disabled):hover { opacity: 0.85; }

        #compose-status { font-size: 0.75rem; flex-shrink: 0; text-align: right; }
        #compose-status.ok  { color: var(--green); }
        #compose-status.err { color: var(--red); }

        /* Character counter — turns yellow ≤30, red ≤10 */
        #compose-counter {
            font-size: 0.75rem;
            color: var(--muted);
            font-variant-numeric: tabular-nums;
            min-width: 28px;
            text-align: right;
            user-select: none;
        }
        #compose-counter.warn { color: var(--yellow); }
        #compose-counter.low  { color: var(--red); font-weight: 600; }

        #compose-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            flex-shrink: 0;
        }

        #emoji-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 7px;
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        #emoji-btn:hover { background: var(--border); }

        #emoji-picker {
            display: none;
            position: absolute;
            bottom: calc(100% + 6px);
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 8px;
            z-index: 200;
            width: 340px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        #emoji-picker.open { display: block; }

        #emoji-picker-search {
            width: 100%;
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            outline: none;
            margin-bottom: 6px;
            box-sizing: border-box;
        }
        #emoji-picker-search:focus { border-color: var(--accent); }

        #emoji-scroll { max-height: 260px; overflow-y: auto; overflow-x: hidden; }
        #emoji-scroll::-webkit-scrollbar { width: 5px; }
        #emoji-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .emoji-category-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--muted);
            padding: 6px 2px 2px;
            grid-column: 1 / -1;
        }
        #emoji-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 1px; }
        .emoji-cell {
            font-size: 1.25rem;
            text-align: center;
            padding: 3px 1px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.1s;
            user-select: none;
            line-height: 1.5;
        }
        .emoji-cell:hover { background: var(--border); }

        /* Signal quality bar — compact for inline metric rows */
        .signal-wrap {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            min-width: 0;
        }
        .signal-wrap span { font-variant-numeric: tabular-nums; }
        .signal-bars { display: flex; align-items: flex-end; gap: 1px; height: 11px; flex-shrink: 0; }
        .signal-bars .bar { width: 3px; }
        .signal-wrap { gap: 5px; }
        .signal-bars .bar {
            width: 3px;
            border-radius: 1px;
            background: var(--border);
            transition: background 0.3s;
        }
        .signal-bars .bar.active.excellent { background: var(--green); }
        .signal-bars .bar.active.good      { background: var(--yellow); }
        .signal-bars .bar.active.poor      { background: var(--red); }
    </style>
</head>
<body>

    <header>
        <h1><span class="logo">MC</span> MeshCore Dashboard</h1>
        <div id="header-stats" title="Messages received today (since local midnight)"></div>
        <div style="display:flex;align-items:center;gap:10px">
            <div class="rx-toolbar">
                <button class="rx-tool-btn" onclick="_openSidePanel('stats')" title="Statistics — lifetime totals & leaderboards"><i class="fa-solid fa-ranking-star"></i></button>
                <button class="rx-tool-btn" onclick="_openSidePanel('firehose')" title="Live RF firehose (RX_LOG_DATA)"><i class="fa-solid fa-tower-broadcast"></i></button>
                <button class="rx-tool-btn" onclick="_openSidePanel('traffic')" title="Traffic stats by payload type"><i class="fa-solid fa-chart-column"></i></button>
                <button class="rx-tool-btn" onclick="_openSidePanel('heatmap')" title="24h packet rate heatmap"><i class="fa-solid fa-grip"></i></button>
                <button class="rx-tool-btn" onclick="_openSidePanel('channels')" title="Channel auto-discovery"><i class="fa-solid fa-hashtag"></i></button>
                <button class="rx-tool-btn" onclick="_openSidePanel('topology')" title="Mesh topology: all contacts + paths"><i class="fa-solid fa-sitemap"></i></button>
                <button class="rx-tool-btn" onclick="_openSidePanel('heard')" title="Heard nodes — adverts from nodes not in your contacts"><i class="fa-solid fa-satellite-dish"></i></button>
            </div>
            <span id="last-updated"></span>
            <button id="refresh-btn" onclick="loadData()">↻ Refresh</button>
        </div>
    </header>

    <div id="status-msg">Loading…</div>

    <div id="main-layout">
        <section id="self-section" style="display:none">
            <h2 class="section-title">Connected Node</h2>
            <div id="self-grid"></div>
        </section>

        <div id="layout-divider"></div>

        <section id="contacts-section" style="display:none">
            <div class="contacts-header">
                <h2 class="section-title">Contacts <span id="contacts-count"></span></h2>
                <div id="contacts-toolbar">
                    <div class="view-toggle" role="tablist" title="View mode">
                        <button id="view-cards" class="view-btn active" title="Card view"><i class="fa-solid fa-grip"></i></button>
                        <button id="view-list"  class="view-btn"        title="List view"><i class="fa-solid fa-list"></i></button>
                    </div>
                    <button id="view-type-1" class="view-btn" title="Show/hide Contacts (clients)"><i class="fa-solid fa-user"></i></button>
                    <button id="view-type-2" class="view-btn" title="Show/hide Repeaters"><i class="fa-solid fa-tower-broadcast"></i></button>
                    <button id="view-type-3" class="view-btn" title="Show/hide Room Servers"><i class="fa-solid fa-house-signal"></i></button>
                    <button id="view-heard" class="view-btn" title="Also show heard (non-contact) nodes"><i class="fa-solid fa-satellite-dish"></i></button>
                    <div class="search-wrap">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input id="filter-name" type="search" placeholder="Filter by name, type...">
                    </div>
                </div>
            </div>
            <div id="contacts-grid"></div>
            <div id="contacts-list" style="display:none"></div>
        </section>
    </div>

    <!-- ── Inbox history ─────────────────────────────────────── -->
    <div id="inbox-history-section">
        <div class="inbox-section-header">
            <h2>📨 Message Inbox</h2>
            <a id="inbox-log-link" href="#" target="_top" style="display:none">📋 View full log</a>
        </div>
        <div id="conv-banner" style="display:none">
            <span id="conv-banner-label"></span>
            <button id="conv-banner-exit" title="Back to all messages">✕ All messages</button>
        </div>
        <!-- filter / search -->
        <div id="inbox-filters">
            <div id="filter-rows">
                <div class="filter-row">
                    <span class="filter-label">Channel</span>
                    <div id="channel-chips"></div>
                </div>
            </div>
            <input id="inbox-search" type="search" placeholder="Search sender / text…" oninput="_onInboxSearch(this.value)">
        </div>
        <!-- compose bar -->
        <div id="compose-bar" style="position:relative">
            <select id="compose-target" title="Send to"></select>
            <input id="compose-input" type="text" placeholder="Type a message…"
                   oninput="_updateCharCounter(this.value)"
                   onkeydown="if(event.key==='Enter')_sendMessage()">
            <button id="emoji-btn" onclick="_toggleEmojiPicker(event)" title="Insert emoji">😊</button>
            <div id="emoji-picker">
                <input id="emoji-picker-search" type="search" placeholder="Search…" oninput="_filterEmoji(this.value)" autocomplete="off">
                <div id="emoji-scroll"><div id="emoji-grid"></div></div>
            </div>
            <div id="compose-actions">
                <span id="compose-counter" title="Characters remaining (MeshCore limit: 150)">150</span>
                <button id="compose-send" onclick="_sendMessage()">Send ✈</button>
                <span id="compose-status"></span>
            </div>
        </div>
        <div id="inbox-history">
            <div id="inbox-empty">No messages yet.</div>
        </div>
    </div>

    <script>
    // Inject Leaflet dynamically — Domoticz custom-template loading does not
    // execute <script src> tags reliably across browsers, so we create the
    // tag at runtime from this inline script (which is always executed).
    (function _loadLeaflet() {
        if (typeof L !== "undefined") return;
        if (!document.querySelector('link[data-leaflet]')) {
            const css = document.createElement("link");
            css.rel = "stylesheet";
            css.href = "/templates/leaflet/leaflet.css";
            css.setAttribute("data-leaflet", "1");
            document.head.appendChild(css);
        }
        if (!document.querySelector('script[data-leaflet]')) {
            // Domoticz's dashboard loads RequireJS, which defines window.define
            // with .amd. Leaflet's UMD wrapper detects AMD and registers as a
            // module instead of setting window.L. Hide window.define for the
            // duration of the script load so the UMD picks the globals path.
            const _define = window.define;
            window.define = undefined;
            const s = document.createElement("script");
            s.src = "/templates/leaflet/leaflet.js";
            s.setAttribute("data-leaflet", "1");
            s.onload = s.onerror = () => { window.define = _define; };
            document.head.appendChild(s);
        }
    })();
    (function () {
        // Metrics shown for the self (connected) node — in display order.
        // "key" matches the property names in meshcore_devices.json.
        const SELF_METRICS = [
            { key: "battery", label: "Battery", unit: "%", special: "battery" },
            { key: "battery_v", label: "Voltage", unit: "V" },
            { key: "rssi", label: "RSSI", unit: "dBm" },
            { key: "snr", label: "SNR", unit: "dB", special: "snr" },
            { key: "noise", label: "Noise Floor", unit: "dBm" },
            { key: "uptime", label: "Uptime", unit: "min", special: "uptime" },
            { key: "airtime", label: "TX Air", unit: "s" },
            { key: "pkts_sent", label: "Pkts Sent", unit: "" },
            { key: "pkts_recv", label: "Pkts Recv", unit: "" },
            { key: "last_seen", label: "Last Seen", unit: "" },
        ];

        // Metrics shown for remote contacts — only data available from contacts list / messages.
        const NODE_METRICS = [
            { key: "hops",      label: "Hops",      unit: ""   },
            { key: "snr",       label: "SNR",       unit: "dB", special: "snr" },
            // RSSI is hidden (empty) for normal contacts — no reliable value —
            // but heard nodes carry a real advert RSSI, so the row appears.
            { key: "rssi",      label: "RSSI",      unit: "dBm" },
            { key: "last_seen", label: "Last Seen", unit: ""   },
        ];

        // Tunable delays / timeouts referenced in multiple places.
        // PRESET_STEP_MS: gap between back-to-back !-commands when applying a
        //   preset. Each command is delivered via the Mesh Send device's
        //   sValue; the plugin reads sValue inside onDeviceModified, and if
        //   four writes land before any callback runs, only the last sValue
        //   is seen. The gap gives onDeviceModified time to consume each one.
        // PRESET_REFRESH_MS: how long to wait after the last command before
        //   re-fetching the device map so the self panel reflects the new
        //   radio state.
        // LEAFLET_POLL_*: poll cadence / timeout for the dynamically loaded
        //   Leaflet library (the map / topology panels).
        const PRESET_STEP_MS     = 600;
        const PRESET_REFRESH_MS  = 1500;
        const LEAFLET_POLL_MS    = 100;
        const LEAFLET_MAX_TRIES  = 50;

        // ── Device map (loaded from meshcore_devices.json) ───────────────────────────
        // {
        //   inbox, inbox_value, self, written_at,
        //   nodes: { nodeName: { status: {idx, value, online}, rssi: {idx, value}, ... } }
        // }
        let _deviceMap = null;

        async function _loadDeviceMap() {
            try {
                const r = await fetch("/templates/meshcore_devices.json?_=" + Date.now());
                if (r.ok) _deviceMap = await r.json();
            } catch (_) { }
        }

        // ── RX_LOG_DATA buffer (analyzer-style packet detail) ────────────────
        // Written by the plugin from EventType.RX_LOG_DATA push events.
        // Shape: { entries: [...], stats: {payload_type_counts, chan_hash_counts,
        //   signal_history, dup_floods, heatmap_24h}, known_channels: {...} }
        let _rxLog = { entries: [], stats: {} };
        let _rxLogLastSeen = 0;        // last entry _t seen by the firehose
        let _rxLogFirehosePaused = false;

        async function _loadRxLog() {
            try {
                const r = await fetch("/templates/meshcore_rx_log.json?_=" + Date.now());
                if (r.ok) _rxLog = await r.json();
            } catch (_) { }
        }

        // ── Persistent heard-nodes store ─────────────────────────────────────
        // Written by the plugin from RX_LOG ADVERT frames for nodes that are
        // NOT in our contacts. Shape: { nodes: { <pubkey>: {pubkey, name,
        // type, lat, lon, snr, rssi, path_len, first_heard, last_heard} } }
        let _heard = { nodes: {} };
        async function _loadHeard() {
            try {
                const r = await fetch("/templates/meshcore_heard.json?_=" + Date.now());
                if (r.ok) _heard = await r.json();
            } catch (_) { }
        }

        let _stats = null;
        async function _loadStats() {
            try {
                const r = await fetch("/templates/meshcore_stats.json?_=" + Date.now());
                if (r.ok) _stats = await r.json();
            } catch (_) { }
            _renderHeaderStats();
        }

        function _renderHeaderStats() {
            const el = document.getElementById("header-stats");
            if (!el) return;
            const t = (_stats && _stats.today) || {};
            const m = t.messages || 0, c = t.client || 0,
                  rp = t.repeater || 0, sv = t.server || 0;
            el.innerHTML =
                `<span class="hs-label">Today</span> `
              + `<span><i class="fa-solid fa-envelope"></i> <b>${m}</b> msgs</span>`
              + `<span class="hs-sep">·</span>`
              + `<span class="hs-client">Client <b>${c}</b></span>`
              + `<span class="hs-repeater">Repeater <b>${rp}</b></span>`
              + `<span class="hs-server">Server <b>${sv}</b></span>`;
        }

        function _statsLeaderboard(map, limit, cls) {
            const rows = Object.entries(map || {})
                .filter(([, c]) => c > 0)
                .sort((a, b) => b[1] - a[1])
                .slice(0, limit);
            if (!rows.length) return `<div class="dd-chart-unconfigured">No data yet.</div>`;
            const max = rows[0][1] || 1;
            return rows.map(([name, n]) => `
                <div class="lb-row">
                    <div class="lb-top"><span>${escHtml(name)}</span><span class="lb-count">${n}</span></div>
                    <div class="lb-bar"><div class="lb-fill ${cls}" style="width:${Math.max(2, Math.round(n / max * 100))}%"></div></div>
                </div>`).join("");
        }

        function _renderStatsPanel() {
            const view = document.getElementById("stats-view");
            if (!view) return;
            if (!_stats) {
                view.innerHTML = `<div class="dd-chart-unconfigured">Statistics not available yet.</div>`;
                return;
            }
            const s = _stats;
            const hr = s.hops_record || {};
            const hopsHtml = (hr.hops != null && hr.hops >= 0) ? `
                <div class="hops-rec">
                    <div class="hr-title">🏆 Hops record</div>
                    <div class="hr-line">
                        All-time max: <b>${hr.hops}</b> hops<br>
                        Name: <b>${escHtml(hr.name || "?")}</b><br>
                        Date: <b>${escHtml(hr.date || "?")}</b><br>
                        Channel: <b>${escHtml(hr.channel || "?")}</b>
                    </div>
                </div>` : "";
            view.innerHTML = `
                <div class="self-section">Totals</div>
                <div class="stats-tot">
                    Adverts: <b class="st-adv">${s.adverts_total || 0}</b>
                    &nbsp;|&nbsp;
                    Messages: <b class="st-msg">${s.messages_total || 0}</b>
                </div>
                <div class="stats-cards">
                    <div class="stats-card"><div class="sc-label">Client</div>
                        <div class="sc-value">${s.client_total || 0}</div></div>
                    <div class="stats-card"><div class="sc-label">Repeater</div>
                        <div class="sc-value">${s.repeater_total || 0}</div></div>
                    <div class="stats-card"><div class="sc-label">Server</div>
                        <div class="sc-value">${s.server_total || 0}</div></div>
                </div>

                <div class="self-section">Top message senders</div>
                ${_statsLeaderboard(s.msg_by_sender, 30, "")}

                ${hopsHtml}

                <div class="self-section">Top advert senders</div>
                ${_statsLeaderboard(s.adv_by_sender, 15, "adv")}
            `;
        }

        // Heuristic: match an inbox message to an RX log entry.
        // We have message text, channel and approximate time; the RX log entry
        // has snr/rssi/recv_time + raw header fields. Match by:
        //   1) exact text inside entry.message  (best signal)
        //   2) same channel hash (chan_hash matches the channel index name hash)
        //   3) recv_time within ±10s of the inbox-reported time
        function _findRxEntryForMsg(msgObj) {
            if (!_rxLog || !Array.isArray(_rxLog.entries)) return null;
            const wantText = (msgObj.text || "").trim();
            const wantTs   = msgObj.ts ? msgObj.ts : 0;
            let best = null, bestScore = -1;
            for (const e of _rxLog.entries) {
                let score = 0;
                const msg = (e.message || "").trim();
                if (wantText && msg && msg.indexOf(wantText) !== -1) score += 10;
                if (wantText && msg === wantText) score += 5;
                if (wantTs && e.recv_time) {
                    const dt = Math.abs((e.recv_time - wantTs));
                    if (dt < 5)  score += 4;
                    else if (dt < 15) score += 2;
                }
                if (msgObj.isSent && (e.payload_typename === "TEXT_MSG" || e.payload_typename === "GRP_TXT")) score += 1;
                if (score > bestScore) { bestScore = score; best = e; }
            }
            return bestScore >= 5 ? best : null;
        }

        function deviceUrl(idx) {
            if (!idx) return "#";
            return `/index.html#/Devices/${idx}/Log`;
        }

        // Fetch all devices and return a byIdx lookup keyed on Domoticz idx.
        async function fetchDevices() {
            const resp = await fetch("/json.htm?type=command&param=getdevices&order=Name");
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            const all = data.result || [];
            const byIdx = {};
            for (const d of all) byIdx[d.idx] = d;
            return { all, byIdx };
        }

        function battClass(pct) {
            if (pct >= 60) return "high";
            if (pct >= 25) return "medium";
            return "low";
        }

        function renderBatteryHtml(pct, idx) {
            const cls = battClass(pct);
            return `
        <a href="${deviceUrl(idx)}" target="_top" title="View battery detail">
          <div class="metric-label">Battery</div>
          <div class="metric-value">
            <div class="batt-wrap">
              <span>${pct}%</span>
              <div class="batt-bar-bg">
                <div class="batt-bar-fill ${cls}" style="width:${pct}%"></div>
              </div>
            </div>
          </div>
        </a>`;
        }

        function _snrQuality(snr) {
            if (snr >= 7)  return { level: 4, cls: "excellent", label: "Excellent" };
            if (snr >= 3)  return { level: 3, cls: "excellent", label: "Good" };
            if (snr >= 0)  return { level: 2, cls: "good",      label: "Fair" };
            if (snr >= -5) return { level: 1, cls: "poor",      label: "Poor" };
            return                { level: 0, cls: "poor",      label: "Very Poor" };
        }

        function renderSnrHtml(snr, idx) {
            const q = _snrQuality(snr);
            const heights = [4, 7, 10, 14];
            const bars = heights.map((h, i) =>
                `<div class="bar${i < q.level ? ` active ${q.cls}` : ""}" style="height:${h}px"></div>`
            ).join("");
            const inner = `
              <div class="metric-label">SNR</div>
              <div class="metric-value">
                <div class="signal-wrap">
                  <div class="signal-bars">${bars}</div>
                  <span>${snr} dB</span>
                </div>
              </div>`;
            return idx
                ? `<a href="${deviceUrl(idx)}" target="_top" title="${q.label}">${inner}</a>`
                : inner;
        }

        function _formatUptime(rawMinutes) {
            const m = parseFloat(rawMinutes);
            if (isNaN(m) || m < 0) return null;
            const totalMin = Math.round(m);
            const days  = Math.floor(totalMin / 1440);
            const hours = Math.floor((totalMin % 1440) / 60);
            const mins  = totalMin % 60;
            const parts = [];
            if (days  > 0) parts.push(`${days}d`);
            if (hours > 0) parts.push(`${hours}h`);
            parts.push(`${mins}m`);
            return parts.join(" ");
        }

        function renderMetricHtml(label, value, unit, idx) {
            const display = value !== undefined && value !== null && value !== ""
                ? `${value}${unit ? " " + unit : ""}`
                : "—";
            const cls = display === "—" ? " na" : "";
            const inner = `<div class="metric-label">${label}</div><div class="metric-value${cls}">${display}</div>`;
            return idx
                ? `<a href="${deviceUrl(idx)}" target="_top" title="View ${label} detail">${inner}</a>`
                : inner;
        }

        // A node's advert carries a timestamp set by the advertising node's
        // own RTC. We display OUR local receive time as "Last Seen" (slots
        // .last_seen), but if the node-reported advert time (slots.last_advert)
        // drifts from our receive time by more than this, the node's clock is
        // wrong — flag it red with a tooltip showing both times.
        const CLOCK_WRONG_TOLERANCE_S = 3600;   // 1 hour

        function _clockSkew(slots) {
            const nodeAdv = Number(slots && slots.last_advert) || 0;
            if (!nodeAdv) return { wrong: false, tip: "" };
            // Our local receive time of the latest advert == last_seen.
            let oursSec = 0;
            const lsRaw = _slotValue(slots.last_seen);
            if (lsRaw) {
                const d = new Date(String(lsRaw).replace(" ", "T"));
                if (!isNaN(d.getTime())) oursSec = Math.floor(d.getTime() / 1000);
            }
            if (!oursSec) oursSec = Math.floor(Date.now() / 1000);
            if (Math.abs(nodeAdv - oursSec) <= CLOCK_WRONG_TOLERANCE_S) {
