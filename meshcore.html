                    <span class="lbl">${escHtml(lbl)}</span>
                    <span class="val ${cls}">${escHtml(val)}</span>
                </div>`
            ).join("") +
            (analyzerRows.length ? `<div class="msg-detail-section">RX log (on-air)</div>` +
                analyzerRows.map(([lbl, val, cls]) =>
                    `<div class="msg-detail-row">
                        <span class="lbl">${escHtml(lbl)}</span>
                        <span class="val ${cls || ""}">${escHtml(val)}</span>
                    </div>`
                ).join("") : "") +
            (dupRows.length ? `<div class="msg-detail-section">Duplicate paths heard</div>` +
                dupRows.map(([lbl, val]) =>
                    `<div class="msg-detail-row">
                        <span class="lbl">${escHtml(lbl)}</span>
                        <span class="val">${escHtml(val)}</span>
                    </div>`
                ).join("") : "") +
            (ackRows.length ? `<div class="msg-detail-section">Acknowledgement</div>` +
                ackRows.map(([lbl, val]) =>
                    `<div class="msg-detail-row">
                        <span class="lbl">${escHtml(lbl)}</span>
                        <span class="val">${escHtml(val)}</span>
                    </div>`
                ).join("") : "") +
            (rxEntry ? "" : `
                <div style="font-size:0.72rem;color:var(--muted);font-style:italic;padding-top:4px">
                    No matching RX_LOG_DATA entry found for this message. (Outgoing
                    messages, very old messages, or text that doesn't match any
                    recent on-air frame won't be enriched.)
                </div>`) + `</div>`;
            // Replace the map canvas with our content; we'll restore it on map-open.
            body.dataset.previousContent = body.dataset.previousContent || "1";
            body.innerHTML = html;

            panel.classList.add("open");
            backdrop.classList.add("open");
            panel.setAttribute("aria-hidden", "false");
        }

        // ── Generic RX-log side-panel views ─────────────────────────────────
        // The map panel side-drawer is reused for all of these: firehose,
        // traffic, channels, heatmap. We track which view is open so the
        // 3s _loadRxLog interval can re-render only the active one.
        let _sidePanelView = null;  // null | 'firehose' | 'traffic' | 'channels' | 'heatmap' | 'msg'

        function _openSidePanel(view) {
            const panel    = document.getElementById("map-panel");
            const backdrop = document.getElementById("map-backdrop");
            const title    = document.getElementById("map-panel-title");
            const coords   = document.getElementById("map-panel-coords");
            const body     = document.getElementById("map-panel-body");
            const ext      = document.getElementById("map-panel-external");
            const footer   = document.getElementById("map-panel-footer");
            if (!panel || !body) return;
            ext.style.display = "none";
            // Hide the "Powered by Leaflet · OpenStreetMap" footer when we're
            // not showing a map-based view.
            if (footer) footer.style.display = (view === "map" || view === "topology") ? "" : "none";
            // Mark toolbar button active
            document.querySelectorAll(".rx-tool-btn").forEach(b => b.classList.remove("active"));
            _sidePanelView = view;
            // Kick a fresh fetch so the panel shows live data immediately instead
            // of waiting for the next 3 s interval tick.
            _loadRxLog().then(() => {
                if (view === "firehose") _renderFirehoseIfOpen();
                if (view === "traffic")  _renderTrafficIfOpen();
                if (view === "channels") _renderChannelsIfOpen();
                if (view === "heatmap")  _renderHeatmapIfOpen();
            });
            if (view === "heard") _loadHeard().then(_renderHeardIfOpen);
            if (view === "firehose") {
                title.textContent  = "RF firehose";
                coords.textContent = "Every RX_LOG_DATA frame, live";
                body.innerHTML = `
                    <div class="panel-view" id="firehose-view">
                        <div class="firehose-controls">
                            <button id="firehose-legend" title="What do these columns mean?"><i class="fa-solid fa-circle-info"></i></button>
                            <div style="display:flex;gap:6px">
                                <button id="firehose-pause">Pause</button>
                                <button id="firehose-clear">Clear view</button>
                            </div>
                        </div>
                        <div id="firehose-legend-pop" style="display:none"></div>
                        <div class="firehose-row firehose-head">
                            <span>Time</span>
                            <span>Type</span>
                            <span>Hops</span>
                            <span>SNR/RSSI · Text or raw bytes</span>
                        </div>
                        <div id="firehose-list" style="font-family: ui-monospace, monospace;"></div>
                    </div>`;
                document.getElementById("firehose-pause").onclick = _toggleFirehosePause;
                document.getElementById("firehose-clear").onclick = () => {
                    _rxLogLastSeen = (_rxLog.entries.length ? _rxLog.entries[_rxLog.entries.length - 1]._t : 0);
                    document.getElementById("firehose-list").innerHTML = "";
                };
                document.getElementById("firehose-legend").onclick = _toggleFirehoseLegend;
                _rxLogLastSeen = 0;
                _renderFirehoseIfOpen();
            } else if (view === "traffic") {
                title.textContent  = "Traffic by payload type";
                coords.textContent = "Cumulative since plugin start";
                body.innerHTML = `<div class="panel-view" id="traffic-view"></div>`;
                _renderTrafficIfOpen();
            } else if (view === "channels") {
                title.textContent  = "Channel discovery";
                coords.textContent = "Known + unknown chan_hashes heard";
                body.innerHTML = `<div class="panel-view" id="channels-view"></div>`;
                _renderChannelsIfOpen();
            } else if (view === "heatmap") {
                title.textContent  = "Packet rate (24h)";
                coords.textContent = "Hour-of-day bucket counts";
                body.innerHTML = `<div class="panel-view" id="heatmap-view"></div>`;
                _renderHeatmapIfOpen();
            } else if (view === "topology") {
                title.textContent  = "Mesh topology";
                coords.textContent = "All contacts with a known location";
                // Use the map canvas Leaflet already knows about; restore it
                // so Leaflet can attach.
                _ensureMapCanvas();
                _renderTopology();
            } else if (view === "heard") {
                title.textContent  = "Heard nodes";
                coords.textContent = "Adverts from nodes not in your contacts";
                body.innerHTML = `<div class="panel-view" id="heard-view"></div>`;
                _renderHeardIfOpen();
            } else if (view === "stats") {
                title.textContent  = "Statistics";
                coords.textContent = "Lifetime totals & leaderboards";
                body.innerHTML = `<div class="panel-view" id="stats-view"></div>`;
                _loadStats().then(_renderStatsPanel);
            } else if (view === "self") {
                title.textContent  = "Connected node";
                coords.textContent = "Identity, radio, advert, telemetry";
                body.innerHTML = `<div class="panel-view" id="self-view"></div>`;
                _renderSelfPanel();
            } else if (view && view.startsWith("contact:")) {
                const name = view.slice("contact:".length);
                title.textContent  = name;
                coords.textContent = "Remote queries";
                body.innerHTML = `<div class="panel-view" id="contact-view" data-node="${escHtml(name)}"></div>`;
                _renderContactPanel(name);
            }
            panel.classList.add("open");
            backdrop.classList.add("open");
            panel.setAttribute("aria-hidden", "false");
        }

        // Track which view is currently in the panel so renderers can no-op
        // when their tab isn't open.
        function _isOpen(view)  { return _sidePanelView === view && document.getElementById("map-panel").classList.contains("open"); }
        function _toggleFirehosePause() {
            _rxLogFirehosePaused = !_rxLogFirehosePaused;
            const btn = document.getElementById("firehose-pause");
            if (btn) {
                btn.textContent = _rxLogFirehosePaused ? "Resume" : "Pause";
                btn.classList.toggle("active", _rxLogFirehosePaused);
            }
        }

        function _toggleFirehoseLegend() {
            const pop = document.getElementById("firehose-legend-pop");
            if (!pop) return;
            if (pop.style.display === "none") {
                pop.innerHTML = `
                  <div style="font-size:0.78rem;line-height:1.5;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 10px;">
                    <div style="color:var(--accent);font-weight:600;margin-bottom:4px">Column legend</div>
                    <div><strong>Time</strong> — when this packet was heard (local time).</div>
                    <div><strong>Type</strong> — payload type:
                        <span style="color:var(--accent)">TEXT_MSG</span> (DM),
                        <span style="color:#f9c74f">GRP_TXT</span> (channel),
                        <span style="color:#a0c4ff">ADVERT</span> (node beacon),
                        <span style="opacity:.85">RESPONSE</span> (ACK/reply),
                        REQ / ANON_REQ (queries).</div>
                    <div><strong>Nh</strong> — how many hops the packet has already traversed in the mesh (e.g. <code>6h</code> = 6 repeaters).</div>
                    <div><strong>SNR / RSSI</strong> — the signal we received this copy with. SNR is in dB (higher = cleaner), RSSI is in dBm (less negative = stronger).</div>
                    <div><strong>Text / raw bytes</strong> — the decoded message if we have the key, otherwise the start of the raw on-air frame (ciphertext for encrypted payloads).</div>
                  </div>`;
                pop.style.display = "";
            } else {
                pop.style.display = "none";
            }
        }

        function _renderFirehoseIfOpen() {
            if (!_isOpen("firehose") || _rxLogFirehosePaused) return;
            const list = document.getElementById("firehose-list");
            if (!list) return;
            const entries = (_rxLog && _rxLog.entries) || [];
            // Append only what is newer than the last cursor. The plugin
            // stores entries oldest-first; we render newest-first so the
            // initial dump and incremental appends both put the freshest
            // packet at the top of the list.
            const fresh = entries.filter(e => (e._t || 0) > _rxLogLastSeen);
            if (!fresh.length) return;
            _rxLogLastSeen = fresh[fresh.length - 1]._t || _rxLogLastSeen;
            fresh.reverse();
            // Keep most recent 200 in DOM
            const ADV_TYPE_NAME = { 1: "Contact", 2: "Repeater", 3: "Room Server", 4: "Sensor" };
            const rowsHtml = fresh.map(e => {
                const ts = e._t ? new Date(e._t * 1000).toLocaleTimeString() : "?";
                const pt = e.payload_typename || "?";
                const cls = ({
                    TEXT_MSG: "text", GRP_TXT: "group",
                    ADVERT: "advert", RESPONSE: "response",
                })[pt] || "";
                const sig = `${e.snr ?? "?"}/${e.rssi ?? "?"}`;
                const hops = e.path_len !== undefined ? `${e.path_len}h` : "";

                // What to show in the visible message column. For ADVERT we have a
                // parsed adv_name + location — far more useful than the raw hex.
                // For GRP_TXT the firmware tells us the channel name. For TEXT_MSG
                // the body is encrypted, so we keep the raw bytes preview.
                let msg;
                if (pt === "ADVERT" && e.adv_name) {
                    const loc = (e.adv_lat && e.adv_lon) ? `  @${e.adv_lat.toFixed(4)},${e.adv_lon.toFixed(4)}` : "";
                    const kind = ADV_TYPE_NAME[e.adv_type] || `type ${e.adv_type ?? "?"}`;
                    msg = `${e.adv_name}  (${kind})${loc}`;
                } else if (pt === "GRP_TXT" && e.chan_name) {
                    msg = `${e.chan_name}   (ciphertext: ${(e.crypted || e.raw_hex || "").slice(0, 24)}…)`;
                } else if (e.message) {
                    msg = e.message.slice(0, 80);
                } else {
                    msg = e.raw_hex ? e.raw_hex.slice(0, 30) + "…" : "";
                }

                // Build the per-row tooltip from every field we have. Advert
                // packets get a richer block (name / type / pubkey / lat-lon /
                // flags / timestamp).
                const tipLines = [
                    `Time:        ${ts}`,
                    `Type:        ${pt}`,
                    `Route:       ${e.route_typename || "?"}`,
                    `Hops:        ${e.path_len ?? "?"}`,
                    `SNR:         ${e.snr ?? "?"} dB`,
                    `RSSI:        ${e.rssi ?? "?"} dBm`,
                    e.transport_code ? `Transport:   ${e.transport_code}` : "",
                    e.path ?           `Path hashes: ${e.path}` : "",
                ];
                if (pt === "ADVERT") {
                    if (e.adv_name)       tipLines.push(`Name:        ${e.adv_name}`);
                    if (e.adv_type !== undefined) tipLines.push(`Adv type:    ${e.adv_type} (${ADV_TYPE_NAME[e.adv_type] || "?"})`);
                    if (e.adv_flags !== undefined) tipLines.push(`Adv flags:   0x${e.adv_flags.toString(16)}`);
                    if (e.adv_lat && e.adv_lon) tipLines.push(`Location:    ${e.adv_lat}, ${e.adv_lon}`);
                    if (e.adv_timestamp) tipLines.push(`Adv ts:      ${new Date(e.adv_timestamp * 1000).toLocaleString()}`);
                    if (e.adv_key)       tipLines.push(`Public key:  ${e.adv_key}`);
                    if (e.signature)     tipLines.push(`Signature:   ${e.signature.slice(0, 32)}…`);
                }
                if (e.chan_hash) tipLines.push(`Chan hash:   0x${e.chan_hash}${e.chan_name ? " (" + e.chan_name + ")" : ""}`);
                if (e.cipher_mac) tipLines.push(`Cipher MAC:  ${e.cipher_mac}`);
                if (e.message)    tipLines.push(`Text:        ${e.message}`);
                if (e.raw_hex)    tipLines.push(`Raw hex:     ${e.raw_hex.slice(0, 80)}${e.raw_hex.length > 80 ? "…" : ""}`);
                const tip = tipLines.filter(Boolean).join("\n");

                return `<div class="firehose-row ${cls}" data-tip="1" title="${escHtml(tip)}">
                    <span class="t">${ts}</span>
                    <span class="pt">${pt}</span>
                    <span>${hops}</span>
                    <span class="msg">${escHtml(sig)} · ${escHtml(msg)}</span>
                </div>`;
            }).join("");
            list.insertAdjacentHTML("afterbegin", rowsHtml);
            // Trim
            while (list.children.length > 200) list.removeChild(list.lastChild);
        }

        function _renderTrafficIfOpen() {
            if (!_isOpen("traffic")) return;
            const view = document.getElementById("traffic-view");
            if (!view) return;
            const counts = (_rxLog.stats && _rxLog.stats.payload_type_counts) || {};
            const pairs = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            if (!pairs.length) {
                view.innerHTML = `<div style="color:var(--muted)">No packets seen yet.</div>`;
                return;
            }
            const max = Math.max(...pairs.map(p => p[1]));
            const head = `<div class="bar-row" style="color:var(--accent);font-weight:600;text-transform:uppercase;font-size:0.65rem;letter-spacing:0.05em;border-bottom:1px solid var(--accent);padding-bottom:4px">
                <span>Payload type</span><span></span><span style="text-align:right">Count</span>
            </div>`;
            view.innerHTML = head + pairs.map(([name, n]) => {
                const pct = max ? Math.round(100 * n / max) : 0;
                return `<div class="bar-row">
                    <span>${escHtml(name)}</span>
                    <div class="bar-bar"><span style="width:${pct}%"></span></div>
                    <span class="bar-count">${n}</span>
                </div>`;
            }).join("");
        }

        function _renderChannelsIfOpen() {
            if (!_isOpen("channels")) return;
            const view = document.getElementById("channels-view");
            if (!view) return;
            const counts = (_rxLog.stats && _rxLog.stats.chan_hash_counts) || {};
            // Try to build a hash → channel-name map from recent entries
            // (the firmware tags each GRP_TXT entry with chan_name when we
            // have its key, which lets us resolve hashes to readable names).
            const hashToName = {};
            for (const e of (_rxLog.entries || [])) {
                if (e.chan_hash && e.chan_name) hashToName[e.chan_hash] = e.chan_name;
            }

            // Device-side channel slots (firmware supports up to 40).
            // If the plugin hasn't sent the slot table yet, fall back to
            // synthesising it from the legacy {idx: name} known-channels map.
            const MAX_SLOTS = 40;
            let slots = (_deviceMap && _deviceMap.channel_slots) || null;
            if (!slots) {
                const known = (_rxLog.known_channels) || _channelNames || {};
                slots = [];
                for (let i = 0; i < MAX_SLOTS; i++) slots.push({ idx: i, name: known[String(i)] || "" });
            }
            const slotRows = slots.map(s => {
                const empty = !s.name;
                const nameHtml = empty
                    ? `<span class="name" style="font-style:italic;opacity:.7">(empty)</span>`
                    : `<span class="name" style="color:var(--text)">${escHtml(s.name)}</span>`;
                const btn = empty
                    ? `<button class="chan-slot-btn add"   data-slot="${s.idx}" title="Add a channel to this slot"><i class="fa-solid fa-plus"></i> Add</button>`
                    : `<button class="chan-slot-btn clear" data-slot="${s.idx}" title="Wipe this slot"><i class="fa-solid fa-trash"></i> Remove</button>`;
                return `<div class="chan-slot-row">
                    <span class="slot-idx">${s.idx}</span>
                    ${nameHtml}
                    ${btn}
                </div>`;
            }).join("");

            // Hashes heard on air (with packet counts)
            const pairs = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            const hashRows = pairs.map(([h, n]) => {
                const name = hashToName[h] || "(unknown — no key)";
                const isKnown = !!hashToName[h];
                return `<div class="chan-row${isKnown ? " known" : ""}">
                    <span class="chash">0x${escHtml(h)}</span>
                    <span class="name">${escHtml(name)}</span>
                    <span class="cnt">${n}</span>
                </div>`;
            }).join("");

            view.innerHTML = `
                <div style="font-size:0.78rem;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--accent);padding-bottom:4px">
                    Channel slots (${slots.filter(s => s.name).length} / ${slots.length})
                </div>
                <div style="font-size:0.78rem;color:var(--text);opacity:0.85;line-height:1.5">
                    Slots on this device — fill an empty one to subscribe.
                    Public-style names that start with <code>#</code>
                    auto-derive their key from the name; private channels need
                    a 16-byte secret too.
                </div>
                <div id="chan-slots-list">${slotRows}</div>
                <div style="font-size:0.78rem;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--accent);padding-bottom:4px;margin-top:6px">
                    Hashes heard on air
                </div>
                <div style="font-size:0.78rem;color:var(--text);opacity:0.85;line-height:1.5">
                    Each row is a channel hash heard over the radio. Unknown
                    rows are channels we have no key for — knowing the hash
                    alone isn't enough to subscribe, you need the name (and
                    secret for private channels).
                </div>
                ${hashRows ? `
                    <div class="chan-row" style="color:var(--accent);font-weight:600;text-transform:uppercase;font-size:0.65rem;letter-spacing:0.05em;border-bottom:1px solid var(--accent)">
                        <span title="MeshCore hashes a channel's name to a single byte; the firmware uses this hash to route encrypted group traffic. We see it on every GRP_TXT packet.">Chan hash</span>
                        <span>Name</span>
                        <span style="text-align:right">Pkts</span>
                    </div>${hashRows}` : `<div style="color:var(--text);opacity:.7;padding-top:8px">No grouped traffic heard yet.</div>`}`;

            // Wire up slot Add/Remove buttons
            view.querySelectorAll(".chan-slot-btn.add").forEach(btn => {
                btn.onclick = () => _addChannelSlot(parseInt(btn.dataset.slot, 10));
            });
            view.querySelectorAll(".chan-slot-btn.clear").forEach(btn => {
                btn.onclick = () => _clearChannelSlot(parseInt(btn.dataset.slot, 10), btn);
            });
        }

        async function _addChannelSlot(slot) {
            const sendIdx = _deviceMap && _deviceMap.send_idx;
            if (!sendIdx) { alert("Cannot add: Mesh Send device not found."); return; }
            const name = prompt(
                `Add channel to slot ${slot}.\n\n` +
                `Enter the channel name (e.g. "#mc-radar" or "#nl").\n\n` +
                `Names starting with # auto-derive the key from the name.\n` +
                `For a private channel, append a space and the 32-hex-char secret.\n\n` +
                `Examples:\n` +
                `  #nl\n` +
                `  MyPrivateRoom 0123456789abcdef0123456789abcdef`, ""
            );
            if (!name) return;
            const cmd = `!set_channel ${slot} ${name}`;
            try {
                const url = `/json.htm?type=command&param=udevice&idx=${sendIdx}&nvalue=0&svalue=${encodeURIComponent(cmd)}`;
                const r = await fetch(url, { method: "GET" });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                await _refreshChannelsAndCompose();
                _renderChannelsIfOpen();
            } catch (err) {
                alert(`Failed to add channel: ${err.message}`);
            }
        }

        async function _clearChannelSlot(slot, btn) {
            if (!confirm(`Wipe channel slot ${slot}?\n\nYou can re-add the channel later by name.`)) return;
            const sendIdx = _deviceMap && _deviceMap.send_idx;
            if (!sendIdx) { alert("Cannot clear: Mesh Send device not found."); return; }
            try {
                const url = `/json.htm?type=command&param=udevice&idx=${sendIdx}&nvalue=0&svalue=${encodeURIComponent("!clear_channel " + slot)}`;
                const r = await fetch(url, { method: "GET" });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                await _refreshChannelsAndCompose();
                _renderChannelsIfOpen();
            } catch (err) {
                alert(`Failed to clear channel: ${err.message}`);
            }
        }

        // After a channel slot is added/removed, reload everything that
        // depends on the channel name table: the device map (which holds the
        // slot list), meshcore_channels.json (which feeds the compose-bar
        // channel dropdown) AND the inbox channel-filter chip row above the
        // inbox (so a freshly-added channel appears as a filter immediately).
        async function _refreshChannelsAndCompose() {
            await Promise.all([_loadDeviceMap(), _loadChannelNames()]);
            _populateComposeTargets();
            try { _renderChannelChips(_allChannelChips()); } catch (_) { /* before inbox render */ }
        }

        // Heard-nodes panel. Backed by the plugin's persistent
        // meshcore_heard.json (survives restarts), not the rolling RX log.
        const _HEARD_ADV_TYPE = { 1: "Contact", 2: "Repeater", 3: "Room Server", 4: "Sensor" };
        let _heardMap = null;          // Leaflet instance for the bottom map
        let _heardMapPk = null;        // pubkey currently shown on the map
        let _contactMap = null;        // Leaflet instance for the contact panel

        function _heardList() {
            // Defensive: hide anything that's already a contact.
            const knownPks = new Set();
            for (const n of Object.values((_deviceMap && _deviceMap.nodes) || {})) {
                if (n.pubkey) knownPks.add(n.pubkey);
            }
            return Object.values((_heard && _heard.nodes) || {})
                .filter(h => h.pubkey && !knownPks.has(h.pubkey))
                .sort((a, b) => (b.last_heard || 0) - (a.last_heard || 0));
        }

        function _renderHeardIfOpen() {
            if (!_isOpen("heard")) return;
            const view = document.getElementById("heard-view");
            if (!view) return;

            // Build the shell ONCE per panel open. The 3 s refresh only
            // rewrites #heard-list-wrap — the #heard-map element is left
            // untouched so its Leaflet instance stays bound to a live DOM
            // node (rebuilding it every tick made the map flash and die).
            let listWrap = document.getElementById("heard-list-wrap");
            if (!listWrap) {
                // Fresh shell — any prior Leaflet instance is now orphaned.
                if (_heardMap) { try { _heardMap.remove(); } catch (_) {} _heardMap = null; }
                view.innerHTML = `
                    <div style="font-size:0.82rem;color:var(--text);opacity:0.85;line-height:1.5">
                        Nodes heard over the air whose pubkey isn't in your
                        contacts. This list is persistent. Use
                        <i class="fa-solid fa-user-plus"></i> to add a node to
                        your contacts, <i class="fa-solid fa-trash"></i> to drop
                        it from this list, or
                        <i class="fa-solid fa-location-dot"></i> to show its
                        position on the map below.
                    </div>
                    <div id="heard-list-wrap"></div>
                    <div id="heard-map" style="display:none"></div>`;
                listWrap = document.getElementById("heard-list-wrap");
            }

            const list = _heardList();
            if (!list.length) {
                listWrap.innerHTML = `<div style="color:var(--text);opacity:.7;padding-top:10px">
                    Nothing heard yet — wait for repeaters to beacon.</div>`;
            } else {
                listWrap.innerHTML = `<div class="heard-list">` + list.map(h => {
                    const pk   = h.pubkey;
                    const t    = h.last_heard ? new Date(h.last_heard * 1000).toLocaleString() : "?";
                    const sig  = `${h.snr ?? "?"}/${h.rssi ?? "?"}`;
                    const kind = _HEARD_ADV_TYPE[h.type] || "?";
                    const hops = (h.path_len !== undefined && h.path_len >= 0) ? `${h.path_len}h` : "?";
                    let skewWrong = false, skewTip = "";
                    if (h.node_ts && h.last_heard
                        && Math.abs(h.node_ts - h.last_heard) > CLOCK_WRONG_TOLERANCE_S) {
                        skewWrong = true;
                        skewTip = `Node clock looks wrong (off by >1h).  `
                                + `Node-reported advert time: ${new Date(h.node_ts * 1000).toLocaleString()}  |  `
                                + `We last heard it: ${new Date(h.last_heard * 1000).toLocaleString()}`;
                    }
                    const hasLoc = !!(h.lat || h.lon);
                    const gpsBtn = hasLoc
                        ? `<button class="heard-act gps" data-pk="${escHtml(pk)}" title="Show on map (${h.lat}, ${h.lon})"><i class="fa-solid fa-location-dot"></i></button>`
                        : "";
                    return `<div class="heard-row">
                        <div class="heard-row-top">
                            <div class="heard-name">${escHtml(h.name || "(unnamed)")}</div>
                            <div class="heard-acts">
                                ${gpsBtn}
                                <button class="heard-act add" data-pk="${escHtml(pk)}" data-name="${escHtml(h.name || "")}" title="Add to contacts"><i class="fa-solid fa-user-plus"></i></button>
                                <button class="heard-act del" data-pk="${escHtml(pk)}" title="Delete from heard list"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                        <div class="heard-meta">
                            <span class="heard-chip">${escHtml(kind)}</span>
                            <span class="heard-chip">${hops}</span>
                            <span class="heard-chip">${escHtml(sig)} dB/dBm</span>
                        </div>
                        <div class="heard-pk" title="${escHtml(pk)}">${escHtml(pk)}</div>
                        <div class="heard-extra${skewWrong ? " clock-wrong" : ""}"><span title="${skewWrong ? escHtml(skewTip) : "Last heard at"}">${escHtml(t)}</span></div>
                    </div>`;
                }).join("") + `</div>`;

                listWrap.querySelectorAll(".heard-act.add").forEach(b =>
                    b.onclick = () => _heardAdd(b.dataset.pk, b.dataset.name));
                listWrap.querySelectorAll(".heard-act.del").forEach(b =>
                    b.onclick = () => _heardDelete(b.dataset.pk));
                listWrap.querySelectorAll(".heard-act.gps").forEach(b =>
                    b.onclick = () => _heardToggleMap(b.dataset.pk));
            }

            // Keep an open map visible if its node is still present.
            // force=false → don't reset the user's zoom/pan on refresh.
            if (_heardMapPk && list.some(h => h.pubkey === _heardMapPk)) {
                _heardShowMap(_heardMapPk, false);
            } else if (_heardMapPk) {
                _heardMapPk = null;
                const el = document.getElementById("heard-map");
                if (el) el.style.display = "none";
            }
        }

        async function _heardAdd(pk, name) {
            if (!confirm(`Add "${name || pk.slice(0,12)}" to your contacts?`)) return;
            // Optimistic: drop locally so it disappears immediately.
            if (_heard.nodes) delete _heard.nodes[pk];
            if (_heardMapPk === pk) _heardToggleMap(pk);
            _renderHeardIfOpen();
            if (_includeHeard) _rerenderContacts();
            await _sendDeviceCmd(`!heard_add ${pk}`);
            // Refresh contacts/map shortly so the new contact card shows up.
            setTimeout(() => {
                _loadDeviceMap();
                _loadHeard().then(() => { _renderHeardIfOpen(); _rerenderContacts(); });
            }, 2500);
        }

        async function _heardDelete(pk) {
            if (_heard.nodes) delete _heard.nodes[pk];
            if (_heardMapPk === pk) _heardToggleMap(pk);
            _renderHeardIfOpen();
            if (_includeHeard) _rerenderContacts();
            await _sendDeviceCmd(`!heard_delete ${pk}`);
        }

        function _heardToggleMap(pk) {
            if (_heardMapPk === pk) {           // toggle off
                _heardMapPk = null;
                const el = document.getElementById("heard-map");
                if (el) el.style.display = "none";
                return;
            }
            _heardShowMap(pk, true);   // explicit click → (re)center
        }

        function _heardShowMap(pk, force) {
            const node = (_heard.nodes || {})[pk];
            const el = document.getElementById("heard-map");
            if (!node || !el || (!node.lat && !node.lon)) return;
            _heardMapPk = pk;
            el.style.display = "";
            let tries = 0;
            const init = () => {
                if (typeof L === "undefined") {
                    if (++tries > LEAFLET_MAX_TRIES) {
                        el.innerHTML = `<div style="padding:16px;color:var(--muted);font-size:0.8rem;text-align:center">Map library unavailable.</div>`;
                        return;
                    }
                    setTimeout(init, LEAFLET_POLL_MS);
                    return;
                }
                const fresh = !_heardMap;
                if (fresh) {
                    _heardMap = L.map(el, { zoomControl: true }).setView([node.lat, node.lon], 12);
                    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                        attribution: '&copy; OpenStreetMap', maxZoom: 19,
                    }).addTo(_heardMap);
                }
                // Only (re)center + (re)place the marker when the displayed
                // node actually changes or the user explicitly clicked the
                // pin. The 3 s refresh calls this with force=false, so it
                // must NOT fight the user's manual zoom / pan.
                if (fresh || force || _heardMap._shownPk !== pk) {
                    _heardMap.setView([node.lat, node.lon], 12);
                    if (_heardMap._hmMarker) _heardMap._hmMarker.remove();
                    // CSS-only pin — the self-hosted Leaflet bundle has no
                    // marker PNGs, so the default icon would render broken.
                    const pinIcon = L.divIcon({
                        className: "mc-pin",
                        html: '<div class="mc-pin-inner"></div>',
                        iconSize: [20, 20],
                        iconAnchor: [10, 20],
                        popupAnchor: [0, -16],
                    });
                    _heardMap._hmMarker = L.marker([node.lat, node.lon], { icon: pinIcon })
                        .addTo(_heardMap).bindPopup(node.name || pk.slice(0, 12)).openPopup();
                    _heardMap._shownPk = pk;
                }
                setTimeout(() => _heardMap.invalidateSize(), 200);
            };
            init();
        }

        function _renderHeatmapIfOpen() {
            if (!_isOpen("heatmap")) return;
            const view = document.getElementById("heatmap-view");
            if (!view) return;
            const hm = (_rxLog.stats && _rxLog.stats.heatmap_24h) || new Array(24).fill(0);
            const max = Math.max(...hm);
            const now = new Date().getHours();
            // Two rows of 12 hours, 0..11 and 12..23
            const cell = (h) => {
                const v = hm[h] || 0;
                let cls = "";
                if (max > 0) {
                    const r = v / max;
                    if      (r > 0.75) cls = "hot4";
                    else if (r > 0.5)  cls = "hot3";
                    else if (r > 0.25) cls = "hot2";
                    else if (r > 0)    cls = "hot1";
                }
                if (h === now) cls += " now";
                return `<div class="${cls}" title="${h}:00–${h}:59  ${v} pkt">${v || ""}</div>`;
            };
            const labels = Array.from({length: 24}, (_, h) => `<div>${h}</div>`).join("");
            view.innerHTML = `
                <div style="font-size:0.82rem;color:var(--text)">
                    Packets received per hour-of-day, last 24h. Outlined cell = current hour.
                </div>
                <div class="heatmap-grid" style="grid-template-columns:repeat(24,1fr)">
                    ${Array.from({length: 24}, (_, h) => cell(h)).join("")}
                </div>
                <div class="heatmap-labels">${labels}</div>`;
        }

        // Topology: render every contact (and self if known) on one Leaflet
        // map, drawing a polyline from each contact to the self node when we
        // have both endpoints. Line colour encodes hop count (green = direct,
        // yellow = 1-3 hops, orange = 4-7, red = 8+).
        let _topologyLayer = null;
        function _renderTopology() {
            const canvas = document.getElementById("map-canvas");
            if (!canvas) return;
            let tries = 0;
            const init = () => {
                if (typeof L === "undefined") {
                    if (++tries > LEAFLET_MAX_TRIES) {
                        canvas.innerHTML = `<div style="padding:24px;color:var(--muted);font-size:0.85rem;text-align:center;">
                            Leaflet failed to load.<br>The topology view needs the map library.
                        </div>`;
                        return;
                    }
                    setTimeout(init, LEAFLET_POLL_MS);
                    return;
                }
                if (!_leafletMap) {
                    _leafletMap = L.map(canvas, { zoomControl: true }).setView([52, 5], 7);
                    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                        maxZoom: 19,
                    }).addTo(_leafletMap);
                }
                // Drop any prior topology overlay so a refresh doesn't pile up
                if (_topologyLayer) { _topologyLayer.remove(); _topologyLayer = null; }
                _topologyLayer = L.layerGroup().addTo(_leafletMap);

                const nodes = (_deviceMap && _deviceMap.nodes) || {};
                const selfName = _deviceMap && _deviceMap.self;
                const selfNode = selfName ? nodes[selfName] : null;
                const selfLoc = (selfNode && selfNode.lat != null && selfNode.lon != null && (selfNode.lat || selfNode.lon))
                    ? [selfNode.lat, selfNode.lon] : null;

                const bounds = [];
                let plotted = 0;

                // Helper: pick a colour for the hop count
                const hopColour = (h) => {
                    if (h == null || h < 0) return "#888";
                    if (h === 0) return "#26c47c";  // green: direct
                    if (h <= 3)  return "#f9c74f";  // yellow
                    if (h <= 7)  return "#ff8c42";  // orange
                    return "#e63946";               // red
                };

                // Self marker
                if (selfLoc) {
                    const icon = L.divIcon({
                        className: "mc-pin self",
                        html: '<div class="mc-pin-inner" style="background:#3a7bd5"></div>',
                        iconSize: [22, 22], iconAnchor: [11, 22],
                    });
                    L.marker(selfLoc, { icon }).addTo(_topologyLayer).bindPopup(`<b>${selfName}</b><br>(this node)`);
                    bounds.push(selfLoc);
                    plotted++;
                }

                // Contact markers + lines
                for (const [name, node] of Object.entries(nodes)) {
                    if (name === selfName) continue;
                    if (node.lat == null || node.lon == null) continue;
                    if (!node.lat && !node.lon) continue;
                    const ll = [node.lat, node.lon];
                    const hopsRaw = node.hops && node.hops.value;
                    const h = hopsRaw != null ? parseInt(String(hopsRaw).replace(/[^\d-]/g, ""), 10) : null;
                    const colour = hopColour(h);
                    const icon = L.divIcon({
                        className: "mc-pin",
                        html: `<div class="mc-pin-inner" style="background:${colour}"></div>`,
                        iconSize: [20, 20], iconAnchor: [10, 20],
                    });
                    L.marker(ll, { icon }).addTo(_topologyLayer).bindPopup(
                        `<b>${name}</b><br>` +
                        `Hops: ${h != null && !isNaN(h) ? h : "?"}<br>` +
                        `Type: ${({1:"Contact",2:"Repeater",3:"Room Server",4:"Sensor"})[node.type] || "?"}`
                    );
                    if (selfLoc) {
                        L.polyline([selfLoc, ll], {
                            color: colour, weight: 2, opacity: 0.7, dashArray: h === 0 ? null : "4 4",
                        }).addTo(_topologyLayer);
                    }
                    bounds.push(ll);
                    plotted++;
                }

                if (bounds.length >= 2) {
                    _leafletMap.fitBounds(bounds, { padding: [30, 30] });
                } else if (bounds.length === 1) {
                    _leafletMap.setView(bounds[0], 11);
                }

                if (!plotted) {
                    canvas.innerHTML = `<div style="padding:24px;color:var(--text);opacity:.7;font-size:0.85rem;text-align:center;">
                        No contacts have shared a location yet.<br>
                        Set <code>adv_loc_policy = Share</code> on the connected node
                        and ask remote contacts to do the same, or add manual
                        positions in <code>meshcore_locations.json</code>.
                    </div>`;
                    return;
                }

                // Force Leaflet to recompute container size after the panel animation
                setTimeout(() => _leafletMap.invalidateSize(), 280);
            };
            init();
        }

        // ── Self-node side panel ─────────────────────────────────────────
        // Renders identity + radio + actions. Uses the same panel-view
        // styling as the other RX-log views.
        const LS_RADIO_PRESETS = "meshcore.radioPresets";
        const LS_HAS_GPS = "meshcore.selfHasGps";

        function _loadRadioPresets() {
            try { return JSON.parse(localStorage.getItem(LS_RADIO_PRESETS) || "[]"); }
            catch (_) { return []; }
        }
        function _saveRadioPresets(arr) {
            try { localStorage.setItem(LS_RADIO_PRESETS, JSON.stringify(arr)); } catch (_) {}
        }
        function _hasGpsHardware() {
            return localStorage.getItem(LS_HAS_GPS) === "1";
        }
        function _setHasGpsHardware(v) {
            try { localStorage.setItem(LS_HAS_GPS, v ? "1" : "0"); } catch (_) {}
        }

        // Accept both "12,34" (EU locale) and "12.34" decimal separators —
        // <input type=number> normalisation is inconsistent across browsers
        // and Domoticz users come from many locales.
        function _normDecimal(v) {
            if (v === null || v === undefined) return "";
            return String(v).trim().replace(",", ".");
        }

        async function _sendDeviceCmd(cmd) {
            const sendIdx = _deviceMap && _deviceMap.send_idx;
            if (!sendIdx) { alert("Mesh Send device not found."); return false; }
            const url = `/json.htm?type=command&param=udevice&idx=${sendIdx}&nvalue=0&svalue=${encodeURIComponent(cmd)}`;
            try {
                const r = await fetch(url, { method: "GET" });
                return r.ok;
            } catch (_) { return false; }
        }

        function _renderSelfPanel() {
            const view = document.getElementById("self-view");
            if (!view) return;
            const si = (_deviceMap && _deviceMap.self_info) || {};
            const st = (_deviceMap && _deviceMap.self_telemetry) || {};
            const hasGps = _hasGpsHardware();
            const presets = _loadRadioPresets();
            const SF_OPTS = [7,8,9,10,11,12].map(v =>
                `<option value="${v}"${v === si.radio_sf ? " selected" : ""}>${v}</option>`).join("");
            // Coding rate in MeshCore firmware: 5..8 = 4/5..4/8
            const CR_OPTS = [5,6,7,8].map(v =>
                `<option value="${v}"${v === si.radio_cr ? " selected" : ""}>4/${v}</option>`).join("");
            const presetOpts = presets.length
                ? `<option value="">— select preset —</option>` +
                  presets.map((p, i) => {
                      const parts = [`${p.freq}/${p.bw}/SF${p.sf}/CR4/${p.cr}`];
                      if (p.tx_power)       parts.push(`${p.tx_power}dBm`);
                      if (p.path_hash_mode) parts.push(`${p.path_hash_mode}-byte`);
                      if (p.flood_scope)    parts.push(p.flood_scope);
                      return `<option value="${i}">${escHtml(p.name)} (${escHtml(parts.join(" · "))})</option>`;
                  }).join("")
                : `<option value="">(no presets saved)</option>`;

            view.innerHTML = `
                <div class="self-section">Identity</div>
                <div class="self-row">
                    <label>Name</label>
                    <div class="self-input-wrap">
                        <input id="self-name" type="text" value="${escHtml(si.name || "")}" maxlength="32">
                        <button class="self-btn" data-action="set-name">Save</button>
                    </div>
                </div>
                <div class="self-row">
                    <label>Public key</label>
                    <div class="self-input-wrap">
                        <input id="self-pubkey" type="text" value="${escHtml(si.public_key || "")}" readonly>
                        <button class="self-btn" data-action="copy-pubkey">Copy</button>
                    </div>
                </div>
                <div class="self-row">
                    <label>Adv type</label>
                    <span class="self-value">${escHtml(({1:"Contact",2:"Repeater",3:"Room Server",4:"Sensor"})[si.adv_type] || si.adv_type || "?")}</span>
                </div>

                <div class="self-section">Coordinates
                    <label style="float:right;font-weight:normal;font-size:0.78rem">
                        <input type="checkbox" id="self-has-gps"${hasGps ? " checked" : ""}>
                        I have GPS hardware
                    </label>
                </div>
                <div style="font-size:0.74rem;color:var(--text);opacity:0.7;line-height:1.4">
                    ${hasGps
                        ? "GPS hardware is set, the device updates its own coordinates — manual edit disabled."
                        : "No GPS hardware — set the coordinates manually so the device advertises a location."}
                </div>
                <div class="self-row">
                    <label>Latitude</label>
                    <input id="self-lat" type="text" inputmode="decimal" value="${si.adv_lat ?? 0}"${hasGps ? " readonly" : ""}>
                </div>
                <div class="self-row">
                    <label>Longitude</label>
                    <input id="self-lon" type="text" inputmode="decimal" value="${si.adv_lon ?? 0}"${hasGps ? " readonly" : ""}>
                </div>
                ${hasGps ? "" : `<button class="self-btn primary" data-action="set-coords">Apply coordinates</button>`}

                <div class="self-section">Radio</div>
                <div class="self-grid-2">
                    <div class="self-row">
                        <label>Frequency (MHz)</label>
                        <input id="self-freq" type="text" inputmode="decimal" value="${si.radio_freq ?? ""}">
                    </div>
                    <div class="self-row">
                        <label>Bandwidth (kHz)</label>
                        <input id="self-bw" type="text" inputmode="decimal" value="${si.radio_bw ?? ""}">
                    </div>
                    <div class="self-row">
                        <label>Spreading factor</label>
                        <select id="self-sf">${SF_OPTS}</select>
                    </div>
                    <div class="self-row">
                        <label>Coding rate</label>
                        <select id="self-cr">${CR_OPTS}</select>
                    </div>
                    <div class="self-row">
                        <label>TX power (dBm)</label>
                        <input id="self-tx" type="number" min="0" max="${si.max_tx_power || 22}" value="${si.tx_power ?? ""}">
                    </div>
                    <div class="self-row">
                        <label>Max TX power</label>
                        <span class="self-value">${si.max_tx_power ?? "?"} dBm</span>
                    </div>
                </div>
                <div style="display:flex;gap:6px;flex-wrap:wrap">
                    <button class="self-btn primary" data-action="apply-radio">Apply radio</button>
                    <button class="self-btn" data-action="apply-tx">Apply TX power</button>
                </div>

                <div class="self-section">Routing</div>
                <div class="self-row">
                    <label title="MeshCore stores N bytes per hop in the packet path field.
1-byte ≈ 64 max hops but more hash collisions.
2-byte ≈ 32 max hops, less collision.
3-byte ≈ 21 max hops, near-zero collision (default on SF8).
Larger = more reliable routing but smaller mesh diameter.">Path hash size</label>
                    <div class="self-input-wrap">
                        <select id="self-phm">
                            <option value="1"${(_deviceMap?.device_info?.path_hash_mode === 1) ? " selected" : ""}>1 byte (max ~64 hops)</option>
                            <option value="2"${(_deviceMap?.device_info?.path_hash_mode === 2) ? " selected" : ""}>2 byte (max ~32 hops)</option>
                            <option value="3"${(_deviceMap?.device_info?.path_hash_mode === 3 || !_deviceMap?.device_info?.path_hash_mode) ? " selected" : ""}>3 byte (max ~21 hops, default on SF8)</option>
                        </select>
                        <button class="self-btn" data-action="apply-phm">Apply</button>
                    </div>
                </div>
                <div class="self-row">
                    <label title="Default flood scope tag — empty = global flood. e.g. #nl or #europe.">Default flood scope</label>
                    <div class="self-input-wrap">
                        <input id="self-flood-scope" type="text" maxlength="31" placeholder="(global)" value="${escHtml(_deviceMap?.default_flood_scope || "")}">
                        <button class="self-btn" data-action="apply-flood-scope">Apply</button>
                    </div>
                </div>

                <div class="self-section">Presets</div>
                <div class="self-input-wrap">
                    <select id="self-preset" style="flex:1">${presetOpts}</select>
                    <button class="self-btn" data-action="apply-preset" disabled>Apply</button>
                    <button class="self-btn" data-action="save-preset">Save current as…</button>
                    <button class="self-btn" data-action="delete-preset" title="Delete the selected preset" disabled><i class="fa-solid fa-trash"></i></button>
                </div>

                <div class="self-section">Actions</div>
                <div class="self-input-wrap">
                    <label style="display:inline-flex;align-items:center;gap:4px;font-size:0.78rem">
                        <input type="radio" name="advert-mode" value="flood" checked> Flood
                    </label>
                    <label style="display:inline-flex;align-items:center;gap:4px;font-size:0.78rem">
                        <input type="radio" name="advert-mode" value="direct"> Direct
                    </label>
                    <button class="self-btn primary" data-action="send-advert">Send advert</button>
                </div>
                <div class="self-input-wrap">
                    <button class="self-btn" data-action="get-telemetry">Get telemetry</button>
                    <button class="self-btn danger" data-action="reboot">Reboot device</button>
                </div>
                <div id="self-telemetry-box" style="font-size:0.78rem;color:var(--text);${Object.keys(st).length ? "" : "display:none"}">
                    ${_renderTelemetryBox(st)}
                </div>
            `;
            // Wire buttons
            view.querySelectorAll(".self-btn").forEach(btn => {
                btn.onclick = () => _selfPanelAction(btn.dataset.action);
            });

            // Hovering "Apply" preset or "Save current as…" highlights every
            // form field that the preset captures, so the user knows at a
            // glance what is in / not in the preset.
            const PRESET_FIELD_IDS = ["self-freq", "self-bw", "self-sf", "self-cr",
                                      "self-tx", "self-phm", "self-flood-scope"];
            const onHi = () => {
                PRESET_FIELD_IDS.forEach(id => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    el.classList.add("preset-highlight");
                    // Also highlight the row's label so it's obvious in the grid
                    const row = el.closest(".self-row");
                    if (row) {
                        const lab = row.querySelector("label");
                        if (lab) lab.classList.add("preset-highlight-label");
                    }
                });
            };
            const offHi = () => {
                document.querySelectorAll(".preset-highlight").forEach(el => el.classList.remove("preset-highlight"));
                document.querySelectorAll(".preset-highlight-label").forEach(el => el.classList.remove("preset-highlight-label"));
            };
            view.querySelectorAll('.self-btn[data-action="apply-preset"], .self-btn[data-action="save-preset"]').forEach(btn => {
                btn.addEventListener("mouseenter", onHi);
                btn.addEventListener("mouseleave", offHi);
                btn.addEventListener("focus", onHi);
                btn.addEventListener("blur", offHi);
            });
            const gpsCb = document.getElementById("self-has-gps");
            if (gpsCb) gpsCb.onchange = () => {
                _setHasGpsHardware(gpsCb.checked);
                _renderSelfPanel();   // re-render to enable/disable inputs
            };
            // When the user picks a preset from the dropdown, mirror its
            // values into the form so they see what Apply will send. Doesn't
            // actually fire any commands yet — only the Apply button does.
            // Also gate the Apply/Delete buttons on a valid selection.
            const presetSel = document.getElementById("self-preset");
            const applyBtn  = view.querySelector('.self-btn[data-action="apply-preset"]');
            const deleteBtn = view.querySelector('.self-btn[data-action="delete-preset"]');
            const syncPresetButtons = () => {
                const hasSel = presetSel && presetSel.value !== "";
                if (applyBtn)  applyBtn.disabled  = !hasSel;
                if (deleteBtn) deleteBtn.disabled = !hasSel;
            };
            if (presetSel) presetSel.onchange = () => {
                syncPresetButtons();
                const idx = presetSel.value;
                if (idx === "") return;
                const ps = _loadRadioPresets();
                const p = ps[idx];
                if (!p) return;
                const setIf = (id, v) => {
                    const el = document.getElementById(id);
                    if (el && v !== undefined && v !== null) el.value = String(v);
                };
                setIf("self-freq",        p.freq);
                setIf("self-bw",          p.bw);
                setIf("self-sf",          p.sf);
                setIf("self-cr",          p.cr);
                setIf("self-tx",          p.tx_power);
                setIf("self-phm",         p.path_hash_mode);
                if (p.flood_scope !== undefined) setIf("self-flood-scope", p.flood_scope);
            };
            syncPresetButtons();
        }

        function _renderTelemetryBox(st, title = "Last telemetry reading") {
            if (!st || !Object.keys(st).length) return "";
            const rows = Object.entries(st).map(([k, v]) =>
                `<div class="self-row" style="grid-template-columns: 130px 1fr">
                    <span style="font-size:0.74rem;opacity:0.8;text-transform:uppercase;letter-spacing:0.04em">${escHtml(k)}</span>
                    <span>${escHtml(typeof v === "object" ? JSON.stringify(v) : String(v))}</span>
                </div>`).join("");
            return title ? `<div class="self-section">${escHtml(title)}</div>${rows}` : rows;
        }

        // Wrap a self-panel command so the user sees feedback and the panel
        // re-renders with fresh values after the plugin processes the change.
        async function _selfPanelApply(cmd, btnAction) {
            const btn = btnAction ? document.querySelector(`.self-btn[data-action="${btnAction}"]`) : null;
            const orig = btn ? btn.innerHTML : null;
            if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; }
            await _sendDeviceCmd(cmd);
            // The plugin updates the device map after a successful set; give
            // it a moment, then reload + re-render so the user sees the new
            // values (and a repeat click won't double-fire).
            setTimeout(async () => {
                await _loadDeviceMap();
                _renderSelfPanel();
            }, 800);
            // The re-render replaces the button DOM, but if it failed early
            // (no device map yet) we still restore the original state.
            if (btn) {
                setTimeout(() => { try { btn.disabled = false; btn.innerHTML = orig; } catch (_) {} }, 1200);
            }
        }

        async function _selfPanelAction(action) {
            const si = (_deviceMap && _deviceMap.self_info) || {};
            if (action === "copy-pubkey") {
                const el = document.getElementById("self-pubkey");
                if (el && el.value) {
                    navigator.clipboard.writeText(el.value).then(
                        () => { el.style.background = "rgba(38,196,124,0.20)"; setTimeout(() => el.style.background = "", 600); },
                        () => alert("Copy failed — select the text manually.")
                    );
                }
                return;
            }
            if (action === "set-name") {
                const v = document.getElementById("self-name").value.trim();
                if (!v) return;
                await _selfPanelApply(`!set_name ${v}`, action);
                return;
            }
            if (action === "set-coords") {
                const lat = _normDecimal(document.getElementById("self-lat").value);
                const lon = _normDecimal(document.getElementById("self-lon").value);
                if (lat === "" || lon === "") return;
                await _selfPanelApply(`!set_coords ${lat} ${lon}`, action);
                return;
            }
            if (action === "apply-radio") {
                const f  = _normDecimal(document.getElementById("self-freq").value);
                const bw = _normDecimal(document.getElementById("self-bw").value);
                const sf = document.getElementById("self-sf").value;
                const cr = document.getElementById("self-cr").value;
                if (!f || !bw || !sf || !cr) { alert("Fill in all radio fields."); return; }
                if (!confirm(`Apply radio settings?\nfreq=${f} MHz  bw=${bw} kHz  sf=${sf}  cr=4/${cr}\n\nMis-set values can drop your link to the local mesh.`)) return;
                await _selfPanelApply(`!set_radio ${f} ${bw} ${sf} ${cr}`, action);
                return;
            }
            if (action === "apply-tx") {
                const p = _normDecimal(document.getElementById("self-tx").value);
                if (!p) return;
                if (!confirm(`Apply TX power = ${p} dBm?`)) return;
                await _selfPanelApply(`!set_tx_power ${p}`, action);
                return;
            }
            if (action === "apply-phm") {
                const m = document.getElementById("self-phm").value;
                if (!m) return;
                if (!confirm(`Set path hash size to ${m} byte(s)?\n\nLarger size = less hash collision but smaller mesh diameter.`)) return;
                await _selfPanelApply(`!set_path_hash_mode ${m}`, action);
                return;
            }
            if (action === "apply-flood-scope") {
                const v = document.getElementById("self-flood-scope").value.trim();
                await _selfPanelApply(`!flood_scope ${v}`, action);
                return;
            }
            if (action === "save-preset") {
                const f  = _normDecimal(document.getElementById("self-freq").value);
                const bw = _normDecimal(document.getElementById("self-bw").value);
                const sf = document.getElementById("self-sf").value;
                const cr = document.getElementById("self-cr").value;
                const tx = _normDecimal(document.getElementById("self-tx").value);
                const phm = document.getElementById("self-phm").value;
                const scope = document.getElementById("self-flood-scope").value.trim();
                const name = prompt("Preset name (e.g. SF7 or SF8):", `SF${sf}`);
                if (!name) return;
                const presets = _loadRadioPresets();
                const existing = presets.findIndex(p => p.name === name);
                const entry = {
                    name,
                    freq: +f, bw: +bw, sf: +sf, cr: +cr,
                    tx_power: +tx,
                    path_hash_mode: +phm,
                    flood_scope: scope,
                };
                if (existing >= 0) presets[existing] = entry;
                else presets.push(entry);
                _saveRadioPresets(presets);
                _renderSelfPanel();
                return;
            }
            if (action === "apply-preset") {
                const idx = document.getElementById("self-preset").value;
                const presets = _loadRadioPresets();
                if (idx === "" || !presets[idx]) return;
                const p = presets[idx];
                // Build an explicit confirm dialog that names EVERY setting
                // the preset will or will not touch, so the user can see at
                // a glance what changes. Empty string = will reset to global
                // / off; undefined = preset doesn't carry this setting yet
                // (legacy presets saved before the field existed).
                const fmt = (v, emptyLabel) =>
                    v === undefined ? "(unchanged)" :
                    v === ""        ? emptyLabel :
                    String(v);
                const lines = [
                    `Frequency:        ${p.freq} MHz`,
                    `Bandwidth:        ${p.bw} kHz`,
                    `Spreading factor: SF${p.sf}`,
                    `Coding rate:      4/${p.cr}`,
                    `TX power:         ${fmt(p.tx_power, "(unchanged)")}${p.tx_power ? " dBm" : ""}`,
                    `Path hash size:   ${fmt(p.path_hash_mode, "(unchanged)")}${p.path_hash_mode ? "-byte" : ""}`,
                    `Default flood scope: ${fmt(p.flood_scope, "(global / off)")}`,
                ];
                if (!confirm(`Apply preset "${p.name}"?\n\n${lines.join("\n")}`)) return;
                // Apply non-radio commands FIRST — set_radio re-tunes the
                // transceiver and can briefly drop the local link. Doing TX
                // power / path hash / flood scope ahead means we're not
                // racing against a re-tune. Radio goes last.
                // Space the writes apart: each !-command is delivered via the
                // Mesh Send device's sValue. Domoticz only stores the latest
                // sValue, and the plugin's onDeviceModified reads it at
                // callback time. If we write four values back-to-back, all
                // callbacks see the *last* value and the dedup drops the
                // earlier commands. A short delay between writes ensures each
                // sValue is observed before the next overwrites it.
                const _step = (cmd) => new Promise(r =>
                    setTimeout(async () => { await _sendDeviceCmd(cmd); r(); }, PRESET_STEP_MS));
                if (p.flood_scope !== undefined) await _step(`!flood_scope ${p.flood_scope}`);
                if (p.path_hash_mode)            await _step(`!set_path_hash_mode ${p.path_hash_mode}`);
                if (p.tx_power)                  await _step(`!set_tx_power ${p.tx_power}`);
                await _step(`!set_radio ${p.freq} ${p.bw} ${p.sf} ${p.cr}`);
                setTimeout(async () => { await _loadDeviceMap(); _renderSelfPanel(); }, PRESET_REFRESH_MS);
                return;
            }
            if (action === "delete-preset") {
                const idx = document.getElementById("self-preset").value;
                const presets = _loadRadioPresets();
                if (idx === "" || !presets[idx]) return;
                if (!confirm(`Delete preset "${presets[idx].name}"?`)) return;
                presets.splice(+idx, 1);
                _saveRadioPresets(presets);
                _renderSelfPanel();
                return;
            }
            if (action === "send-advert") {
                const mode = (document.querySelector("input[name='advert-mode']:checked") || {}).value || "flood";
                await _sendDeviceCmd(`!send_advert ${mode}`);
                return;
            }
            if (action === "get-telemetry") {
                await _sendDeviceCmd("!get_telemetry");
                return;
            }
            if (action === "reboot") {
                if (!confirm("Reboot the connected MeshCore device?\n\nYou'll lose the connection for ~30 seconds.")) return;
                await _sendDeviceCmd("!reboot");
                return;
            }
        }

        // ── Remote-contact side panel ────────────────────────────────────
        // Build a _deviceMap-node-shaped object from the heard store so the
        // contact panel can show pubkey/type/snr/hops/coords for a heard node
        // that isn't a real contact (and so has no _deviceMap.nodes entry).
        function _heardNodeShape(name) {
            const hl = (typeof _heardList === "function") ? _heardList() : [];
            const h = hl.find(x => (x.name || (x.pubkey || "").slice(0, 12)) === name);
            if (!h) return null;
            return {
                pubkey: h.pubkey || "",
                type:   h.type || 0,
                snr:    (h.snr != null) ? { value: `${h.snr} dB` } : null,
                rssi:   (h.rssi != null) ? { value: `${h.rssi} dBm` } : null,
                hops:   (h.path_len != null && h.path_len >= 0) ? { value: String(h.path_len) } : null,
                lat:    h.lat ?? null,
                lon:    h.lon ?? null,
                query:  {},
                _heard: true,
            };
        }

        function _renderContactPanel(name) {
            const view = document.getElementById("contact-view");
            if (!view) return;
            const node = (_deviceMap && _deviceMap.nodes && _deviceMap.nodes[name])
                       || _heardNodeShape(name) || {};
            const query = node.query || {};
            const hops  = node.hops && node.hops.value || "?";
            // Values already carry their unit ("4.5 dB" / "-88 dBm") — strip
            // it so we don't render a doubled unit in the panel.
            const snr   = (node.snr  && String(node.snr.value).replace(/\s*dB$/i, "").trim())  || "?";
            const rssiV = (node.rssi && String(node.rssi.value).replace(/\s*dBm$/i, "").trim()) || "";
            const cLat = node.lat, cLon = node.lon;
            const cHasLoc = (cLat != null && cLon != null) && (cLat || cLon);
            // Distance from us — only if both we and the node have GPS.
            // Our own coords live in self_info (adv_lat/adv_lon); the self
            // node usually has no lat/lon under nodes[]. Fall back to that.
            const _si = (_deviceMap && _deviceMap.self_info) || {};
            const _selfNode = (_deviceMap && _deviceMap.self
                && _deviceMap.nodes && _deviceMap.nodes[_deviceMap.self]) || null;
            // Coerce to numbers — JSON values may arrive as strings; a
            // non-finite or null-island (0,0) coord is treated as "no fix".
            const sLat = Number(_si.adv_lat != null ? _si.adv_lat
                          : (_selfNode ? _selfNode.lat : NaN));
            const sLon = Number(_si.adv_lon != null ? _si.adv_lon
                          : (_selfNode ? _selfNode.lon : NaN));
            const cLatN = Number(cLat), cLonN = Number(cLon);
            const sHasLoc = isFinite(sLat) && isFinite(sLon) && (sLat || sLon);
            const cFix    = isFinite(cLatN) && isFinite(cLonN) && (cLatN || cLonN);
            let distHtml = "";
            if (cFix && sHasLoc) {
                const R = 6371, toR = d => d * Math.PI / 180;
                const dLat = toR(cLatN - sLat), dLon = toR(cLonN - sLon);
                const a = Math.sin(dLat/2)**2
                        + Math.cos(toR(sLat)) * Math.cos(toR(cLatN)) * Math.sin(dLon/2)**2;
                const km = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                const txt = km < 1 ? `${Math.round(km * 1000)} m` : `${km.toFixed(km < 10 ? 2 : 1)} km`;
                distHtml = `<div class="self-row"><label>Distance</label><span class="self-value">${txt} from us</span></div>`;
            }

            const fmtAge = (t) => {
                if (!t) return "never";
                const d = Math.max(0, Math.floor(Date.now() / 1000 - t));
                if (d < 60) return `${d}s ago`;
                if (d < 3600) return `${Math.floor(d / 60)}m ago`;
                return `${Math.floor(d / 3600)}h ago`;
            };

            const statusHtml = query.status ? `
                <div class="self-section">Status @ ${fmtAge(query.status.t)}</div>
                ${_renderTelemetryBox(query.status.data, null)}
            ` : "";
            const telemHtml = query.telemetry ? `
                <div class="self-section">Telemetry @ ${fmtAge(query.telemetry.t)}</div>
                ${_renderTelemetryBox(query.telemetry.data, null)}
            ` : "";
            const neighHtml = query.neighbours ? `
                <div class="self-section">Neighbours @ ${fmtAge(query.neighbours.t)}</div>
                <pre style="font-size:0.72rem;white-space:pre-wrap;word-break:break-all;color:var(--text);background:var(--bg);padding:6px;border-radius:4px">${escHtml(JSON.stringify(query.neighbours.data, null, 2))}</pre>
            ` : "";

            view.innerHTML = `
                <div class="self-section">Contact info</div>
                <div class="self-row"><label>Name</label><span class="self-value">${escHtml(name)}</span></div>
                <div class="self-row"><label>Type</label><span class="self-value">${escHtml(({1:"Contact",2:"Repeater",3:"Room Server",4:"Sensor"})[node.type] || node.type || "?")}</span></div>
                <div class="self-row"><label>Hops</label><span class="self-value">${escHtml(hops)}</span></div>
                <div class="self-row"><label>SNR</label><span class="self-value">${escHtml(snr)} dB</span></div>
                ${rssiV ? `<div class="self-row"><label>RSSI</label><span class="self-value">${escHtml(rssiV)} dBm</span></div>` : ""}
                <div class="self-row"><label>Public key</label>
                    <div class="self-input-wrap">
                        <input type="text" readonly value="${escHtml(node.pubkey || "")}">
                        <button class="self-btn" data-action="copy-pubkey">Copy</button>
                    </div>
                </div>
                <div class="self-row"><label>Coordinates</label>
                    <span class="self-value">${cHasLoc ? `${cLat}, ${cLon}` : "—"}</span>
                </div>
                ${distHtml}
                ${cHasLoc ? `<div id="contact-map"></div>` : ""}
                ${_convDevIdx(name) ? `
                <div class="self-input-wrap">
                    <button class="self-btn primary" data-action="show-conversation" style="flex:1">
                        💬 Show conversation in inbox
                    </button>
                </div>` : ""}

                ${node._heard ? `
                <div class="self-section">Heard node</div>
                <div style="font-size:0.78rem;color:var(--text);opacity:0.8;line-height:1.5">
                    This node was heard over the air but is not in your contacts,
                    so remote queries aren't available. Add it to contacts
                    (star it in the list or the Heard-nodes panel) to enable
                    status / telemetry / neighbour queries.
                </div>
                ` : `
                <div class="self-section">Remote queries</div>
                <div style="font-size:0.78rem;color:var(--text);opacity:0.8;line-height:1.5">
                    Each query sends a packet over the mesh and waits up to 60s
                    for the remote to respond. If the contact is offline or out
                    of range the query will time out.
                </div>
                <div class="self-input-wrap" style="flex-wrap:wrap">
                    <button class="self-btn" data-action="reset-path">Reset path</button>
                    <button class="self-btn primary" data-action="req-status">Get status</button>
                    <button class="self-btn primary" data-action="req-telemetry">Get telemetry</button>
                    <button class="self-btn primary" data-action="req-neighbours">Get neighbours</button>
                </div>
                ${statusHtml}${telemHtml}${neighHtml}
                `}
            `;

            // Location map. innerHTML above replaced the DOM, so any prior
            // Leaflet instance is now orphaned — drop it and rebuild. This
            // panel has no periodic refresh, so a plain rebuild is fine.
            if (_contactMap) { try { _contactMap.remove(); } catch (_) {} _contactMap = null; }
            if (cHasLoc) {
                const el = document.getElementById("contact-map");
                let tries = 0;
                const init = () => {
                    if (typeof L === "undefined") {
                        if (++tries > LEAFLET_MAX_TRIES) {
                            if (el) el.innerHTML = `<div style="padding:16px;color:var(--muted);font-size:0.8rem;text-align:center">Map library unavailable.</div>`;
                            return;
                        }
                        setTimeout(init, LEAFLET_POLL_MS);
                        return;
                    }
                    if (!el) return;
                    _contactMap = L.map(el, { zoomControl: true }).setView([cLat, cLon], 12);
                    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                        attribution: '&copy; OpenStreetMap', maxZoom: 19,
                    }).addTo(_contactMap);
                    const pinIcon = L.divIcon({
                        className: "mc-pin",
                        html: '<div class="mc-pin-inner"></div>',
                        iconSize: [20, 20],
                        iconAnchor: [10, 20],
                        popupAnchor: [0, -16],
                    });
                    L.marker([cLat, cLon], { icon: pinIcon })
                        .addTo(_contactMap).bindPopup(name).openPopup();
                    setTimeout(() => _contactMap.invalidateSize(), 200);
                };
                init();
            }

            view.querySelectorAll(".self-btn").forEach(btn => {
                btn.onclick = async () => {
                    const action = btn.dataset.action;
                    if (action === "show-conversation") {
                        _closeMapPanel();
                        _enterConversation(name);
                        return;
                    }
                    if (action === "copy-pubkey") {
                        const el = btn.previousElementSibling;
                        if (el && el.value) {
                            navigator.clipboard.writeText(el.value).then(
                                () => { el.style.background = "rgba(38,196,124,0.20)"; setTimeout(() => el.style.background = "", 600); },
                                () => alert("Copy failed — select the text manually.")
                            );
                        }
                        return;
                    }
                    btn.disabled = true;
                    const orig = btn.innerHTML;
                    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> …';
                    try {
                        if (action === "reset-path")      await _sendDeviceCmd(`!reset_path ${name}`);
                        else if (action === "req-status") await _sendDeviceCmd(`!req_status ${name}`);
                        else if (action === "req-telemetry") await _sendDeviceCmd(`!req_telemetry ${name}`);
                        else if (action === "req-neighbours") await _sendDeviceCmd(`!req_neighbours ${name}`);
                        // Reload device map so query result appears in the panel
                        // (plugin writes it on receipt)
                        setTimeout(async () => {
                            await _loadDeviceMap();
                            _renderContactPanel(name);
                        }, 1500);
                    } finally {
                        btn.disabled = false;
                        btn.innerHTML = orig;
                    }
                };
            });
        }

        // Sparkline refresh hook — invoked from the rx-log interval. Walks all
        // visible contact cards and re-paints their SVG.
        function _refreshCardSparklines() {
            const sigHist = (_rxLog.stats && _rxLog.stats.signal_history) || {};
            document.querySelectorAll(".sparkline").forEach(el => {
                const pk = el.dataset.pubkey;
                if (!pk || !sigHist[pk] || sigHist[pk].length < 2) {
                    // Not enough samples yet — render a flat placeholder.
                    el.innerHTML = "";
                    return;
                }
