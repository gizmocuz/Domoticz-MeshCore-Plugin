<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeshCore Dashboard</title>
    <link rel="stylesheet" href="/font-awesome/css/all.min.css">
    <!-- Leaflet from CDN. Some browsers' tracking-prevention may block this;
         when that happens the map panel shows a fallback message instead. -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <style>
        :root {
            --bg: #1e1f26;
            --surface: #2a2b35;
            --border: #3a3b47;
            --accent: #4e9af1;
            --green: #4caf7d;
            --red: #e05555;
            --yellow: #f0a832;
            --text: #e2e4ed;
            --muted: #7c7f93;
            --radius: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            min-height: 100vh;
            color-scheme: dark;
        }
        /* Bound the contacts area so the inbox below stays within reach
           without a long page scroll. The cards/list scroll internally. */
        #contacts-grid,
        #contacts-list {
            max-height: 50vh;
            min-height: 180px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        /* Make the scrollbar clearly visible against the dark surface */
        #contacts-grid::-webkit-scrollbar,
        #contacts-list::-webkit-scrollbar { width: 10px; }
        #contacts-grid::-webkit-scrollbar-track,
        #contacts-list::-webkit-scrollbar-track { background: transparent; }
        #contacts-grid::-webkit-scrollbar-thumb,
        #contacts-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
        }
        #contacts-grid::-webkit-scrollbar-thumb:hover,
        #contacts-list::-webkit-scrollbar-thumb:hover { background: var(--muted); }
        /* Keep the inbox compact so the whole page fits in a typical viewport. */
        #inbox-history { max-height: 180px; }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 10px;
        }
        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        header h1 span.logo {
            background: var(--accent);
            color: #fff;
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        #last-updated { font-size: 0.8rem; color: var(--muted); }

        #refresh-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.15s;
        }
        #refresh-btn:hover { background: var(--border); }

        /* ── Main layout: self node left, contacts right ───────── */
        #main-layout {
            display: flex;
            align-items: flex-start;
            gap: 0;
        }
        #self-section {
            flex: 0 0 300px;
        }
        #layout-divider {
            flex: 0 0 1px;
            background: var(--border);
            align-self: stretch;
            margin: 0 36px;
            min-height: 80px;
            display: none;
            margin-top: 36px;
            opacity: 29%;
        }
        #contacts-section {
            flex: 1;
            min-width: 0;
        }

        /* ── Section headers ───────────────────────────────────── */
        .section-title {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: var(--muted);
            margin: 0 0 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        /* ── Node grids ─────────────────────────────────────────── */
        #self-grid .node-card { width: 100%; }
        #contacts-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }
        #contacts-grid .node-card {
            width: 230px;
            flex-shrink: 0;
        }

        @media (max-width: 900px) {
            #main-layout { flex-direction: column; }
            #layout-divider { flex: none; width: 100%; height: 1px; margin: 24px 0; min-height: 0; }
            #self-section, #contacts-section { flex: none; width: 100%; }
            #contacts-grid .node-card { width: auto; flex: 1 1 220px; }
        }
        .node-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: visible;
            position: relative;
        }
        .node-header {
            padding: 10px 14px 8px;
            padding-right: 56px;  /* leave room for the floating badge */
            border-bottom: 1px solid var(--border);
        }
        .node-name { font-weight: 600; font-size: 0.95rem; }

        /* Floating badge — top-right overlay, doesn't affect card layout */
        .node-badge {
            position: absolute;
            top: 10px;
            right: 12px;
            z-index: 2;
            pointer-events: auto;
        }

        /* Floating map-pin button — bottom-LEFT overlay, mirrors fav-toggle */
        .map-toggle {
            position: absolute;
            bottom: 8px;
            left: 10px;
            z-index: 2;
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 1rem;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 4px;
            transition: color 0.12s, background 0.12s;
        }
        .map-toggle:hover { color: var(--green); background: rgba(76, 175, 125, 0.08); }
        /* List-view map indicator before the favorite slot */
        .row-map {
            display: inline-flex;
            align-items: center;
            color: var(--green);
            font-size: 0.9rem;
            margin-right: 6px;
            cursor: pointer;
        }
        .row-map.empty { visibility: hidden; }

        /* Map side panel (slides in from the right) */
        #map-panel {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 480px;
            max-width: 90vw;
            background: var(--surface);
            border-left: 1px solid var(--border);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.25s ease-out;
            box-shadow: -4px 0 16px rgba(0, 0, 0, 0.4);
        }
        #map-panel.open { transform: translateX(0); }
        #map-panel-header {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        #map-panel-header h3 {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
        }
        #map-panel-header .coords {
            font-size: 0.72rem;
            color: var(--muted);
            font-family: monospace;
            margin-top: 2px;
        }
        #map-panel-close {
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
        }
        #map-panel-close:hover { color: var(--text); background: var(--border); }
        #map-panel-body {
            flex: 1;
            position: relative;
            min-height: 0;
        }
        #map-canvas {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
        }
        #map-panel-footer {
            padding: 10px 14px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            font-size: 0.78rem;
        }
        #map-panel-footer a {
            color: var(--accent);
            text-decoration: none;
        }
        #map-panel-footer a:hover { text-decoration: underline; }
        #map-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 999;
            display: none;
        }
        #map-backdrop.open { display: block; }

        /* CSS-only Leaflet marker (no PNG dependency) */
        .mc-pin {
            background: transparent;
            border: none;
        }
        .mc-pin-inner {
            width: 20px;
            height: 20px;
            border-radius: 50% 50% 50% 0;
            background: var(--accent);
            border: 2px solid #fff;
            transform: rotate(-45deg);
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        /* Floating favorite toggle — bottom-right overlay on contact cards */
        .fav-toggle {
            position: absolute;
            bottom: 8px;
            right: 10px;
            z-index: 2;
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 1rem;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 4px;
            transition: color 0.12s, background 0.12s;
        }
        .fav-toggle:hover  { color: var(--yellow); background: rgba(240, 168, 50, 0.08); }
        .fav-toggle.active { color: var(--yellow); }
        /* List-view favorite indicator in front of the name */
        .row-fav {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            color: var(--yellow);
            font-size: 0.9rem;
            margin-right: 6px;
        }
        /* visibility:hidden (not display:none) so non-favorite rows keep
           the same name-column starting position as favorite rows */
        .row-fav.empty { visibility: hidden; }

        .badge {
            font-size: 1rem;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.35);
        }
        .badge i { font-size: 1rem; }
        .badge.online  { background: #1a3d2b; color: var(--green); }
        .badge.offline { background: #3d1a1a; color: var(--red); }
        .badge.unknown { background: #2e2e2e; color: var(--muted); }
        .badge.self    { background: #1a2e3d; color: var(--accent); }

        .node-metrics {
            /* extra bottom padding reserves room for the floating fav-star and
               map-pin overlays so they don't sit on top of the Last Seen row */
            padding: 8px 12px 28px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px 8px;
        }
        /* Single-line metric rows: "LABEL  value" inline. Compact. */
        .metric {
            display: flex;
            flex-direction: row;
            align-items: baseline;
            gap: 6px;
            min-width: 0;
        }
        .metric a { text-decoration: none; color: inherit; display: contents; }
        .metric a:hover .metric-value { color: var(--accent); }
        .metric-label::after { content: ""; }

        /* Hide metric rows that have no data (instead of showing a "—" placeholder). */
        .metric.empty { display: none; }

        /* Last Seen spans the full row at the bottom of the metric grid. */
        .metric[data-key="last_seen"] {
            grid-column: 1 / -1;
            margin-top: 2px;
        }
        .metric[data-key="last_seen"] .metric-label::after { content: ":"; }
        .metric[data-key="last_seen"] .metric-value { font-size: 0.82rem; }

        /* Clickable contact cards — visual cue */
        #contacts-grid .node-card { cursor: pointer; transition: border-color 0.15s, transform 0.1s; }
        #contacts-grid .node-card:hover { border-color: var(--accent); }
        #contacts-grid .node-card.compose-selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent);
        }

        /* Firmware info line shown under the self-node name */
        .fw-info {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 4px;
            font-family: -apple-system, "Segoe UI", monospace;
        }

        /* Direct-neighbour badge ("hops == 0") */
        .direct-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.62rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: #1a3d2b;
            color: var(--green);
            border-radius: 4px;
            padding: 2px 6px;
            margin-top: 4px;
        }
        .direct-chip i { font-size: 0.7rem; }
        .row-direct {
            display: inline-flex;
            align-items: center;
            color: var(--green);
            font-size: 0.85rem;
            margin-left: 8px;
        }

        /* Contact type chip (shown under node name in card header) */
        .type-chip {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 4px;
            padding: 2px 7px;
            margin-top: 4px;
        }
        .type-chip.type-1 { background: #1a2e3d; color: var(--accent); }
        .type-chip.type-2 { background: #3d2a1a; color: #f0a832; }
        .type-chip.type-3 { background: #1a3d2b; color: var(--green); }
        .type-chip.type-4 { background: #3d1a3d; color: #d090e0; }
        .type-chip.type-0 { background: #2e2e2e; color: var(--muted); }

        /* Group headings between online/offline + per-type sections */
        .contact-group-title {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin: 14px 0 8px;
            width: 100%;
        }
        .contact-group-title:first-child { margin-top: 0; }

        /* Contacts toolbar: view-toggle + type-filter + name-search on right */
        .contacts-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 14px;
            margin: 0 0 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .contacts-header .section-title {
            margin: 0;
            padding: 0;
            border: none;
        }
        #contacts-count {
            color: var(--text);
            font-weight: 500;
            margin-left: 6px;
            opacity: 0.7;
        }
        #contacts-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #contacts-toolbar select,
        #contacts-toolbar input {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 0.82rem;
            outline: none;
            min-width: 0;
        }
        #contacts-toolbar input[type="search"] { width: 180px; }
        #contacts-toolbar input:focus,
        #contacts-toolbar select:focus { border-color: var(--accent); }
        #contacts-toolbar .search-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        #contacts-toolbar .search-wrap i {
            position: absolute;
            left: 9px;
            color: var(--muted);
            font-size: 0.8rem;
            pointer-events: none;
        }
        #contacts-toolbar .search-wrap input { padding-left: 28px; }

        .view-toggle {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }
        .view-btn {
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 0.95rem;
            padding: 5px 11px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .view-btn:hover { color: var(--text); }
        .view-btn.active { background: var(--border); color: var(--accent); }

        /* Generic icon button in the contacts toolbar (e.g. manual_add_contacts toggle) */
        .toolbar-icon-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 6px;
            padding: 5px 11px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.15s, color 0.15s;
        }
        .toolbar-icon-btn:hover { color: var(--text); }
        .toolbar-icon-btn.active { color: var(--yellow); }       /* manual-add = ON (block auto-add) */
        .toolbar-icon-btn.inactive { color: var(--green); }      /* manual-add = OFF (auto-add) */

        /* List view */
        #contacts-list {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            /* No `overflow: hidden` here — it would defeat the
               internal scroll set higher up. */
        }
        /* Shared grid template for header + body rows so columns line up.
           cols: [checkbox] [status-dot] [name] [type] [last-seen wider] [snr] [hops] [trash] */
        .contact-row,
        .contact-row-header {
            display: grid;
            grid-template-columns: 24px 18px 1fr 110px 170px 70px 60px 40px;
            align-items: center;
            gap: 12px;
            padding: 4px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 0.82rem;
            line-height: 1.2;
        }
        .contact-row-header {
            background: var(--bg);
            color: var(--muted);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
            cursor: default;
        }
        .contact-row-header .row-bulk-actions {
            grid-column: 3 / -1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            text-transform: none;
            font-weight: 500;
            font-size: 0.78rem;
            color: var(--text);
        }
        .contact-row-header .row-bulk-actions .selected-count { color: var(--muted); font-size: 0.74rem; }
        .contact-row-header .row-bulk-actions button {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 5px;
            padding: 4px 10px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: color 0.1s, border-color 0.1s, background 0.1s;
        }
        .contact-row-header .row-bulk-actions button.danger:hover {
            color: var(--red); border-color: var(--red); background: rgba(224, 85, 85, 0.08);
        }
        .contact-row-header .row-bulk-actions button:disabled {
            opacity: 0.4; cursor: not-allowed;
        }
        .contact-row { cursor: pointer; transition: background 0.1s; }
        .contact-row:last-child { border-bottom: none; }
        .contact-row:hover { background: rgba(255, 255, 255, 0.03); }
        .contact-row.compose-selected { background: rgba(78, 154, 241, 0.08); }
        .contact-row.row-selected     { background: rgba(224, 85, 85, 0.08); }
        /* Custom icon-based checkbox (Domoticz host CSS sometimes hides native ones). */
        .row-check { display: flex; align-items: center; justify-content: center; }
        .row-check-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            cursor: pointer;
            color: var(--muted);
            font-size: 1.05rem;
            transition: color 0.12s;
        }
        .row-check-box:hover            { color: var(--text); }
        .row-check-box.checked          { color: var(--accent); }
        .row-check-box.indeterminate    { color: var(--accent); }
        .contact-row .row-status {
            width: 10px; height: 10px; border-radius: 50%;
        }
        .contact-row .row-status.online  { background: var(--green); }
        .contact-row .row-status.offline { background: var(--red); }
        .contact-row .row-name { font-weight: 500; color: var(--text); }
        .contact-row .row-name .row-pk {
            font-size: 0.7rem; color: var(--muted); margin-left: 8px; font-family: monospace;
        }
        .contact-row .row-type { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .contact-row .row-meta { color: var(--muted); font-size: 0.78rem; }
        .contact-row .row-snr  { color: var(--text); font-variant-numeric: tabular-nums; text-align: right; }
        .contact-row .row-hops { color: var(--muted); text-align: right; }
        .contact-row .row-remove {
            background: transparent;
            border: none;
            color: var(--red);
            font-size: 0.9rem;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 4px;
            transition: background 0.1s;
        }
        .contact-row .row-remove:hover { background: rgba(224, 85, 85, 0.15); }

        .contacts-empty {
            padding: 18px;
            text-align: center;
            color: var(--muted);
            font-size: 0.88rem;
        }

        /* Settings panel inside the connected-node card */
        .node-settings {
            border-top: 1px solid var(--border);
            padding: 12px 18px 14px;
        }
        .node-settings-header {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin: 0 0 10px;
        }
        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 7px;
        }
        .settings-row:last-child { margin-bottom: 0; }
        .settings-label {
            font-size: 0.78rem;
            color: var(--text);
        }
        .settings-options {
            display: flex;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            overflow: hidden;
        }
        .settings-btn {
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 0.72rem;
            padding: 3px 9px;
            cursor: pointer;
            transition: background 0.1s, color 0.1s;
        }
        .settings-btn:hover { color: var(--text); }
        .settings-btn.active {
            background: var(--accent);
            color: #fff;
        }

        /* Flood-scope text-input row */
        .settings-text-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .settings-text {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text);
            font-size: 0.78rem;
            padding: 3px 8px;
            width: 130px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.4s;
        }
        .settings-text:focus { border-color: var(--accent); }
        .settings-text.saved { box-shadow: 0 0 0 2px rgba(76, 175, 125, 0.5); }
        .settings-btn-save {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--muted);
            font-size: 0.78rem;
            padding: 3px 8px;
            cursor: pointer;
            transition: color 0.1s, border-color 0.1s;
        }
        .settings-btn-save:hover { color: var(--green); border-color: var(--green); }

        .metric-label {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            white-space: nowrap;
        }
        .metric-value {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text);
            transition: color 0.15s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .metric-value.na { color: var(--muted); font-style: italic; }

        /* Battery bar */
        .batt-wrap { display: flex; align-items: center; gap: 6px; }
        .batt-bar-bg {
            flex: 1;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }
        .batt-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
        .batt-bar-fill.high   { background: var(--green); }
        .batt-bar-fill.medium { background: var(--yellow); }
        .batt-bar-fill.low    { background: var(--red); }

        /* ── Error / loading ───────────────────────────────────── */
        #status-msg { text-align: center; color: var(--muted); margin-top: 40px; font-size: 0.9rem; }

        /* ── Inbox history ─────────────────────────────────────── */
        #inbox-history-section { margin-top: 16px; }

        .inbox-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .inbox-section-header h2 {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--muted);
        }

        #inbox-log-link {
            font-size: 0.8rem;
            color: var(--accent);
            text-decoration: none;
            padding: 4px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            transition: background 0.15s;
        }
        #inbox-log-link:hover { background: var(--border); }

        #inbox-history {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0;
            max-height: 400px;
            overflow-y: auto;
        }
        .inbox-msg {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 4px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            line-height: 1.25;
        }
        .inbox-msg:last-child { border-bottom: none; }
        .inbox-msg .msg-time {
            color: var(--muted);
            font-size: 0.75rem;
            white-space: nowrap;
            flex-shrink: 0;
            min-width: 130px;
        }
        .inbox-msg .msg-sender {
            color: var(--accent);
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .inbox-msg .msg-text {
            color: var(--text);
            word-break: break-word;
            user-select: text;
            -webkit-user-select: text;
            cursor: text;
        }
        /* Allow selecting time + sender too (e.g. copy a timestamp) */
        .inbox-msg .msg-time,
        .inbox-msg .msg-sender { user-select: text; -webkit-user-select: text; }
        .inbox-msg .msg-text .mention {
            color: #4caf7d;
            background: rgba(76,175,125,0.13);
            border-radius: 4px;
            padding: 0 4px;
            font-weight: 600;
        }

        @media (max-width: 540px) {
            .inbox-msg { flex-wrap: wrap; align-items: center; }
            .inbox-msg .msg-text { flex-basis: 100%; padding-top: 4px; padding-left: 2px; }
        }

        .msg-chan {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 4px;
            white-space: nowrap;
            flex-shrink: 0;
            background: var(--border);
            color: var(--muted);
        }
        .msg-chan.private { background: #2a3a4a; color: #7ab; }
        .inbox-msg.sent { background: rgba(78,154,241,0.06); border-left: 3px solid var(--accent); }
        .inbox-msg.sent .msg-sender { color: var(--muted); font-weight: 500; }
        /* Optimistic placeholder until the plugin confirms the send (~30s) */
        .inbox-msg.pending { opacity: 0.6; font-style: italic; }
        .inbox-msg.pending .msg-time { color: var(--yellow); font-style: normal; }

        /* ── Inbox filter bar ───────────────────────────────────── */
        #inbox-filters {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        #filter-rows { display: flex; flex-direction: column; gap: 6px; flex: 1; }
        .filter-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .filter-label {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            flex-shrink: 0;
            min-width: 56px;
        }

        .filter-btn {
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--muted);
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .filter-btn:hover { background: var(--border); }
        .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        #inbox-search {
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            outline: none;
            width: 160px;
            margin-left: auto;
            align-self: flex-start;
        }
        #inbox-search:focus { border-color: var(--accent); }

        #inbox-empty {
            padding: 20px 16px;
            color: var(--muted);
            font-size: 0.85rem;
            font-style: italic;
            text-align: center;
        }

        .msg-reply-btn {
            margin-left: auto;
            flex-shrink: 0;
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 4px;
            padding: 1px 7px;
            font-size: 0.72rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s, color 0.15s;
        }
        .inbox-msg:hover .msg-reply-btn { opacity: 1; }
        .msg-reply-btn:hover { color: var(--accent); border-color: var(--accent); }

        /* ── Compose bar ───────────────────────────────────────────── */
        #compose-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px;
        }
        #compose-target {
            font-size: 0.82rem;
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            outline: none;
            flex-shrink: 0;
        }
        #compose-target:focus { border-color: var(--accent); }

        #compose-input {
            flex: 1;
            font-size: 0.88rem;
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            outline: none;
            min-width: 0;
        }
        #compose-input:focus { border-color: var(--accent); }

        #compose-send {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 5px 14px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            flex-shrink: 0;
            transition: opacity 0.15s;
        }
        #compose-send:disabled { opacity: 0.45; cursor: default; }
        #compose-send:not(:disabled):hover { opacity: 0.85; }

        #compose-status { font-size: 0.75rem; flex-shrink: 0; text-align: right; }
        #compose-status.ok  { color: var(--green); }
        #compose-status.err { color: var(--red); }

        #compose-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            flex-shrink: 0;
        }

        #emoji-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 7px;
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        #emoji-btn:hover { background: var(--border); }

        #emoji-picker {
            display: none;
            position: absolute;
            bottom: calc(100% + 6px);
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 8px;
            z-index: 200;
            width: 340px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        #emoji-picker.open { display: block; }

        #emoji-picker-search {
            width: 100%;
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            outline: none;
            margin-bottom: 6px;
            box-sizing: border-box;
        }
        #emoji-picker-search:focus { border-color: var(--accent); }

        #emoji-scroll { max-height: 260px; overflow-y: auto; overflow-x: hidden; }
        #emoji-scroll::-webkit-scrollbar { width: 5px; }
        #emoji-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .emoji-category-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--muted);
            padding: 6px 2px 2px;
            grid-column: 1 / -1;
        }
        #emoji-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 1px; }
        .emoji-cell {
            font-size: 1.25rem;
            text-align: center;
            padding: 3px 1px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.1s;
            user-select: none;
            line-height: 1.5;
        }
        .emoji-cell:hover { background: var(--border); }

        /* Signal quality bar — compact for inline metric rows */
        .signal-wrap {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            min-width: 0;
        }
        .signal-wrap span { font-variant-numeric: tabular-nums; }
        .signal-bars { display: flex; align-items: flex-end; gap: 2px; height: 12px; flex-shrink: 0; }
        .signal-bars .bar {
            width: 3px;
            border-radius: 1px;
            background: var(--border);
            transition: background 0.3s;
        }
        .signal-bars .bar.active.excellent { background: var(--green); }
        .signal-bars .bar.active.good      { background: var(--yellow); }
        .signal-bars .bar.active.poor      { background: var(--red); }
    </style>
</head>
<body>

    <header>
        <h1><span class="logo">MC</span> MeshCore Dashboard</h1>
        <div style="display:flex;align-items:center;gap:14px">
            <span id="last-updated"></span>
            <button id="refresh-btn" onclick="loadData()">↻ Refresh</button>
        </div>
    </header>

    <div id="status-msg">Loading…</div>

    <div id="main-layout">
        <section id="self-section" style="display:none">
            <h2 class="section-title">Connected Node</h2>
            <div id="self-grid"></div>
        </section>

        <div id="layout-divider"></div>

        <section id="contacts-section" style="display:none">
            <div class="contacts-header">
                <h2 class="section-title">Contacts <span id="contacts-count"></span></h2>
                <div id="contacts-toolbar">
                    <div class="view-toggle" role="tablist" title="View mode">
                        <button id="view-cards" class="view-btn active" title="Card view"><i class="fa-solid fa-grip"></i></button>
                        <button id="view-list"  class="view-btn"        title="List view"><i class="fa-solid fa-list"></i></button>
                    </div>
                    <div class="search-wrap">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input id="filter-name" type="search" placeholder="Filter by name, type...">
                    </div>
                </div>
            </div>
            <div id="contacts-grid"></div>
            <div id="contacts-list" style="display:none"></div>
        </section>
    </div>

    <!-- ── Inbox history ─────────────────────────────────────── -->
    <div id="inbox-history-section">
        <div class="inbox-section-header">
            <h2>📨 Message Inbox</h2>
            <a id="inbox-log-link" href="#" target="_top" style="display:none">📋 View full log</a>
        </div>
        <!-- filter / search -->
        <div id="inbox-filters">
            <div id="filter-rows">
                <div class="filter-row">
                    <span class="filter-label">Channel</span>
                    <div id="channel-chips"></div>
                </div>
            </div>
            <input id="inbox-search" type="search" placeholder="Search sender / text…" oninput="_onInboxSearch(this.value)">
        </div>
        <!-- compose bar -->
        <div id="compose-bar" style="position:relative">
            <select id="compose-target" title="Send to"></select>
            <input id="compose-input" type="text" placeholder="Type a message…" maxlength="200"
                   onkeydown="if(event.key==='Enter')_sendMessage()">
            <button id="emoji-btn" onclick="_toggleEmojiPicker(event)" title="Insert emoji">😊</button>
            <div id="emoji-picker">
                <input id="emoji-picker-search" type="search" placeholder="Search…" oninput="_filterEmoji(this.value)" autocomplete="off">
                <div id="emoji-scroll"><div id="emoji-grid"></div></div>
            </div>
            <div id="compose-actions">
                <button id="compose-send" onclick="_sendMessage()">Send ✈</button>
                <span id="compose-status"></span>
            </div>
        </div>
        <div id="inbox-history">
            <div id="inbox-empty">No messages yet.</div>
        </div>
    </div>

    <script>
    (function () {
        // Metrics shown for the self (connected) node — in display order.
        // "key" matches the property names in meshcore_devices.json.
        const SELF_METRICS = [
            { key: "battery", label: "Battery", unit: "%", special: "battery" },
            { key: "battery_v", label: "Voltage", unit: "V" },
            { key: "rssi", label: "RSSI", unit: "dBm" },
            { key: "snr", label: "SNR", unit: "dB", special: "snr" },
            { key: "noise", label: "Noise Floor", unit: "dBm" },
            { key: "uptime", label: "Uptime", unit: "min", special: "uptime" },
            { key: "airtime", label: "TX Air", unit: "s" },
            { key: "pkts_sent", label: "Pkts Sent", unit: "" },
            { key: "pkts_recv", label: "Pkts Recv", unit: "" },
            { key: "last_seen", label: "Last Seen", unit: "" },
        ];

        // Metrics shown for remote contacts — only data available from contacts list / messages.
        const NODE_METRICS = [
            { key: "hops",      label: "Hops",      unit: ""   },
            { key: "snr",       label: "SNR",       unit: "dB", special: "snr" },
            { key: "last_seen", label: "Last Seen", unit: ""   },
        ];

        // ── Device map (loaded from meshcore_devices.json) ───────────────────────────
        // {
        //   inbox, inbox_value, self, written_at,
        //   nodes: { nodeName: { status: {idx, value, online}, rssi: {idx, value}, ... } }
        // }
        let _deviceMap = null;

        async function _loadDeviceMap() {
            try {
                const r = await fetch("/templates/meshcore_devices.json?_=" + Date.now());
                if (r.ok) _deviceMap = await r.json();
            } catch (_) { }
        }

        function deviceUrl(idx) {
            if (!idx) return "#";
            return `/index.html#/Devices/${idx}/Log`;
        }

        // Fetch all devices and return a byIdx lookup keyed on Domoticz idx.
        async function fetchDevices() {
            const resp = await fetch("/json.htm?type=command&param=getdevices&order=Name");
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            const all = data.result || [];
            const byIdx = {};
            for (const d of all) byIdx[d.idx] = d;
            return { all, byIdx };
        }

        function battClass(pct) {
            if (pct >= 60) return "high";
            if (pct >= 25) return "medium";
            return "low";
        }

        function renderBatteryHtml(pct, idx) {
            const cls = battClass(pct);
            return `
        <a href="${deviceUrl(idx)}" target="_top" title="View battery detail">
          <div class="metric-label">Battery</div>
          <div class="metric-value">
            <div class="batt-wrap">
              <span>${pct}%</span>
              <div class="batt-bar-bg">
                <div class="batt-bar-fill ${cls}" style="width:${pct}%"></div>
              </div>
            </div>
          </div>
        </a>`;
        }

        function _snrQuality(snr) {
            if (snr >= 7)  return { level: 4, cls: "excellent", label: "Excellent" };
            if (snr >= 3)  return { level: 3, cls: "excellent", label: "Good" };
            if (snr >= 0)  return { level: 2, cls: "good",      label: "Fair" };
            if (snr >= -5) return { level: 1, cls: "poor",      label: "Poor" };
            return                { level: 0, cls: "poor",      label: "Very Poor" };
        }

        function renderSnrHtml(snr, idx) {
            const q = _snrQuality(snr);
            const heights = [4, 7, 10, 14];
            const bars = heights.map((h, i) =>
                `<div class="bar${i < q.level ? ` active ${q.cls}` : ""}" style="height:${h}px"></div>`
            ).join("");
            const inner = `
              <div class="metric-label">SNR</div>
              <div class="metric-value">
                <div class="signal-wrap">
                  <div class="signal-bars">${bars}</div>
                  <span>${snr} dB</span>
                </div>
              </div>`;
            return idx
                ? `<a href="${deviceUrl(idx)}" target="_top" title="${q.label}">${inner}</a>`
                : inner;
        }

        function _formatUptime(rawMinutes) {
            const m = parseFloat(rawMinutes);
            if (isNaN(m) || m < 0) return null;
            const totalMin = Math.round(m);
            const days  = Math.floor(totalMin / 1440);
            const hours = Math.floor((totalMin % 1440) / 60);
            const mins  = totalMin % 60;
            const parts = [];
            if (days  > 0) parts.push(`${days}d`);
            if (hours > 0) parts.push(`${hours}h`);
            parts.push(`${mins}m`);
            return parts.join(" ");
        }

        function renderMetricHtml(label, value, unit, idx) {
            const display = value !== undefined && value !== null && value !== ""
                ? `${value}${unit ? " " + unit : ""}`
                : "—";
            const cls = display === "—" ? " na" : "";
            const inner = `<div class="metric-label">${label}</div><div class="metric-value${cls}">${display}</div>`;
            return idx
                ? `<a href="${deviceUrl(idx)}" target="_top" title="View ${label} detail">${inner}</a>`
                : inner;
        }

        // Build a raw value string from a slot object (from either JSON snapshot or live API).
        // slot = { idx, value, online } from JSON  OR  a Domoticz API device object.
        function _slotValue(slot) {
            if (!slot) return "";
            // Live API device object has a "Data" field; JSON snapshot has "value".
            return slot.Data !== undefined ? slot.Data : (slot.value || "");
        }

        function _slotIdx(slot) {
            if (!slot) return null;
            return slot.idx !== undefined ? slot.idx : (slot.ID || null);
        }

        function _slotOnline(slot) {
            if (!slot) return false;
            if (slot.online !== undefined) return slot.online;           // JSON snapshot
            return slot.Status === "On" || slot.Data === "On";           // live API
        }

        // Contact type names (from meshcore: CONTACT_TYPENAMES = NONE/CLI/REP/ROOM/SENS)
        const TYPE_LABELS = { 0: "", 1: "Contact", 2: "Repeater", 3: "Room Server", 4: "Sensor" };

        function _isFavorite(name) {
            return !!(_deviceMap && Array.isArray(_deviceMap.favorites) && _deviceMap.favorites.includes(name));
        }

        function _typeChipHtml(type) {
            const t = Number(type) || 0;
            const label = TYPE_LABELS[t];
            if (!label) return "";
            return `<span class="type-chip type-${t}">${label}</span>`;
        }

        // Render a complete node card from a slots map.
        // slots values can be either JSON snapshot objects or live API device objects.
        function renderNode(nodeName, slots, isSelf) {
            const statusSlot = slots.status || null;
            const statusIdx = _slotIdx(statusSlot);

            let badgeHtml;
            if (isSelf) {
                badgeHtml = `<span class="badge self" title="Connected"><i class="fa-solid fa-plug-circle-check"></i></span>`;
            } else if (statusSlot) {
                const online = _slotOnline(statusSlot);
                badgeHtml = online
                    ? `<a href="${deviceUrl(statusIdx)}" target="_top" style="text-decoration:none"><span class="badge online" title="Online"><i class="fa-solid fa-circle-check"></i></span></a>`
                    : `<a href="${deviceUrl(statusIdx)}" target="_top" style="text-decoration:none"><span class="badge offline" title="Offline"><i class="fa-solid fa-circle-xmark"></i></span></a>`;
            } else {
                badgeHtml = `<span class="badge unknown" title="Unknown"><i class="fa-solid fa-circle-question"></i></span>`;
            }

            const typeChip = isSelf ? "" : _typeChipHtml(slots.type);

            // Direct-neighbour chip — shows when hops == 0 (no intermediate repeater).
            // hops slot value may be "0", "0 hops", or empty/null.
            let directChip = "";
            if (!isSelf && slots.hops) {
                const hopsRaw = _slotValue(slots.hops).replace(/\s*hops?$/i, "").trim();
                if (hopsRaw === "0") directChip = `<span class="direct-chip" title="Direct path learned (0 intermediate repeaters). Based on past discovery, not a live RX check."><i class="fa-solid fa-tower-broadcast"></i> Direct</span>`;
            }

            // Firmware info on the self-node card (from send_device_query)
            let fwLine = "";
            if (isSelf && _deviceMap && _deviceMap.device_info && Object.keys(_deviceMap.device_info).length) {
                const di = _deviceMap.device_info;
                const fwVer = di["fw ver"];
                const fwBuild = di.fw_build || "";
                const model = di.model || "";
                const bits = [];
                if (fwVer != null) bits.push(`FW v${fwVer}`);
                if (fwBuild) bits.push(fwBuild);
                if (model) bits.push(model);
                if (bits.length) fwLine = `<div class="fw-info">${escHtml(bits.join("  "))}</div>`;
            }

            const metrics = isSelf ? SELF_METRICS : NODE_METRICS;
            let metricsHtml = "";
            for (const { key, label, unit, special } of metrics) {
                const slot = slots[key] || null;
                const devIdx = _slotIdx(slot);
                const raw = _slotValue(slot);
                const numVal = raw.replace(/\s*(dBm|dB|%|V|°C|hops|min|s|pkts)$/i, "").trim();
                // Remote contact cards: hide metric rows that have no usable value
                // (compact view). Self always shows everything so the user sees that
                // their connected node is reporting all stats.
                const hideEmpty = !isSelf && (!slot || numVal === "");
                const cls = hideEmpty ? "metric empty" : "metric";
                const div = `<div class="${cls}" data-node="${escHtml(nodeName)}" data-key="${key}">`;
                const end = `</div>`;
                if (!slot) {
                    metricsHtml += `${div}${renderMetricHtml(label, null, unit, null)}${end}`;
                    continue;
                }
                if (special === "battery") {
                    const pct = parseInt(numVal, 10);
                    metricsHtml += `${div}${isNaN(pct) ? renderMetricHtml(label, null, unit, devIdx) : renderBatteryHtml(pct, devIdx)}${end}`;
                } else if (special === "snr") {
                    const snr = parseFloat(numVal);
                    metricsHtml += `${div}${isNaN(snr) ? renderMetricHtml(label, null, unit, devIdx) : renderSnrHtml(snr, devIdx)}${end}`;
                } else if (special === "uptime") {
                    const formatted = _formatUptime(numVal);
                    metricsHtml += `${div}${renderMetricHtml(label, formatted, "", devIdx)}${end}`;
                } else {
                    metricsHtml += `${div}${renderMetricHtml(label, numVal, unit, devIdx)}${end}`;
                }
            }

            const settingsHtml = isSelf ? _renderNodeSettings() : "";
            const favHtml = isSelf ? "" : (() => {
                const fav = _isFavorite(nodeName);
                const icon = fav ? "fa-solid fa-star" : "fa-regular fa-star";
                return `<button class="fav-toggle ${fav ? "active" : ""}" data-node="${escHtml(nodeName)}" title="${fav ? "Remove from favorites" : "Mark as favorite"}"><i class="${icon}"></i></button>`;
            })();
            const mapHtml = (!isSelf && slots.lat != null && slots.lon != null && (slots.lat || slots.lon))
                ? `<button class="map-toggle" data-node="${escHtml(nodeName)}" data-lat="${slots.lat}" data-lon="${slots.lon}" title="Show on map"><i class="fa-solid fa-location-dot"></i></button>`
                : "";

            return `
        <div class="node-card" data-node="${escHtml(nodeName)}">
          <div class="node-header">
            <div class="node-name">${escHtml(nodeName)}</div>
            ${typeChip}
            ${directChip}
            ${fwLine}
            <span class="node-badge" data-node="${escHtml(nodeName)}">${badgeHtml}</span>
          </div>
          <div class="node-metrics">${metricsHtml}</div>
          ${settingsHtml}
          ${mapHtml}
          ${favHtml}
        </div>`;
        }

        // ── Self-node settings panel (rendered at the bottom of the connected card) ──

        const _SETTINGS_DEFS = [
            { key: "manual_add",     label: "Auto-add contacts",   options: [{v: 0, l: "On"},  {v: 1, l: "Off"}] },
            { key: "telemetry_base", label: "Telemetry: base",     options: [{v: 0, l: "Off"}, {v: 1, l: "Public"}, {v: 2, l: "Always"}] },
            { key: "telemetry_env",  label: "Telemetry: env",      options: [{v: 0, l: "Off"}, {v: 1, l: "Public"}, {v: 2, l: "Always"}] },
            { key: "telemetry_loc",  label: "Telemetry: location", options: [{v: 0, l: "Off"}, {v: 1, l: "Public"}, {v: 2, l: "Always"}] },
            { key: "adv_loc_policy", label: "Advert location",     options: [{v: 0, l: "Never"}, {v: 1, l: "Share"}] },
        ];

        function _currentSettingValue(key) {
            if (!_deviceMap) return null;
            if (key === "manual_add")     return _deviceMap.manual_add_contacts ? 1 : 0;
            if (key === "telemetry_base") return Number(_deviceMap.telemetry_mode_base) || 0;
            if (key === "telemetry_env")  return Number(_deviceMap.telemetry_mode_env) || 0;
            if (key === "telemetry_loc")  return Number(_deviceMap.telemetry_mode_loc) || 0;
            if (key === "adv_loc_policy") return Number(_deviceMap.adv_loc_policy) || 0;
            return null;
        }

        function _renderNodeSettings() {
            const rows = _SETTINGS_DEFS.map(def => {
                const cur = _currentSettingValue(def.key);
                const opts = def.options.map(o =>
                    `<button class="settings-btn ${o.v === cur ? "active" : ""}" data-key="${def.key}" data-val="${o.v}">${escHtml(o.l)}</button>`
                ).join("");
                return `<div class="settings-row">
                    <span class="settings-label">${escHtml(def.label)}</span>
                    <div class="settings-options">${opts}</div>
                </div>`;
            }).join("");
            const scopeVal = (_deviceMap && _deviceMap.default_flood_scope) || "";
            const scopeRow = `<div class="settings-row">
                <span class="settings-label" title="Default flood scope tag — empty = global flood. e.g. #nl or #europe.">Default flood scope</span>
                <div class="settings-text-wrap">
                    <input id="settings-flood-scope" class="settings-text" type="text"
                           value="${escHtml(scopeVal)}" placeholder="(global)" maxlength="31">
                    <button class="settings-btn-save" data-key="flood_scope" title="Save flood scope">
                        <i class="fa-solid fa-check"></i>
                    </button>
                </div>
            </div>`;
            return `<div class="node-settings">
                <div class="node-settings-header">Node Settings</div>
                ${rows}
                ${scopeRow}
            </div>`;
        }

        async function _applyNodeSetting(key, val) {
            const sendIdx = _deviceMap && _deviceMap.send_idx;
            if (!sendIdx) { alert("Cannot save: Mesh Send device not found."); return; }
            // Map dashboard key → plugin command syntax
            let cmd;
            if (key === "manual_add") {
                cmd = `!manual_add ${val ? "on" : "off"}`;
            } else {
                cmd = `!set ${key} ${val}`;
            }
            try {
                const url = `/json.htm?type=command&param=udevice&idx=${sendIdx}&nvalue=0&svalue=${encodeURIComponent(cmd)}`;
                const r = await fetch(url, { method: "GET" });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                // Optimistic update so the active highlight moves immediately
                if (_deviceMap) {
                    if (key === "manual_add")          _deviceMap.manual_add_contacts = !!val;
                    else if (key === "telemetry_base") _deviceMap.telemetry_mode_base = val;
                    else if (key === "telemetry_env")  _deviceMap.telemetry_mode_env  = val;
                    else if (key === "telemetry_loc")  _deviceMap.telemetry_mode_loc  = val;
                    else if (key === "adv_loc_policy") _deviceMap.adv_loc_policy      = val;
                }
                // Re-render the active highlights without losing the rest
                document.querySelectorAll(`.settings-btn[data-key="${key}"]`).forEach(b => {
                    b.classList.toggle("active", Number(b.dataset.val) === Number(val));
                });
            } catch (err) {
                alert(`Failed to save setting: ${err.message}`);
            }
        }

        function _initNodeSettings() {
            const root = document.getElementById("self-grid");
            if (!root || root._settingsBound) return;
            root._settingsBound = true;
            root.addEventListener("click", (ev) => {
                const btn = ev.target.closest(".settings-btn");
                if (btn) {
                    ev.preventDefault();
                    _applyNodeSetting(btn.dataset.key, Number(btn.dataset.val));
                    return;
                }
                const saveBtn = ev.target.closest(".settings-btn-save");
                if (saveBtn && saveBtn.dataset.key === "flood_scope") {
                    ev.preventDefault();
                    _saveFloodScope();
                }
            });
            // Enter inside the flood-scope input also saves
            root.addEventListener("keydown", (ev) => {
                if (ev.target.id === "settings-flood-scope" && ev.key === "Enter") {
                    ev.preventDefault();
                    _saveFloodScope();
                }
            });
        }

        async function _saveFloodScope() {
            const input = document.getElementById("settings-flood-scope");
            if (!input) return;
            const sendIdx = _deviceMap && _deviceMap.send_idx;
            if (!sendIdx) { alert("Cannot save: Mesh Send device not found."); return; }
            const val = input.value.trim();
            const cmd = `!flood_scope ${val}`;
            try {
                const url = `/json.htm?type=command&param=udevice&idx=${sendIdx}&nvalue=0&svalue=${encodeURIComponent(cmd)}`;
                const r = await fetch(url, { method: "GET" });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                // Optimistic: the plugin normalizes ("#nl" prefix) on apply.
                if (_deviceMap) {
                    _deviceMap.default_flood_scope = val
                        ? (val.startsWith("#") ? val : "#" + val)
                        : "";
                }
                input.value = _deviceMap.default_flood_scope || "";
                input.classList.add("saved");
                setTimeout(() => input.classList.remove("saved"), 1200);
            } catch (err) {
                alert(`Failed to save flood scope: ${err.message}`);
            }
        }

        // Patch an already-rendered card in-place with fresh data from byIdx.
        // Only rewrites the inner HTML of each metric cell — no full re-render.
        function patchNode(nodeName, isSelf, byIdx) {
            const mapSlots = (_deviceMap && _deviceMap.nodes && _deviceMap.nodes[nodeName]) || {};
            const metrics = isSelf ? SELF_METRICS : NODE_METRICS;

            // Patch badge
            const badgeEl = document.querySelector(`.node-badge[data-node="${CSS.escape(nodeName)}"]`);
            if (badgeEl && !isSelf) {
                const statusSlot = mapSlots.status;
                const statusIdx = statusSlot ? statusSlot.idx : null;
                const liveDev = statusIdx ? byIdx[statusIdx] : null;
                if (liveDev) {
                    const online = liveDev.Status === "On" || liveDev.Data === "On";
                    badgeEl.innerHTML = online
                        ? `<a href="${deviceUrl(statusIdx)}" target="_top" style="text-decoration:none"><span class="badge online" title="Online"><i class="fa-solid fa-circle-check"></i></span></a>`
                        : `<a href="${deviceUrl(statusIdx)}" target="_top" style="text-decoration:none"><span class="badge offline" title="Offline"><i class="fa-solid fa-circle-xmark"></i></span></a>`;
                }
            }

            // Patch each metric cell
            for (const { key, label, unit, special } of metrics) {
                const cell = document.querySelector(`.metric[data-node="${CSS.escape(nodeName)}"][data-key="${key}"]`);
                if (!cell) continue;
                const slot = mapSlots[key] || null;
                const devIdx = slot ? slot.idx : null;
                const liveDev = devIdx ? byIdx[devIdx] : null;
                if (!liveDev) continue;
                const raw = liveDev.Data || "";
                const numVal = raw.replace(/\s*(dBm|dB|%|V|°C|hops|min|s|pkts)$/i, "").trim();
                cell.innerHTML = special === "battery"
                    ? (() => { const pct = parseInt(numVal, 10); return isNaN(pct) ? renderMetricHtml(label, null, unit, devIdx) : renderBatteryHtml(pct, devIdx); })()
                    : special === "snr"
                    ? (() => { const snr = parseFloat(numVal); return isNaN(snr) ? renderMetricHtml(label, null, unit, devIdx) : renderSnrHtml(snr, devIdx); })()
                    : special === "uptime"
                    ? (() => { const formatted = _formatUptime(numVal); return renderMetricHtml(label, formatted, "", devIdx); })()
                    : renderMetricHtml(label, numVal, unit, devIdx);
            }
        }

        // ── Inbox history ────────────────────────────────────────────────────────────
        // On first load: render instantly from JSON snapshot, then fetch full history.
        // On every 10-second refresh: detect new messages via LastUpdate and prepend.

        const _inboxHistory = [];    // [{time, channel, sender, text}, ...] newest first
        let _inboxLastUpdate = null;  // LastUpdate of the last recorded entry
        let _inboxDevIdx2 = null;
        let _inboxLoaded = false; // true once initial history has been fetched
        const LS_INBOX_CHAN = "meshcore.inboxChanFilter";
        // Restore the last channel filter from localStorage; "" / null means "All"
        let _inboxChanFilter = (() => {
            try {
                const v = localStorage.getItem(LS_INBOX_CHAN);
                return v ? v : null;
            } catch (_) { return null; }
        })();
        let _inboxSearch = "";           // text search on sender + text (case-insensitive)

        let _channelNames = {};  // idx string → name, loaded from meshcore_channels.json

        async function _loadChannelNames() {
            try {
                const r = await fetch("/templates/meshcore_channels.json");
                if (r.ok) _channelNames = await r.json();
            } catch (_) { }
        }

        function _chanLabel(idxStr) {
            if (_channelNames[idxStr]) return _channelNames[idxStr];
            const n = parseInt(idxStr, 10);
            return isNaN(n) ? `Ch ${idxStr}` : `Ch ${n}`;
        }

        function _parseInboxData(raw) {
            // Format: [ChannelName|sender] text  or  [P|sender] text
            // Legacy: [C0|sender] text  or  [sender] text  (no pipe)

            const m = raw.match(/^\[([^\]]+)\]\s*(.*)/s);
            if (!m) return { channel: null, sender: "", text: raw };
            const meta = m[1], text = m[2];
            const pipe = meta.indexOf("|");
            if (pipe >= 0) {
                const chanPart = meta.slice(0, pipe);
                const sender = meta.slice(pipe + 1);
                let channel;
                if (chanPart === "P") {
                    channel = "Private";
                } else if (/^C\d+$/.test(chanPart)) {
                    // Legacy C<idx> format — resolve via _chanLabel
                    channel = _chanLabel(chanPart.slice(1));
                } else {
                    // New format — channel name is already in the tag
                    channel = chanPart;
                }
                return { channel, sender, text };
            }
            return { channel: null, sender: meta, text };
        }

        async function _fetchTextLog(idx) {
            try {
                const resp = await fetch(`/json.htm?type=command&param=gettextlog&idx=${idx}`);
                if (!resp.ok) return [];
                const data = await resp.json();
                return data.result || [];
            } catch (_) { return []; }
        }

        async function loadInboxHistory(inboxDev) {
            const container = document.getElementById("inbox-history");
            const logLink = document.getElementById("inbox-log-link");

            if (!inboxDev || !inboxDev.idx) {
                container.innerHTML = `<div id="inbox-empty">No messages yet.</div>`;
                return;
            }

            _inboxDevIdx2 = inboxDev.idx;
            logLink.href = `/index.html#/Devices/${_inboxDevIdx2}/Log`;
            logLink.style.display = "";

            // ── First load: populate from Domoticz text log history ──
            if (!_inboxLoaded) {
                _inboxLoaded = true;
                const entries = await _fetchTextLog(_inboxDevIdx2);
                // Remove any snapshot placeholder that was injected by initialRender()
                const snapIdx = _inboxHistory.findIndex(m => m._snapshot);
                if (snapIdx !== -1) _inboxHistory.splice(snapIdx, 1);
                for (const e of entries) {
                    const raw = e.Data || e.Value || "";
                    const time = e.Date || "";
                    if (!raw) continue;
                    const { channel, sender, text } = _parseInboxData(raw);
                    _inboxHistory.push({ time, channel, sender, text });   // API returns oldest-first
                }
                // After loading history, record the current LastUpdate so we don't
                // double-add the most recent entry on the next refresh.
                _inboxLastUpdate = inboxDev.LastUpdate || null;
            }

            // ── Every refresh: prepend newly arrived messages ──
            const update = inboxDev.LastUpdate || "";
            const data = inboxDev.Data || "";
            if (data && update && update !== _inboxLastUpdate) {
                _inboxLastUpdate = update;
                const { channel, sender, text } = _parseInboxData(data);
                // If this is the confirmation of a recent optimistic echo,
                // drop the pending placeholder so we don't show it twice.
                if (sender && (sender.startsWith("> ") || sender.startsWith("▶"))) {
                    const pIdx = _inboxHistory.findIndex(m =>
                        m._pending && m.channel === channel && m.sender === sender && m.text === text);
                    if (pIdx >= 0) _inboxHistory.splice(pIdx, 1);
                }
                _inboxHistory.unshift({ time: update, channel, sender, text });
                if (_inboxHistory.length > 200) _inboxHistory.pop();
            }

            _renderInbox(container);
        }

        let _lastRenderedInboxHtml = "";  // dedup: skip DOM replace when nothing changed

        function _renderInbox(container) {
            if (!_inboxHistory.length) {
                container.innerHTML = `<div id="inbox-empty">No messages yet.</div>`;
                _lastRenderedInboxHtml = "";
                _renderChannelChips(_allChannelChips());
                return;
            }

            const chips = _allChannelChips();
            // If a previously-saved channel filter no longer corresponds to any
            // existing channel/private chip, fall back to "All" so the user
            // doesn't see a misleading "No messages match" forever.
            if (_inboxChanFilter && !chips.includes(_inboxChanFilter)) {
                _setChanFilter(null);
                return;
            }
            _renderChannelChips(chips);

            const needle = _inboxSearch.toLowerCase();
            const visible = _inboxHistory.filter(m => {
                if (_inboxChanFilter && m.channel !== _inboxChanFilter) return false;
                if (needle && !(m.sender || "").toLowerCase().includes(needle)
                    && !(m.text || "").toLowerCase().includes(needle)) return false;
                return true;
            });

            if (!visible.length) {
                container.innerHTML = `<div id="inbox-empty">No messages match the filter.</div>`;
                _lastRenderedInboxHtml = "";
                return;
            }

            const html = visible.map(({ time, channel, sender, text, _pending }) => {
                // Outgoing marker may be "> " (current, ASCII-safe) or "▶" (legacy)
                const isSent = sender && (sender.startsWith("> ") || sender.startsWith("▶"));
                const isPending = !!_pending;
                const chanHtml = channel
                    ? `<span class="msg-chan${channel === "Private" ? " private" : ""}">${escHtml(channel)}</span>`
                    : "";
                const replyTarget = sender && sender !== "?" && !isSent ? escHtml(sender) : "";
                const replyChannel = channel && channel !== "Private" ? escHtml(channel) : "";
                const replyBtn = replyTarget
                    ? `<button class="msg-reply-btn" onclick="_replyTo(event,'${replyTarget}','${replyChannel}')" title="Reply to ${replyTarget}">↩ Reply</button>`
                    : "";
                const timeLabel = isPending ? "sending…" : escHtml(time);
                return `<div class="inbox-msg${isSent ? " sent" : ""}${isPending ? " pending" : ""}">
          <span class="msg-time">${timeLabel}</span>
          ${chanHtml}
          ${sender ? `<span class="msg-sender">${escHtml(sender)}</span>` : ""}
          <span class="msg-text">${_renderMentions(text)}</span>
          ${replyBtn}
        </div>`;
            }).join("");

            // Only touch the DOM when content actually changed — preserves scroll position
            if (html !== _lastRenderedInboxHtml) {
                // Don't stomp an active text selection inside the inbox
                // (the user is mid-drag trying to copy text). Defer until next tick.
                const sel = window.getSelection && window.getSelection();
                const selInInbox = sel && !sel.isCollapsed && sel.anchorNode
                    && container.contains(sel.anchorNode);
                if (selInInbox) return;

                const scrollTop = container.scrollTop;
                container.innerHTML = html;
                container.scrollTop = scrollTop;
                _lastRenderedInboxHtml = html;
            }
        }

        function _renderChipRow(containerId, items, activeValue, onClickFn) {
            const chipBar = document.getElementById(containerId);
            if (!chipBar) return;
            const needed = [null, ...items];
            chipBar.querySelectorAll(".filter-btn").forEach(btn => {
                const val = btn.dataset.filterval === "__all__" ? null : btn.dataset.filterval;
                if (!needed.includes(val)) btn.remove();
            });
            needed.forEach(c => {
                const key = c === null ? "__all__" : c;
                const label = c === null ? "All" : c;
                let btn = chipBar.querySelector(`.filter-btn[data-filterval="${CSS.escape(key)}"]`);
                if (!btn) {
                    btn = document.createElement("button");
                    btn.className = "filter-btn";
                    btn.dataset.filterval = key;
                    btn.textContent = label;
                    btn.addEventListener("click", () => onClickFn(c));
                    if (c === null) chipBar.prepend(btn);
                    else chipBar.appendChild(btn);
                }
                btn.classList.toggle("active", activeValue === c);
            });
        }

        function _renderChannelChips(channels) {
            _renderChipRow("channel-chips", channels, _inboxChanFilter, _setChanFilter);
        }

        // Union of: channels we've ever seen in the inbox + every channel configured on the device.
        // This way every device-known channel (e.g. #leusden) appears as a chip even before its
        // first message arrives.
        function _allChannelChips() {
            const seen = new Set(_inboxHistory.map(m => m.channel).filter(Boolean));
            for (const name of Object.values(_channelNames)) {
                if (name) seen.add(name);
            }
            return [...seen].sort();
        }

        function _setChanFilter(key) {
            _inboxChanFilter = key;
            try {
                if (key) localStorage.setItem(LS_INBOX_CHAN, key);
                else     localStorage.removeItem(LS_INBOX_CHAN);
            } catch (_) {}
            _syncComposeTarget();
            _lastRenderedInboxHtml = "";
            const container = document.getElementById("inbox-history");
            if (container) _renderInbox(container);
        }

        function _syncComposeTarget() {
            const sel = document.getElementById("compose-target");
            if (!sel) return;
            if (_inboxChanFilter && _inboxChanFilter !== "Private") {
                const chanIdx = Object.entries(_channelNames).find(([, n]) => n === _inboxChanFilter);
                if (chanIdx) {
                    const val = `#${chanIdx[0]}`;
                    if ([...sel.options].some(o => o.value === val)) sel.value = val;
                }
            }
        }

        function _onInboxSearch(val) {
            _inboxSearch = val;
            _lastRenderedInboxHtml = "";
            const container = document.getElementById("inbox-history");
            if (container) _renderInbox(container);
        }

        function escHtml(s) {
            return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        function _renderMentions(text) {
            return escHtml(text).replace(/@\[([^\]]+)\]|@(\S+)/g, (m, bracketed, plain) =>
                bracketed ? `<span class="mention">@[${bracketed}]</span>`
                          : `<span class="mention">@${plain}</span>`);
        }

        // ── Contacts filter / sort / view state ──────────────────────────────────────

        let _viewMode = "cards";      // "cards" or "list"
        let _filterName = "";         // matches against name + type label
        const _selectedContacts = new Set();   // contact names checked in list view
        // Cached live-resolver from the last loadData() call so view-toggling /
        // filter changes don't fall back to stale JSON snapshot values.
        let _lastLiveSlotsOf = null;
        let _lastRemoteNodes = [];

        // Build sorted/filtered groups for the contacts area.
        // Returns an array of { groupLabel, contacts: [{name, slots, type, online, lastTs}] }
        function _buildContactGroups(remoteNodes, liveSlotsOf) {
            const items = remoteNodes.map(name => {
                const slots = liveSlotsOf(name);
                const type = Number(slots.type) || 0;
                const online = _slotOnline(slots.status);
                // Parse last_seen "YYYY-MM-DD HH:MM:SS" into a unix timestamp for sorting
                let lastTs = Number(slots.last_advert) || 0;
                if (!lastTs && slots.last_seen) {
                    const raw = _slotValue(slots.last_seen);
                    if (raw) {
                        const d = new Date(raw.replace(" ", "T"));
                        if (!isNaN(d.getTime())) lastTs = Math.floor(d.getTime() / 1000);
                    }
                }
                return { name, slots, type, online, lastTs, favorite: _isFavorite(name) };
            });

            // Apply filter — matches against name and type label (e.g. "repeater")
            const q = _filterName.trim().toLowerCase();
            const filtered = q
                ? items.filter(it => {
                    if (it.name.toLowerCase().includes(q)) return true;
                    const typeLabel = (TYPE_LABELS[it.type] || "").toLowerCase();
                    return typeLabel && typeLabel.includes(q);
                })
                : items;

            // Sort:
            //   1. online before offline
            //   2. favorites before non-favorites (within the same online/offline group)
            //   3. type rank: Contact(1) → Sensor(4) → Room(3) → Repeater(2) → Unknown(0)
            //   4. newer last_advert first
            //   5. by name
            const TYPE_RANK = { 1: 0, 4: 1, 3: 2, 2: 3, 0: 4 };
            filtered.sort((a, b) => {
                if (a.online !== b.online)     return a.online ? -1 : 1;
                if (a.favorite !== b.favorite) return a.favorite ? -1 : 1;
                const ra = TYPE_RANK[a.type] ?? 9;
                const rb = TYPE_RANK[b.type] ?? 9;
                if (ra !== rb) return ra - rb;
                if (a.lastTs !== b.lastTs) return b.lastTs - a.lastTs;
                return a.name.localeCompare(b.name);
            });

            return filtered;
        }

        function _renderListRow(item) {
            const { name, slots, type, online, lastTs } = item;
            const lastSeen = slots.last_seen ? _slotValue(slots.last_seen) : "";
            const snr = slots.snr ? _slotValue(slots.snr).replace(/\s*dB$/i, "") : "";
            // Strip the " hops" unit suffix Domoticz adds — we already render "hops" ourselves.
            const hops = slots.hops ? _slotValue(slots.hops).replace(/\s*hops?$/i, "").trim() : "";
            const typeLabel = TYPE_LABELS[type] || "—";
            const isChecked = _selectedContacts.has(name);
            const selectedCls = isChecked ? " row-selected" : "";
            const checkIcon = isChecked ? "fa-square-check" : "fa-square";
            const checkCls  = isChecked ? "row-check-box checked" : "row-check-box";
            const fav = _isFavorite(name);
            const favHtml = fav
                ? `<span class="row-fav" title="Favorite"><i class="fa-solid fa-star"></i></span>`
                : `<span class="row-fav empty"></span>`;
            const hasLoc = slots.lat != null && slots.lon != null && (slots.lat || slots.lon);
            const mapInline = hasLoc
