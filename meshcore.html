        }

        // LoS tool — lives outside _topologyLayer so it survives layer-group rebuilds.
        let _losLayer = null;           // L.LayerGroup for pins + polyline
        let _losPins = [];              // [{ id, lat, lon, h, label }]
        let _losNextId = 1;
        let _losProfileDebounce = null; // setTimeout handle for debounced profile fetch
        let _losChart = null;           // Highcharts instance for elevation profile
        const _LOS_SAMPLES = 256;       // interpolated points per segment
        const _LOS_FREQ_GHZ = 0.910525;
        const _LOS_MAX_SEG_KM = 1000;   // refuse pins more than this apart
        let _losElevCmdId = 0;          // monotonic counter for elevation cmd correlation
        let _losGeneration = 0;         // incremented on pin layout change; guards stale callbacks
        let _losSelectedSeg = 0;        // currently-selected segment index (0 = first segment)

        // ── Coverage / propagation heatmap ───────────────────────────────────
        let _propLayer = null;          // L.GridLayer subclass — canvas overlay
        let _propWorker = null;         // Web Worker (inline blob)
        let _propSnrGrid = null;        // Float32Array(200*200) latest result
        let _propGrid = null;           // { originLat, originLon, halfSpanKm, cols, rows }
        let _propDebounce = null;       // setTimeout handle for 500 ms debounce
        let _propElevCmdId = 0;         // monotonic cmd correlation counter
        let _propGeneration = 0;        // incremented on cancel; guards stale callbacks
        let _propOriginMarker = null;   // L.Marker with pulsing halo for the origin

        // SX1276 receiver sensitivity (dBm): _LORA_THRESHOLD[bw_kHz][sf]
        // Values from Semtech SX1276 datasheet table 23 (RSSI sensitivity).
        // Wider bandwidth degrades sensitivity by ~3 dB per BW doubling.
        const _LORA_THRESHOLD = {
            7.8:   { 7:-126, 8:-129, 9:-132, 10:-135, 11:-137, 12:-140 },
            15.6:  { 7:-124, 8:-127, 9:-130, 10:-133, 11:-135, 12:-138 },
            31.25: { 7:-124, 8:-127, 9:-130, 10:-133, 11:-135, 12:-138 },
            62.5:  { 7:-123, 8:-126, 9:-129, 10:-132, 11:-133, 12:-136 },
            125:   { 7:-123, 8:-126, 9:-129, 10:-132, 11:-134.5, 12:-137 },
            250:   { 7:-120, 8:-123, 9:-126, 10:-129, 11:-131.5, 12:-134 },
            500:   { 7:-117, 8:-120, 9:-123, 10:-126, 11:-128.5, 12:-131 },
        };

        // Clutter-loss additive constants per propagation model.
        const _CLUTTER_LOSS = { fs: 0, terrain: 0, suburban: 5, urban: 15, indoor: 25 };

        // Coverage gradient stops (same palette as activity heatmap).
        const _COV_GRADIENT = [
            [0,    "#3b82f6"],
            [0.33, "#22c55e"],
            [0.66, "#f59e0b"],
            [1.0,  "#ef4444"],
        ];

        // Build the worker source as a template literal.
        // The worker receives one message: { type:'compute', ... } and
        // posts back { type:'result', snr: Float32Array } or { type:'error', msg }.
        const _PROP_WORKER_SRC = `
"use strict";
// Haversine distance (m) between two lat/lon pairs.
function haversineM(lat1,lon1,lat2,lon2){
    const R=6371000,d2r=Math.PI/180;
    const p1=lat1*d2r,p2=lat2*d2r;
    const dp=(lat2-lat1)*d2r,dl=(lon2-lon1)*d2r;
    const a=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
    return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
// Bullington single-equivalent knife-edge diffraction loss (dB).
// samples: array of terrain heights along the path (including endpoints),
// heights: [h_tx, h_rx] antenna AGL heights, d: total path length in metres.
// Returns extra diffraction loss in dB (0 if clear LOS).
function bullingtonLoss(samples, hTx, hRx, d){
    const n=samples.length;
    if(n<3)return 0;
    const elev0=samples[0]||0,elevN=samples[n-1]||0;
    const antTx=elev0+hTx, antRx=elevN+hRx;
    let maxNu=-Infinity;
    for(let i=1;i<n-1;i++){
        const frac=i/(n-1);
        const dFrac=frac*d;
        const dRem=(1-frac)*d;
        const losH=antTx+frac*(antRx-antTx);
        const h=(samples[i]||0)-losH;
        if(h<=0)continue;
        // Knife-edge nu per ITU-R P.526; lambda = c/f
        const lambda=299792458/freqHz;
        const nu=h*Math.sqrt(2*(dFrac+dRem)/(lambda*dFrac*dRem));
        if(nu>maxNu)maxNu=nu;
    }
    if(maxNu<=0)return 0;
    if(maxNu<=1)return 6.02+9.11*maxNu+1.27*maxNu*maxNu;
    return 13.26+20*Math.log10(maxNu);
}
onmessage=function(ev){
    const d=ev.data;
    if(d.type!=='compute')return;
    const {cols,rows,originElev,txPower,gainTx,gainRx,rxHeight,
           freqHz,threshold,fadeMargin,useTerrain,clutterLoss,
           originLat,originLon}=d;
    // Reconstruct typed arrays from transferred ArrayBuffers.
    const cellLats=new Float64Array(d.cellLats);
    const cellLons=new Float64Array(d.cellLons);
    const cellElevs=useTerrain && d.cellElevs ? new Float64Array(d.cellElevs) : null;
    const N=cols*rows;
    const snr=new Float32Array(N);
    const TERRAIN_SAMPLES=32;
    for(let i=0;i<N;i++){
        const cLat=cellLats[i], cLon=cellLons[i];
        const distM=haversineM(originLat,originLon,cLat,cLon);
        if(distM<1){snr[i]=30;continue;}
        if(distM>50000){snr[i]=-999;continue;}
        // Free-space path loss
        const Lfs=20*Math.log10(distM)+20*Math.log10(freqHz)-147.55;
        // Terrain attenuation
        let Lterrain=0;
        if(cellElevs){
            // Elevation profile packed as [i*TERRAIN_SAMPLES ... +TERRAIN_SAMPLES-1]
            const offsets=new Float64Array(TERRAIN_SAMPLES);
            for(let k=0;k<TERRAIN_SAMPLES;k++){
                offsets[k]=cellElevs[i*TERRAIN_SAMPLES+k]||0;
            }
            Lterrain=bullingtonLoss(offsets,0,rxHeight,distM);
        }
        const RX=txPower+gainTx+gainRx-Lfs-Lterrain-clutterLoss;
        snr[i]=RX-threshold-fadeMargin;
    }
    postMessage({type:'result',snr:snr.buffer},[snr.buffer]);
};
`;

        function _propGetSetting(key, def) {
            const k = "coverage:" + key;
            return _topoGetStr(k, String(def));
        }
        function _propSetSetting(key, val) {
            const k = "coverage:" + key;
            _topoSetStr(k, String(val));
        }

        // Return the LoRa sensitivity threshold for given bw (kHz string) and sf (int).
        function _loraThr(bwStr, sf) {
            const bwNum = parseFloat(bwStr);
            const row = _LORA_THRESHOLD[bwNum] || _LORA_THRESHOLD[62.5];
            return row[sf] !== undefined ? row[sf] : -120;
        }

        // Gather settings from localStorage, returning a plain object.
        function _propSettings() {
            const sf = parseInt(_propGetSetting("sf", 7), 10);
            const bw = _propGetSetting("bw", "62.5");
            const cr = _propGetSetting("cr", "4/8");
            return {
                origin:      _propGetSetting("origin", "self"),
                txPower:     parseFloat(_propGetSetting("txPower", "20")),
                gainTx:      parseFloat(_propGetSetting("gainTx", "2")),
                gainRx:      parseFloat(_propGetSetting("gainRx", "2")),
                rxHeight:    parseFloat(_propGetSetting("rxHeight", "2")),
                noiseFigure: parseFloat(_propGetSetting("noiseFigure", "6")),
                fadeMargin:  parseFloat(_propGetSetting("fadeMargin", "10")),
                freq:        parseFloat(_propGetSetting("freq", "910.525")),
                bw, sf, cr,
                model:       _propGetSetting("model", "terrain"),
                useTerrain:  _propGetSetting("useTerrain", "1") !== "0",
                threshold:   _loraThr(bw, sf),
            };
        }

        // Resolve origin name → { lat, lon, elev? }.
        function _propOriginCoords(originName) {
            let coords = null;
            if (!originName || originName === "self") {
                const si = _deviceMap && _deviceMap.self_info;
                if (si && si.adv_lat != null && (si.adv_lat || si.adv_lon))
                    coords = { lat: si.adv_lat, lon: si.adv_lon };
                else if (_domoticzLocation && _domoticzLocation.lat != null)
                    coords = { lat: _domoticzLocation.lat, lon: _domoticzLocation.lon };
            } else {
                const idx = _buildNodeCoordIndex();
                coords = idx[originName] || null;
            }
            if (!coords) return null;
            const { lat, lon } = coords;
            if (lat < -90 || lat > 90 || lon < -180 || lon > 180) return null;
            return coords;
        }

        // Build the 200×200 lat/lon grid centred on origin, span = 2× horizon.
        // Coverage grid resolution. 100 × 100 = 10 000 cells × 16 terrain
        // samples per ray = 160 000 elevation points; chunked at 1 000/cmd
        // that is ~160 WS round-trips — feasible in 10-30 s on a cold cache
        // and a couple of seconds when fully cache-warm. At 200 × 200 × 32
        // it was 1.28 M points and 1 280 round-trips, which the user saw as
        // the slow "X / 40000" progress climb.
        const _PROP_COLS = 100, _PROP_ROWS = 100;
        const _PROP_MAX_KM = 50;

        function _propBuildGrid(originLat, originLon) {
            const R = 6371.0;
            const halfSpanKm = _PROP_MAX_KM;
            const halfSpanLat = (halfSpanKm / R) * (180 / Math.PI);
            const halfSpanLon = (halfSpanKm / (R * Math.cos(originLat * Math.PI / 180))) * (180 / Math.PI);
            const lats = new Float64Array(_PROP_COLS * _PROP_ROWS);
            const lons = new Float64Array(_PROP_COLS * _PROP_ROWS);
            for (let r = 0; r < _PROP_ROWS; r++) {
                for (let c = 0; c < _PROP_COLS; c++) {
                    const lat = originLat + halfSpanLat * (1 - 2 * r / (_PROP_ROWS - 1));
                    const lon = originLon + halfSpanLon * (-1 + 2 * c / (_PROP_COLS - 1));
                    const idx = r * _PROP_COLS + c;
                    lats[idx] = lat;
                    lons[idx] = lon;
                }
            }
            return { originLat, originLon, halfSpanKm, halfSpanLat, halfSpanLon, cols: _PROP_COLS, rows: _PROP_ROWS, lats, lons };
        }

        // Update the progress label in the drawer.
        function _propSetProgress(text) {
            const el = document.getElementById("topo-cov-progress");
            if (el) el.innerHTML = text ? `<i class="fa-solid fa-spinner fa-spin"></i> ${text}` : "";
        }

        // Cancel any in-flight computation (worker + pending callbacks).
        function _propCancel() {
            ++_propGeneration;
            if (_propDebounce) { clearTimeout(_propDebounce); _propDebounce = null; }
            if (_propWorker) { try { _propWorker.terminate(); } catch (_) {} _propWorker = null; }
            _propSetProgress("");
        }

        // Fetch terrain profile samples along each ray (origin → each cell) in
        // TERRAIN_SAMPLES points. We pack them into a Float64Array and ship to worker.
        // Returns a Float64Array(N * TERRAIN_SAMPLES) or null on failure.
        const _PROP_TERRAIN_SAMPLES = 16;
        // Domoticz caps `plugin_command` WebSocket frames at 65 536 bytes.
        // Coords are rounded to 4 dp before serialising (the elevation cache
        // already quantises at 4 dp ≈ 11 m, so this is lossless from the
        // cache's perspective). With 4-dp coords each point serialises to
        // roughly 17 bytes, so 1000 points ≈ 17 KB — well under the cap.
        const _PROP_CHUNK = 1000;

        async function _propFetchTerrainProfiles(grid, gen) {
            const N = grid.cols * grid.rows;
            const SAMP = _PROP_TERRAIN_SAMPLES;
            // Build list of all sample lat/lons (N * SAMP points total).
            // For each cell, we sample SAMP points linearly from origin to cell.
            const allLats = new Float64Array(N * SAMP);
            const allLons = new Float64Array(N * SAMP);
            for (let i = 0; i < N; i++) {
                const cLat = grid.lats[i], cLon = grid.lons[i];
                for (let k = 0; k < SAMP; k++) {
                    const f = k / (SAMP - 1);
                    allLats[i * SAMP + k] = grid.originLat + f * (cLat - grid.originLat);
                    allLons[i * SAMP + k] = grid.originLon + f * (cLon - grid.originLon);
                }
            }
            const total = N * SAMP;
            const result = new Float64Array(total);
            let fetched = 0;
            while (fetched < total) {
                if (_propGeneration !== gen) return null;
                const end = Math.min(fetched + _PROP_CHUNK, total);
                const chunk = [];
                for (let j = fetched; j < end; j++) {
                    // Round to 4 dp (~11 m grid) to match the elevation cache
                    // quantisation; further precision is discarded server-side
                    // anyway and only wastes WS frame bytes.
                    chunk.push([
                        Math.round(allLats[j] * 1e4) / 1e4,
                        Math.round(allLons[j] * 1e4) / 1e4,
                    ]);
                }
                const id = ++_propElevCmdId;
                let elevs;
                try {
                    const res = await new Promise((resolve, reject) => {
                        let unsub;
                        const timer = setTimeout(() => { unsub && unsub(); reject(new Error("timeout")); }, 45000);
                        unsub = _pluginWS.onPluginMessage(msg => {
                            if (msg && msg.t === "cmd_result" && msg.id === id) {
                                clearTimeout(timer); unsub();
                                if (msg.ok) resolve(msg);
                                else reject(new Error(msg.error || "elevation failed"));
                            }
                        });
                        _pluginWS.sendPluginCommand({ t: "cmd", cmd: "elevation", points: chunk, id });
                    });
                    elevs = res.elevations;
                } catch (_) {
                    return null; // elevation service unavailable
                }
                if (_propGeneration !== gen) return null;
                for (let j = 0; j < (elevs ? elevs.length : 0); j++) {
                    result[fetched + j] = elevs[j] != null ? elevs[j] : 0;
                }
                fetched = end;
                const done = Math.round(fetched / (SAMP)); // cells done
                _propSetProgress(`Computing coverage… ${done.toLocaleString()} / ${N.toLocaleString()}`);
            }
            return result;
        }

        // Spawn worker, send compute message, await result.
        async function _propRunWorker(grid, cellElevs, settings, originElevM, gen) {
            if (_propWorker) { try { _propWorker.terminate(); } catch (_) {} _propWorker = null; }
            const blob = new Blob([_PROP_WORKER_SRC], { type: "application/javascript" });
            const url = URL.createObjectURL(blob);
            const worker = _propWorker = new Worker(url);
            URL.revokeObjectURL(url);

            const freqHz = settings.freq * 1e6;
            const clutterLoss = _CLUTTER_LOSS[settings.model] || 0;
            const useTerrain = settings.useTerrain && !!cellElevs;

            const N = grid.cols * grid.rows;
            // Transfer typed arrays for zero-copy. We need plain arrays for lats/lons.
            const cellLats = new Float64Array(grid.lats);
            const cellLons = new Float64Array(grid.lons);
            const msg = {
                type: "compute",
                cols: grid.cols, rows: grid.rows,
                originLat: grid.originLat, originLon: grid.originLon,
                originElev: originElevM,
                txPower:    settings.txPower,
                gainTx:     settings.gainTx,
                gainRx:     settings.gainRx,
                rxHeight:   settings.rxHeight,
                freqHz,
                threshold:  settings.threshold,
                fadeMargin: settings.fadeMargin,
                useTerrain,
                clutterLoss,
                cellElevs:  useTerrain ? cellElevs.buffer : null,
                cellLats:   cellLats.buffer,
                cellLons:   cellLons.buffer,
            };
            const transfers = [cellLats.buffer, cellLons.buffer];
            if (useTerrain && cellElevs) transfers.push(cellElevs.buffer);

            return new Promise((resolve, reject) => {
                worker.onmessage = ev => {
                    const d = ev.data;
                    if (d.type === "result") {
                        const snr = new Float32Array(d.snr);
                        resolve(snr);
                    } else {
                        reject(new Error(d.msg || "worker error"));
                    }
                };
                worker.onerror = e => reject(e);
                worker.postMessage(msg, transfers);
            });
        }

        // Main entry: schedule (debounce) a coverage recompute.
        function _propScheduleRecompute() {
            _propCancel();
            if (!_topoGet("coverage", false)) return;
            _propDebounce = setTimeout(_propRecompute, 500);
        }

        async function _propRecompute() {
            _propDebounce = null;
            const gen = ++_propGeneration;
            const settings = _propSettings();

            // Clamp freq to valid range; warn if outside typical LoRa bands.
            settings.freq = Math.max(400, Math.min(2500, settings.freq));
            if (settings.freq < 800 || settings.freq > 1000)
                console.warn("Coverage: freq", settings.freq, "MHz is outside typical LoRa bands [800, 1000]");

            const originCoords = _propOriginCoords(settings.origin);
            if (!originCoords) {
                _propSetProgress("Origin has no coordinates");
                return;
            }
            const { lat: oLat, lon: oLon } = originCoords;

            _propSetProgress("Building grid…");
            const grid = _propBuildGrid(oLat, oLon);
            _propGrid = grid;

            // Update origin marker.
            _propUpdateOriginMarker(oLat, oLon);

            // Fetch terrain if needed.
            let cellElevs = null;
            if (settings.useTerrain) {
                _propSetProgress("Fetching terrain… 0 / 40 000");
                cellElevs = await _propFetchTerrainProfiles(grid, gen);
                if (_propGeneration !== gen) return;
                if (!cellElevs) {
                    _propSetProgress("Terrain unavailable — using free-space");
                }
            }

            // Fetch origin elevation.
            let originElevM = 0;
            if (settings.useTerrain) {
                try {
                    const id = ++_propElevCmdId;
                    const r = await new Promise((resolve, reject) => {
                        let unsub;
                        const t = setTimeout(() => { unsub && unsub(); reject(new Error("timeout")); }, 15000);
                        unsub = _pluginWS.onPluginMessage(msg => {
                            if (msg && msg.t === "cmd_result" && msg.id === id) {
                                clearTimeout(t); unsub();
                                if (msg.ok) resolve(msg); else reject(new Error("fail"));
                            }
                        });
                        _pluginWS.sendPluginCommand({ t: "cmd", cmd: "elevation", points: [[oLat, oLon]], id });

                        originElevM = r.elevations[0];

            _propSetProgress("Computing propagation…");
            let snr;
            try {
                snr = await _propRunWorker(grid, cellElevs, settings, originElevM, gen);
            } catch (e) {
                if (_propGeneration !== gen) return;
                _propSetProgress("Computation failed");
                return;
            }
            if (_propGeneration !== gen) return;
            _propWorker = null;

            _propSnrGrid = snr;
            _propSetProgress("");
            _propRedrawLayer();
            _propShowLegend(true);
        }

        // Create/update the pulsing origin marker.
        function _propUpdateOriginMarker(lat, lon) {
            if (!_leafletMap) return;
            const icon = L.divIcon({
                className: "",
                html: `<div class="cov-origin-wrap"><div class="cov-origin-halo"></div><div class="cov-origin-inner"></div></div>`,
                iconSize: [24, 24],
                iconAnchor: [12, 12],
            });
            if (_propOriginMarker) {
                try { _propOriginMarker.setLatLng([lat, lon]); } catch (_) {}
            } else {
                _propOriginMarker = L.marker([lat, lon], { icon, interactive: false, zIndexOffset: -10 });
                _propOriginMarker.addTo(_leafletMap);
            }
        }

        // Convert SNR 0..30 dB to RGBA using the coverage gradient.
        function _propSnrToRgba(snr) {
            if (snr <= 0) return null;
            const t = Math.min(snr / 30, 1.0);
            // Parse gradient stops to RGB.
            const stops = _COV_GRADIENT;
            let lo = stops[0], hi = stops[stops.length - 1];
            for (let i = 0; i < stops.length - 1; i++) {
                if (t >= stops[i][0] && t <= stops[i + 1][0]) { lo = stops[i]; hi = stops[i + 1]; break; }
            }
            const f = (t - lo[0]) / Math.max(0.001, hi[0] - lo[0]);
            const hexToRgb = h => {
                const r = parseInt(h.slice(1, 3), 16);
                const g = parseInt(h.slice(3, 5), 16);
                const b = parseInt(h.slice(5, 7), 16);
                return [r, g, b];
            };
            const [r1, g1, b1] = hexToRgb(lo[1]);
            const [r2, g2, b2] = hexToRgb(hi[1]);
            return [
                Math.round(r1 + f * (r2 - r1)),
                Math.round(g1 + f * (g2 - g1)),
                Math.round(b1 + f * (b2 - b1)),
            ];
        }

        // Build and add the GridLayer overlay.
        function _propRedrawLayer() {
            if (!_leafletMap) return;
            if (_propLayer) {
                try { _leafletMap.removeLayer(_propLayer); } catch (_) {}
                _propLayer = null;
            }
            if (!_propSnrGrid || !_propGrid) return;

            const snr = _propSnrGrid;
            const g = _propGrid;

            // Pre-parse gradient stops for fast per-pixel colour lookup.
            const _covStops = _COV_GRADIENT.map(([t, hex]) => ({
                t,
                r: parseInt(hex.slice(1, 3), 16),
                g: parseInt(hex.slice(3, 5), 16),
                b: parseInt(hex.slice(5, 7), 16),
            }));
            function _covSnrToRgb(sv) {
                const t = Math.min(sv / 30, 1.0);
                let lo = _covStops[0], hi = _covStops[_covStops.length - 1];
                for (let i = 0; i < _covStops.length - 1; i++) {
                    if (t >= _covStops[i].t && t <= _covStops[i + 1].t) { lo = _covStops[i]; hi = _covStops[i + 1]; break; }
                }
                const f = (t - lo.t) / Math.max(0.001, hi.t - lo.t);
                return [
                    Math.round(lo.r + f * (hi.r - lo.r)),
                    Math.round(lo.g + f * (hi.g - lo.g)),
                    Math.round(lo.b + f * (hi.b - lo.b)),
                ];
            }

            const CovLayer = L.GridLayer.extend({
                createTile(coords) {
                    const tile = document.createElement("canvas");
                    tile.width = tile.height = 256;
                    const ctx = tile.getContext("2d");
                    const tileSize = 256;
                    const imgData = ctx.createImageData(tileSize, tileSize);
                    const data = imgData.data;
                    const nwX = coords.x * tileSize;
                    const nwY = coords.y * tileSize;
                    const zoom = coords.z;
                    const proj = this._map.options.crs || L.CRS.EPSG3857;
                    const ALPHA = Math.round(0.55 * 255);
                    for (let py = 0; py < tileSize; py++) {
                        for (let px = 0; px < tileSize; px++) {
                            const ll = proj.pointToLatLng(L.point(nwX + px, nwY + py), zoom);
                            if (!ll) continue;
                            const lat = ll.lat, lon = ll.lng;
                            const normC = (lon - (g.originLon - g.halfSpanLon)) / (2 * g.halfSpanLon);
                            const normR = ((g.originLat + g.halfSpanLat) - lat) / (2 * g.halfSpanLat);
                            if (normC < 0 || normC > 1 || normR < 0 || normR > 1) continue;
                            const gc = normC * (g.cols - 1);
                            const gr = normR * (g.rows - 1);
                            const c0 = Math.floor(gc), r0 = Math.floor(gr);
                            const c1 = Math.min(c0 + 1, g.cols - 1), r1 = Math.min(r0 + 1, g.rows - 1);
                            const fc = gc - c0, fr = gr - r0;
                            const s00 = snr[r0 * g.cols + c0];
                            const s10 = snr[r0 * g.cols + c1];
                            const s01 = snr[r1 * g.cols + c0];
                            const s11 = snr[r1 * g.cols + c1];
                            const sv = s00*(1-fc)*(1-fr) + s10*fc*(1-fr) + s01*(1-fc)*fr + s11*fc*fr;
                            if (sv <= 0) continue;
                            const rgb = _covSnrToRgb(sv);
                            const off = (py * tileSize + px) * 4;
                            data[off]   = rgb[0];
                            data[off+1] = rgb[1];
                            data[off+2] = rgb[2];
                            data[off+3] = ALPHA;
                        }
                    }
                    ctx.putImageData(imgData, 0, 0);
                    return tile;
                },
            });

            _propLayer = new CovLayer({ tileSize: 256, opacity: 1, zIndex: 350, pane: "overlayPane" });
            _propLayer.addTo(_leafletMap);

            // Ensure the origin marker is on the map above the overlay.
            if (_propOriginMarker) {
                try { _propOriginMarker.addTo(_leafletMap); } catch (_) {}
            }
        }

        // Tear down coverage: cancel worker, remove layer + legend + marker + drawer.
        function _propTeardown() {
            _propCancel();

        // Build a name→{lat,lon} index from all available coordinate sources so
        // rxlog src/from fields (which may be a node name, pubkey prefix, or
        // 1-byte path hash) can be resolved to a map position.
        function _buildNodeCoordIndex() {
            const idx = {};
            const nodes = (_deviceMap && _deviceMap.nodes) || {};
            // Contact nodes
            for (const [name, node] of Object.entries(nodes)) {
                if (node && node.lat != null && node.lon != null && (node.lat || node.lon)) {
                    idx[name] = { lat: node.lat, lon: node.lon };
                    if (node.pubkey_prefix) idx[node.pubkey_prefix] = { lat: node.lat, lon: node.lon };
                    if (node.pubkey)        idx[String(node.pubkey).toLowerCase()] = { lat: node.lat, lon: node.lon };
                }
            }
            // Self node (observer)
            const selfName = _deviceMap && _deviceMap.self;
            if (selfName) {
                const si = _deviceMap && _deviceMap.self_info;
                let sLat = null, sLon = null;
                if (si && si.adv_lat != null && si.adv_lon != null && (si.adv_lat || si.adv_lon)) {
                    sLat = si.adv_lat; sLon = si.adv_lon;
                } else if (nodes[selfName] && nodes[selfName].lat != null) {
                    sLat = nodes[selfName].lat; sLon = nodes[selfName].lon;
                } else if (_domoticzLocation && _domoticzLocation.lat != null) {
                    sLat = _domoticzLocation.lat; sLon = _domoticzLocation.lon;
                }
                if (sLat != null) {
                    idx[selfName] = { lat: sLat, lon: sLon };
                    if (si && si.public_key) idx[String(si.public_key).toLowerCase()] = { lat: sLat, lon: sLon };
                }
            }
            // Heard nodes (non-contact)
            const hn = (_heard && _heard.nodes) || {};
            for (const [pk, node] of Object.entries(hn)) {
                if (node && node.lat != null && node.lon != null && (node.lat || node.lon)) {
                    idx[pk] = { lat: node.lat, lon: node.lon };
                    const hName = node.name || pk.slice(0, 12);
                    if (hName) idx[hName] = { lat: node.lat, lon: node.lon };
                }
            }
            return idx;
        }

        function _renderActivityHeatmap() {
            if (!_leafletMap) return;
            if (_heatmapLayer) { try { _leafletMap.removeLayer(_heatmapLayer); } catch (_) {} _heatmapLayer = null; }
            const heatmapOn = _topoGet("heatmap", false);
            const emptyNote = document.getElementById("topo-heatmap-empty");
            if (!heatmapOn) {
                if (emptyNote) emptyNote.classList.remove("visible");
                return;
            }

            const windowMin = parseInt(_topoGetStr("heatmap-window", "10"), 10) || 10;
            const windowMs  = windowMin * 60_000;
            const now       = Date.now();
            const cutoff    = now - windowMs;

            const coordIdx = _buildNodeCoordIndex();
            const points   = [];

            for (const entry of ((_rxLog && _rxLog.entries) || [])) {
                const ts = entry._t || entry.ts;
                if (!ts || ts * 1000 < cutoff) continue;
                const src = entry.src || entry.from || entry.adv_name;
                if (!src) continue;
                let xy = coordIdx[src] || coordIdx[String(src).toLowerCase()];
                // Fallback: try resolving as a 1-byte path hash
                if (!xy) {
                    const resolved = _resolvePathHop(src);
                    if (resolved) xy = coordIdx[resolved];
                }
                if (!xy) continue;
                const age = (now - ts * 1000) / windowMs;
                const w   = Math.max(0.2, 1 - age);
                points.push([xy.lat, xy.lon, w]);
            }

            const zoom   = _leafletMap.getZoom() || 7;
            const radius = Math.min(35, Math.max(8, 22 - (15 - zoom) * 2));

            _heatmapLayer = L.heatLayer(points, {
                radius,
                blur: 18,
                maxZoom: 17,
                gradient: { 0.2: "#3b82f6", 0.5: "#22c55e", 0.8: "#f59e0b", 1.0: "#ef4444" },
            }).addTo(_leafletMap);

            if (emptyNote) {
                emptyNote.textContent = points.length === 0 ? `No traffic in the last ${windowMin} min` : "";
                emptyNote.classList.toggle("visible", points.length === 0);
            }
        }

        function _startHeatmapAutoFade() {
            if (_heatmapTimer) return;
            _heatmapTimer = setInterval(_renderActivityHeatmap, 30_000);
        }

        function _stopHeatmapAutoFade() {
            if (_heatmapTimer) { clearInterval(_heatmapTimer); _heatmapTimer = null; }
            if (_heatmapDeltaTimer) { clearTimeout(_heatmapDeltaTimer); _heatmapDeltaTimer = null; }
        }

        // Audio context (lazily created on first user gesture → Live toggle click).
        let _topoAudioCtx = null;
        let _topoLastBeepMs = 0;   // epoch-ms of last beep

        function _topoBeep() {
            if (!_topoAudioCtx) {
                try { _topoAudioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
                catch (_) { _topoAudioCtx = null; return; }
            }
            const now = Date.now();
            if (now - _topoLastBeepMs < 250) return;  // throttle: ≤ 4 Hz
            _topoLastBeepMs = now;
            try {
                const ctx = _topoAudioCtx;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = "sine";
                osc.frequency.value = 880;
                const t = ctx.currentTime;
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.1, t + 0.03);  // 30 ms attack
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.09);  // 80 ms decay
                osc.start(t);
                osc.stop(t + 0.09);
            } catch (_) { /* browser refused audio — silent failure */ }
        }

        // Attempt to pulse the marker for a given node key (pubkey_prefix or name).
        // Only fires when the topology view is open and Live is ON.
        function _topoFlashMarker(nodeKey) {
            if (!_isOpen("topology")) return;
            if (_topoLivePulsing.has(nodeKey)) return;
            // Find the marker element via data attribute we set during render.
            const el = document.querySelector(`.mc-pin-inner[data-node-key="${CSS.escape(nodeKey)}"]`);
            if (!el) return;
            _topoLivePulsing.add(nodeKey);
            el.classList.add("live-flash");
            // Beep if audio is also on
            if (_topoGet("audio", false)) _topoBeep();
            // Remove class after animation completes (2 s)
            setTimeout(() => {
                el.classList.remove("live-flash");
                _topoLivePulsing.delete(nodeKey);
            }, 2000);
        }

        // Called from _onDeviceMapUpdated — diffs nodes against _lastSeenByNode.
        // When Live is ON and a change is detected, fires a flash.
        function _topoCheckLiveActivity() {
            if (!_topoLiveOn) return;
            const nodes = (_deviceMap && _deviceMap.nodes) || {};
            for (const [name, node] of Object.entries(nodes)) {
                const key = node.pubkey_prefix || name;
                const prev = _lastSeenByNode[key];
                const curAdvert = (node.last_advert != null) ? node.last_advert : 0;
                const curSeen   = node.last_seen ? String(node.last_seen.value || node.last_seen || "") : "";
                if (!prev) {
                    // First observation — establish baseline without flashing.
                    _lastSeenByNode[key] = { last_advert: curAdvert, last_seen_str: curSeen };
                    continue;
                }
                const advertChanged = curAdvert > prev.last_advert;
                const seenChanged   = curSeen !== prev.last_seen_str;
                _lastSeenByNode[key] = { last_advert: curAdvert, last_seen_str: curSeen };
                if (advertChanged || seenChanged) {
                    _topoFlashMarker(key);
                }
            }
        }

        // ── Type-based marker colour (§B) ────────────────────────────────────
        // polyline colour stays hop-driven (hopColour); only markers use typeColour.
        function _typeColour(node) {
            // Topology marker colour scheme:
            //   self (observer)    = green
            //   companion (type 1) = purple   (also covers sensor / unknown)
            //   repeater (type 2)  = red
            //   room server (3)    = blue
            // Heard-only nodes use the SAME colour as their type, so a
            // heard companion is still purple — the smaller / hollow marker
            // style (set in renderTopology) is what signals "not a contact".
            if (!node) return "#94a3b8";
            if (node.isSelf) return "#22c55e";
            if (node.type === 2) return "#e63946";
            if (node.type === 3) return "#3b82f6";
            return "#a855f7";
        }

        // Hop-count line colour (unchanged — only drives polylines).
        function _hopColour(h) {
            if (h == null || h < 0) return "#888";
            if (h === 0) return "#26c47c";
            if (h <= 3)  return "#f9c74f";
            if (h <= 7)  return "#ff8c42";
            return "#e63946";
        }

        // Format distance for popup (§D)
        function _fmtDistKm(km) {
            if (km == null) return null;
            if (km < 0.05) return "0 m";
            if (km < 10)   return km.toFixed(1) + " km";
            return Math.round(km) + " km";
        }

        // ── Topology: main render (§C/§G/§D) ────────────────────────────────
        let _topologyLayer = null;
        function _renderTopology() {
            const canvas = document.getElementById("map-canvas");
            if (!canvas) return;
            let tries = 0;
            const init = () => {
                if (typeof L === "undefined") {
                    if (++tries > LEAFLET_MAX_TRIES) {
                        canvas.innerHTML = `<div style="padding:24px;color:var(--muted);font-size:0.85rem;text-align:center;">
                            Leaflet failed to load.<br>The topology view needs the map library.
                        </div>`;
                        return;
                    }
                    setTimeout(init, LEAFLET_POLL_MS);
                    return;
                }
                if (!_leafletMap) {
                    // Zoom controls back at the Leaflet default top-left
                    // corner; the filter toolbar is now its own row above
                    // the map, so the corner is free.
                    _leafletMap = L.map(canvas, { zoomControl: true }).setView([52, 5], 7);
                    _liveMaps.add(_leafletMap);
                    _applyTileMode(_leafletMap, _topoGetStr("tile", "light"));
                    // Re-render heatmap on zoom changes (radius is zoom-aware).
                    // Named listener registered once; early-return guard handles heatmap-off state.
                    _leafletMap.on("zoomend", _heatmapZoomListener);
                } else if (_leafletMap.zoomControl) {
                    try { _leafletMap.zoomControl.setPosition("topleft"); } catch (_) {}
                }
                // Drop any prior topology overlay so a refresh doesn't pile up
                if (_topologyLayer) { _topologyLayer.remove(); _topologyLayer = null; }
                _topologyLayer = L.layerGroup().addTo(_leafletMap);

                // Re-add overlay layers so they survive the topology layer rebuild
                // (same lifecycle pattern as _heatmapLayer).
                if (_propLayer) _propLayer.addTo(_leafletMap);
                if (_propOriginMarker) { try { _propOriginMarker.addTo(_leafletMap); } catch (_) {} }
                if (_losLayer) _losLayer.addTo(_leafletMap);

                // Apply dimming class to the canvas when LoS mode is active.
                const canvas2 = document.getElementById("map-canvas");
                const losActive = _topoGet("los", false);
                if (canvas2) canvas2.classList.toggle("los-active", losActive);

                // Map-click handler for LoS pin drops (named function so Leaflet
                // does not accumulate duplicate listeners across topology rebuilds).
                _leafletMap.off("click", _losMapClickHandler);
                _leafletMap.on("click", _losMapClickHandler);

                // Stop the floating toolbar's clicks from reaching Leaflet
                // (without this, Leaflet's drag handler runs on the toolbar
                // element and crashes with "Cannot read properties of null
                // (reading 'offsetWidth')" the moment a button is removed /
                // the layer is rebuilt under the cursor). Re-applies cheaply
                // each render — Leaflet de-dups its own handlers internally.
                const _tb = document.getElementById("topo-toolbar");
                if (_tb && L.DomEvent) {
                    L.DomEvent.disableClickPropagation(_tb);
                    L.DomEvent.disableScrollPropagation(_tb);
                }

                // ── Read toolbar toggle states ──────────────────────────────
                const showCompanions = _topoGet("contacts",  true);   // key kept for back-compat
                const showRepeaters  = _topoGet("repeaters", true);
                const showRooms      = _topoGet("rooms",     true);
                const showHeard      = _topoGet("heard",     false);
                const showLines      = _topoGet("lines",     true);
                _topoLiveOn = _topoGet("live", false);

                // ── Resolve observer coords (3-tier, same chain as radar) ──
                //   1) connected node's advertised GPS (self_info.adv_lat/lon)
                //   2) the self device's lat/lon slot (manual override, etc.)
                //   3) Domoticz Settings → Location (cached, fetched once)
                let obsLat = null, obsLon = null;
                const si = _deviceMap && _deviceMap.self_info;
                if (si && si.adv_lat != null && si.adv_lon != null && (si.adv_lat || si.adv_lon)) {
                    obsLat = si.adv_lat; obsLon = si.adv_lon;
                }
                if ((obsLat == null || (!obsLat && !obsLon)) && _deviceMap && _deviceMap.nodes && _deviceMap.self) {
                    const sn = _deviceMap.nodes[_deviceMap.self];
                    if (sn && sn.lat != null && sn.lon != null && (sn.lat || sn.lon)) {
                        obsLat = sn.lat; obsLon = sn.lon;
                    }
                }
                if ((obsLat == null || (!obsLat && !obsLon)) && _domoticzLocation && _domoticzLocation.lat != null) {
                    obsLat = _domoticzLocation.lat; obsLon = _domoticzLocation.lon;
                }
                // Cache miss → kick the async fetch once; re-render when it
                // resolves so the green dot can appear on the very next paint
                // without the user having to re-open the panel.
                if (obsLat == null && _domoticzLocation === null) {
                    _getDomoticzLocation().then(loc => {
                        if (loc && loc.lat != null && _isOpen("topology")) _renderTopology();
                    });
                }
                const hasObsLoc = obsLat != null && (obsLat || obsLon);

                const nodes = (_deviceMap && _deviceMap.nodes) || {};
                const selfName = _deviceMap && _deviceMap.self;
                // The self marker uses the same resolved observer coords —
                // so it works even if the node has no advertised GPS but the
                // Domoticz Settings location is configured.
                const selfLoc = hasObsLoc ? [obsLat, obsLon] : null;

                const bounds = [];
                let plotted = 0;

                // Helper: build a divIcon for a given colour, node key, and isSelf flag.
                const makePinIcon = (colour, nodeKey, isSelf) => {
                    const cls = isSelf ? "mc-pin-inner self" : "mc-pin-inner";
                    const sz  = isSelf ? [30, 30] : [22, 22];
                    const anc = isSelf ? [15, 30] : [11, 22];
                    const safeKey = nodeKey.replace(/"/g, "&quot;");
                    return L.divIcon({
                        className: "mc-pin",
                        html: `<div class="${cls}" style="background:${colour}" data-node-key="${safeKey}"></div>`,
                        iconSize: sz, iconAnchor: anc,
                    });
                };

                // Self marker — ALWAYS shown regardless of filter toggles
                // (it is the observer / centre of context).
                if (selfLoc) {
                    const selfNodeEntry = selfName ? nodes[selfName] : null;
                    const selfKey = (selfNodeEntry && selfNodeEntry.pubkey_prefix) || selfName || "self";
                    const selfColour = _typeColour({ isSelf: true });
                    const icon = makePinIcon(selfColour, selfKey, true);
                    L.marker(selfLoc, { icon })
                        .addTo(_topologyLayer)
                        .bindPopup(`<b>${escHtml(selfName || "Self")}</b><br>(this node)`);
                    bounds.push(selfLoc);
                    plotted++;
                }

                // Helper: does the current toolbar state include this node's type?
                // Type 2 -> Repeaters bucket. Type 3 -> Room Servers bucket.
                // Everything else (1 / 4 / 0 / null) -> Companions bucket.
                const _typeBucketOn = (t) => {
                    if (t === 2) return showRepeaters;
                    if (t === 3) return showRooms;
                    return showCompanions;
                };
                const noContactFilters = !showCompanions && !showRepeaters && !showRooms;

                // Contact markers + lines
                for (const [name, node] of Object.entries(nodes)) {
                    if (name === selfName) continue;
                    if (node.lat == null || node.lon == null) continue;
                    if (!node.lat && !node.lon) continue;
                    if (!_typeBucketOn(node.type)) continue;

                    const ll = [node.lat, node.lon];
                    const hopsRaw = node.hops && node.hops.value;
                    const h = hopsRaw != null ? parseInt(String(hopsRaw).replace(/[^\d-]/g, ""), 10) : null;
                    const lineColour = _hopColour(h);
                    const markerColour = _typeColour(node);
                    const typeLabel = ({1:"Companion",2:"Repeater",3:"Room Server",4:"Sensor"})[node.type] || "Unknown";
                    const nodeKey = node.pubkey_prefix || name;

                    let distLine = "";
                    if (hasObsLoc) {
                        const km = _haversineKm(obsLat, obsLon, node.lat, node.lon);
                        const ds = _fmtDistKm(km);
                        if (ds) distLine = `<br>Distance: ${ds}`;
                    }

                    const icon = makePinIcon(markerColour, nodeKey, false);
                    const _pkAttr = node.pubkey_prefix ? ` data-pk="${escHtml(node.pubkey_prefix)}"` : "";
                    L.marker(ll, { icon })
                        .addTo(_topologyLayer)
                        .bindPopup(
                            `<b>${escHtml(name)}</b><br>` +
                            `Hops: ${h != null && !isNaN(h) ? h : "?"}<br>` +
                            `Type: ${typeLabel}` +
                            distLine +
                            `<br><button class="topo-popup-los" data-los-lat="${node.lat}" data-los-lon="${node.lon}" data-los-label="${escHtml(name)}" title="Open LoS tool for a path to this node"><i class="fa-solid fa-ruler"></i> LoS to here</button>` +
                            `<br><button class="topo-popup-cov" data-cov-origin="${escHtml(name)}" title="Show predicted coverage from this node"><i class="fa-solid fa-tower-broadcast"></i> Coverage from here</button>` +
                            `<br><button class="topo-popup-del" data-kind="contact" data-name="${escHtml(name)}"${_pkAttr} title="Permanently remove from the system"><i class="fa-solid fa-trash"></i> Delete</button>`
                        );
                    if (showLines && selfLoc) {
                        // Build a multi-segment polyline through resolved
                        // repeater waypoints when out_path is available.
                        const outPath     = node.out_path || "";
                        const hashMode    = node.out_path_hash_mode || 1;
                        // Token byte-width: mode 1 = 1 byte (2 hex chars),
                        // mode 2 = 2 bytes (4 hex chars), mode 3 = 3 bytes (6 hex chars).
                        const tokenChars  = hashMode <= 1 ? 2 : hashMode === 2 ? 4 : 6;
                        let waypoints     = [selfLoc];
                        let resolvedHops  = [];
                        const isFlood     = !outPath || outPath === "ff" || /^(ff)+$/i.test(outPath);
                        if (!isFlood && outPath.length >= tokenChars) {
                            // Split outPath into tokens and resolve each to a coordinate.
                            const raw = outPath.replace(/[^0-9a-fA-F]/g, "").toLowerCase();
                            for (let i = 0; i + tokenChars <= raw.length; i += tokenChars) {
                                const token = raw.slice(i, i + tokenChars);
                                const hopName = _resolvePathHop(token);
                                if (!hopName) continue;
                                const hopNode = ((_deviceMap && _deviceMap.nodes) || {})[hopName];
                                const hopLat  = hopNode && hopNode.lat;
                                const hopLon  = hopNode && hopNode.lon;
                                if (hopLat == null || hopLon == null || (!hopLat && !hopLon)) continue;
                                waypoints.push([hopLat, hopLon]);
                                resolvedHops.push(hopName);
                            }
                        }
                        waypoints.push(ll);
                        const isMultiHop  = resolvedHops.length > 0;
                        const lineOpts    = {
                            color: lineColour, weight: 2, opacity: 0.7,
                            dashArray: (h === 0 && !isMultiHop) ? null : "4 4",
                        };
                        // Build tooltip listing the resolved hop chain.
                        let lineTooltip;
                        if (isMultiHop) {
                            const chain = [selfName || "self", ...resolvedHops, name].join(" → ");
                            lineTooltip = chain;
                        }
                        const pl = L.polyline(waypoints, lineOpts).addTo(_topologyLayer);
                        if (lineTooltip) pl.bindTooltip(lineTooltip, { sticky: true });
                        // Small waypoint markers at intermediate hops.
                        for (let wi = 1; wi < waypoints.length - 1; wi++) {
                            L.circleMarker(waypoints[wi], {
                                radius: 4, weight: 2,
                                color: "#ffffff", fillColor: lineColour, fillOpacity: 0.6,
                            }).addTo(_topologyLayer)
                             .bindTooltip(escHtml(resolvedHops[wi - 1]), { sticky: true });
                        }
                    }
                    bounds.push(ll);
                    plotted++;
                }

                // Heard-only nodes — "Heard" is a modifier on top of the
                // type filters: we only plot a heard node if its type's
                // bucket is enabled. So "Heard ON + everything else OFF"
                // shows nothing extra; "Companions ON + Heard ON" shows
                // contact companions PLUS heard companions; etc.
                if (showHeard && !noContactFilters) {
                    const heardNodes = (_heard && _heard.nodes) || {};
                    for (const [pk, hnode] of Object.entries(heardNodes)) {
                        if (!_typeBucketOn(hnode.type)) continue;
                        // Plugin stores heard-node coords as h.lat/h.lon
                        // (set from the advert's adv_lat/adv_lon). Some snapshot
                        // builds also expose adv_lat/adv_lon as a mirror, so
                        // accept either field name.
                        const lat = (hnode.lat != null) ? hnode.lat : hnode.adv_lat;
                        const lon = (hnode.lon != null) ? hnode.lon : hnode.adv_lon;
                        if (lat == null || lon == null) continue;
                        if (!lat && !lon) continue;
                        // Skip if already a known contact
                        const alreadyKnown = Object.values(nodes).some(n => n.pubkey_prefix === pk || n.pubkey === pk);
                        if (alreadyKnown) continue;
                        const ll = [lat, lon];
                        // Heard nodes are coloured by their own type so a
                        // "heard companion" is purple, "heard repeater" is red,
                        // "heard room server" is blue — matching contact dots.
                        const hColour = _typeColour({ type: hnode.type });
                        const nodeKey = pk;
                        const hName = hnode.name || pk.slice(0, 8) || "Unknown";
                        const lastHearTx = hnode.last_heard
                            ? new Date(hnode.last_heard * 1000).toLocaleString()
                            : "?";

                        let distLine = "";
                        if (hasObsLoc) {
                            const km = _haversineKm(obsLat, obsLon, lat, lon);
                            const ds = _fmtDistKm(km);
                            if (ds) distLine = `<br>Distance: ${ds}`;
                        }

                        const icon = makePinIcon(hColour, nodeKey, false);
                        L.marker(ll, { icon })
                            .addTo(_topologyLayer)
                            .bindPopup(
                                `<b>${escHtml(hName)}</b><br>` +
                                `Heard (not a contact)<br>` +
                                `Last heard: ${lastHearTx}` +
                                distLine +
                                `<br><button class="topo-popup-los" data-los-lat="${lat}" data-los-lon="${lon}" data-los-label="${escHtml(hName)}" title="Open LoS tool for a path to this node"><i class="fa-solid fa-ruler"></i> LoS to here</button>` +
                                `<br><button class="topo-popup-cov" data-cov-origin="${escHtml(hName)}" title="Show predicted coverage from this node"><i class="fa-solid fa-tower-broadcast"></i> Coverage from here</button>` +
                                `<br><button class="topo-popup-del" data-kind="heard" data-pk="${escHtml(pk)}" data-name="${escHtml(hName)}" title="Permanently remove from the heard list"><i class="fa-solid fa-trash"></i> Delete</button>`
                            );
                        bounds.push(ll);
                        plotted++;
                    }
                }

                // (Empty-state messaging is consolidated below into a single
                // overlay so we never show two stacked notes at the same time.)

                // Fit bounds only on first open; subsequent toggle re-renders
                // preserve the user's current pan/zoom.
                if (!_topoFitDone) {
                    if (bounds.length >= 2) {
                        _leafletMap.fitBounds(bounds, { padding: [30, 30] });
                    } else if (bounds.length === 1) {
                        _leafletMap.setView(bounds[0], 11);
                    }
                    _topoFitDone = true;
                }

                // Single consolidated empty state. Only shown when literally
                // NOTHING was plotted (no self, no contacts, no heard). If the
                // self marker is visible the observer IS the on-screen state —
                // no banner needed, and we deliberately don't dim the green
                // observer dot with an overlay just because filters are off.
                const panelBody = document.getElementById("map-panel-body");
                const wrap = panelBody && panelBody.querySelector(".topo-map-wrap");
                const existing = wrap && wrap.querySelector("#topo-empty-overlay");
                if (existing) existing.remove();
                if (!plotted) {
                    const noContacts = !showContacts && !showRepeaters && !showHeard;
                    const note = noContacts
                        ? `All node filters are off &mdash; use the toolbar to enable Contacts / Repeaters / Heard.<br>
                           Set the observer's GPS or Domoticz location to centre the map.`
                        : `No contacts have shared a location yet.<br>
                           Set <code>adv_loc_policy = Share</code> on the connected node
                           and ask remote contacts to do the same, or add manual
                           positions in <code>meshcore_locations.json</code>.`;
                    if (wrap) {
                        const div = document.createElement("div");
                        div.id = "topo-empty-overlay";
                        div.style.cssText = "position:absolute;top:48px;left:50%;transform:translateX(-50%);max-width:80%;text-align:center;background:rgba(0,0,0,0.55);color:var(--text);opacity:.9;font-size:0.8rem;padding:10px 14px;border-radius:8px;border:1px solid var(--border);z-index:900;pointer-events:none;";
                        div.innerHTML = note;
                        wrap.appendChild(div);
                    }
                    return;
                }
                // When ONLY the observer is plotted (all node filters off
                // or no contacts have a known location), re-centre the map
                // on the observer so the green dot is always visible even
                // if the saved pan/zoom was previously on a contact.
                if (plotted === 1 && selfLoc) {
                    _leafletMap.setView(selfLoc, Math.max(_leafletMap.getZoom() || 11, 11));
                }

                // Activity heatmap lives outside _topologyLayer so it survives
                // the layer rebuild above.  Subscribe to rxlog if needed so
                // the heatmap has data even when no heavy panel is open.
                const heatmapOn = _topoGet("heatmap", false);
                if (heatmapOn) {
                    if (_rxLogOpenPanels.size === 0 && _rxLogSeq === -1) _rxLogSubscribe();
                    _startHeatmapAutoFade();
                } else {
                    _stopHeatmapAutoFade();
                    if (_heatmapLayer) { try { _leafletMap.removeLayer(_heatmapLayer); } catch (_) {} _heatmapLayer = null; }
                }
                _renderActivityHeatmap();

                // Force Leaflet to recompute container size after the panel animation
                setTimeout(() => _leafletMap.invalidateSize(), 280);
            };
            init();
        }

        // ── LoS tool helpers ──────────────────────────────────────────────────

        // Named map-click handler for LoS pin drops (reused reference so
        // _leafletMap.off() can remove the exact same handler on each rebuild).
        function _losMapClickHandler(ev) {
            if (!_topoGet("los", false)) return;
            const ll = ev.latlng;
            if (_losPins.length > 0) {
                const last = _losPins[_losPins.length - 1];
                const segKm = _haversineKm(last.lat, last.lon, ll.lat, ll.lng);
                if (segKm > _LOS_MAX_SEG_KM) {
                    alert(`Pins cannot be more than ${_LOS_MAX_SEG_KM} km apart. This segment would be ${Math.round(segKm)} km.`);
                    return;
                }
            }
            _losPins.push({ id: _losNextId++, lat: ll.lat, lon: ll.lng, h: _losPins.length === 0 ? 2 : 8, label: "" });
            _renderLosOverlay();
            _renderLosPanel();
            _scheduleLosProfile();
        }

        // Swap the bottom pane between radar and LoS panel; apply map cursor + dimming.
        function _applyLosActiveState(on) {
            const body = document.getElementById("map-panel-body");
            const canvas = document.getElementById("map-canvas");
            if (canvas) {
                canvas.classList.toggle("los-active", on);
                canvas.style.cursor = on ? "crosshair" : "";
            }
            if (!body) return;
            if (on) {
                // Replace or create the LoS pane.
                let radar = body.querySelector(".topo-radar-wrap");
                if (radar) {
                    radar.style.display = "none";
                    // Insert LoS pane right after radar wrap (or append to body).
                    let losPaneEl = body.querySelector("#topo-los-pane");
                    if (!losPaneEl) {
                        losPaneEl = document.createElement("div");
                        losPaneEl.id = "topo-los-pane";
                        losPaneEl.className = "topo-los-pane";
                        radar.after(losPaneEl);
                    }
                    losPaneEl.style.display = "";
                }
                _renderLosPanel();
                if (_losPins.length >= 2) _scheduleLosProfile();
            } else {
                // Restore radar pane; destroy LoS chart.
                const radar = body.querySelector(".topo-radar-wrap");
                const losPaneEl = body.querySelector("#topo-los-pane");
                if (radar) radar.style.display = "";
                if (losPaneEl) losPaneEl.style.display = "none";
                if (_losChart) { try { _losChart.destroy(); } catch (_) {} _losChart = null; }
                if (_losLayer && _leafletMap) { try { _leafletMap.removeLayer(_losLayer); } catch (_) {} _losLayer = null; }
                _losPins = [];
                _losLastElevations = null;
                _renderRadar();
            }
        }

        // Render the LoS panel content (pin list + hint + chart placeholder).
        function _renderLosPanel() {
            const body = document.getElementById("map-panel-body");
            let pane = body && body.querySelector("#topo-los-pane");
            if (!pane) return;

            const hasObsLoc = (() => {
                const si = _deviceMap && _deviceMap.self_info;
                if (si && si.adv_lat != null && (si.adv_lat || si.adv_lon)) return true;
                if (_deviceMap && _deviceMap.nodes && _deviceMap.self) {
                    const sn = _deviceMap.nodes[_deviceMap.self];
                    if (sn && sn.lat != null && (sn.lat || sn.lon)) return true;
                }
                if (_domoticzLocation && _domoticzLocation.lat != null) return true;
                return false;
            })();

            // Clamp selected segment to valid range
            const numSegs = Math.max(0, _losPins.length - 1);
            if (_losSelectedSeg >= numSegs) _losSelectedSeg = Math.max(0, numSegs - 1);

            let pinsHtml = "";
            _losPins.forEach((pin, i) => {
                // A pin "starts" segment i (between pins i and i+1), so clicking it selects that seg.
                // Pin 0 → seg 0, pin 1 → seg 1 (if exists), last pin → last seg.
                const segForRow = (i < numSegs) ? i : Math.max(0, numSegs - 1);
                const rowSelected = (numSegs >= 2 && segForRow === _losSelectedSeg) ? " seg-selected" : "";
                pinsHtml += `<div class="topo-los-pin-row${rowSelected}" data-pin-id="${pin.id}" data-seg-idx="${segForRow}" style="cursor:${numSegs>=2?'pointer':'default'}">
                    <span class="topo-los-pin-num">${i + 1}</span>
                    <span class="topo-los-pin-coords">${pin.lat.toFixed(5)}, ${pin.lon.toFixed(5)}</span>
                    <input class="topo-los-pin-h" type="number" min="0" max="100" step="0.5" value="${pin.h}" title="Antenna height (m AGL)" data-pin-id="${pin.id}">
                    <span class="topo-los-pin-hlabel">m</span>
                    <button class="topo-los-pin-del" data-pin-id="${pin.id}" title="Remove this pin"><i class="fa-solid fa-xmark"></i></button>
                </div>`;
            });

            const bannerHtml = !hasObsLoc
                ? `<div class="topo-los-banner error"><i class="fa-solid fa-triangle-exclamation"></i> Set observer location in Domoticz Settings to use the LoS tool.</div>`
                : (_losPins.length === 0
                    ? `<div class="topo-los-banner" id="topo-los-hint"><i class="fa-solid fa-map-pin"></i> Click on the map to add LoS pins; click a marker's popup to use it as a pin.</div>`
                    : "");

            // Segment-height editor (shown when ≥2 pins; bound to selected segment)
            const showSegEdit = numSegs >= 2;
            const segStartPin = showSegEdit ? _losPins[_losSelectedSeg] : null;
            const segEndPin   = showSegEdit ? _losPins[_losSelectedSeg + 1] : null;
            const segHeightsHtml = `<div class="topo-los-seg-heights${showSegEdit ? " visible" : ""}" id="topo-los-seg-heights">
                <label>Start pin (${_losSelectedSeg + 1}) height (m):</label>
                <input class="topo-los-seg-h" type="number" min="0" max="100" step="0.5"
                    id="topo-los-seg-h-start" value="${segStartPin ? segStartPin.h : 0}">
                <label style="margin-left:8px;">End pin (${_losSelectedSeg + 2}) height (m):</label>
                <input class="topo-los-seg-h" type="number" min="0" max="100" step="0.5"
                    id="topo-los-seg-h-end" value="${segEndPin ? segEndPin.h : 0}">
            </div>`;

            const statusHtml = `<div class="topo-los-seg-status${showSegEdit ? " visible" : ""}" id="topo-los-seg-status">
                Select a segment to see LoS status
            </div>`;

            const verdictsHtml = `<div class="topo-los-verdicts" id="topo-los-verdicts"></div>`;

            const chartPlaceholder = _losPins.length < 2
                ? `<div style="display:flex;align-items:center;justify-content:center;height:80px;color:var(--muted);font-size:0.72rem;font-style:italic;">Drop at least 2 pins to see the elevation profile</div>`
                : "";

            pane.innerHTML = `
                <div class="topo-los-hdr">
                    <span class="topo-los-title">Line of Sight</span>
                </div>
                <div class="topo-los-body">
                    ${bannerHtml}
                    <div class="topo-los-pin-list">${pinsHtml}</div>
                    <div class="topo-los-actions">
                        <span class="topo-los-hint">+ Add pin (click on map)</span>
                        <button class="topo-los-clear" id="topo-los-clear-btn">Clear all</button>
                    </div>
                    ${statusHtml}
                    ${segHeightsHtml}
                    <div id="topo-los-chart">${chartPlaceholder}</div>
                    ${verdictsHtml}
                </div>`;

            // Wire pin height inputs (per-row inputs in the pin list)
            pane.querySelectorAll(".topo-los-pin-h").forEach(inp => {
                inp.addEventListener("change", () => {
                    const id = parseInt(inp.dataset.pinId, 10);
                    const pin = _losPins.find(p => p.id === id);
                    if (pin) {
                        pin.h = Math.max(0, Math.min(100, parseFloat(inp.value) || 0));
                        inp.value = pin.h;
                        // Sync the selected-segment Start/End inputs in case
                        // the edited pin is one of them — without this they
                        // would display a stale value until the user clicks
                        // a different segment.
                        const segPinA = _losPins[_losSelectedSeg];
                        const segPinB = _losPins[_losSelectedSeg + 1];
                        const hStart = document.getElementById("topo-los-seg-h-start");
                        const hEnd   = document.getElementById("topo-los-seg-h-end");
                        if (hStart && segPinA && segPinA.id === pin.id) hStart.value = pin.h;
                        if (hEnd   && segPinB && segPinB.id === pin.id) hEnd.value   = pin.h;
                        if (_losPins.length >= 2) {
                            if (_losLastElevations) {
                                _drawLosChart(_losLastElevations);
                            } else {
                                const verdEl = document.getElementById("topo-los-verdicts");
                                if (verdEl) verdEl.innerHTML =
                                    '<div class="topo-los-banner error"><i class="fa-solid fa-triangle-exclamation"></i> Elevation service unavailable; heights saved but profile cannot be drawn.</div>';
                            }
                        }
                    }
                });
                // Prevent row-click propagation from firing on the input itself
                inp.addEventListener("click", e => e.stopPropagation());
            });

            // Wire pin-row click → select segment
            pane.querySelectorAll(".topo-los-pin-row").forEach(row => {
                row.addEventListener("click", e => {
                    if (e.target.closest(".topo-los-pin-del") || e.target.closest(".topo-los-pin-h")) return;
                    const segIdx = parseInt(row.dataset.segIdx, 10);
                    if (_losPins.length < 2) return;
                    _losSelectedSeg = Math.max(0, Math.min(_losPins.length - 2, segIdx));
                    _renderLosPanel();
                    if (_losLastElevations) _drawLosChart(_losLastElevations);
                });
            });

            // Wire segment height inputs (start / end of selected segment)
            const segHStart = pane.querySelector("#topo-los-seg-h-start");
            const segHEnd   = pane.querySelector("#topo-los-seg-h-end");
            function _applySegHeight(pinIdx, val) {
                const pin = _losPins[pinIdx];
                if (!pin) return;
                pin.h = Math.max(0, Math.min(100, parseFloat(val) || 0));
                // Sync the per-row input for this pin if it exists
                const rowInp = pane.querySelector(`.topo-los-pin-h[data-pin-id="${pin.id}"]`);
                if (rowInp) rowInp.value = pin.h;
                if (_losPins.length >= 2 && _losLastElevations) _drawLosChart(_losLastElevations);
            }
            if (segHStart) segHStart.addEventListener("change", () => _applySegHeight(_losSelectedSeg, segHStart.value));
            if (segHEnd)   segHEnd.addEventListener("change",   () => _applySegHeight(_losSelectedSeg + 1, segHEnd.value));

            // Wire pin delete buttons
            pane.querySelectorAll(".topo-los-pin-del").forEach(btn => {
                btn.addEventListener("click", () => {
                    const id = parseInt(btn.dataset.pinId, 10);
                    _losPins = _losPins.filter(p => p.id !== id);
                    _losSelectedSeg = 0;
                    _renderLosOverlay();
                    _renderLosPanel();
                    if (_losPins.length >= 2) _scheduleLosProfile();
                    else {
                        const vc = document.getElementById("topo-los-verdicts");
                        if (vc) vc.innerHTML = "";
                        if (_losChart) { try { _losChart.destroy(); } catch (_) {} _losChart = null; }
                        _losLastElevations = null;
                    }
                });
            });

            // Wire clear-all button
            const clearBtn = pane.querySelector("#topo-los-clear-btn");
            if (clearBtn) {
                clearBtn.addEventListener("click", () => {
                    _losPins = [];
                    _losSelectedSeg = 0;
                    if (_losLayer && _leafletMap) { try { _leafletMap.removeLayer(_losLayer); } catch (_) {} _losLayer = null; }
                    if (_losChart) { try { _losChart.destroy(); } catch (_) {} _losChart = null; }
                    _losLastElevations = null;
                    _renderLosPanel();
                });
            }
        }

        // Cached elevation result for height-only redraws.
        let _losLastElevations = null;

        // Render/update the Leaflet LoS overlay (numbered markers + polyline).
        function _renderLosOverlay() {
            if (!_leafletMap) return;
            if (!_losLayer) {
                _losLayer = L.layerGroup().addTo(_leafletMap);
            } else {
                _losLayer.clearLayers();
            }
            if (_losPins.length === 0) return;

            // Connecting polyline
            if (_losPins.length >= 2) {
                const latlngs = _losPins.map(p => [p.lat, p.lon]);
                L.polyline(latlngs, { color: "#f0a832", weight: 5, dashArray: "10 6", opacity: 0.95 })
                    .addTo(_losLayer);
            }

            // Numbered markers (draggable)
            _losPins.forEach((pin, i) => {
                const icon = L.divIcon({
                    className: "",
                    html: `<div class="los-pin-icon">${i + 1}</div>`,
                    iconSize: [22, 22],
                    iconAnchor: [11, 11],
                });
                const marker = L.marker([pin.lat, pin.lon], { icon, draggable: true })
                    .addTo(_losLayer);
                marker.on("dragend", (ev) => {
                    const ll = ev.target.getLatLng();
                    const prevLat = pin.lat, prevLon = pin.lon;
                    pin.lat = ll.lat;
                    pin.lon = ll.lng;
                    // Validate segment distance after drag; revert and show banner if exceeded.
                    let tooFar = false;
                    for (let j = 1; j < _losPins.length; j++) {
                        const segKm = _haversineKm(_losPins[j-1].lat, _losPins[j-1].lon, _losPins[j].lat, _losPins[j].lon);
                        if (segKm > _LOS_MAX_SEG_KM) { tooFar = true; break; }
                    }
                    if (tooFar) {
                        pin.lat = prevLat;
                        pin.lon = prevLon;
                        _renderLosOverlay();
                        _renderLosPanel();
                        const verdEl = document.getElementById("topo-los-verdicts");
                        if (verdEl) verdEl.innerHTML =
                            `<div class="topo-los-banner error"><i class="fa-solid fa-triangle-exclamation"></i> Segment exceeds the ${_LOS_MAX_SEG_KM} km limit — pin reverted. Drag within range.</div>`;
                        return;
                    }
                    _renderLosOverlay();
                    _renderLosPanel();
                    _scheduleLosProfile();
                });
            });
        }

        // Schedule a profile re-fetch with 250 ms debounce.
        // Also bumps _losGeneration synchronously so any in-flight response is invalidated.
        // Resets segment selection to 0 (pins changed → old index may be out of range).
        function _scheduleLosProfile() {
            ++_losGeneration;
            _losSelectedSeg = 0;
            if (_losProfileDebounce) clearTimeout(_losProfileDebounce);
            _losProfileDebounce = setTimeout(_fetchLosProfile, 250);
        }

        // Great-circle interpolation: returns n evenly-spaced [lat,lon] pairs
        // from (lat1,lon1) to (lat2,lon2) inclusive of endpoints.
        function _gcInterpolate(lat1, lon1, lat2, lon2, n) {
            const toRad = d => d * Math.PI / 180;
            const toDeg = r => r * 180 / Math.PI;
            const phi1 = toRad(lat1), lam1 = toRad(lon1);
            const phi2 = toRad(lat2), lam2 = toRad(lon2);
            const d = 2 * Math.asin(Math.sqrt(
                Math.sin((phi2 - phi1) / 2) ** 2 +
                Math.cos(phi1) * Math.cos(phi2) * Math.sin((lam2 - lam1) / 2) ** 2
            ));
            if (d < 1e-10) {
                return Array.from({ length: n }, () => [lat1, lon1]);
            }
            const pts = [];
            for (let i = 0; i < n; i++) {
                const f = i / (n - 1);
                const A = Math.sin((1 - f) * d) / Math.sin(d);
                const B = Math.sin(f * d) / Math.sin(d);
                const x = A * Math.cos(phi1) * Math.cos(lam1) + B * Math.cos(phi2) * Math.cos(lam2);
                const y = A * Math.cos(phi1) * Math.sin(lam1) + B * Math.cos(phi2) * Math.sin(lam2);
                const z = A * Math.sin(phi1) + B * Math.sin(phi2);
                const lat = toDeg(Math.atan2(z, Math.sqrt(x * x + y * y)));
                const lon = toDeg(Math.atan2(y, x));
                pts.push([lat, lon]);
            }
            return pts;
        }

        // Fetch elevations for all segments and draw the profile chart.
        // The chart is rendered IMMEDIATELY with a zero-terrain skeleton (LoS
        // line + Fresnel envelope) so the user gets instant feedback, then
        // each elevation chunk that returns triggers a redraw with the real
        // terrain layered in. This avoids the previous "10-second wait while
        // every upstream HTTP completes" pattern.
        async function _fetchLosProfile() {
            _losProfileDebounce = null;
            if (_losPins.length < 2) return;
            const gen = ++_losGeneration;
            const chartEl = document.getElementById("topo-los-chart");
            if (!chartEl) return;
            // Ensure Highcharts (core + more/arearange) is available before fetching elevations.
            if (typeof _loadHighchartsMore === "function") {
                try { await _loadHighchartsMore(); } catch (_) {}
            } else if (typeof _loadHighcharts === "function") {
                try { await _loadHighcharts(); } catch (_) {}
            }
            if (gen !== _losGeneration) return;

            // Build interpolated points for each segment.
            const segPoints = [];   // array of arrays (one per segment)
            for (let s = 0; s < _losPins.length - 1; s++) {
                const p1 = _losPins[s], p2 = _losPins[s + 1];
                segPoints.push(_gcInterpolate(p1.lat, p1.lon, p2.lat, p2.lon, _LOS_SAMPLES));
            }

            // Allocate the elevations array; null means "not yet known" — the
            // chart renderer treats nulls as zero-terrain for the LoS / Fresnel
            // math and skips drawing terrain at those samples so the profile
            // doesn't show a phantom sea-level baseline. As chunks arrive we
            // fill the array and redraw.
            const elevations = new Array(segPoints.reduce((n, s) => n + s.length, 0)).fill(null);
            _losLastElevations = { segPoints, elevations };
            _drawLosChart({ segPoints, elevations });  // instant skeleton paint

            // Flatten into one list, rounded to 4 dp to match the elevation
            // cache's quantisation (~11 m grid). Extra precision would be
            // discarded server-side anyway and only inflates WS frame size.
            const allPoints = [];
            for (const seg of segPoints) {
                for (const [la, lo] of seg) {
                    allPoints.push([
                        Math.round(la * 1e4) / 1e4,
                        Math.round(lo * 1e4) / 1e4,
                    ]);
                }
            }

            // Chunk into ≤ _LOS_ELEV_CHUNK points per cmd — Domoticz caps
            // `plugin_command` frames at 65 536 bytes; with 4-dp coords each
            // point serialises to ~17 bytes so 1000 points ≈ 17 KB, well
            // under the cap.
            const _LOS_ELEV_CHUNK = 1000;
            try {
                for (let off = 0; off < allPoints.length; off += _LOS_ELEV_CHUNK) {
                    if (gen !== _losGeneration) return;
                    const chunk = allPoints.slice(off, off + _LOS_ELEV_CHUNK);
                    const id = ++_losElevCmdId;
                    const result = await new Promise((resolve, reject) => {
                        let unsub;
                        const timer = setTimeout(() => {
                            unsub && unsub();
