                _analyticsAttachUI();
                // Observe the chart grid AND every individual chart slot. The
                // panel-level observer wasn't enough: when the container
                // query toggles the grid from 2 columns to 1, the slot
                // widths change but the panel's own width didn't change in
                // that same frame, so no callback fired. Observing each
                // slot guarantees we catch every geometry change — drag
                // resize, column-count flip, font reflow, anything.
                if (typeof ResizeObserver !== "undefined") {
                    if (_analyticsResizeObs) { try { _analyticsResizeObs.disconnect(); } catch (_) {} }
                    _analyticsResizeObs = new ResizeObserver(() => _scheduleAnalyticsReflow());
                    const _ag = document.getElementById("analytics-chart-grid");
                    if (_ag) _analyticsResizeObs.observe(_ag);
                    document.querySelectorAll(".analytics-chart-slot").forEach(s => {
                        try { _analyticsResizeObs.observe(s); } catch (_) {}
                    });
                }
                Promise.all([_loadHighcharts(), _waitForWSOpen(10_000)]).then(() => {
                    if (!_analyticsIsOpen()) return;
                    _analyticsRefresh();
                    _analyticsStartTimer();
                }).catch(err => {
                    document.querySelectorAll(".analytics-chart-slot").forEach(s => {
                        s.innerHTML = `<div class="analytics-empty-state" style="color:var(--red,#e05555);">Could not initialise analytics: ${(err && err.message) || err}. Reload or click a time-range button to retry.</div>`;
                    });
                    console.warn('Analytics init failed', err);
                });
            } else if (view === "stats") {
                title.textContent  = "Statistics";
                coords.textContent = "Lifetime totals & leaderboards";
                body.innerHTML = `<div class="panel-view" id="stats-view"></div>`;
                _renderStatsPanel();
            } else if (view === "self") {
                title.textContent  = "Connected node";
                coords.textContent = "Identity, radio, advert, telemetry";
                body.innerHTML = `<div class="panel-view" id="self-view"></div>`;
                _renderSelfPanel();
            } else if (view && view.startsWith("contact:")) {
                const name = view.slice("contact:".length);
                title.textContent  = name;
                coords.textContent = "Remote queries";
                body.innerHTML = `<div class="panel-view" id="contact-view" data-node="${escHtml(name)}"></div>`;
                _renderContactPanel(name);
            }
        }

        // Track which view is currently in the panel so renderers can no-op
        // when their tab isn't open.
        function _isOpen(view)  { return _sidePanelView === view && document.getElementById("map-panel").classList.contains("open"); }
        function _toggleFirehosePause() {
            _rxLogFirehosePaused = !_rxLogFirehosePaused;
            const btn = document.getElementById("firehose-pause");
            if (btn) {
                btn.textContent = _rxLogFirehosePaused ? "Resume" : "Pause";
                btn.classList.toggle("active", _rxLogFirehosePaused);
            }
        }

        function _toggleFirehoseLegend() {
            const pop = document.getElementById("firehose-legend-pop");
            if (!pop) return;
            if (pop.style.display === "none") {
                pop.innerHTML = `
                  <div style="font-size:0.78rem;line-height:1.5;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 10px;">
                    <div style="color:var(--accent);font-weight:600;margin-bottom:4px">Column legend</div>
                    <div><strong>Time</strong> — when this packet was heard (local time).</div>
                    <div><strong>Type</strong> — payload type:
                        <span style="color:var(--accent)">TEXT_MSG</span> (DM),
                        <span style="color:#f9c74f">GRP_TXT</span> (channel),
                        <span style="color:#a0c4ff">ADVERT</span> (node beacon),
                        <span style="opacity:.85">RESPONSE</span> (ACK/reply),
                        REQ / ANON_REQ (queries).</div>
                    <div><strong>Nh</strong> — how many hops the packet has already traversed in the mesh (e.g. <code>6h</code> = 6 repeaters).</div>
                    <div><strong>SNR / RSSI</strong> — the signal we received this copy with. SNR is in dB (higher = cleaner), RSSI is in dBm (less negative = stronger).</div>
                    <div><strong>Text / raw bytes</strong> — the decoded message if we have the key, otherwise the start of the raw on-air frame (ciphertext for encrypted payloads).</div>
                  </div>`;
                pop.style.display = "";
            } else {
                pop.style.display = "none";
            }
        }

        function _renderFirehoseIfOpen() {
            if (!_isOpen("firehose") || _rxLogFirehosePaused) return;
            const list = document.getElementById("firehose-list");
            if (!list) return;
            const entries = (_rxLog && _rxLog.entries) || [];
            // Append only what is newer than the last cursor. The plugin
            // stores entries oldest-first; we render newest-first so the
            // initial dump and incremental appends both put the freshest
            // packet at the top of the list.
            const fresh = entries.filter(e => (e._t || 0) > _rxLogLastSeen);
            if (!fresh.length) return;
            _rxLogLastSeen = fresh[fresh.length - 1]._t || _rxLogLastSeen;
            fresh.reverse();
            // Keep most recent 200 in DOM
            const ADV_TYPE_NAME = { 1: "Companion", 2: "Repeater", 3: "Room Server", 4: "Sensor" };
            const rowsHtml = fresh.map(e => {
                const ts = e._t ? new Date(e._t * 1000).toLocaleTimeString() : "?";
                const pt = e.payload_typename || "?";
                const cls = ({
                    TEXT_MSG: "text", GRP_TXT: "group",
                    ADVERT: "advert", RESPONSE: "response",
                })[pt] || "";
                const sig = `${e.snr ?? "?"}/${e.rssi ?? "?"}`;
                const hops = e.path_len !== undefined ? `${e.path_len}h` : "";

                // What to show in the visible message column. For ADVERT we have a
                // parsed adv_name + location — far more useful than the raw hex.
                // For GRP_TXT the firmware tells us the channel name. For TEXT_MSG
                // the body is encrypted, so we keep the raw bytes preview.
                let msg;
                if (pt === "ADVERT" && e.adv_name) {
                    const loc = (e.adv_lat && e.adv_lon) ? `  @${e.adv_lat.toFixed(4)},${e.adv_lon.toFixed(4)}` : "";
                    const kind = ADV_TYPE_NAME[e.adv_type] || `type ${e.adv_type ?? "?"}`;
                    msg = `${e.adv_name}  (${kind})${loc}`;
                } else if (pt === "GRP_TXT" && e.chan_name) {
                    msg = `${e.chan_name}   (ciphertext: ${(e.crypted || e.raw_hex || "").slice(0, 24)}…)`;
                } else if (e.message) {
                    msg = e.message.slice(0, 80);
                } else {
                    msg = e.raw_hex ? e.raw_hex.slice(0, 30) + "…" : "";
                }

                // Build the per-row tooltip from every field we have. Advert
                // packets get a richer block (name / type / pubkey / lat-lon /
                // flags / timestamp).
                const tipLines = [
                    `Time:        ${ts}`,
                    `Type:        ${pt}`,
                    `Route:       ${e.route_typename || "?"}`,
                    `Hops:        ${e.path_len ?? "?"}`,
                    `SNR:         ${e.snr ?? "?"} dB`,
                    `RSSI:        ${e.rssi ?? "?"} dBm`,
                    e.transport_code ? `Transport:   ${e.transport_code}` : "",
                    e.path ?           `Path hashes: ${e.path}` : "",
                ];
                if (pt === "ADVERT") {
                    if (e.adv_name)       tipLines.push(`Name:        ${e.adv_name}`);
                    if (e.adv_type !== undefined) tipLines.push(`Adv type:    ${e.adv_type} (${ADV_TYPE_NAME[e.adv_type] || "?"})`);
                    if (e.adv_flags !== undefined) tipLines.push(`Adv flags:   0x${e.adv_flags.toString(16)}`);
                    if (e.adv_lat && e.adv_lon) tipLines.push(`Location:    ${e.adv_lat}, ${e.adv_lon}`);
                    if (e.adv_timestamp) tipLines.push(`Adv ts:      ${new Date(e.adv_timestamp * 1000).toLocaleString()}`);
                    if (e.adv_key)       tipLines.push(`Public key:  ${e.adv_key}`);
                    if (e.signature)     tipLines.push(`Signature:   ${e.signature.slice(0, 32)}…`);
                }
                if (e.chan_hash) tipLines.push(`Chan hash:   0x${e.chan_hash}${e.chan_name ? " (" + e.chan_name + ")" : ""}`);
                if (e.cipher_mac) tipLines.push(`Cipher MAC:  ${e.cipher_mac}`);
                if (e.message)    tipLines.push(`Text:        ${e.message}`);
                if (e.raw_hex)    tipLines.push(`Raw hex:     ${e.raw_hex.slice(0, 80)}${e.raw_hex.length > 80 ? "…" : ""}`);
                const tip = tipLines.filter(Boolean).join("\n");

                return `<div class="firehose-row ${cls}" data-tip="1" title="${escHtml(tip)}">
                    <span class="t">${ts}</span>
                    <span class="pt">${pt}</span>
                    <span>${hops}</span>
                    <span class="msg">${escHtml(sig)} · ${escHtml(msg)}</span>
                </div>`;
            }).join("");
            list.insertAdjacentHTML("afterbegin", rowsHtml);
            // Trim
            while (list.children.length > 200) list.removeChild(list.lastChild);
        }

        function _renderTrafficIfOpen() {
            if (!_isOpen("traffic")) return;
            const view = document.getElementById("traffic-view");
            if (!view) return;
            const counts = (_rxLog.stats && _rxLog.stats.payload_type_counts) || {};
            const pairs = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            if (!pairs.length) {
                view.innerHTML = `<div style="color:var(--muted)">No packets seen yet.</div>`;
                if (_payloadPieChart) { try { _payloadPieChart.destroy(); } catch (_) {} _payloadPieChart = null; }
                return;
            }
            const total = pairs.reduce((s, [, n]) => s + n, 0);
            const max = Math.max(...pairs.map(p => p[1]));
            const head = `<div class="bar-row" style="color:var(--accent);font-weight:600;text-transform:uppercase;font-size:0.65rem;letter-spacing:0.05em;border-bottom:1px solid var(--accent);padding-bottom:4px">
                <span>Payload type</span><span></span><span style="text-align:right">Count</span>
            </div>`;
            const bars = pairs.map(([name, n]) => {
                const pct = max ? Math.round(100 * n / max) : 0;
                return `<div class="bar-row">
                    <span style="display:inline-flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:2px;background:${_payloadColor(name)};display:inline-block"></span>${escHtml(name)}</span>
                    <div class="bar-bar"><span style="width:${pct}%;background:${_payloadColor(name)}"></span></div>
                    <span class="bar-count">${n}</span>
                </div>`;
            }).join("");
            view.innerHTML = `
                <div class="payload-card">
                    <div class="payload-card-title">Packet Types</div>
                    <div class="payload-pie-wrap"><div id="payload-pie"></div></div>
                </div>
                ${head}
                ${bars}
            `;
            // Render the donut chart once Highcharts is available. The bar list
            // above stays usable even if Highcharts fails to load.
            _loadHighcharts().then(() => {
                if (!_isOpen("traffic")) return;
                const el = document.getElementById("payload-pie");
                if (!el) return;
                if (_payloadPieChart) {
                    try { _payloadPieChart.destroy(); } catch (_) {}
                    _payloadPieChart = null;
                }
                const _txt = (getComputedStyle(document.body).getPropertyValue("--text") || "#fff").trim() || "#fff";
                const _muted = (getComputedStyle(document.body).getPropertyValue("--muted") || "#888").trim() || "#888";
                const _bg = (getComputedStyle(document.body).getPropertyValue("--bg") || "#111").trim() || "#111";
                _payloadPieChart = Highcharts.chart(el, {
                    chart: {
                        type: "pie",
                        backgroundColor: "transparent",
                        height: 280,
                        spacing: [4, 4, 4, 4],
                        events: {
                            render() {
                                // Place "<total> / pkts" centered in the donut
                                // hole, recomputed on every redraw. Two
                                // separate SVG text nodes (not tspans inside a
                                // useHTML element, which the browser rendered
                                // inline as "48pkts").
                                const ser = this.series[0];
                                if (!ser || !ser.center) return;
                                const cx = ser.center[0] + this.plotLeft;
                                const cy = ser.center[1] + this.plotTop;
                                const t = ser.points.reduce((s, p) => s + (p.y || 0), 0);
                                if (this._centerNum) { try { this._centerNum.destroy(); } catch (_) {} }
                                if (this._centerLbl) { try { this._centerLbl.destroy(); } catch (_) {} }
                                // The number sits just above the geometric
                                // centre; the "pkts" label just below. dominant
                                // -baseline centres each line vertically on its
                                // own y, so the visual centre of the pair
                                // matches the hole's centre.
                                this._centerNum = this.renderer
                                    .text(t.toLocaleString(), cx, cy - 4)
                                    .attr({ "text-anchor": "middle", zIndex: 5 })
                                    .css({ color: _txt, fontSize: "1.4rem", fontWeight: "700" })
                                    .add();
                                this._centerLbl = this.renderer
                                    .text("pkts", cx, cy + 16)
                                    .attr({ "text-anchor": "middle", zIndex: 5 })
                                    .css({ color: _muted, fontSize: "0.72rem" })
                                    .add();
                            },
                        },
                    },
                    title: { text: "" },
                    credits: { enabled: false },
                    exporting: { enabled: false },
                    tooltip: { pointFormat: "<b>{point.y}</b> ({point.percentage:.1f}%)" },
                    legend: {
                        enabled: true,
                        layout: "vertical",
                        align: "right",
                        verticalAlign: "middle",
                        itemStyle: { color: _txt, fontWeight: "500", fontSize: "0.78rem" },
                        itemHoverStyle: { color: _txt },
                        symbolHeight: 10,
                        symbolRadius: 2,
                        labelFormatter: function () { return `${this.name} (${this.y})`; },
                    },
                    plotOptions: {
                        pie: {
                            innerSize: "60%",
                            borderWidth: 1,
                            borderColor: _bg,
                            dataLabels: { enabled: false },
                            showInLegend: true,
                        },
                    },
                    series: [{
                        name: "Packets",
                        data: pairs.map(([name, y]) => ({ name, y, color: _payloadColor(name) })),
                    }],
                    responsive: {
                        rules: [{
                            condition: { maxWidth: 440 },
                            chartOptions: {
                                legend: { layout: "horizontal", align: "center", verticalAlign: "bottom" },
                            },
                        }],
                    },
                });
            }).catch(() => { /* highcharts unavailable — bar list still shown */ });
        }

        function _renderChannelsIfOpen() {
            if (!_isOpen("channels")) return;
            const view = document.getElementById("channels-view");
            if (!view) return;
            const counts = (_rxLog.stats && _rxLog.stats.chan_hash_counts) || {};
            // Try to build a hash → channel-name map from recent entries
            // (the firmware tags each GRP_TXT entry with chan_name when we
            // have its key, which lets us resolve hashes to readable names).
            const hashToName = {};
            for (const e of (_rxLog.entries || [])) {
                if (e.chan_hash && e.chan_name) hashToName[e.chan_hash] = e.chan_name;
            }

            // Device-side channel slots (firmware supports up to 40).
            // If the plugin hasn't sent the slot table yet, fall back to
            // synthesising it from the legacy {idx: name} known-channels map.
            const MAX_SLOTS = 40;
            let slots = (_deviceMap && _deviceMap.channel_slots) || null;
            if (!slots) {
                const known = (_rxLog.known_channels) || _channelNames || {};
                slots = [];
                for (let i = 0; i < MAX_SLOTS; i++) slots.push({ idx: i, name: known[String(i)] || "" });
            }
            const slotRows = slots.map(s => {
                const empty = !s.name;
                const nameHtml = empty
                    ? `<span class="name" style="font-style:italic;opacity:.7">(empty)</span>`
                    : `<span class="name" style="color:var(--text)">${escHtml(s.name)}</span>`;
                const btn = empty
                    ? `<button class="chan-slot-btn add"   data-slot="${s.idx}" title="Add a channel to this slot"><i class="fa-solid fa-plus"></i> Add</button>`
                    : `<button class="chan-slot-btn clear" data-slot="${s.idx}" title="Wipe this slot"><i class="fa-solid fa-trash"></i> Remove</button>`;
                return `<div class="chan-slot-row">
                    <span class="slot-idx">${s.idx}</span>
                    ${nameHtml}
                    ${btn}
                </div>`;
            }).join("");

            // Hashes heard on air (with packet counts), sorted by the channel
            // hash value ascending (low → high) so the table reads in a stable
            // numeric order regardless of packet counts.
            const pairs = Object.entries(counts).sort(
                (a, b) => (parseInt(a[0], 16) || 0) - (parseInt(b[0], 16) || 0)
            );
            const hashRows = pairs.map(([h, n]) => {
                const name = hashToName[h] || "(unknown — no key)";
                const isKnown = !!hashToName[h];
                return `<div class="chan-row${isKnown ? " known" : ""}">
                    <span class="chash">0x${escHtml(h)}</span>
                    <span class="name">${escHtml(name)}</span>
                    <span class="cnt">${n}</span>
                </div>`;
            }).join("");

            view.innerHTML = `
                <div style="font-size:0.78rem;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--accent);padding-bottom:4px">
                    Channel slots (${slots.filter(s => s.name).length} / ${slots.length})
                </div>
                <div style="font-size:0.78rem;color:var(--text);opacity:0.85;line-height:1.5">
                    Slots on this device — fill an empty one to subscribe.
                    Public-style names that start with <code>#</code>
                    auto-derive their key from the name; private channels need
                    a 16-byte secret too.
                </div>
                <div id="chan-slots-list">${slotRows}</div>
                <div style="font-size:0.78rem;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--accent);padding-bottom:4px;margin-top:6px">
                    Hashes heard on air
                </div>
                <div style="font-size:0.78rem;color:var(--text);opacity:0.85;line-height:1.5">
                    Each row is a channel hash heard over the radio. Unknown
                    rows are channels we have no key for — knowing the hash
                    alone isn't enough to subscribe, you need the name (and
                    secret for private channels).
                </div>
                ${hashRows ? `
                    <div class="chan-row" style="color:var(--accent);font-weight:600;text-transform:uppercase;font-size:0.65rem;letter-spacing:0.05em;border-bottom:1px solid var(--accent)">
                        <span title="MeshCore hashes a channel's name to a single byte; the firmware uses this hash to route encrypted group traffic. We see it on every GRP_TXT packet.">Chan hash</span>
                        <span>Name</span>
                        <span style="text-align:right">Pkts</span>
                    </div>${hashRows}` : `<div style="color:var(--text);opacity:.7;padding-top:8px">No grouped traffic heard yet.</div>`}`;

            // Wire up slot Add/Remove buttons
            view.querySelectorAll(".chan-slot-btn.add").forEach(btn => {
                btn.onclick = () => _addChannelSlot(parseInt(btn.dataset.slot, 10));
            });
            view.querySelectorAll(".chan-slot-btn.clear").forEach(btn => {
                btn.onclick = () => _clearChannelSlot(parseInt(btn.dataset.slot, 10), btn);
            });
        }

        async function _addChannelSlot(slot) {
            const name = prompt(
                `Add channel to slot ${slot}.\n\n` +
                `Enter the channel name (e.g. "#mc-radar" or "#nl").\n\n` +
                `Names starting with # auto-derive the key from the name.\n` +
                `For a private channel, append a space and the 32-hex-char secret.\n\n` +
                `Examples:\n` +
                `  #nl\n` +
                `  MyPrivateRoom 0123456789abcdef0123456789abcdef`, ""
            );
            if (!name) return;
            try {
                await _pluginWS.sendCmdAndWait(`!set_channel ${slot} ${name}`);
                await _refreshChannelsAndCompose();
                _renderChannelsIfOpen();
            } catch (err) {
                alert(`Failed to add channel: ${err.message}`);
            }
        }

        async function _clearChannelSlot(slot, btn) {
            if (!confirm(`Wipe channel slot ${slot}?\n\nYou can re-add the channel later by name.`)) return;
            try {
                await _pluginWS.sendCmdAndWait(`!clear_channel ${slot}`);
                await _refreshChannelsAndCompose();
                _renderChannelsIfOpen();
            } catch (err) {
                alert(`Failed to clear channel: ${err.message}`);
            }
        }

        // After a channel slot is added/removed, the plugin will push a fresh
        // t:'channels' and t:'devices' message; the reducer re-populates compose
        // targets and channel chips automatically.  This helper does the immediate
        // UI refresh from in-memory state so the panel reacts without waiting for
        // the next push cycle.
        function _refreshChannelsAndCompose() {
            _populateComposeTargets();
            try { _renderChannelChips(_allChannelChips()); } catch (_) { /* before inbox render */ }
            return Promise.resolve();
        }

        // Heard-nodes panel. Backed by the plugin's persistent
        // meshcore_heard.json (survives restarts), not the rolling RX log.
        const _HEARD_ADV_TYPE = { 1: "Companion", 2: "Repeater", 3: "Room Server", 4: "Sensor" };
        // Per-type visibility for the heard side-panel (default: all on),
        // persisted like the dashboard's contact-type toggles.
        const LS_HEARD_TYPE = { 1: "meshcore.heardType1", 2: "meshcore.heardType2",
                                3: "meshcore.heardType3", 4: "meshcore.heardType4" };
        const _heardShowType = (() => {
            const g = k => { try { return localStorage.getItem(k) !== "0"; } catch (_) { return true; } };
            return { 1: g(LS_HEARD_TYPE[1]), 2: g(LS_HEARD_TYPE[2]),
                     3: g(LS_HEARD_TYPE[3]), 4: g(LS_HEARD_TYPE[4]) };
        })();
        const _HEARD_TYPE_ICON = { 1: "fa-user", 2: "fa-tower-broadcast",
                                   3: "fa-house-signal", 4: "fa-microchip" };
        let _heardMap = null;          // Leaflet instance for the bottom map
        let _heardMapPk = null;        // pubkey currently shown on the map
        let _contactMap = null;        // Leaflet instance for the contact panel

        // Per-type counts of heard (non-contact) nodes, ignoring the active
        // type filter — so the toggle badges show how many exist of each.
        function _heardTypeCounts() {
            const knownPks = new Set();
            for (const n of Object.values((_deviceMap && _deviceMap.nodes) || {}))
                if (n.pubkey) knownPks.add(n.pubkey);
            const c = { 1: 0, 2: 0, 3: 0, 4: 0 };
            for (const h of Object.values((_heard && _heard.nodes) || {})) {
                if (!h.pubkey || knownPks.has(h.pubkey)) continue;
                if (h.type in c) c[h.type]++;
            }
            return c;
        }

        function _heardList() {
            // Defensive: hide anything that's already a contact.
            const knownPks = new Set();
            for (const n of Object.values((_deviceMap && _deviceMap.nodes) || {})) {
                if (n.pubkey) knownPks.add(n.pubkey);
            }
            return Object.values((_heard && _heard.nodes) || {})
                .filter(h => h.pubkey && !knownPks.has(h.pubkey))
                .filter(h => !(h.type in _heardShowType) || _heardShowType[h.type])
                .sort((a, b) => (b.last_heard || 0) - (a.last_heard || 0));
        }

        function _renderHeardIfOpen() {
            if (!_isOpen("heard")) return;
            const view = document.getElementById("heard-view");
            if (!view) return;

            // Build the shell ONCE per panel open. The 3 s refresh only
            // rewrites #heard-list-wrap — the #heard-map element is left
            // untouched so its Leaflet instance stays bound to a live DOM
            // node (rebuilding it every tick made the map flash and die).
            let listWrap = document.getElementById("heard-list-wrap");
            if (!listWrap) {
                // Fresh shell — any prior Leaflet instance is now orphaned.
                if (_heardMap) { try { _heardMap.remove(); } catch (_) {} _liveMaps.delete(_heardMap); _heardMap = null; }
                view.innerHTML = `
                    <div style="font-size:0.82rem;color:var(--text);opacity:0.85;line-height:1.5">
                        Nodes heard over the air whose pubkey isn't in your
                        contacts. This list is persistent. Use
                        <i class="fa-solid fa-user-plus"></i> to add a node to
                        your contacts, <i class="fa-solid fa-trash"></i> to drop
                        it from this list, or
                        <i class="fa-solid fa-location-dot"></i> to show its
                        position on the map below.
                    </div>
                    <div id="heard-purge-bar" style="display:flex;align-items:center;gap:6px;margin:8px 0 2px;flex-wrap:wrap">
                        <span style="font-size:0.72rem;color:var(--muted)">Purge older than:</span>
                        <select id="heard-purge-age" style="font-size:0.72rem;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 6px">
                            <option value="604800">1 week</option>
                            <option value="2592000" selected>1 month</option>
                            <option value="31536000">1 year</option>
                        </select>
                        <button id="heard-purge-btn" class="view-btn" title="Remove heard nodes older than the selected age"><i class="fa-solid fa-broom"></i> Purge</button>
                    </div>
                    <div id="heard-type-filter" style="display:flex;align-items:center;gap:4px;margin:6px 0 2px">
                        <span style="font-size:0.72rem;color:var(--muted);margin-right:4px">Show:</span>
                        ${[1,2,3,4].map(t =>
                            `<button class="view-btn heard-type-btn${_heardShowType[t] ? " active" : ""}" data-htype="${t}" title="Show/hide ${_HEARD_ADV_TYPE[t]}s"><i class="fa-solid ${_HEARD_TYPE_ICON[t]}"></i> <span class="htc">0</span></button>`
                        ).join("")}
                    </div>
                    <div id="heard-list-wrap"></div>
                    <div id="heard-map" style="display:none"></div>`;
                listWrap = document.getElementById("heard-list-wrap");
                view.querySelectorAll(".heard-type-btn").forEach(b => {
                    b.onclick = () => {
                        const t = b.dataset.htype;
                        _heardShowType[t] = !_heardShowType[t];
                        try { localStorage.setItem(LS_HEARD_TYPE[t], _heardShowType[t] ? "1" : "0"); } catch (_) {}
                        b.classList.toggle("active", _heardShowType[t]);
                        _renderHeardIfOpen();
                    };
                });
                const purgeBtn = document.getElementById("heard-purge-btn");
                if (purgeBtn) purgeBtn.onclick = _heardPurgeOlderThan;
            }

            // Refresh the per-type count badges every render.
            const _htc = _heardTypeCounts();
            view.querySelectorAll(".heard-type-btn").forEach(b => {
                const span = b.querySelector(".htc");
                if (span) span.textContent = _htc[b.dataset.htype] || 0;
            });

            const list = _heardList();
            if (!list.length) {
                listWrap.innerHTML = `<div style="color:var(--text);opacity:.7;padding-top:10px">
                    Nothing heard yet — wait for repeaters to beacon.</div>`;
            } else {
                listWrap.innerHTML = `<div class="heard-list">` + list.map(h => {
                    const pk   = h.pubkey;
                    const t    = h.last_heard ? new Date(h.last_heard * 1000).toLocaleString() : "?";
                    const sig  = `${h.snr ?? "?"}/${h.rssi ?? "?"}`;
                    const kind = _HEARD_ADV_TYPE[h.type] || "?";
                    const hops = (h.path_len !== undefined && h.path_len >= 0) ? `${h.path_len}h` : "?";
                    let skewWrong = false, skewTip = "";
                    if (h.node_ts && h.last_heard
                        && Math.abs(h.node_ts - h.last_heard) > CLOCK_WRONG_TOLERANCE_S) {
                        skewWrong = true;
                        skewTip = `Node clock looks wrong (off by >1h).\n`
                                + `Received: ${new Date(h.last_heard * 1000).toLocaleString()}\n`
                                + `Node reported: ${new Date(h.node_ts * 1000).toLocaleString()}`;
                    }
                    const hasLoc = !!(h.lat || h.lon);
                    const gpsBtn = hasLoc
                        ? `<button class="heard-act gps" data-pk="${escHtml(pk)}" title="Show on map (${h.lat}, ${h.lon})"><i class="fa-solid fa-location-dot"></i></button>`
                        : "";
                    return `<div class="heard-row">
                        <div class="heard-row-top">
                            <div class="heard-name">${escHtml(h.name || "(unnamed)")}</div>
                            <div class="heard-acts">
                                ${gpsBtn}
                                <button class="heard-act add" data-pk="${escHtml(pk)}" data-name="${escHtml(h.name || "")}" title="Add to contacts"><i class="fa-solid fa-user-plus"></i></button>
                                <button class="heard-act del" data-pk="${escHtml(pk)}" title="Delete from heard list"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                        <div class="heard-meta">
                            <span class="heard-chip">${escHtml(kind)}</span>
                            <span class="heard-chip">${hops}</span>
                            <span class="heard-chip">${escHtml(sig)} dB/dBm</span>
                            <span class="heard-chip" title="Adverts received from this node">${(h.count || 0)}&times;</span>
                        </div>
                        <div class="heard-pk" title="${escHtml(pk)}">${escHtml(pk)}</div>
                        <div class="heard-extra"><span title="Last heard at">${escHtml(t)}</span>${skewWrong ? `<i class="fa-solid fa-triangle-exclamation clock-warn" title="${escHtml(skewTip).replace(/\n/g, "&#10;")}"></i>` : ""}</div>
                    </div>`;
                }).join("") + `</div>`;

                listWrap.querySelectorAll(".heard-act.add").forEach(b =>
                    b.onclick = () => _heardAdd(b.dataset.pk, b.dataset.name));
                listWrap.querySelectorAll(".heard-act.del").forEach(b =>
                    b.onclick = () => _heardDelete(b.dataset.pk));
                listWrap.querySelectorAll(".heard-act.gps").forEach(b =>
                    b.onclick = () => _heardToggleMap(b.dataset.pk));
            }

            // Keep an open map visible if its node is still present.
            // force=false → don't reset the user's zoom/pan on refresh.
            if (_heardMapPk && list.some(h => h.pubkey === _heardMapPk)) {
                _heardShowMap(_heardMapPk, false);
            } else if (_heardMapPk) {
                _heardMapPk = null;
                const el = document.getElementById("heard-map");
                if (el) el.style.display = "none";
            }
        }

        async function _heardAdd(pk, name) {
            if (!confirm(`Add "${name || pk.slice(0,12)}" to your contacts?`)) return;
            // Optimistic: drop locally so it disappears immediately.
            if (_heard.nodes) delete _heard.nodes[pk];
            if (_heardMapPk === pk) _heardToggleMap(pk);
            _renderHeardIfOpen();
            if (_includeHeard) _rerenderContacts();
            await _sendDeviceCmd(`!heard_add ${pk}`);
            // The plugin will push t:'devices' and t:'heard' shortly; the reducer
            // will re-render automatically.  No explicit fetch needed.
        }

        // Bulk purge: drop every heard node whose last_heard is older than
        // the selected age. Counts the affected rows locally (against the
        // currently visible filter) so the confirm dialog tells the user
        // exactly what's about to happen.
        async function _heardPurgeOlderThan() {
            const sel = document.getElementById("heard-purge-age");
            if (!sel) return;
            const seconds = parseInt(sel.value, 10);
            if (!Number.isFinite(seconds) || seconds <= 0) return;
            const now = Math.floor(Date.now() / 1000);
            const cutoff = now - seconds;
            const knownPks = new Set();
            for (const n of Object.values((_deviceMap && _deviceMap.nodes) || {}))
                if (n.pubkey) knownPks.add(n.pubkey);
            const victims = Object.values((_heard && _heard.nodes) || {})
                .filter(h => h.pubkey && !knownPks.has(h.pubkey))
                .filter(h => !h.last_heard || h.last_heard < cutoff);
            if (!victims.length) {
                alert(`No heard nodes are older than ${sel.options[sel.selectedIndex].text}.`);
                return;
            }
            const cutoffStr = new Date(cutoff * 1000).toLocaleDateString();
            if (!confirm(
                `This will remove ${victims.length} heard node(s) last seen before ${cutoffStr}.\n\n` +
                `Future broadcasts from these nodes will be ignored until they're heard again past the cutoff.\n\n` +
                `Continue?`
            )) return;
            // Optimistic local removal so the rows disappear immediately.
            for (const v of victims) {
                if (_heard.nodes) delete _heard.nodes[v.pubkey];
                if (_heardMapPk === v.pubkey) _heardToggleMap(v.pubkey);
            }
            _renderHeardIfOpen();
            if (_includeHeard) _rerenderContacts();
            await _pluginWS.sendCmdAndWait(`!purge_heard ${seconds}`);
        }

        async function _heardDelete(pk) {
            const node = (_heard.nodes || {})[pk];
            const displayName = (node && node.name) ? node.name : pk.slice(0, 12);
            if (!confirm(`Delete "${displayName}" from the heard list?\n\nFuture broadcasts from this node will be ignored.`)) return;
            // Optimistic update: remove locally so the row vanishes immediately.
            if (_heard.nodes) delete _heard.nodes[pk];
            if (_heardMapPk === pk) _heardToggleMap(pk);
            _renderHeardIfOpen();
            if (_includeHeard) _rerenderContacts();
            await _pluginWS.sendCmdAndWait(`!forget_heard ${pk}`);
        }

        function _heardToggleMap(pk) {
            if (_heardMapPk === pk) {           // toggle off
                _heardMapPk = null;
                const el = document.getElementById("heard-map");
                if (el) el.style.display = "none";
                return;
            }
            _heardShowMap(pk, true);   // explicit click → (re)center
        }

        function _heardShowMap(pk, force) {
            const node = (_heard.nodes || {})[pk];
            const el = document.getElementById("heard-map");
            if (!node || !el || (!node.lat && !node.lon)) return;
            _heardMapPk = pk;
            el.style.display = "";
            let tries = 0;
            const init = () => {
                if (typeof L === "undefined") {
                    if (++tries > LEAFLET_MAX_TRIES) {
                        el.innerHTML = `<div style="padding:16px;color:var(--muted);font-size:0.8rem;text-align:center">Map library unavailable.</div>`;
                        return;
                    }
                    setTimeout(init, LEAFLET_POLL_MS);
                    return;
                }
                const fresh = !_heardMap;
                if (fresh) {
                    _heardMap = L.map(el, { zoomControl: true }).setView([node.lat, node.lon], 12);
                    _liveMaps.add(_heardMap);
                    _applyTileMode(_heardMap, _topoGetStr("tile", "light"));
                }
                // Only (re)center + (re)place the marker when the displayed
                // node actually changes or the user explicitly clicked the
                // pin. The 3 s refresh calls this with force=false, so it
                // must NOT fight the user's manual zoom / pan.
                if (fresh || force || _heardMap._shownPk !== pk) {
                    _heardMap.setView([node.lat, node.lon], 12);
                    if (_heardMap._hmMarker) _heardMap._hmMarker.remove();
                    // CSS-only pin — the self-hosted Leaflet bundle has no
                    // marker PNGs, so the default icon would render broken.
                    const pinIcon = L.divIcon({
                        className: "mc-pin",
                        html: '<div class="mc-pin-inner"></div>',
                        iconSize: [20, 20],
                        iconAnchor: [10, 20],
                        popupAnchor: [0, -16],
                    });
                    _heardMap._hmMarker = L.marker([node.lat, node.lon], { icon: pinIcon })
                        .addTo(_heardMap).bindPopup(node.name || pk.slice(0, 12)).openPopup();
                    _heardMap._shownPk = pk;
                }
                setTimeout(() => _heardMap.invalidateSize(), 200);
            };
            init();
        }

        // Heatmap markup (no DOM write) — embedded at the top of the
        // Statistics panel rather than a stand-alone side-panel.
        function _heatmapHtml() {
            const hm = (_rxLog.stats && _rxLog.stats.heatmap_24h) || new Array(24).fill(0);
            const max = Math.max(...hm, 1);   // avoid n/0 → Infinity when idle
            const now = new Date().getHours();
            const cell = (h) => {
                const v = hm[h] || 0;
                let cls = "";
                if (max > 0) {
                    const r = v / max;
                    if      (r > 0.75) cls = "hot4";
                    else if (r > 0.5)  cls = "hot3";
                    else if (r > 0.25) cls = "hot2";
                    else if (r > 0)    cls = "hot1";
                }
                if (h === now) cls += " now";
                return `<div class="${cls}" title="${h}:00–${h}:59  ${v} pkt">${v || ""}</div>`;
            };
            const labels = Array.from({length: 24}, (_, h) => `<div>${h}</div>`).join("");
            return `
                <div class="self-section">Packets / hour (24h)</div>
                <div style="font-size:0.78rem;color:var(--muted);margin-bottom:2px">
                    Per hour-of-day, last 24h. Outlined cell = current hour.
                </div>
                <div class="heatmap-grid" style="grid-template-columns:repeat(24,1fr)">
                    ${Array.from({length: 24}, (_, h) => cell(h)).join("")}
                </div>
                <div class="heatmap-labels">${labels}</div>`;
        }

        // ── Polar-radar state ────────────────────────────────────────────────────
        let _radarView  = "distance"; // "distance" | "hops"
        let _radarZoom  = 0;          // 0 = Auto, else multiplier factor
        let _radarChart = null;       // active Highcharts instance (polar scatter)
        let _radarThrottleTimer = null;

        // Throttled entry point — coalesces rapid device-map pushes to ≤1/s.
        function _renderRadarIfOpen() {
            if (!_isOpen("topology")) return;
            if (_radarThrottleTimer) return;
            _radarThrottleTimer = setTimeout(() => {
                _radarThrottleTimer = null;
                _renderRadar();
            }, 1000);
        }

        // Main radar render — async because it may need to lazy-load Highcharts libs
        // and fetch the Domoticz settings location.
        async function _renderRadar() {
            const chartDiv = document.getElementById("topo-radar-chart");
            const listDiv  = document.getElementById("topo-radar-list");
            if (!chartDiv || !listDiv) return;

            // ── 1. Resolve observer location ──────────────────────────────────
            let obsLat = null, obsLon = null;
            const si = _deviceMap && _deviceMap.self_info;
            if (si && si.adv_lat != null && si.adv_lon != null && (si.adv_lat || si.adv_lon)) {
                obsLat = si.adv_lat;
                obsLon = si.adv_lon;
            }
            // Also try self node's lat/lon from the device map
            if ((obsLat == null || (!obsLat && !obsLon)) && _deviceMap && _deviceMap.nodes && _deviceMap.self) {
                const selfNode = _deviceMap.nodes[_deviceMap.self];
                if (selfNode && selfNode.lat != null && selfNode.lon != null && (selfNode.lat || selfNode.lon)) {
                    obsLat = selfNode.lat;
                    obsLon = selfNode.lon;
                }
            }
            if (obsLat == null || (!obsLat && !obsLon)) {
                // Invalidate cached false result when self_info changes (on reconnect).
                if (_domoticzLocation === false) _domoticzLocation = null;
                const dLoc = await _getDomoticzLocation();
                if (dLoc) { obsLat = dLoc.lat; obsLon = dLoc.lon; }
            }

            const hasObs = obsLat != null && (obsLat || obsLon);

            if (!hasObs) {
                // Destroy any prior chart
                if (_radarChart) { try { _radarChart.destroy(); } catch (_) {} _radarChart = null; }
                chartDiv.innerHTML = "";
                listDiv.innerHTML  = "";
                chartDiv.closest(".topo-radar-body").innerHTML =
                    `<div class="topo-radar-empty">Set the observer\'s coordinates (Self panel &rarr; Coordinates, or Domoticz Settings &rarr; Location) to enable the radar.</div>`;
                return;
            }

            // ── 2. Collect node data ───────────────────────────────────────────
            const nodes   = (_deviceMap && _deviceMap.nodes) || {};
            const selfName = _deviceMap && _deviceMap.self;
            const points  = [];

            // Stable hash for pseudo-bearing when no lat/lon available (hops mode).
            function _pseudoBearing(str) {
                let h = 0;
                for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) >>> 0;
                return h % 360;
            }

            for (const [name, node] of Object.entries(nodes)) {
                if (name === selfName) continue;

                // Parse RSSI
                let rssiNum = null;
                if (node.rssi && node.rssi.value != null) {
                    const rv = String(node.rssi.value).replace(/[^\d.-]/g, "");
                    const parsed = parseFloat(rv);
                    if (isFinite(parsed)) rssiNum = parsed;
                }

                // Parse hops
                let hopsNum = null;
                if (node.hops && node.hops.value != null) {
                    const hv = String(node.hops.value).replace(/[^\d]/g, "");
                    const parsed = parseInt(hv, 10);
                    if (isFinite(parsed)) hopsNum = parsed;
                }

                const hasGeo = node.lat != null && node.lon != null && (node.lat || node.lon);
                const online = !!(node.status && (node.status.online || node.status.value === "On" || node.status.value === true));

                if (_radarView === "distance") {
                    if (!hasGeo) continue;
                    const dist = _haversineKm(obsLat, obsLon, node.lat, node.lon);
                    const bear = _bearingDeg(obsLat, obsLon, node.lat, node.lon);
                    points.push({ name, dist, bear, rssi: rssiNum, hops: hopsNum, online, hasGeo: true });
                } else {
                    // Hops mode
                    if (hopsNum == null) continue;
                    const bear = hasGeo
                        ? _bearingDeg(obsLat, obsLon, node.lat, node.lon)
                        : _pseudoBearing(node.pubkey_prefix || name);
                    const dist = hasGeo ? _haversineKm(obsLat, obsLon, node.lat, node.lon) : null;
                    points.push({ name, dist, bear, radial: hopsNum, rssi: rssiNum, hops: hopsNum, online, hasGeo });
                }
            }

            // Assign radial value and sort
            if (_radarView === "distance") {
                points.forEach(p => { p.radial = p.dist; });
                points.sort((a, b) => a.dist - b.dist);
            } else {
                points.sort((a, b) => {
                    if (a.hops !== b.hops) return a.hops - b.hops;
                    // Within same hop count: better RSSI (less negative) first
                    const ra = a.rssi != null ? a.rssi : -999;
                    const rb = b.rssi != null ? b.rssi : -999;
                    return rb - ra;
                });
            }
            points.forEach((p, i) => { p.rank = i + 1; });

            // ── 3. Zoom / scale ───────────────────────────────────────────────
            const radials = points.map(p => p.radial).filter(v => v != null && isFinite(v));
            const rawMax  = radials.length ? Math.max(...radials) : 1;
            const autoMax = rawMax > 0 ? rawMax * 1.1 : 1;
            let yMax;
            if (_radarZoom === 0) {
                yMax = autoMax;
            } else {
                yMax = autoMax / _radarZoom;
            }

            // ── 4. Render right-side list ─────────────────────────────────────
            if (points.length === 0) {
                if (_radarChart) { try { _radarChart.destroy(); } catch (_) {} _radarChart = null; }
                chartDiv.innerHTML = "";
                const body = chartDiv.closest(".topo-radar-body");
                if (body) {
                    body.innerHTML = `<div class="topo-radar-empty">No nodes to plot in this view.</div>`;
                }
                return;
            }

            // Restore the two-column layout if it was replaced by an empty-state message.
            const radarBody = chartDiv.closest(".topo-radar-body") ||
                              document.getElementById("topo-radar") && document.getElementById("topo-radar").querySelector(".topo-radar-body");
            if (radarBody && !radarBody.querySelector("#topo-radar-chart")) {
                radarBody.innerHTML = `<div id="topo-radar-chart"></div><div id="topo-radar-list"></div>`;
            }
            const listEl  = document.getElementById("topo-radar-list");
            const chartEl = document.getElementById("topo-radar-chart");
            if (!listEl || !chartEl) return;

            function fmtDist(km) {
                if (km == null) return "?";
                if (km < 0.01) return "0 m";
                if (km < 10)   return km.toFixed(1) + " km";
                return Math.round(km) + " km";
            }
            function fmtHops(h) {
                if (h == null) return "?";
                return h === 1 ? "1 hop" : h + " hops";
            }

            listEl.innerHTML = points.map(p => {
                const color  = _radarColorForRssi(p.rssi, p.online);
                const val    = _radarView === "distance" ? fmtDist(p.dist) : fmtHops(p.hops);
                const rssiTx = p.rssi != null ? p.rssi + " dBm" : "?";
                // Bearing arrow: rotate ↑ (unicode up-arrow) by bearing degrees
                const bearTx = p.bear != null
                    ? `<span class="topo-rbearing" style="display:inline-block;transform:rotate(${p.bear.toFixed(0)}deg);">↑</span>`
                    : `<span class="topo-rbearing">?</span>`;
                return `<div class="topo-radar-row${p.online ? "" : " offline"}" data-rank="${p.rank}">
                    <span class="topo-rank" style="background:${color}">${p.rank}</span>
                    <span class="topo-rname${p.online ? "" : " offline"}">${escHtml(p.name)}</span>
                    <span class="topo-rval">${escHtml(val)}</span>
                    ${bearTx}
                    <span class="topo-rrssi">${escHtml(rssiTx)}</span>
                </div>`;
            }).join("");

            // Row click → flash the chart point
            listEl.querySelectorAll(".topo-radar-row").forEach(row => {
                row.addEventListener("click", () => {
                    const rank = parseInt(row.dataset.rank, 10);
                    if (!_radarChart) return;
                    _radarChart.series[0].points.forEach(pt => {
                        if (pt.options && pt.options.custom && pt.options.custom.rank === rank) {
                            const origR = pt.options.marker && pt.options.marker.radius || 8;
                            pt.update({ marker: { radius: origR * 2 } }, true, false);
                            setTimeout(() => {
                                if (pt && pt.update) pt.update({ marker: { radius: origR } }, true, false);
                            }, 600);
                        }
                    });
                });
            });

            // ── 5. Load Highcharts (lazy) then render chart ───────────────────
            try {
                await _loadHighchartsMore();
            } catch (_) {
                chartEl.innerHTML = `<div class="topo-radar-empty" style="font-size:0.75rem;">Chart library unavailable.</div>`;
                return;
            }

            // (chart instance is kept across refreshes — see below)

            // Resolve theme colours once per render so we can use them in
            // SVG attributes (Highcharts does not evaluate CSS `var(...)` for
            // marker outlines / text outlines on Firefox/Safari).
            const _cs = getComputedStyle(document.body);
            const _radarBg     = (_cs.getPropertyValue("--bg")     || "#0b1220").trim() || "#0b1220";
            const _radarText   = (_cs.getPropertyValue("--text")   || "#ffffff").trim() || "#ffffff";
            const _radarBorder = (_cs.getPropertyValue("--border") || "#2a3344").trim() || "#2a3344";

            // Build data for Highcharts polar scatter:
            // x = bearing (0..360, 0 = N clockwise), y = radial value (clamped to yMax for off-scale)
            const seriesData = points.map(p => {
                const rawRadial = p.radial != null ? p.radial : 0;
                const clamped   = Math.min(rawRadial, yMax);
                const offScale  = rawRadial > yMax;
                const color     = _radarColorForRssi(p.rssi, p.online);
                return {
                    x: p.bear != null ? p.bear : 0,
                    y: clamped,
                    name: p.name,
                    marker: {
                        fillColor: offScale ? color + "88" : color,
                        // Thin white outline (resolved from --text so a
                        // future light-mode theme stays sensible) — matches
                        // the Leaflet map pin border style.
                        lineColor: _radarText,
                        lineWidth: 1.5,
                        radius: offScale ? 6 : 8,
                        symbol: offScale ? "triangle" : "circle",
                    },
                    custom: {
                        rank:     p.rank,
                        rssi:     p.rssi,
                        dist:     p.dist,
                        hops:     p.hops,
                        online:   p.online,
                        offScale: offScale,
                        realRadial: rawRadial,
                    },
                };
            });

            const yUnit = _radarView === "distance" ? " km" : " hop";
            const yTick = _radarView === "distance"
                ? (yMax > 50 ? Math.ceil(yMax / 4 / 10) * 10 : yMax > 10 ? 5 : yMax > 2 ? 1 : 0.5)
                : 1;

            // Incremental update path: reuse the existing chart instance
            // whenever the view/zoom mode hasn't changed, so a fresh devices_
            // delta does NOT rebuild the whole chart (which previously caused
            // a visible full-animation rebuild every few seconds). Only data
            // and yAxis.max change; the polar grid/axes stay put.
            const _modeKey = `${_radarView}|${_radarZoom}`;
            if (_radarChart && _radarChart._mcModeKey === _modeKey && _radarChart.series && _radarChart.series[0]) {
                try {
                    _radarChart.yAxis[0].update({ max: yMax, tickInterval: yTick || undefined }, false);
                    _radarChart.series[0].setData(seriesData, true, false, false);
                    return;
                } catch (_) {
                    // Fall through to full rebuild on any update error.
                    try { _radarChart.destroy(); } catch (__) {}
                    _radarChart = null;
                }
            }
            if (_radarChart) { try { _radarChart.destroy(); } catch (_) {} _radarChart = null; }

            try {
                _radarChart = Highcharts.chart(chartEl, {
                    chart: {
                        polar: true,
                        type: "scatter",
                        backgroundColor: "transparent",
                        margin: [10, 10, 10, 10],
                        animation: false,
                    },
                    title:   { text: null },
                    credits: { enabled: false },
                    exporting: { enabled: false },
                    legend:  { enabled: false },
                    tooltip: {
                        useHTML: true,
                        formatter: function () {
                            const c = this.point.options.custom || {};
                            const dist  = c.dist  != null ? fmtDist(c.dist)  : null;
                            const hops  = c.hops  != null ? fmtHops(c.hops)  : null;
                            const rssi  = c.rssi  != null ? c.rssi + " dBm"   : "?";
                            const bear  = this.x  != null ? this.x.toFixed(0) + "° " + _compassLabel(this.x) : "?";
                            const ofsTx = c.offScale ? `<br><i style="color:#fb923c">Off-scale</i>` : "";
                            const line1 = _radarView === "distance" && dist ? `<b>Dist:</b> ${dist}` : (hops ? `<b>Hops:</b> ${hops}` : "");
                            return `<b>${c.rank}. ${escHtml(this.point.name || "")}</b><br>
                                    ${line1}<br>
                                    <b>Bearing:</b> ${bear}<br>
                                    <b>RSSI:</b> ${rssi}${ofsTx}`;
                        },
                    },
                    pane: {
                        startAngle: 0,
                        endAngle:   360,
                        background: [{
                            backgroundColor: "transparent",
                            borderColor: "transparent",
                        }],
                    },
                    xAxis: {
                        min: 0,
                        max: 360,
                        tickInterval: 45,
                        tickPositions: [0, 45, 90, 135, 180, 225, 270, 315],
                        gridLineColor: _radarBorder,
                        lineColor: _radarBorder,
                        labels: {
                            style: {
                                color: _radarText,
                                fontSize: "0.65rem",
                                fontWeight: "600",
                                textOutline: `2px ${_radarBg}`,
                            },
                            formatter: function () {
                                return ["N","NE","E","SE","S","SW","W","NW"][this.value / 45] || "";
                            },
                        },
                    },
                    yAxis: {
                        min: 0,
                        max: yMax,
                        tickInterval: yTick || undefined,
                        gridLineColor: _radarBorder,
                        gridLineDashStyle: "Dash",
                        labels: {
                            style: {
                                color: _radarText,
                                fontSize: "0.65rem",
                                fontWeight: "600",
                            },
                            formatter: function () { return this.value + yUnit; },
                        },
                    },
                    series: [{
                        data: seriesData,
                        enableMouseTracking: true,
                        states: { hover: { enabled: true } },
                        dataLabels: { enabled: false },
                    }],
                    plotOptions: {
                        series: {
                            // Suppress per-point animation on subsequent
                            // setData() calls — first paint still animates.
                            animation: { duration: 250 },
                        },
                    },
                });
                if (_radarChart) _radarChart._mcModeKey = _modeKey;
            } catch (e) {
                chartEl.innerHTML = `<div class="topo-radar-empty" style="font-size:0.75rem;">Chart error: ${escHtml(String(e))}</div>`;
            }
        }

        // ── Topology toolbar state ────────────────────────────────────────────
        // Toggle states persisted in localStorage. Defaults match requirements.
        const LS_TOPO = {
            contacts: "meshcore.topo.show_contacts",
            repeaters: "meshcore.topo.show_repeaters",
            rooms:     "meshcore.topo.show_rooms",
            heard:     "meshcore.topo.show_heard",
            lines:     "meshcore.topo.show_lines",
            live:      "meshcore.topo.live",
            audio:     "meshcore.topo.audio",
            tile:      "meshcore.topo.tile",
            heatmap:          "meshcore.topo.heatmap",
            "heatmap-window": "meshcore.topo.heatmap-window",
            los:       "meshcore.topo.los",
            coverage:  "meshcore.topo.coverage",
            "coverage:origin":       "meshcore.topo.coverage.origin",
            "coverage:txPower":      "meshcore.topo.coverage.txPower",
            "coverage:gainTx":       "meshcore.topo.coverage.gainTx",
            "coverage:gainRx":       "meshcore.topo.coverage.gainRx",
            "coverage:rxHeight":     "meshcore.topo.coverage.rxHeight",
            "coverage:noiseFigure":  "meshcore.topo.coverage.noiseFigure",
            "coverage:fadeMargin":   "meshcore.topo.coverage.fadeMargin",
            "coverage:freq":         "meshcore.topo.coverage.freq",
            "coverage:bw":           "meshcore.topo.coverage.bw",
            "coverage:sf":           "meshcore.topo.coverage.sf",
            "coverage:cr":           "meshcore.topo.coverage.cr",
            "coverage:model":        "meshcore.topo.coverage.model",
            "coverage:useTerrain":   "meshcore.topo.coverage.useTerrain",
        };
        function _topoGet(key, def) {
            const v = localStorage.getItem(LS_TOPO[key]);
            if (v === null) return def;
            return v === "1";
        }
        function _topoSet(key, val) {
            try { localStorage.setItem(LS_TOPO[key], val ? "1" : "0"); } catch (_) {}
        }
        function _topoGetStr(key, def) {
            const storageKey = LS_TOPO[key];
            if (!storageKey) return def;
            try { const v = localStorage.getItem(storageKey); return v !== null ? v : def; } catch (_) { return def; }
        }
        function _topoSetStr(key, val) {
            const storageKey = LS_TOPO[key];
            if (!storageKey) return;
            try { localStorage.setItem(storageKey, val); } catch (_) {}
        }
        function _updateTileIcon(btn, mode) {
            const icon = btn && btn.querySelector("i");
            if (icon) icon.className = mode === "dark" ? "fa-solid fa-sun" : "fa-solid fa-moon";
        }

        // ── Tile layer helpers ────────────────────────────────────────────────
        const _TILE_LAYERS = {
            light: () => L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                maxZoom: 19,
            }),
            dark: () => L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {

                subdomains: "abcd",
                maxZoom: 19,

        const _liveMaps = new Set();
        const _mapBaseLayer = new WeakMap();

            if (!map) return;

        // Whether the first-fit-bounds has been done for the current topology session.

        let _topoLiveOn = false;

        let _heatmapLayer = null;
        let _heatmapTimer = null;       // setInterval handle for auto-fade redraws
        let _heatmapDeltaTimer = null;  // setTimeout handle for throttled delta redraw
